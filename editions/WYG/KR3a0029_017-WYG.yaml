body:
  text: 正䝉初義卷十七邳州知州王植撰乾稱篇第十七補注西銘為此篇首章故取其首句為篇名今自為一書而其篇名猶在也與首太和篇多互相發學者宜合而觀之李注東銘本曰砭愚西銘本曰訂頑程子改之盖愚則不智頑則不仁觀其所謂不明自誣而卒之以不智則所以砭其愚者切矣所謂濟惡不才而本之於悖德害仁則所以訂其頑者至矣西銘為此篇之首實正䝉一書之體要故自可狀皆有章以下統論神化性命人鬼死生皆括全書之意以申西銘之義其以東銘終篇乃初學之門也故益物必誠及修巳厚重二章實以見進學之本於誠而其要在於持巳改過以起東銘之指愚按此篇凡十七節與首篇相發明亦當照太虚三層意盖言虚言性即太虚之本體也言神言感言善應即絪縕相盪之大用也言原始反終形潰反原即散亦吾體之正意也言有無虚實言内外言屈伸動靜始終皆不外虚神性感之理或言天之性或言人之性或言性而兼及命或言神而並及化與道與易皆不外三層之義其闢異端也首篇但絀其有無之見此併及其輪迴之說盖以人性為空寂既於太虚之上二層未能深知以人死為輪迴更於太虚之第三層未嘗窺見其弊相因而皆與吾儒相反故不可不辨也内浮屠明鬼一節近思錄入辨别異端東銘一節入論學凡可狀皆有也凡有皆象也凡象皆氣也氣之性本虚而神則神與性乃氣所固有此鬼神所以體物而不可遺也自注舍氣有象否非象有意否發明首三句見天地間無有非氣所謂不如野馬絪縕不足謂之太和也氣之性即浮沈升降動靜相感之性氣本之虚而有相感之妙是虚而神也天下無物非氣莫不有神莫不有性非鬼神為之體謂之何哉張子自注云舍氣有象否非象有意否羅翰本附在此章下而性理大全附在次章下義不相屬今從羅本華注曰有曰象即物也曰氣即隂陽也氣之性虛而神即二氣之良能所以能屈而能伸者故曰鬼神體物不遺愚按此節大意見萬物之不能外乎神與性也首三句只以一氣字分析層折言之即首篇所謂散殊可象所謂濁則碍碍則形者也氣之性本虛謂本乎太虚即首篇所謂太虚無形氣之本體者也而神謂氣之流行者神妙不測即首篇所謂無碍故神也此句以第一層與第二層串言下言神與性盖以第一層二層平舉也舊說皆未分明固有者自然而然也有此氣即具此性與神如人生而性者然故曰固有鬼神體物引成語以証之鬼神即性與神物即氣之有象者至誠天性也不息天命也人能至誠則性盡而神可窮矣不息則命行而化可知矣學未至知化非真得也徵引易說卦之一章窮理盡性以至于命下傳之五章窮神知化德之盛也補訓此承上文神與性推言之見人當窮神知化也神明不測即變化無窮非兩件物事至誠即不息性盡即命行窮神即知化非兩項功夫因窮神言知化末句反言又以知化兼窮神高注天性無妄天命不已性即神命即化故至誠無息而性命神化一以貫之矣何以能誠妄復於無妄而已愚按性與命對則命者性之流行神與化對則化者神之發用而性即神之體命即化之原也故性盡而神可窮命行而化可知細分之性為第一層其神妙不測而流行變化者皆在第二層内不外上節一神字盖以性之妙用流行則曰神神之流行不息則曰命命之推行以漸則曰化耳首二句以理言至誠者天之性不息者天之命此尚未及人人能至誠以下乃以人言集釋集解皆未清晰有無虛實通為一物者性也不能為一非盡性也飲食男女皆性也是烏可滅然則有無皆性也是豈無對莊老浮屠為此說乆矣果暢真理乎補訓此推言性通有無以見二氏不能盡性也上四句引起飲食男女至豈無對見當通為一物以盡性莊老浮屠正是不能為一者豈能盡性闢二氏之虛無當重有與實一邊有無皆性以有無該虚實真理即謂性無不離有虚不離實貫通為一者性也能貫通為一為盡性若不能通為一非盡性者也如飲食男女皆性所寓是烏可厭其有而滅去之然則有與無固皆性也宜貫為一物是豈無對待可以偏廢者哉莊老與浮屠專尚虚無為無對之説乆矣果能暢然於性之真理乎發明太虚無形至靜無感所謂無與虛也其聚其散有識有知所謂有與實也無即性之本體淵源而有即性之客形客感所謂通為一物也無必對有虛必對實故曰是豈無對愚按此即者篇知虛空即氣節意所以辨虚無之謬也下至虚之實節意與此同天包載萬物於内所感所性乾坤隂陽二端而已無内外之合無耳目之引取與人物蕞然異矣人能盡性知天不為蕞然起見則幾矣補訓此見人能盡性知天則與天無異也上言天與人物異下言人可幾天兩截語氣分明夫人之性即天之性也天包載萬物於其内氣之所感涵其所性不過乾坤隂陽二端之循環而已無内外之合亦無耳目之引取與人物之蕞然而小者異矣人之形雖蕞然而性天非蕞然能盡性知天大公無我不為蕞然者起見則幾於天矣人可不求盡性知天哉所感即太和篇浮沈升降動靜相感之感感以氣言性寓其中重在性上所感所性總不越隂陽乾坤二端乾坤者健順之性隂陽者交感之氣也二端非言其分言其循環無間之意内外耳目照人物說為是有内有外方言合天孰為外孰為内有耳目方為聞見所引取天無耳目則無聞見有何引取人物便有已物之内外耳目之引取蕞然言其小也愚按所感言其用所性言其體亦以太虛之第一層與第二層對舉也下言性感言虛神皆放此有無一内外合自注庸聖同此人心之所自来也若聖人則不專以聞見為心故能不專以聞見為用無所不感者虛也感即合也咸也以萬物本一故一能合異以其能合異故謂之感若非有異則無合天性乾坤隂陽也二端故有感本一故能合天地生萬物所受雖不同皆無須㬰之不感所謂性即天道也徵引易咸卦彖曰咸感也象曰君子以虚受人李注人心之所自来内外本合此性之德也其為蕞然起見者因耳目之引取而以聞見為心耳𢎞於性而不禦於見聞則能以虛受人而無所不感矣然非聖人之意之也以萬物同出於一之故天地萬物之大源也一物兩體而自相感故所生萬物亦無須㬰之不感物之性即天之道也補訓人心之所自来心該性在内有形為物無形為理理寓於物故一内而巳外而物以已感物故合聖人不專以聞見為心則虚而無所不感感而即合猶易所云咸感虚受之意也天性即上文所感所性之性天地生萬物本易咸卦天地感而萬物化生愚按此節大意明聖人内外感通之故也通節皆重内外合意首三句言人心本内外合一聖人以下言聖人能合内外萬物本一五句明感即合也之意而推本於萬物本一也天性三句即天道以明人天地生萬物四句言人性即天道以應人心所自来意總之皆見感而能合之義也語意云夫人皆有心亦知心之所自来乎凡有形而為物無形而為理通為一物物散於外理具於内内外合一者此人心之所自来庸聖同之者也但庸人梏於聞見之小而失之聖人則渾然一理無所不具不專以聞見為心故其應事接物亦不專以聞見為用其無所不感而有觸即應者以其不梏於聞見而虚也故感於物而即合也猶易所謂咸也所以感而即合者以萬物之情異而理本一故吾心之一理能合萬物之異惟其能合異故謂之感若非有異則無所用其合而又何感之可言乎此合内外所以為聖人之能事也夫人心之所自來本於天天體至大而其所性亦不過乾坤隂陽二端而已二端循環故有感其理本一故能合此天道之感而即通者然也天地以之生萬物物亦各得天地之理以為心所受於天者雖有大小之不同而皆無須㬰之頃不與物相感是所謂性者即天道而天與人物皆内外合者也人可不思人心所自來而合内外以求合於天哉有無一内外合即上所謂有無虚實通為一物之性也故曰人心所自來感即合與上内外合二合字微别内外以心與物對萬物皆備於我故曰合性之本然者也感以物言合者一以貫之之意聖人之心也天性以下只申明首三句意所受不同兼人物言而重在庸聖之不同無須㬰不感亦兼人物言而重在人之無不感盖天道無為而就其用處言之則乾坤隂陽之流行為四德為五行人物生生千變萬化皆無須㬰不感者也人性亦無為而就其用處言之則為四德為五常為百行以及萬事萬物之各有一理亦無湏㬰不與物相感此即性中自然之能所謂人心所自來者也然惟聖人物各付物一以貫之與天道之有感無隠者一而已故曰感即合也曰天性又曰天道者太虛之性合於乾坤隂陽之氣而謂之天道實則一也宋子鋭臣云二端故有感所謂兩故化也本一故能合所謂一故神也感者性之神性者感之體自注在天在人其究一也惟屈伸動靜始終之能一也故所以妙萬物而謂之神通萬物而謂之道體萬物而謂之性徵引易説卦之六章神也者妙萬物而為言者也補訓此承上文性感而言泛論理不著人感也性也一而二二而一者也感者其性之神妙所為乎性者其感之本體所在乎惟屈與伸動與靜終與始之相感而能一也故即所以妙萬物而謂之神也感則能通通萬物即謂之道感必有體體萬物即謂之性其究一而已矣感而能一即妙萬物之神也感通萬物是天道流行處感萬物不離性是性能體萬物愚按天之太虛無形變化客形與人之寂然不動感而遂通皆以性為體感為用者也故自注云然集釋謂性天感人分屬未合屈伸動靜始終皆以兩相感者也其屈而能伸伸而又屈與夫動靜始終之能一者神也神即道道即性但所由之名異耳其在天者兩在不測而為神無物不有而為道體物不遺而為性也其在人者有感必通而為神萬物皆備而為道體事無不在而為性也皆兼天人言之為盡至虚之實實而不固至靜之動動而不窮實而不固則一而散動而不窮則往且來華注實本於虚故不固而流行無滯動本於靜故不窮而推遷無已虚靜者天地之性寔動者性之感在人亦然集解理本虚無形也而所以為形之理實無不具故曰至虛之實形滯於方虚而能實則有其理無其形也理無方故一而能散動根於靜故曰至靜之動則其靜也有以畜其力養其動矣故動而不窮不窮則往且來四時是也愚按此節大意亦明性感之理也虚與靜俱貼性實與動俱貼感而性感皆兼天人言之補注以虚實動靜照首篇太虚客形至靜客感分貼天人未確性通極於無氣其一物爾命稟同於性遇乃適然焉人一已百人十已千然有不至猶難語性可以言氣行同報異猶難語命可以言遇性理拾遺問智愚之識殊疑於有性善惡之報差疑於有命張子曰性通極於無氣其一物耳命稟同於性遇乃適然焉語錄人一已百人十已千如此不至者猶難罪性語氣可也行同報異猶難語命語遇可也氣與遇性與命切近矣猶未易言也補訓此言性與氣命與遇之分上提起下申其說發明天地之性原不雜氣質故曰通極於無自天畀之為命自人得之為性原無二理故曰稟同於性張注性者至善而已命則有吉有凶學問所以變化氣質苟有未變當咎氣不當咎性也福善禍淫理之常也有反是者非天命之逆施乃境遇之適然君子亦安之而已矣愚按此與至誠天性節皆極精粹與程朱大同然所云無者亦本太虚無形言之與無極太極之理終覺小異宋子鋭臣云通極於無猶首節氣之性本虛之意高注謂通極猶究極未合又云張子言造化之氣多於氣字中帶性言之如首節太和是也言人身之氣多於氣字上標性字或貶倒氣字如誠明篇氣質之性及此節是也在天無不實之理在人有不實之心此與程朱甚合浮屠明鬼謂有識之死受生循環遂厭苦求免可謂知鬼乎以人生為妄可謂知人乎天人一理輒生取舍可謂知天乎孔孟所謂天彼所謂道惑者指游魂為變為輪迴未之思也大學當先知天德知天德則知聖人知鬼神今浮屠極論要歸必謂死生轉流非得道不免謂之悟道可乎自注悟則有義有命均死生一天人惟知晝夜通隂陽體之不二自其説熾傳中國儒者未容窺聖學門墻已為引取淪胥其間指為大道其俗達之天下致善惡智愚男女臧獲人人著信使英才間氣生則溺耳目恬習之事長則師世儒宗尚之言遂㝠然被驅因謂聖人可不修而至大道可不學而知故未識聖人心已謂不必求其迹未見君子志已謂不必事其文此人倫所以不察庶物所以不明治所以忽德所以亂異言滿耳上無禮以防其偽下無學以稽其弊自古詖淫邪遁之詞翕然並興一出於佛氏之門者千五百年自非獨立不懼精一自信有大過人之才何以正立其間與之較是非計得失徵引易上傳之四章精氣為物游魂為變是故知鬼神之情狀本義隂精陽氣聚而成物神之伸也魂游魄降散而為變鬼之歸也大過象君子以獨立不懼詩小雅雨無正篇淪胥以鋪集傳相與陷於死亡書益稷在治忽蔡傳忽治之反也舜典惟精惟一太史公報任安書臧獲婢妾猶能引决風俗通云古制本無奴婢即犯事者原之臧者被贓罪沒入官為奴獲者逃亡獲得為婢補訓此節深闢釋氏也有原有委極其透快前云不知鬼不知人不知天不知道可見浮屠全無所知自其説熾傳以下言其流弊儒者為所引取是一層達之天下人人是一層英才間氣至千五百年是一層乃其害之大者末言闢之難其人張子其欲自任歟大學是學之大者容猶得也恬習安於所習也世儒宗尚之言即上指為大道者因謂乃英才間氣者為此說也聖人可不修而至謂立地成佛也大道可不學而知謂不立語言文字但取頓悟也稽考也發明氣有聚散氣散為鬼非既散之氣復為方伸之氣也佛氏以覺為性謂人雖死而覺性不散為鬼重復受生輪迴循轉遂指為苦海求免是不知鬼也氣聚為人日用事物莫非實理佛氏指四大為假合是不知人也天性之在人猶水性之在冰凝釋雖異為物一也佛氏舍人取天是不知天也所以然者盖由太虛有天之名由氣化有道之名孔孟所謂天本謂道之從出而佛氏直認太虛為道謂萬象為太虛中所見之物是以一切人事盡為墮落下學工夫盡可遺棄此其所以不知天與人也易曰精氣為物游魂為變朱子曰精魄也耳目之精為魄氣魂也口鼻之嘘吸為魂二者合而成物精虚魄降則氣散魂游而無不之矣張子之意是謂變為有變為無今佛氏即以變為輪迴此所以不知鬼也天德者誠也隂陽晝夜之實理通乎晝夜而知知天德也能知天德則知聖人所以範圍天地之化知鬼神不過屈伸之理死生天人處之一矣今佛氏不知死生之故直謂得道可免輪迴謂之悟道可乎盖聖人以天為道所從出以道為日用事物當然之理故窮理盡性然後可以至命下學然後可以上達佛氏謂太虛即道故謂一切有為皆是幻化其為吾道之賊豈可勝歎李注以其有鬼神生死之可畏懼也則善惡智愚男女臧獲人人著信矣以其有超悟脱離之可歆羡也則英才間氣亦㝠然被驅矣人倫不察庶物不明在世則害治在身則亂德上不能反經以息邪慝下不能明道以覺沈迷遂至千有餘年並為一論惟獨立不懼則不至於怖死生慮禍福惟精一自信則不至於溺耳目崇世儒惟有大過人之才故能卓然以聖人之道為己任有學以稽其弊而是非可明有禮以防其偽而得失可辨矣集解惑字疑無心有識謂人也間氣謂間有之氣難得之賢才也建安葉氏采曰當生而生當死而死是則有義有命生死均安何所厭苦天人一致何所取舍知晝夜通隂陽則知死生之説何所謂輪迴愚按此節首五句明釋氏不知鬼以輪迴為說次五句明其不知天人以崇虛為說孔孟二句明所以不知天人之故惑者二句明所以不知鬼之故大學八句由崇虚意說到輪迴而見其不知道自其說以下言惑人之易而為害之乆也盖鬼神無形也而釋氏偏以為有人性至實也而釋氏偏以為無其與吾儒直如氷炭之不相入惟以人性為無也故舍人而取天惟以鬼神為有也故懼輪迴而求得道種種流弊皆自此出儒者誦法周孔為風俗人心倡率而反惑於異說不洵可歎乎舍人取天者以人生為妄欲一切歸於空虚也知天德即首篇所謂本天道為用下節所謂知晝夜隂陽而一性命者也聖人於此理兼體不累鬼神則此理之妙用而已懼死生轉流而欲得道以免則是道其所道而非天德之道也得道云者道即指太虚欲虛空寂靜如槁木死灰不生不滅即謂之得道與長生之說有别補訓謂延保不散之氣以免輪迴未是極論要歸要當讀平聲與下節發本要歸同謂極論其要歸也補訓謂極至之論要妙之歸亦非是釋氏語實際乃知道者所謂誠也天德也其語到實際則以人生為幻妄有為為疣贅以世界為䕃濁遂厭而不有遣而弗存就使得之乃誠而惡明者也儒者則因明致誠因誠致明故天人合一致學而可以成聖得天而未始遺人易所謂不遺不流不過者也彼語雖似是觀其發本要歸與吾儒二本殊歸矣道一而已此是則彼非此非則彼是固不當同日而語其言流遁失守窮大則淫推行則詖致曲則邪求之一卷之中此弊數數有之大率知晝夜隂陽則能知性命能知性命則能知聖人知鬼神彼欲直語太虚不以晝夜隂陽累其心則是未始見易未始見易則雖欲免隂陽晝夜之累末由也已易且不見又烏能更語真際舍真際而談鬼神妄也所謂實際彼徒能語之而已未始心解也徵引釋氏金剛經一切有為法如夢幻泡影又曰諸幻為真雖真亦妄彌陀經五濁惡世䕃濁見濁煩惱濁衆生濁命濁莊子宥坐篇今學曽未如疣贅注疣贅結肉也易上傳之四章與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流又云範圍天地之化而不過曲成萬物而不遺李注申上條之意大學當先知天德天德者誠而已矣誠之中萬理具備至賾而不可厭也釋氏亦語實際疑與夫誠相似矣而以人生為幻妄有為為疣贅欲厭棄之不暇雖使其果誠也而已惡明矣况誠明相為體用既無明所謂誠者又安在乎因明致誠由窮理而盡性也故致學而可以成聖因誠致明由盡性而窮理也故得天而未始遺人曲成而不遺旁行而不流周物而不過此則天人合一儒者之學也彼語實際雖與誠相似然既惡明而殊其歸則亦非誠而與我異其本矣本末既異是非固不可同詖淫邪遁之詞知言者展卷立辨而已吾儒所謂天德者性命也欲知性命知聖人知鬼神必先通乎晝夜隂陽之道而知晝夜隂陽者易也易即天道也浮屠徒知體虛空為性不知本天道為用則語寂滅者與狥生執有均耳安能盡道其間兼體而不累乎誠者物之終始鬼神者誠之不可掩者也舍易而言誠舍誠而言鬼神非誣妄而何哉補訓釋氏語實際至惡明者也為一段言釋氏之語實際類知道之所謂誠然誠而惡明不惟不能明亦不能誠矣儒者至不過者也為一段言儒者誠明天人兼盡如此彼語雖似是至有之為一段較論儒是而釋非大率知晝夜至末為一段先正後反言釋氏不知晝夜隂陽之道為不知易不知易則不能免累彼談鬼神為妄而未能心解於實際也致誠之致至也致學之致推致其功也不遺與不流連言不遺恐是不違之誤流遁失守四句錯舉孟子詖淫邪遁四字而以失守窮大推行致曲實之直但也真際即實際談鬼神即受生輪迴之説愚按此節自數數有之句截分二段㸔皆申上節意盖上節不知天人是一意不知鬼不知道是一意此上段即上節以人生為幻妄舍人取天之意盖申不知人不知天之義也下段即上節當知天德數句之意盖申不知鬼不知道之義也然以語實際起以未能解真際結以下截申明上截正非截然分說節首實際天德俱虚彼語實際宜若知天德矣其語到實際却謂一切皆空不知天德之誠不離於晝夜隂陽而已晝夜隂陽氣化之實即易之道也知此則性命即此理之本天而流行者也聖人即知此理而兼體不累者也鬼神則所謂二氣之良能者也語太虚而遺氣則亦烏知天德不知天德又烏能語實際哉大意即首節畧知體虚空為性不知本天道為用意要歸之要平聲謂始之所以發其本終之所以要其歸者也補訓作去聲誤晝夜隂陽所該者廣如近而吾身之語黙動息外而事物之應接交感無非晝夜隂陽之實理所在即易之道也聖人知之而因物盡道故脱然而無累釋氏不知而欲廢棄一切反為其所役矣故曰欲免累而末由補訓解晝夜隂陽耑以死生為言謂釋氏欲生而不死亦未是易謂原始反終故知死生之說者謂原始而知生則求其終而知死必矣此夫子所以直季路之問而不隠也徵引易上傳之四章原始反終故知死生之説本義原者推之於前反者要之於後補訓此因上文輪迴之説而引易及孔子之言以見輪迴之妄也直者直告之也李注謂非拒其問也言能知生則能知死矣正所以直告之也愚按首篇云太虛不能不聚而為萬物萬物不能不散為太虚即此節之義疏盖太虚之第三層也與程朱所言小異玩下節形潰反原可見體不偏滯乃可謂無方無體偏滯於晝夜隂陽者物也若道則兼體而無累也以其兼體故曰一隂一陽又曰隂陽不測又曰一闔一闢又曰通乎晝夜語其推行故曰道語其不測故曰神語其生生故曰易其實一物指事異名耳徵引易上傳之四章通乎晝夜之道而知故神无方而易无體五章一隂一陽之謂道又曰隂陽不測之謂神十一章一闔一闢謂之變十二章推而行之謂之通五章又云生生之謂易補訓此節以道字為主而兼及神與易體不偏滯二句提起下分物則偏滯道則兼體言雜引易辭皆兼體之意兼體則道也神也易也皆在乎是矣更即道而推之道與神與易非有二也易曰神无方易无體盖謂體之不偏滯者乃可謂無方無體凡偏滯於晝夜隂陽而不相通者物也若道則兼體而無偏滯之累也以其兼體故易有曰一隂一陽又曰隂陽變化不測又曰一闔一闢又曰通乎晝夜盖自其推行有漸語之故曰道自其變化不測語之故曰神自其生生不窮語之故曰易其實則為一物指其事而異其名耳分之為三可也統之為道可也無方所無定體如晝夜隂陽循環變化是也若晝只為晝夜只為夜則偏滯而不能無方體矣一隂一陽一闔一闢一字甚活有循環之義不測亦謂變化不測通乎晝夜作通變之通與易稍異張注無方故無物不包無體故無微不入動則在陽靜則在隂故曰兼體動極而靜靜極而動不守其常故曰無累大率天之為德虛而善應其應非思慮聰明可求故謂之神老氏况諸谷以此徵引老子成象篇谷神不死補訓此言天德之神也謂之神者以其神妙不測也可求則不神矣高注應者屈伸相感之無窮况譬也老子所謂谷神不死况天之虛而應也愚按虛即太虚無形之本體體也善應即絪縕相盪之氣化用也由第一層及第二層重在神太虛者氣之體氣有隂陽屈伸相感之無窮故神之應也無窮其散無數故神之應也無數雖無窮其實湛然雖無數其實一而已隂陽之氣散則萬殊人莫知其一也合則混然人不見其殊也形聚為物形潰反原反原者其游魂為變歟所謂變者對聚散存亡成文非如螢雀之化指前後身而為說也徵引易上傳之四章游魂為變禮月令季夏之月腐草為螢季秋之月爵入大水為蛤補訓此承上文虛而善應謂之神而極推隂陽合散之理因以明生死變化之義也無窮無數總歸湛一即所謂太虚為之體也隂陽之氣四句大概以隂陽言承上起下之詞形聚為物二句以一物言夫太虚之理主宰乎氣而為氣之體氣有隂陽屈伸相感之無窮故神之應之也亦無窮其氣散見而無數故神之應之也亦無數雖應之無窮其實只是湛然雖應之無數其實只是一而已矣湛一者太虚之理本如是也夫隂陽之所以感且散者未易窺也隂陽之氣本一散見則有萬殊人莫知其一也合則混然萬殊歸於一人不見其殊也此隂陽之變也以一物言之方其形聚則合為一物及其形潰則反原盖形潰反原則魂散而復歸於隂陽之氣易所謂游魂為變此之謂歟所謂變者對聚散存亡而為文耳非如螢雀之化指其有前後身而為變之說也彼輪迴受生之說不亦妄哉太虛之理至神妙故下言神神即太虚之善應處隂陽屈伸相感無窮對下散説則相感主其合時言散則萬殊合則混然無迹形聚為物承散説隂陽之氣散為萬物而物皆得隂陽之氣聚為形也形潰反原承合説形潰散則反歸其原復合於太虚也此二句不可以聚承合潰承散說易游魂為變對聚散存亡為文謂聚變為散存變為亡也集解散散見成物也非消散也無窮直言無時不然也無數横言無物不有也反原者謂其理復還於天地也程子曰萬物之散其氣遂盡無復還本原之理天地之化自然生生不窮更何資既反之氣以為造化哉况既反之氣既散豈有復在天地之間其造化者自生氣如海水潮至因陽盛而涸及隂盛而生亦不是將已涸之水来生也或問朱子人死其氣雖散只反本還原去曰不須如此說若說無便是索性無了惟其可以感召得来故只說得散要之散也是無了愚按太虚體也神即太虚之用也其用隨氣所感而善應體則湛然而至一亦以第一層第二層並舉也至形潰反原並及第三層矣盖相感無窮以氣之流行言其散無數以氣之生物言其實則湛然而一仍然太虚之本體而已散則萬殊承上散無數一即下混然意與上一謂太虛者不同合則混然承上感無窮殊即上萬殊意此見萬殊即其混一混一即其萬殊而隂陽之氣皆神之所為非貴人以當知也形聚為物又承散則萬殊形潰反原又承合則混然通節只此二意反原者以下不過因反原而辨游魂為變之義耳益物必誠如天之生物日進日息自益必誠如川之方至日増日得施之妄學之不勤欲自益且益人難矣哉易曰益長裕而不設信夫徵引易益卦彖日進無疆下傳之七章益長裕而不設本義益但充長而不造作詩小雅天保篇如川之方至以莫不増補訓此與上文不聫盖以學問之語雜附之提一誠字示人見得誠能益於己益於人而借易以明其義華注益物自益皆必以誠漸而進之而勿助長乃其道也施之妄躐等之教也學不勤作輟之學也故皆不能益愚按益六三有孚中行謂心存誠信而所行合中也九五有孚惠心謂上有誠信以惠下之心也易原有誠意但張子非耑釋易乃借易以明誠之足為益耳大易篇益長裕而不設益以誠也妄加以不誠之益非益也與此互相發上以誠正明長裕意下以妄與不勤反明不設意誠則自不用設不誠則妄與不勤之弊生矣反正相足將修已必先厚重以自持厚重知學德乃進而不固矣忠信進德惟尚友而急賢欲勝已者親無如改過之不吝徵引易乾卦文言忠信所以進德也書仲虺之誥改過不吝補訓此引論語不重章貫通其意示人以切己之功也集釋不固之固此以為固滯之固李注學則不固盖重則疑於固知學則其德日進而不固矣厚重而進於學忠信而取善改過皆交養互發之道也愚按論語本作四事此以重與學分㸔與下共作五事而其意總以見五者之相須而不可缺也戲言出於思也戲動作於謀也發乎聲見乎四肢謂非己心不明也欲人無己疑不能也過言非心也過動非誠也失於聲繆迷其四體謂己當然自誣也欲他人己從誣人也或者以出於心者歸咎為己戲失於思者自誣為己誠不知戒其出汝者歸咎其不出汝者長傲且遂非不智孰甚焉徵引禮哀公問孔子曰君子過言則民作辭過動則民作則張子經學理窟學大原上篇戲謔直是大無益出於無敬心戲謔不已不惟害事志亦為氣所流不戲謔亦是持氣之一端善戲謔之事雖不為無傷朱子曰此章即東銘正如今法書所謂故失兩字華注首篇及此篇多論神化之事而以此章終之見君子窮神達化之功不外乎言動身心之地正示人著實用功處李注言動之戲者有心之過也乃自以為出於無心而欲人之不己疑曰吾聊為戯耳而不知戒其出汝者是之謂長傲言動之過者無心之失也乃自以為當然而欲人之己從曰吾誠欲如此耳而不知歸咎其不出汝者是之謂遂非凡此者皆不能思省撿察之過故曰不智莫甚焉補注沈毅齋先生詳述朱子之説謂此篇大指不越過故二字且曰有心謔浪之謂戲無心差失之謂過本有心而掩之以無心則以故為戲而至於長傲本無心而誣之以有心則以過為誠而至於遂非是愚之甚者也戲不可有朱子推其原而謂之故欲人深戒於言動未發之先以為正心誠意之本過不能無朱子指其流而謂之過欲人自咎於言動己失之後以為遷善改過之機其誨人之意深矣愚按歸咎猶云任過出於思作於謀即是出於心即是出汝者謂非己心即是歸咎於戲即是不知戒非心非誠即是失於思即是不出汝謂己當然即是自誣為誠即是不知歸咎雖言之重而詞之複意則只此兩層正蒙初義卷十七
