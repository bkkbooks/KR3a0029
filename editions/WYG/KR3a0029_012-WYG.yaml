body:
  text: 正蒙初義卷十二邳州知州王植撰有徳篇第十二華注此篇諄諄於言動出處事親處世之道是天徳之實下有司篇則言居官臨政之道是王道之全也愚按此篇凡三十八節節各一義意不相屬内言有教節入近思録論學有徳者必有言能為有也志於仁而無惡能為無也髙注有徳有言能有其所當有也志仁無惡能無其所當無也華注從焉能為有焉能為無來愚按此節大意以孔子有徳無惡實子張能為有無之語疑張子㸔焉能為有無亦與朱注别也行修言道則當為人取不務徇物強施以引取乎人故往教妄說皆取人之弊也徴引禮曲禮上行修言道禮之質也陳注言道言合於道也曲禮又云禮聞取於人不聞取人禮聞來學不聞往教朱子曰取於人者為人所取法取人者人不來而我引取之也來學往教即其事也曲禮又云禮不妄說人陳注說音恱補訓連引曲禮以眀教人者當為人取法不可以枉道引取乎人也曲徇乎人強以施教即引取人之意引謂誘之來華注往教欲人善妄說欲人喜雖邪正不同而皆有弊愚按華注往教妄說並言玩上四句當以往教為主妄說亦指教者而言如曲說以阿人之類言不必信行不必果志正深逺不務硜硜信其小者補訓此眀孟子大人言行不必信果之意而以論語之硜硜必信必果形之信其小者信以該果愚按孟子言大人不必信果孔子言小人必信必果語意反正相足故合論之志正深逺對硜硜言志於義則正精於義則深逺矣有淺深辭取達意則止多或反害也補訓此眀辭達而已矣之意務多之害恐其文煩則掩意飾偽則不誠君子寜言之不顧不規規於非義之信寜身被困辱不徇人以非禮之恭寜孤立無助不失親於可賤之人三者知和而能以禮節之也與上有子之言文相屬而不相䝉者凡論語孟子發眀前文義各未盡者皆挈之他皆放此補訓此以論語信近於義節聨上章知和禮節而言之也規規猶拘拘可賤與可宗反約信致恭相因皆有和意而必合義必守禮必求可親是以禮節之也兩章文相屬謂章次相聨不相蒙謂各為一章前文義有未盡則下章發眀皆提挈之在一處以互見也補注寜言之不顧猶言寜言之不復也寜身被困辱猶言寜近恥辱也寜孤立無助猶言寜無所宗也此三者能知和而以禮節之葢張子合二章而言也愚按此以知和而和通之信近章乃書之一義非謂其正㫖盡於是也因此而謂張子之書皆逐節相聨則必有附會拘牽之病矣徳主天下之善善原天下之一善同歸治故王心一言必主徳故王言大徴引書咸有一徳徳無常師主善為師善無常主協於克一俾萬姓咸曰大哉王言又曰一哉王心蔡傳徳兼衆善不主於善則無以得一本萬殊之理善原於一不協於一則無以達萬殊一本之妙博而求之於不一之善約而會之於至一之理此聖學始終條理之序蔡仲之命為善不同同歸於治補訓此釋咸有一徳之言徳主天下之善以萬殊言善原天下之一以一本言善歸於治無不善以雜之故王心一言必主乎徳皆有闗係故王言大髙注凡所謂徳不過主於善而已盖善得於己則謂之徳也凡所謂善原於一理而已盖順理則吉故謂之善也主於善故王心一發於徳故王言大愚按徳善一也主於内為心一發扵口為言善心云善言云徳者互見之文耳李注以言頂主善心頂克一未確尚書大全問徳無常師四句朱子曰横渠說最好徳且是大體說有吉徳有凶徳然必主於善始為吉耳善亦且是大段說或在此為善或在彼為不善或在前日則不善而今日則為善惟須協於克一是乃為善協字雖訓合字却是以此合彼之合非己相合之合又曰一者善之原也善無常主如言前日之受非也協於克一如言皆是也盖均是善但易地有不同者故無常主必是合於一乃為至善一者純於理而無二三之謂也朱子有取張子之説如此竊意一者萬理之一本者也書言協者叅萬理以㑹一理之約此言原者本一理以定萬理之歸皆以人之求善者言言異而意一也言有教動有法晝有為宵有得息有養瞬有存朱子曰此語極好君子終日乾乾不可瞬息間亦不必終日讀書或静坐存養亦是天地之生物以四時運動春生夏長固是不息及至秋冬凋落亦只藏於其中故明年復生若使秋冬已絶則来春無縁復有生意學者常喚令此心不死則日有進一息之間亦有養一瞬之間亦有存如造次必於是顛沛必於是之意但說得太𦂳補注此言君子無往無時而非學也葉氏曰非先王之法言不敢言言有教也非先王之徳行不敢行動有法也終日乾乾晝有為也夜氣所養宵有得也氣之出入為息一息而必有所養也目之開闔為瞬一瞬而必有所存也集釋言動一身也宵晝一日也瞬息一刻也學者當書此言於坐隅作聖功夫也補訓教以古人教人之規條言法即禮法之法晝主動作故有為為以事言宵主静思故有得得以理言養存皆以心言養以天理養吾心也存存天理於吾心也六句一層進一層言動是大段工夫晝夜則密矣息瞬則尤宻君子於民導使為徳而禁其為非不大望於愚者之道與禮謂道民以言禁民以行斯之謂耳徴引禮緇衣君子道人以言而禁人以行髙注道民以言使之為徳禁民以行使不為非皆不大責望於愚者之事也以言謂以言語告詔之以行以行事禁止之也華注惟愚故不可不導不可不禁惟愚故禁導之外亦無深望焉愚按此節大意言君子教民之道而引禮以証之非為釋禮也無徴而言取不信啓詐妄之道也杞宋不足徴吾言則不言周足徴則従之故無徴不信君子不言補訓以孔子不言夏殷之禮見君子無徴則不言也從周是帶言無徴而言取人之不信乃啟詐妄之道也人不信而習為詐妄自我啓之耳孔子於杞宋不足徴吾言則不復言周禮足徴則従乎周以此觀之君子扵無徴而人不信者不肯言也補注榖梁傳曰春秋之義信以傳信疑以傳疑意盖如此愚按啟詐妄謂無徴而言之流弊恐以輕言開詐妄之端耳補訓之說似太曲便辟足恭善柔令色便佞巧言補訓此以巧言令色足恭解便辟善柔便佞取其大意相近節禮樂不使流離相勝能進反以為文也徴引禮樂記禮減而進以進為文樂盈而反以反為文又云樂勝則流禮勝則離朱子曰樂記言減是退讓撙節收斂的意思是禮之體本如此然非人之所樂故須進步向前着力去做故以進為文盈是舒暢發越快滿的意思是樂之體本如此然易至於流蕩却須收拾向裏故以反為文補注此皆孔子之言而張子各以類配之也補訓孔子云節禮樂節之者使其不偏不至於樂勝而流禮勝而離且能於禮則進而不消有威儀以為文於樂則反而不放有節奏以為文也集釋節若不文不使過中乃所以為文也李注節字従禮樂易於相勝處說正與有子所謂知和而和不以禮節之者意極相貫愚按禮以肅分而彼此之情不通則離矣故進以為文而意文必備樂以合情而和樂之意無節則流矣故反以為文而節制必嚴一進一反雖不同節其過則一也驕樂侈靡宴樂宴安補訓此釋驕樂宴樂之義集釋宫室無度衣服無節侈靡也耽於酒食安於怠惰宴安也言形則卜如響以是知蔽固之私心不能黙然以達於性與天道徴引易上傳之十章問焉而以言其受命也如響華注達於性與天道不著卜筮說言形則卜如響是借揲蓍以明天人感通之理言之應非以其言也以其心之誠也蔽固之心先不誠矣豈能達於性與天道哉補訓卜即指揲蓍易云以卜筮者尚其占卜筮是通用字愚按此節大意明妄心之不足以合天也集解以性道即貼卜筮說則此節専為揲蓍發取義太淺華注乃為該括黙然以達猶黙契也宋子鋭臣云易言指卦爻之詞此則以為問卦之詞也人道知所先後則恭不勞慎不葸勇不亂直不絞民化而歸厚矣補訓此合論語恭而無禮君子篤於親二節以大學知所先後之語冠之見人當知所先也人之道當知所先後先有禮則恭不勞慎不葸勇不亂直不絞矣先篤親不遺則興仁不偷民化而歸厚矣用曾子民徳歸厚之語以括興仁不偷二句也張子此等串合似失之鑿愚按此節論語朱註採入而不甚然其說盖合二節為一章不如各為一章之為愈也膚受陽也其行隂也象生法必效故君子重夫剛者徴引易上傳之五章成象之謂乾效法之謂坤朱子曰象是未成形之意法是一成已定之物補訓此張子易理爛熟於膚受節㸔出隂陽象法之理也象屬陽法屬隂方愬而有其象為陽愬行而呈其形為隂膚受易於行陽動而隂隨之猶象生而法必效之也君子重夫剛者剛即論語所言明也舊注謂膚受不行為陽行為隂象生句似無安頓歸罪為尤罪己為悔言寡尤者不以言得罪於人也補訓此釋寡尤悔之意由其不以言得罪於人故人不歸罪髙注歸罪者人以罪歸之己所不欲勿施於人能恕己以仁人也在邦無怨在家無怨己雖不施不欲於人然人施於己能無怨也補注釋論語之意或疑恕己二字即朱子所以譏范忠宣者若易之曰能恕人以仁己也則庶乎其得之矣髙注恕己仁人者推己以及物也李注此以無怨為無怨於人之義敬而無失與人接而當也恭而有禮不為非禮之恭也補訓論語敬而無失以䖏己言恭而有禮以與人言張子通作人說與人接而當宜寛說事事皆當恭而有禮専以禮貌言聚百順以事君親故曰孝者畜也又曰畜君者好君也徴引禮祭統孝者畜也順於親不逆於倫是之謂畜又云備者百順之名也補注引祭統所以為聚百順以事親者引孟子所以為聚百順以事君者集釋此以畜訓聚與孟子不同華注孝道一有不備則非所以事親矣忠道亦然事父母先意承志故能辨志意之異然後能教人徴引禮祭義君子之所謂孝者先意承志諭父母於道程子曰意與志異志是所存䖏意是發動處如先意承志自不同也補訓中正篇云諭人者先其意而遜其志可也志意兩言則志公而意私耳與此節叅㸔知其志之如何不待其意之發而先其意以承其志此諭親於道者當然也能辨志公意私之異然後能教人亦先其意而遜其志耳如推所食以與人父之志也不待其意之發而先請所與是謂先意而承志愚按此節大意見志意公私之宜辨也引祭義成語以起教人以教人為主藝者日為之分義涉而不有過而不存故曰游集釋釋論語游於藝之意補訓今人每日所學者謂之功課分義或是此類涉如涉水過如過路皆照㳺字立言集解不有不存者心不為彼所累也若切切偏好而不舍反為吾性累矣如程明道以謝上蔡誦史文為玩物喪志是也天下有道道隨身出天下無道身隨道屈補注釋孟子以道殉身以身殉道之意補訓此以隨字替殉字安土不懐居也有為而重遷無為而輕遷皆懐居也徴引易上傳之四章安土敦乎仁本義隨處皆安而無一息之不仁補注此釋易安土二字之義李注安土與懐居相似而不同安土則不懐居懐居則不安土矣有為無為猶言有故無故也華注當遷而遷不當遷而不遷皆安土也不然有所繫戀固懐有所歆羨亦懐耳補訓重遷者懐舊居輕遷者懐新居愚按重遷輕遷皆以居止言而安仁意在言外有過不改有為而重遷者也執徳不固無為而輕遷者也老而不死是為賊幼不率教長無循述老不安死三者皆賊生之道也補訓此釋責原壤老而不死之義不率教是不率父兄之教賊生謂賊害其生理髙注無循述不率由舊章而恣意妄為也不安死不以死為安而欲偷生也集釋因老而並言幼與長也樂驕樂則佚欲樂宴樂則不能徙義補注此孔子所謂損者也補訓前云驕樂侈靡宴樂宴安此又進一層侈靡則縦佚欲宴安則不能徙於義不僭不賊其不忮不求之謂乎徴引詩大雅抑之篇不僭不賊鮮不為則集傳僭差賊害也衛風雄雉篇不忮不求集傳忮害求貪也補注此以詩釋詩學者以意推之可也補訓不差於事不害於理屬處已言不以人有而忮不以己無而求屬與人言張子合言之不僭即不求之謂不賊即不忮之謂不穿窬義也謂非其有而取之曰盜亦義也惻隠仁也如天亦仁也故擴而充之不可勝用徴引家語五帝徳篇孔子曰陶唐其仁如天補訓義從粗處說到細䖏仁従微䖏說到大處皆須推擴而至於充滿方不可勝用愚按此節大意釋孟子充無穿窬章意見仁義之宜極其量也自養薄於人私也厚於人私也稱其才隨其等無驕吝之弊斯得之矣華注此借驕吝兩字而通之扵自養另為一解發明薄則吝厚則驕素富貴行乎富貴素貧賤行乎貧賤斯得之矣愚按才謂力之所及等謂分之所宜罪己則無尤補注與上歸罪為尤罪己為悔章意同集釋能罪己則有自修之實故人不得而尤之困辱非憂取困辱為憂榮利非樂忘榮利為樂華注取困辱則雖不至困辱亦可憂也㤀榮利則無紛擾之念何樂如之愚按此節大意論憂樂之在我而不在外也勇者不懼死且不避而反不安貧則其勇将何施耶不足稱也仁者愛人彼不仁而疾之深其仁不足稱也皆迷謬不思之甚故仲尼率歸諸亂云集釋此釋好勇疾貧章李注此以亂字著疾貧疾不仁者説為迷謬之義擠人者人擠之侮人者人侮之出乎爾者反乎爾理也勢不得反亦理也髙注鄭眉軒曰以出爾反爾為理所以儆擠人侮人者也以勢不得反為理所以教受擠侮者也補注擠排陷也克己行法為賢樂己可法為聖聖與賢迹相近而心之所至有差焉避世者依乎中庸沒世不遇而無嫌避地者不懐居以害仁避色者逺恥於将形避言者免害於禍辱此為士清濁淹速之殊也避世避地雖聖人亦同然憂樂於中與賢者其次者為異故曰迹相近而心之所至者不同補訓首數句虛說引起避世者以下至殊也分賢者次者所避不同末避世以下又言聖人雖避世避地迹類隠者而心寔不同也克己復禮行法俟命皆有工夫故為賢若聖則樂乎已而可為人法差分别也依乎中庸引中庸語以言盡避一世也不懐居以害仁用論語懐居及易安土敦仁之意安土敦仁懐居則不能安土故害仁以其心係扵私也逺恥於将形者意有不善将形於色而逺去以逺恥免害於禍辱者言之不善禍辱隨之早去以免害淹是久意避世避地聖人亦與賢者次者同然聖人憂違樂行之意存於中則與避世避地一意隠避者有異憂樂於中照易文言樂則行之憂則違之㸔盖従龍徳而隠推出髙注避世避地清而速至扵徴色發聲而後去濁而淹矣愚按此節大意即論語賢者避世章以明聖賢心迹之不盡同也克己行法四語言聖賢所造有安勉之分避世者六語借論語之言以明之大概言賢者克己行法之事憂樂於中則所謂樂己可法者也避世避地之同正迹相近之實憂樂於中之異正心有差之實故仍以迹近心殊結之迹與心前虚冒後實指無二義補注以前為克己行法樂已可法之迹後為避世避言之迹强分未是此以賢者其次㸔得有優劣與朱注所引程子之說不同故言聖人避世避地之同而不及言色豈以聖人不待恥辱将至而後避與進賢如不得已将使卑踰尊疏踰戚之道與表記所謂事君難進而易退則位有序易進而難退則亂也相表裏徴引禮表記子曰事君難進而易退則位有序易進而難退則亂也補訓以表記之言証孟子之意髙注難進易退而位有序自不至踰尊踰戚矣故曰相表裏人君用賢當如孟子之意人臣自處當如表記之言庶幾出䖏之正弓調而後求勁焉馬服而後求良焉士必慤而後智能著不慤而多能譬之豺狼不可近徴引荀子哀公篇孔子曰弓調而後求勁焉馬服而後求良焉士信慤而後求智能焉士不信慤而又多智能譬之其豺狼也不可以身邇也補訓此節語本荀子以弓馬諭士也勁謂力大良謂善走弓不調而徒挽强矢必亂發馬不服而喜速騁行必泛駕士以誠慤為本智能為用不慤而多能以詭詐之心逞狡悍之技其兇等於豺狼何可近也集解調者木心正而脈理直制作如法也服者不蹄齧易控御也谷神能象其聲而應之非謂能報以律吕之變也猶卜筮叩以是言則報以是物而已易所謂同聲相應是也王弼謂命吕者律語聲之變非此之謂也徴引老子成象篇谷神不死易乾卦文言同聲相應魏王弼易例畧云命吕者律發明象聲而應無心也律吕之變則有為矣王弼所謂乃語聲音清濁髙下之變豈谷神之謂乎補訓六律六吕之變作樂之事陽唱隂和律以統吕是命吕者乃律也命吕者律正應上報以律吕之變見谷之應聲非如是愚按此節大意見谷神之應聲乃實理之自然非如律吕之變猶出人為也似為語神怪之迹者發行前定而不疚光明也大人虎變夫何疚之有徴引易履卦彖履帝位而不疚光明也革卦九五爻大人虎變其文炳也本義虎大人之象變謂希革而毛毨也集解虎變其文炳故借以状光明之意愚按此節大意以易言履帝位而不疚與中庸行前定則不疚相類故合而論之又以革卦大人虎變状光明之義補注専主釋中庸未確行前定而不疚者以其行事光明無暗蔽之私也光明如大人之虎變夫何疚之有光明正推所以不疚之實虎變正足光明之義言従作乂名正其言易知人易從聖人不患為政難患民難喻徴引書洪範言曰従從作乂蔡傳従者順也乂者條理也補訓言為人従則能作乂所以然者其名正則其言易知而人易従故聖人不患為政難但患民之難以家喻戶曉耳民喻而為政又何難乎此書所以云作乂也盖張子以従為人従作乂照為治㸔而又以名正為言従之實是張子所見如此愚按此節大意以名正為言從作乂之實以書為主補注謂引洪範釋論語之意未是書從謂順理惟従故發為徳音而有倫有要是作乂也張子之說異名正謂所以為名者無不正如父父子子兄兄弟弟之類是也人易従即民之喻為政即作乂之實言人易従則為政不難可知末二語反跌以足其意耳正䝉初義卷十二
