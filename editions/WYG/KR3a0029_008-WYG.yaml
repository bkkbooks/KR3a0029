body:
  text: 正蒙初義卷八邳州知州王植撰中正篇第八補訓此篇首言中正貫道而有大與化之分至極其大二句收上文大化之意次言聖人不思勉學者不能不思勉因歴言學問之事至於致曲説到能化以應大化意有不知節至末又言教人之事學必由教而入也愚按此篇凡五十八節自首至勉葢未能安也十三節言中正大化之淺深皆血脉貫屬然尚未及工夫不尊徳性以下三十二節乃歴言為學之事不尊徳性至妄去節以尊徳去妄相屬結到得正至大以應前事豫以下至致曲節或自立言或釋成語則節各一意不必牽聯滋擾有不知則有知以下至末十三節又言教人之事教以廣其學也亦節各一義文不相承内仲尼絶四三句意有思也一節俱入近思錄論學惡不仁故不善未嘗不知一節責己者當知天下國家無皆非之理一節俱入克治學者舍理義一節入戒警中正然後貫天下之道此君子之所以大居正也葢得正則得所止得所止則可以𢎞而至於大樂正子顔淵知欲仁矣樂正子不致其學足以為善人信人志於仁無惡而已顔子好學不倦合仁與智具體聖人獨未至聖人之止爾徴引公羊傳隐公三年君子大居正張子語錄顔子樂正子皆到可欲之地但一人向學𦂳一人向學慢補訓首句中正並言下接正說又以得所止明正字意樂正子只是善信顔子可謂大而未能化是以樂正子形顔子非平重愚按此節大意欲學者以中正為進徳之地而中正大聖實一篇之綱宋子鋭臣云自首至至於大言中正可充而至大樂正子以下言中正必以學而後至於大中正雖平提中只帯言中正而不偏於所徃然後道可由此而至故曰貫天下之道得正則得止得所止只足得正意盖以知之所至言非已居其地之謂𢎞而至於大𢎞字内有學之功在至於大即貫道之實也下以樂正顔子明之知欲仁則得正而得所止矣不學則僅為善信而未大學則智仁合一而大矣但未至聖人之止耳此止乃已至其地而居之非但知至至之而已也層次淺深諸家多誤篇中中正之義各有淺深此節俱淺㸔大中至正之極俱深㸔中道而立則有位以𢎞之矯而得中然後可大中皆在大之前宜淺㸔未得中而不居中道不可識知徳以大中為極極其大而後中可求中皆在大之後宜深㸔於此不明則多牽合而不得其說者矣樂正子顔淵以下孟子善信章朱注採入學者中道而立則有位以𢎞之無中道而𢎞則窮大而失其居失其居則無地以崇其徳與不及者同此顔子所以克己研幾必欲用其極也未至聖而不已故仲尼賢其進未得中而不居故惜夫未見其止也徴引易上傳之十章夫易聖人之所以極深而研幾也本義研猶審也序卦傳下篇窮大者必失其居張子語錄顔子知當至而至焉故見其進也不極善則不處焉故未見其止也知必至者如致廣大極髙明此則儘逺大所處則直是精約顔子方求而未得故未見其止也黄氏瑞節曰張子所引論語未見其止其說與舊解不同舊解對進而言則止為已意張子以止為聖人之極功故言顔子未至聖人之止未詳是否李注又申上意盖得正則得所止故可𢎞而至於大是中道而立而有位可𢎞者也顔子之學能𢎞而至於大矣而克已研幾必欲用其中此所以為好學也補訓學者二句正言無中道四句反言位字跟立字來言立則有箇地位矣顔子克已研幾正是要求中道之極下以見其進未見其止証之集解克已持守工夫研幾省察功夫知行並進求道之方也愚按首句中道以學者言即首節中正之中顔子未得中謂中之極也即後極其大而後中可求之中上言有位下言無地地即位也上言𢎞下言崇崇即𢎞也未至聖而不已四語只是証欲用其極意不已即進也止即未得中之中也未見其止而曰惜之定以黄說為是語錄所謂不極善則不處者盡之矣趙子彤元云不已與不居亦微異不已以工夫言精進不已也不居以地位言謂不肯以此位自居也大中至正之極文必能致其用約必能感而通未至於此其視聖人恍惚前後不可為像此顔子之歎乎徴引易下傳之五章精義入神以致用也上傳之十章感而遂通天下之故補訓此承上文言顔子求中之功也極大中至正到極處也集解博學於文而不能致用則汗漫荒唐約以自恃而不能感物則心如槁木死灰皆非聖人之道也故大中至正之極文必能致其用約必能感而通盖其文也切於理約也常惺惺法此其所以知行兩盡本末相須而不偏也愚按大中至正之極即聖人之事也論語博約分屬知行此于博曰致用約曰感通又對浮誇與虚寂者言之有知行交互之義宋子銳臣云論語博約夫子所以誘顔子此即指夫子言可欲之謂善志仁則無惡也誠善於身之謂信充内形外之謂美塞乎天地之謂大大能成性之謂聖天地同流隂陽不測之謂神徴引易上傳之七章成性存存五章隂陽不測之謂神補訓此承上善信大聖而推言善信美大聖神之義也本孟子語而雜引論語孟子易傳之言以明其意塞天地謂善量非謂氣天地同流隂陽不測總是不可知之意聖人隂陽合徳自不可測華注此解孟子與朱注畧同但此以形外即屬美為稍殊耳愚按志仁無惡成善於身二語孟子朱注採入髙明不可窮博厚不可極則中道不可識盖顔子之嘆也補訓此言顔子求中發嘆之意補注髙明不可窮仰彌髙也博厚不可極鑽彌堅也中道不可識瞻之在前忽焉在後也愚按道惟彌髙彌堅故難以識其中而有前後之嘆張子方言中言正故於此亦側串言之只借論語以明已意耳君子之道成身成性以為功者也未至於聖皆行而未成之地耳徵引禮哀公問不能樂天不能成其身易乾卦初九文言行而未成成性見上節華注此亦蒙上章大能成性之謂聖而言集解成性即成身也盖性者所以為身之理也有内外無彼此補注成身成性則至於聖人之地矣未至於聖人之地皆行而未成者大而未化未能有其大化而後能有其大補訓此見化之難也集解大而未化則理與我猶二也故曰未能有其大有者體即道用即義故必化而後能知徳以大中為極可謂知至矣擇中庸而固執之乃至之之漸也惟知學然後能勉能勉然後日進而不息可期矣徵引易乾卦文言知至至之可與幾也集解惟知學以下申上文之意知學即是知徳以大中為極勉即是擇執不息至誠不息也即是大中張注人不知學則是非混淆理欲互乗雖說存誠說力行皆屬淺近之詞惟必先知大中為極然後能擇能執也愚按此節大意亦見中之不可不知也知大中之知淺擇執則深矣擇執勉也至之則由勉及安矣不息即所謂至之者也下三句與上意無大異而複言之者盖上以知與擇執平舉下半叚則歸重知學見其為入徳之要㫖也趙子彤元云知學如夫子所謂知之者能勉如所謂好之者語意云易言知至至之學者能知徳以大中為極可謂知所至之地矣若能擇中庸之理而固執之乃至之之漸也然而知尤要焉人惟知向學然後能勉為擇執之功能勉為擇執然後所學日進而不息地位可期而至矣體正則不待矯而𢎞未正必矯矯而得中然後可大故致曲於誠者必變而後化華注此以矯字明求中之道補訓學者若本體已正則不待矯揉而能𢎞未正必待矯矯而得中然後可大而化故中庸言致曲有誠者必矯變而後至於化也體正句與首節得正則可以𢎞而至於大同意體者本體之體上未正必矯下變正言中者以見因正得中耳可大字兼化在内矯然後大即變則化意故引中庸以結之中庸變則化謂變化人物此則變謂矯化謂大而化愚按致曲於誠者謂致其曲以歸於誠即矯未正以得中之意極其大而後中可求止其中而後大可有補注與上大而未化未能有其大之意相表裏集解前言學者中道而立則有位以𢎞之又言矯而得中然後可大兹言極其大而後中可求又先大而後中者何哉盖以中道而立矯而得中為勉以求中大槩以中道言此所謂中指聖人之不勉不思從容中道者也所謂化也大亦聖之任雖非清和一體之偏猶未㤀於勉而大耳若聖人則性與天道無所勉焉華注此言大雖幾於中然未能至於化則猶未聖也補訓伊尹為聖之任大者之任道似之故云亦聖之任非論伊尹任似優於清和但僅能大而未化故不謂之聖愚按友人宋子銳臣云孟子曰聖則已是化境止曰任正縁未大此以為大而未化義異趙子彤元云勉而大三字連讀盖自然而大則聖矣無所雜者清之極無所異者和之極勉而清非聖人之清勉而和非聖人之和所謂聖者不勉不思而至焉者也華注此言必不思不勉方是聖然夷惠之聖猶未得為中也集釋異與人不同而􅆾争也愚按此節孟子伯夷聖之清節朱注採入勉葢未能安也思葢未能有也補注此釋上章不勉不思之意不尊徳性則問學從而不道不致廣大則精微無所立其誠不極髙明則擇乎中庸失時措之宜矣集解不存心則不能致知此重本之論也華注不尊徳性則徒事口耳之迹豈得謂之道問學乎不致廣大則學不免於支離破碎故曰無所立其誠不極髙明則所擇者或不合乎時宜而不自知故曰失時措之宜愚按此節大意引中庸而釋之以見徳性之宜尊所以明求中求正之功也不重釋中庸意立其誠只是一盡字言於精微者不能誠以盡之也李注作反身而誠添出一層自此以下七節以尊徳去妄相屬妄去而後徳性可尊也絶四之外心可存處葢必有事焉而聖不可知也補注心可之可當作所集釋絶四者之私渾然存天理之公矣豈徒静虚而已哉愚按此節大意即論語絶四之文而補足其義不得已當為而為之雖殺人皆義也有心為之雖善皆意也正已而物正大人也正已而正物猶不免有意之累也有意為善利之也假之也無意為善性之也由之也有意在善且為未盡况有意於未善耶仲尼絶四自始學至成徳竭兩端之教也補訓此承上文絶四而言意之不可有以該必固我也雖善皆意正明意字正已而物正云云是証雖善皆意重有意正物一邊利之也是心中有所希兾徐氏謂智者利仁之利恐利仁不宜說壊補注葉氏曰横渠先生解絶無皆為禁止之意故以此為聖人設教之道謂自始學以至於成徳其所以克治融釋者不外乎此所謂竭兩端之教也愚按首四句提出意字正已物正四句借孟子之言明之有意為善九句正明意之所以為累故聖人以絶四立教始學成徳皆以學者言自初學至成徳皆當絶四是聖人教人之大概具是矣故曰竭兩端之教舊說謂夫子自始學至成徳皆絶四與教字意不合宋子銳臣云上節絶四専就聖人言此節兼教人絶四言以始學成徳為竭兩端與本㫖逈别不得已而後為至於不得為而止斯智矣夫發明此聖人因物付物之妙絶無意必固我者華注為者不預期無意必之妙也止者不留滯無固我之妙也意有思也必有待也固不化也我有方也四者有一焉則與天地不相似補訓此申釋四者見其當絶也四者有其一則心與天地不相似况皆有乎此張子見道語朱子引入論語注華注天地無心而成化者也無意必固我則聖人亦無心矣補注葉氏曰意者萌心之始故曰有思必者期望於中故曰有待固者滯於已徃故曰不化我者成於已私故曰有方或問四者相為終始而曰有一焉何也朱子曰人之為事亦有其初未必出於私意而後來固執而不化者若曰絶私意則三者皆無則曰絶一斯可矣何用更言絶四以此知四者又各是一病天理一貫則無意必固我之鑿意必固我一物存焉非誠也四者盡去則直養而無害矣補訓此承上文言絶四者心純乎天理也天理一貫即至誠無妄鑿即鑿䘮此理也直養無害用孟子語鑿則害無害則無鑿補注天理一貫上章所謂必有事焉而聖不可知者也愚按理欲不容並立天理有一毫間斷即人欲有一毫夾雜故天理一貫則無意必固我之鑿下四句一反一正申明其意私有一則妄而不誠私盡去則直養無害而無不誠也誠即天理直養無害即無鑿上二句從理純說到無私下四句從無私說到理純意互相足末二句無工夫宋子鋭臣云玩一則字與下節然後字不同盖此言成徳之事下節則入徳之事也妄去然後得所止得所止然後得所養而進於大矣無所感而起妄也感而通誠也計度而知昏也不思而得素也補訓此承上絶四而推言之得所止應首節大字亦應前意必固我皆妄也妄去然後得所止而正得所止然後得所養而進於大大可兼化下分誠妄妄去則誠計度二句明感通之意言感通之誠不須計度乃不思而得也感而通兼得止得養在内張注妄非必無所感但不由性中出耳由實理中出自無窒碍昏者見理不明理既素明何待思索愚按此言學者之事妄去得止俱淺㸔無所感二句承上妄字以妄與誠對誠謂不雜於妄也下二句又承感通句以昏與素對昏則不能感通素則不思而得也盖無所感以下止為一妄字作注脚而及感通之義所謂不思而得者對計度之知言非聖人從容中道之謂也語意云偽妄之心皆足以蔽我而害正必妄心去然後得理之正者而止之得所止然後心得所養可充廣而進於大矣何以謂之妄凡心之無所感而起者皆妄也必感而遂通者乃誠也若計度而知者蔽於物而昏者也必不思而得者乃理之素明而能感通者也以感通之妙而不容妄念之存得止而大何難哉事豫則立必有教以先之盡教之善必精義以研之精義入神然後立斯立動斯和矣補訓凡事豫則立必有教以先之乃謂之豫欲盡教者之善必精義以研究之尤所當豫也能精研義理至於入神然後欲立而斯能立欲動而斯能和矣豈非事以豫而立哉立以守言動以行言斯立守之固斯和行之利與本㫖不同集解以教民言與上下文意不聯愚按此節大意引中庸事豫則立􅑋推以見精義之要也豫者由教而入之謂故曰有教以先之盡教之善者盡得所教之理也精義入神内該得盡教之善意立和借成語以明己意與三十篇以立民和民言者不同自此以下雜舉經傳成文皆以明教學之事不専為訓釋之文志道則進據者不止矣依仁則小者可游而不失和矣集釋張子以論語四事作兩事說李注志定則自然有所持守心純則玩物不足䘮志補訓不止謂日有所據非一端也㳺者玩物適情有和順從容之意志學然後可與適道强禮然後可與立不惑然後可與權補注釋論語之意補訓必先志學然後可與適道也必强禮然後可與立也必不惑然後可與權也强有力也强禮謂强立於禮不惑即精義入神意博文以集義集義以正經正經然後一以貫天下之道張子經學理窟學大原上篇是集義所生者集義猶言積善也義湏是常集勿使有息故能生浩然道徳之氣下篇氣湏是集義以生義不集如何得生集義湏是博文博文則用利用利即身安發明此言知之而後行之也愚按此合論語所言博文與孟子所言集義正經者而通論之盖以此見為學之有序也語類言之非一舊說皆謂言博約之義補訓因之以集義屬博文於理未確博文則所知者廣而後能事事合義事事合義而後能正生民之經博文以知言集義以行言皆其在巳者正經則兼人已言至於正經則道之大端克盡而其餘細目皆無不合矣故曰貫天下之道至當篇天下之達道五其生民之大經乎數語可與此叅㸔將窮理而不順理將精義而不徙義欲資深且習察吾不知其智也發明此言不行則亦無從知之也集解徒致知而不力行以騐之則其所知終不能真且亦不能久也故曰思而不學則殆智仁勇天下之達徳雖本之有差及所以知之成之則一也盖謂仁者以生知以安行此五者智者以學知以利行此五者勇者以困知以勉行此五者補注釋中庸之意五者謂天下之達道愚按此節朱注以其等而言與此大同而微有異者朱子或問嘗辨之矣曰安行可以為仁矣然生而知之則智之大而非仁之屬也利行可以為智夫然學而知之則知之次而非智之大也且上文三者之目固有次序而篇首諸章以舜明智以囘明仁以子路明勇其語智也不卑矣夫豈専以學知利行者為足以富之乎竊意張子之說本仁者安仁智者利仁而言固善朱子以舜囘子路及生而知之者上也學而知之者次也為說其理尤精學者不可不知中心安仁無欲而好仁無畏而惡不仁天下一人而巳惟責巳一身當然爾徴引禮表記中心安仁者天下一人而巳矣又云無欲而好仁者無畏而惡不仁者天下一人而已矣補注釋表記孔子之言集解無欲而好仁無畏而惡不仁正是安仁補訓責己一身期乎最上論人必兼取其勉為仁方見誘進之意行之篤者敦篤云乎哉如天道不已而然篤之至也發明此釋中庸篤行之意補訓張子雜引諸書皆借以示意如達徳節見當用困勉之功安仁節見不可以安仁律人此節見人當篤行也君子於天下達善達不善無物我之私循理者共悦之不循理者共改之改之者過雖在人如在己不㤀自訟共悦者善雖在己盖取諸人而為必以與人焉善以天下不善以天下是謂達善達不善補訓達善達不善提起以共悦共改作兩層申其義末說到天下以見達處髙注見人不善如出於己自訟其不能化𨗳也見善必法善在於己矣葢取諸人以為善也亦必與人共由焉是之謂達愚按此節大意見善不善之皆當達也不㤀自訟即論語内自訟之意與人用孟子語玩必以字與朱注作助者微異見人不善而引之已取人為善而復公之人即此是不分物我而達之天下意髙注以自訟為自訟其不能化𨗳豈専以為人而後為達耶且止言及人不言自省亦恐未是善人云者志於仁而未致其學能無惡而已君子名之必可言也如是補訓此明善人所以為善人論語名之必可言與善人無涉張子引來以見善人名為善而實有善可言善與惡對無惡即善善人欲仁而未致其學者也欲仁故雖不踐成法亦不蹈於惡有諸己也不入於室由不學故無自而入聖人之室也補訓此承上文言善人而釋不踐不入之意欲仁句總下分說李注有諸己則善而信矣聖人之室美大聖神是也愚按此節論語朱注採入惡不仁故不善未嘗不知徒好仁而不惡不仁則習不察行不著是故徒善未必盡義徒是未必盡仁好仁而惡不仁然後盡仁義之道徴引易下傳之五章有不善未嘗不知知之未嘗復行也張子語録孔子要好仁而惡不仁者只好仁則忽小者只惡不仁則免過而已故好惡兩端並進好仁則難遽見功惡不仁則有近效日見功發明惡不仁義也察惡未盡雖善亦粗故惡不仁乃所以成仁也今不惡不仁是未必盡義既未盡義將䧟於不仁而不自覺故未必盡仁髙注必好仁惡不仁然後不徒善不徒是而仁義兼盡今之惑於佛學者多偏主好仁之說其究至於含糊苟且長惡遂非而後知張子之言為精切也愚按此節大意釋論語好仁惡不仁而意重在惡不仁邊自是張子所見非但為訓釋之文也篤信好學篤信不好學不越為善人信士而已好徳如好色好仁為甚矣見惡而内自訟惡不仁而不使加乎其身惡不仁為甚矣學者不如是不足以成身故孔子未見其人必嘆曰巳矣乎思之甚也補注此釋論語之意盖好仁惡不仁非篤信好學者不能也故孔子嘆未見其人補訓論語云篤信好學若篤信而不好學不過為善人信士在常人中稍為有志而已不能為好仁惡不仁者必好徳如好色則好仁為甚矣見過而内自訟惡不仁而不使加乎其身則惡不仁為甚矣學者不如是不足以成身而造聖人之域孔子未見好徳内訟之人必嘆曰已矣乎盖思之甚而云然也以好學提起好仁惡不仁皆好學裡面事内自訟便能不使加故合用其語不如是雙承好惡論語好徳内自訟上皆有已矣乎遜其志於仁則得仁遜其志於義則得義惟其敏而已徴引書說命下惟學遜志務時敏蔡傳時敏者無時而不敏也補注此釋書惟學遜志務時敏之意補訓書時敏與遜志分兩意此将時字作虛字帯過而云惟其敏即謂所以遜志者要敏愚按書遜敏平重此從一務字㸔出側勢博文約禮由至著入至簡故可使不得判而去温故知新多識前言徃行以畜徳繹舊業而知新盖思昔未至而今至縁舊所見聞而察來皆其義也徴引易大畜卦象君子多識前言徃行以畜其徳集解多識以下皆是解温故知新盖思昔未至而今至又是解多識前言徃行以畜徳縁舊所聞而察來又是解繹舊業而知新言此皆温故知新之義也愚按此節大意釋論語博文約禮與温故知新之義以明學之事也語意云論語云博文約禮可以弗畔者盖由文之至著以入禮之至簡博以見道約以體道故可使其不得畔而去也論語又云温故而知新者由平日多識前言徃行以畜其徳畜徳則有舊業矣故可繹之以知新盖人之所知有思憶昔所未至而今忽有得者有因舊所見聞而知來者皆温故知新之義也學者博約兼盡新故相生庶幾知行並進而道在我乎温故以下最多雜解謂温故以下皆博文約禮之類者集釋之說也然約禮屬行知新屬知難以貼合補訓已辨之矣謂多識以下皆觧温故知新者集觧之說也又以思昔未至二句分觧上二句竊謂多識句係成説繹舊句乃張子所自為說難以下二語為疏觧上句之文皆其義句惟集觧李注以為温故知新之義而皆不能無失餘俱以為由博得約之義失之逺矣竊意上三句釋博文約禮下五句自釋温故知新但取博文又約禮温故能知新大意相近故合為一節耳多識前言徃行以畜徳只疏一故字舊業即所識之前言徃行也盖字轉下分二意言之昔未至而今至此始疑而終悟者也如子貢之論境知詩是也縁舊聞以知來此觸類而旁通者也如子夏之悟及禮後是也今之所至所察之來皆謂新也故曰皆温故知新之義也文義原自明顯責己者當知天下國家無皆非之理故學至於不尤人學之至也發明行有不得皆反諸己則纎惡必除善斯成性矣愚按此篇大意明不尤人為學之至也不尤意甚細即論語不知不愠易遯世無悶之㫖故以為學之至聞而不疑則𫝊言之見而不殆則學行之中人之徳也聞斯行好學之徒也見而識其善而未果於行愈於不知者耳世有不知而作者葢鑿也妄也夫子所不敢也故曰我無是也補訓此合論語數節而言意重在行上聞斯行好學之徒為一節之㫖不行僅愈於不知以見必當行下不知而作又甚言之也傳言傳其所聞而言之學行學其所見而行之分聞屬言見屬行下見聞互㸔總歸於行學莫切於知行知行由於聞見如聞而於心不疑則可以傳言之見而於心不殆則可以學行之中人之徳大抵如是也必聞斯行者乃為好學之徒而可貴耳若見而徒識其善未能果於行是知而不行僅愈於不知者耳不知則又下矣世有不知而作者盖由於穿鑿也狂妄也夫子所不敢故曰我無是也人當求知以為行之地而又必行以踐其知斯為好學者矣以能問不能以多問寡私淑艾以教人隐而未見之仁也徴引易乾卦文言隐而未見行而未成補訓此合引論孟之言而斷之以仁集解問不能問寡雖曰問之然實有以啟而告之也私淑艾以教人人雖非親受業然實吾之恩澤所及故皆為隐而未見之仁華注私淑艾孟子本言學者此却在教人者身上說與本義不同愚按友人趙子彤元云教人言仁似本孟子教不倦仁也而言為山平地此仲尼所以惜顔囘未至葢與互鄉之進也補訓此引論語而以顔子互鄉証之須善㸔顔子未見其止不是遽止互鄉雖與其進亦未必能底於成集釋為山未成一簣顔子未見其止也平地方覆一簣互鄉方與其進也學者四失為人則失多好髙則失寡不察則易苦難則止徴引禮學記學者有四失或失則多或失則寡或失則易或失則止補訓此釋學記之四失欲人知所救也故舉四者以實之集觧為人䘮已故失之於慕外之多好髙不實故失之於得中之少事理不察失之忽易問學苦難失於自止此學者當知四失而改之也若為己而不求外務近而不求逺如切如磋以求其宻仰髙鑽堅以求其中豈有失哉學者捨禮義則飽食終日無所猷為與下民一致所事不踰飲食之間燕逰之樂耳徴引書洪範有猷有為有守補訓此見學者當日從事於禮義即論語飽食節意猷以謀事言為以作事言以心求道正猶以己知人終不若彼自立彼為不思而得也髙注以心求道如以己知人人與己二也彼自立彼則與道為一矣華注即心即矩所謂彼自立彼也程子論孔顔之樂非樂道乃得道故樂與此正相發明愚按此節大意明勉然者之不能合道也語意云夫道固不可不求矣然人之勉以求道猶以心求道猶視道為心外之物正如以己知人不能視人猶己終不若人之自知而自立者為不思而得也必也聖人之即心即道而與之一者乃為至乎彼字舊說以道言或以聖人言補訓又謂彼自立彼猶言我自立我皆不免拘泥竊謂彼字即以人言以心求道不能與道為一猶以己知人不若人之自知為真也只大槩喻言不必以彼已字一一與心道比合趙子彤元云上知字内有立字意下立字内有知字意知明處當互見之也考求迹合以免罪戾者畏罪之人也故曰考道以為無失徴引禮表記仁者安仁智者利仁畏罪者强仁又云至道以王義道以覇考道以為無失陳注盡考稽之道而事不輕舉焉亦可以無失矣補注釋表記之意補訓夫考古人之迹而求其合以免於罪戾者是畏罪之人强仁者也故禮曰考道以為無失此之謂也迹以善者言考道即考求迹合無失即免罪戾也儒者窮理故率性可以謂之道浮圖不知窮理而自謂之性故其說不可推而行補訓此見學者貴窮理本中庸率性之謂道以闢釋氏補注浮圖釋氏也釋氏不知窮理而妄意空虚為性是其一偏之說不可推而行也愚按舊說多以率字亦作推行之義竊謂率性可以謂之道即率性之謂道之變文儒者窮理而知萬理之皆實故以率性為道也不可推而行亦苐言其說之偏而難通非謂其性之不可推行也舊亦微誤致曲不貳則徳有定體體象誠定則文節著見一曲致文則餘善兼照明能兼照則必將徙義誠能徙義則徳自通變能通其變則圓神無滯徴引易上傳之五章通變之謂事十一章蓍之徳圓而神補訓此釋中庸致曲一節見學者必當致曲也致曲不貳即曲能有誠也一定之體可見即形也文節猶節文著見即著也一曲致文一曲之誠至於文節著見也餘善謂衆善對一曲言兼照謂無不知即明也徙於義即動也徳自通變即變也圓神無滯言化也誠定誠能誠字作苟字㸔集解此全與中庸本㫖不同姑就此解之不貳誠也随其資性之偏而推之以至於誠則其徳之所成者各有定體矣如伯夷之清栁下惠之和是也體象是連曲字體象誠定則文節必自著見於外雖非全體大用然一曲既能致文則私意不行而餘善亦可兼照所謂明也明能兼照則必將知我之偏覺彼之義徙而從之矣誠能徙義則體用兼偹故徳自通變通變者事變多端無不能随時變遷以通之也通變則圓神無滯故謂之化愚按中庸有誠以全體言此不貳即謂致曲之誠實無二以下皆就一曲言之徙義方及全體之誠以下皆就全體言之曰徳有定體曰體象誠定似以形為形體之義有不知則有知無不知則無知是以鄙夫有問仲尼竭兩端而空空易無思無為受命乃如響聖人一言盡天下之道雖鄙夫有問必竭兩端而告之然問者随才分各足未必能兩端之盡也徴引易上傳之十章易無思也無為也又云問焉而以言其受命也如響補注此釋論語之意補訓此節言聖人竭兩端之教也有不知句引起無不知句聖人竭兩端是無不知空空是無知論語解無知實以無知言張子謂無不知則無知過髙一層論語解空空屬鄙夫張子屬仲尼以見無知意下以易引起聖人有問必竭亦是受命如響意而其空空即無思無為也問者随才分各足只是餘意不重才分者賦才各有分量愚按此分三截首四句重空空無知意無思無為五句重有問必告意惟其空空所以必竭末二句只帯言之随才分各足者各因其才質之髙下以為所得之淺深也以下皆言教人之事教人者必知至學之難易知人之美惡當知誰可先傳此誰將後倦此若洒掃應對乃㓜而遜弟之事長後教之人必倦弊惟聖人於大徳有始有卒故事無大小莫不處極今始學之人未必能繼妄以大道教之是誣也徴引禮學記君子知至學之難易而知其美惡補訓此言教人之事以子夏之言為主而以學記合言之也首二句引起下接先傳後倦為通節正意洒掃數句見當先者不可後惟聖人以下見當後者不可先論語孰先傳孰後倦謂不分本末先後此謂有當先有當後誰以人言此以事言大徳即聖人之徳處其極即卒也試以教人之事言之教人者必知至學之事有難有易併知人之質有美有惡當知誰是可先傳此者誰是將後倦此者若洒掃應對乃㓜而遜弟之事當先教之待其長後教之人必倦弊而厭學可見當先者不可後也惟聖人之於大徳渾全有始即有卒故事無論大小莫不處其極至今始學之人未必能繼聖人之事妄以大道教之是誣之也可見當後者不可先也華注長後教以洒掃應對是不知至學之易而啟人之倦也始學即教以大道是不知至學之難而適以傳之者誣之也知至學之難易知徳也知其美惡知人也知其人且知其徳故能教人使入徳仲尼所以問同而答異以此補訓此承上所引學記之言而申之惡字不可說壊皆受教之人但不及善者所謂知至學之難易者知入徳之事有難易也所謂知其美惡者知其人之質有美惡也知其人之美惡且知入徳之事之難易教必因其先後故能教人使之入徳而有成仲尼所以問同而答異者正以此也蒙以養正使蒙者不失其正教人者之功也盡其道其惟聖人乎徴引易蒙卦彖蒙以養正聖功也本義蒙以養正乃作聖之功張子語録蒙以養正聖功也是養其蒙以正聖人之功也詳見大易篇蒙無遽亨之理節李注此以養正聖功為養䝉以正乃聖人之教之功與傳意異愚按此解蒙字玩語録似指學者言不専指童䝉聖人盡道如上文知人知徳之類是也洪鐘未嘗有聲由扣乃有聲聖人未嘗有知由問乃有知有如時雨之化者當其可乗其間而施之不待彼有求有為而後教之也徴引禮學記善待問者如撞鐘扣之以小者則小鳴扣之以大者則大鳴又云當其可之謂時性理拾遺張子曰洪鐘未嘗有聲由扣乃有聲聖人未嘗有知由問乃有知或謂聖人無知則當不問之時其猶木石乎曰有不知則有知無不知則無知故曰聖人未嘗有知由問乃有知也補訓雜引學記孟子之言上下兩截意上言由問而答之下深一步言時雨之化不待問而施聲藏於鐘無聲而有聲在故扣之即響聖人之知藴於心無知而有知在故問之即答志常繼則罕譬而喻言易入則微而臧徴引禮學記善教者使人繼其志其言也約而達微而臧罕譬而喻可謂繼志矣補訓此引學記之言而釋之主教者言集解言善教者能感動人使我之志學者常繼之則不必多為譬說而彼自喻矣臧善也教者之言皆人心之所固有而易以入焉則不必顯大其言而善自明矣此亦本學記而不盡用其㫖李注志常繼者上也言易入者次之凡學官先事士先志謂有官者先教之事未官者使正其志焉志者教之大倫而言也徴引禮學記此七者教之大倫也記曰凡學官先事士先志陳注自皮弁祭菜至聽而弗問凡七事皆大學為教之大倫補訓此又引學記之言而釋之亦重教者言集解大倫猶言大概大端事著其所主之事而教也如典禮則教之禮典樂則教之樂是也志則不著一事以教之大端而言也愚按末句而言之云疑志者下有缺文如以字之類大倫宜如集解不必指皮弁以下七事道以徳者運於物外使自化也故諭人者先其意而遜其志可也葢志意兩言則志公而意私爾徴引禮祭義事父母者先意承志諭父母於道書說命惟學遜志務時敏朱子曰志者心之所之是一直去底意又是志之經營往來底凡營為謀度皆意也補訓此又言教者當先意遜志猶為政者之以徳化人也借祭義先意承志而言教人與事父母無涉論語道之以徳主為政者言此借以引起諭人之意諭人謂教人志意俱就學者言先其意之未發而有以遜其志使向於正亦猶運於物外使自化也遜順也愚按此節以先意遜志為主首二句以論語引起末二句申所以先意遜志之故物舊以上之法制禁令言之與下志意不合竊謂物猶事也道人以徳者非俟其事之有失而後正之乃其仁漸義摩禮陶樂淑有所黙運於事物之外而使之自化也遜其志即道以徳先其意即運於物外能使不仁者仁仁之施厚矣故聖人並答仁智以舉直錯諸枉補訓此釋舉直錯枉使枉者直之意承上文就教人言可也教人者分别仁不仁化不仁為仁即舉錯意不必指定在上以責人之心責己則盡道所謂君子之道四丘未能一焉者也以愛己之心愛人則盡仁所謂施諸己而不願亦勿施於人者也以衆人望人則易從所謂以人治人改而止者也此君子所以責己責人愛人之三術也補訓此釋中庸之意朱子取入注中集釋末句責人當作望人術道也有受教之心雖蠻貊可教為道既異雖黨類難與為謀補訓此承上教人引論語有教無類二節之文而釋其意也無類則蠻貊可教不同則黨類難謀極力形容之詞愚按朱子以類為善惡之殊此以為黨類之類故合二章而為言大人所存葢必以天下為度故孟子教人雖貨色之欲親長之私達諸天下而後巳補訓此言大人教人以天下為度而舉孟子以實之言貨色便說與民同言親長便說人人親其親長其長豈非以天下為度孟子達之天下原說親長此兼承貨色親長說子而孚化之衆好者翼飛之則吾道行矣徴引易中孚卦彖傳孚乃化邦也本義孚信也左傳哀公十六年子西曰勝如卵予翼而長之補訓孚化喻教者之誠心愛養翼飛喻教者之力為輔助吾道行只是有以及人非謂大行於世發明言其人未向道者不可棄而不教當視之如子而真誠以感化之如鳥抱卵然其人已向道而為衆所好者不可遽弛其教當輔翼其行如鳥翼飛然髙注子謂凡卵生者孚從爪從子如鳥抱卵衆好亦指羽族言翼飛引誘之也正䝉初義卷八
