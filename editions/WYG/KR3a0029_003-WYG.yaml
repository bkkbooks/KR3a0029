body:
  text: 正䝉初義卷三邳州知州王植撰天道篇第三補訓此以天道名篇而其中以天道聖人並言見聖人與天道同亦惟聖人能言天道也前四節以聖人與天道相形天不言四節言天道不見而章三節言聖人天之知物節又言天道蓋天命亦天道之一端也化而裁之四節又言聖人形而上者四節言惟聖人能言天道愚按此篇凡二十節大意明天道聖人之合然血脉貫通而文不相䝉玩各節之意惟天不言而信二節不見而章二節化而裁之二節谷之神也二節皆意義相承餘俱節各一義舊説逐節聯貫忽言此又迤􅆔承接言及别事轉轉無窮恐先儒不應有此拖㳫無頭緒之文也補訓謂天不言四節言天道不見而章三節言聖人竊謂天不言三節言天道鼔萬物節亦天聖並言不見而章三節則以天道明聖人也内天體物不遺一節朱子入近思錄道體天道四時行百物生無非至教聖人之動無非至德夫何言哉徵引禮禮器天道至教聖人至德補注合禮記論語之意而言補訓禮云天道至教聖人至德以天道言之春夏秋冬之四時自行飛潛動植之百物自生無非至教之所寓也以聖人言之聖人之動皆中禮無非至德之所形也夫何待於言哉善學者不必以言求之也天道聖人並言夫何言哉雙承天體物不遺猶仁體事無不在也禮儀三百威儀三千無一物而非仁也昊天曰明及爾出王昊天曰旦及爾游衍無一物之不體也徵引詩大雅板篇昊天曰明及爾出王昊天曰旦及爾游衍集傳王往通言出而有所往也旦亦明也衍寛縱之意朱子曰此數句從赤心片片説出來荀楊豈能到體物猶言為物之體也蓋物物有箇天理體事謂事事是仁做出來如禮儀三百威儀三千湏得仁以為骨子凡言體便是做他那骨子本是言物以天為體事以仁為體縁湏著從上説故如此下語體物為物之體猶言幹事為事之幹也出王之王音往言往來游衍無非是理無一物之不體猶言無一物不將這箇做骨子集釋熊氏曰物物皆有天理體之而無所遺也猶事事皆本於仁體之而無不在也禮之大小無非愛敬懇惻之所發見者是仁體事無不在也凡人往來游息之所此理無往而不在是天體物而不遺也愚按此節大意見天仁之無不體也首二句提起下申明之上節言時行物生皆天道此言人之出往游衍皆天理上節言聖人動皆至德此言禮之大小皆本於仁二節本不相謀諸家多牽合上節而本文之意反有不暢竊謂此明天仁之無不體是正意天即天道仁非聖人不能只可作餘意餘意者特説書之一義而未可牽合以亂正也後倣此上天之載有感必通聖人之為得為而為之也徵引詩大雅文王篇上天之載無聲無臭易上傳之十章感而遂通天下之故集釋此天地無心而成化聖人有心而無為也補注童氏發微曰有感必通上天之神得為而為聖人之神張注天之感物以氣聖人之感人以理得為而為順理之自然而無所容私也天不言而四時行聖人神道設教而天下服誠於此動於彼神之道歟大全成變化行鬼神成行陰陽之氣而已矣韓本有此一段徵引易觀卦彖觀天之神道而四時不忒聖人以神道設教而天下服矣集解天不言天之神道也神道設教聖亦不言也誠於此動於彼天與聖人無所容心也是之謂無為而無不為發微不可見而充周不可窮故曰神之道髙注聖人穆穆在位而天下自然化之於此有神焉故曰神道設教云爾補訓天不言而四時行句中便含神字聖人亦是神道設教故以神之道總收神只是微妙意所以神處只在乎誠愚按此節大意明天與聖皆以誠而神也重在神神道設教即過化存神之意與易彖本意不同語意云天之生物也運以時然不言而四時自行聖人之治天下也施以教然神道設教而天下自服所以然者由其誠於此自動於彼而天與聖俱無所容心也其斯為神妙之道歟韓本一段與此節不相貫按易辭上傳之九章所以成變化而行鬼神也本以河圖竒耦之數言此釋其義與本旨不同謂易言成變化行鬼神所以成行者陰陽之氣為之也與神化篇首節意相似天不言而信神不怒而威誠故信無私故威徵引禮樂記天則不言而信神則不怒而威補訓此專以天言神謂天之神妙也信是天自信非人信天以天之神妙者言之天不待言而自極其信其神不待怒而自然有威蓋天本誠故無偽妄而信其神本無私故無可轉移而威也髙注四時運而不易天之信也禍福響應而無常神之威也愚按上二句舉成語下以誠與無私明之亦不必與上節牽連天之不測謂神神而有常謂天李注申上節意集解天與神一而已矣以天之無聲無臭兩在而不可測言即謂之神以神之運行有常理而言即謂之天一物而兩名非二也運於無形之謂道形而下者不足以言之徵引易上傳之十二章形而上者謂之道形而下者謂之器補訓易道字汎言道理此合上下文觀之當以天道言集解即有形之中而指言其無形之道曰運於無形非外形而别有一理運於無也李注運於無形者太虚之性太和之道形而下者散殊而可象神化之糟粕也愚按此節大意本易之言形上者以明天道也鼔萬物而不與聖人同憂天道也聖不可知也無心之妙非有心所及也徵引易上傳之五章鼔萬物而不與聖人同憂華注鼔萬物而不與聖人同憂天道無心也聖不可知之謂神聖之無心也正以明聖與天合德非庸人有心者可及髙注以能字易可字恐非張子之意若是便是聖人有不及天地處要之天無心聖人有心而無為天人之分固如此其實有心無為即與上天無心合德不得云聖不及天觀下三節可見愚按此節訓釋頗雜竊謂鼔萬物句與聖不可知皆舉成語而下以無心之妙合斷之蓋以聖不可知為不知天與即以聖不可知為言天既屬牽强又篇中大意皆言聖與天合德不應於此獨言聖人有心不能及天也語意云易言鼔萬物而不與聖人同憂蓋天道然也孟子言神則曰聖不可知也是皆自然而然無所容心之妙非有心所及也然則天與聖有不合一者乎不見而章已誠而明也不動而變神而化也無為而成為物不貳也髙注此即中庸語而言聖人之事補訓此與中庸本文全異錯綜其説出張子獨見以成已言明即章也誠所以不待見也以成物言化即變也神所以不待動也為物不二總歸一誠一誠無不成不待有為也愚按已宜讀如字為物不二即指聖人之心言方與上誠明神化意合已誠而明故能不見而章不動而變無為而成補注此申明上章之意補訓此又以誠明一句貫三項以見誠明之為要也誠明可該神化不二二句富有廣大不禦之盛與日新悠久無疆之道與徵引易上傳之五章富有之謂大業日新之謂盛德六章以言乎遠則不禦補注本易大傳之意而言蓋富有即廣大不禦之盛日新即悠久無疆之道天地聖人一而已矣愚按廣大不禦悠久無疆者天道然也聖人之德業亦若是而已矣此與上二節皆以言天道者明聖人也天之知物不以耳目心思然知之之理過於耳目心思天視聽以民明威以民故詩書所謂帝天之命主於民心而已焉徵引書臯陶謨天聰明自我民聰明天明畏自我民明威蔡傳威畏二字古通用明者顯其善畏者威其惡泰誓天視自我民視天聽自我民聽張子經學理窟詩書篇天無心心都在人之心一人私見固不足盡至於衆人之心同一則却是義理總之則却是天故曰天曰帝者皆民之情然也又曰天道不可得而見惟占之於民人所悦則天必悦之所惡則天必惡之只為人心至公也民雖至愚無知惟於私已然後昏而不明至於事不干礙處則自是公明大抵衆所向者必是理也理則天理存焉故欲知天者占之於人可也或問朱子曰所謂帝天之命主於民心曰皆此理也民心之所向即天心之所存也集釋此見天從乎民民心即天心也愚按上四句虚下四句正明其意惟其視聽明威以民故不以耳目心思為知也化而裁之存乎變存四時之變則周歲之化可裁存晝夜之變則百刻之化可裁推而行之存乎通推四時而行則能存周歲之通推晝夜而行則能存百刻之通徵引易上傳之十二章化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎德行本義因其自然之化而裁制之變之義也補注此引易示人以知化之事存字就心上言之蓋存四時之變於心則周歲之化吾可得而裁之也存晝夜之變於心則百刻之化吾可得而裁之也此釋易化而裁之存乎變意能推四時而行則能存周歲之通於心能推晝夜而行則能存百刻之通於心此釋易推而行之存乎通意髙注吾心之神即天地一闔一闢之變往來不窮之通存之而四時晝夜之變通不外於是也愚按此節大意釋易辭以見聖人之合天也解易二語語氣各異謂化而裁之以其能存乎變也推而行之自然能存乎通也以推行與存變對存通與化裁對存變推行雖未明言聖人然非聖人不能語意云易曰化而裁之存乎變何謂也以四時晝夜言之天道周歲有四時晝夜有百刻人能與時消息而存四時之變於心則在天周歲之化可自我而裁成之矣人能至誠無息而存晝夜之變於心則在天百刻之化可自我而裁成之矣易又曰推而行之存乎通何謂也亦以四時晝夜言之凡人存之心者必見之於行人能與時合序推四時之運而行之則在天周歲之通能存之於我矣人能日進無疆推晝夜之運而行之則在天百刻之通能存之於我矣此聖人之所以與天合德也聖心存四時晝夜之變則天道周歲百刻之化不能外也猶中庸知天地之化育意此重存變存字有力聖德合乎四時晝夜之運則天道周歲百刻之通皆存於其心矣猶中庸上律天時意此重推行存字無力髙注槩言存之尚未明獨以四時晝夜立言者亦從易一闔一闢謂之變往來不窮謂之通及變通莫大乎四時數語取義然此節化為化育之化非變化之化裁為裁成之裁非裁截之裁舊説多非張子之意神而明之存乎其人不知上天之載當存文王黙而成之存乎德行學者常存德性則自然黙成而信矣存文王則知天載之神存衆人則知物性之神徵引易辭見上節詩大雅文王篇上天之載無聲無臭補注此引易示人以窮神之事存字亦就心上言之蓋不知上天之載當存文王於心此解易神而明之存乎其人意學者常存德性於心則自然黙成而信此解易黙而成之存乎德行意補訓易神明即神明乎變通黙成即黙成其神明之妙是逓説總以用易言張子作兩邊説一云存文王云天載從其深者言之也一云存衆人云物性從其淺者言之也然天載與物性非二存衆人亦可以存文王存文王有二説集解云存文王之心補注云存文王於心於字較勝易言德行張子言德性德原於性也存字皆作有力字㸔物性即德性物物各有故曰物性兩神字應神而明之之神髙注文王純亦不已即上天之載也故存文王則知天載之神德性者衆人所受於天之正理常存德性所謂存衆人也故知物性之神愚按此節大意釋易辭以勉學者之希聖也語意云易言神而明之存乎其人何謂也蓋上天之載最為神妙而人則有合於天載者學者不能知上天之載當存文王之人於心以求其純亦不已又云黙而成之不言而信存乎德行何謂也蓋德行必有以存之而後成也若學者能常存德性而不失則自然黙而成之信有於已矣蓋文王即與天合德之人也能存文王於心則于天載之神無聲無臭者自無不知德行乃萬物各正之性也能存衆人之恒性則于物性之神有物有則者自無不知學者當勉盡希聖之功可也後三十篇云上天之載無聲臭可象正惟儀型文王當㝠契天德而萬邦信悦故易曰神而明之存乎其人正與此相發明其必以天載立説者竊謂張子之意神明字是拆開讀以天載實神之義而以知為明之解神不可知而欲明之但當求之與天合德之人必言文王者文王之詩有上天之載二語正能合天者也天載之神物性之神即神而明之之神知即明也如此則與易旨及常解大異而與張子語意確合舊説皆未及此故於言天載言文王之故終未了了神明黙成補訓謂張子作兩邊説然其後四語皆歸於神則仍有逓説意在物性以在已者言即德性之變文成謂成已之德發明華注皆欲兼成已成物殊不必也谷之神也有限故不能通天下之聲聖人之神惟天故能周萬物而知徵引老子成象篇谷神不死蘇子由註云谷至虚而猶有形谷神則虚而無形者也易上傳之四章知周乎萬物而道濟天下補訓此贊聖人之神能周知萬物而以谷神形起夫谷之神能應聲而其神有限不能盡通天下之聲聖人之神與天同故能周乎萬物而知之無遺也愚按張子引用谷神者四惟此以谷神與天分㸔神化篇谷神不死即以谷神明神也至當篇谷神象聲而應則謂谷神自然之妙也乾稱篇老氏況諸谷又以谷神明天之神也皆與此異義聖人有感無隱正猶天道之神李注申上節意感而遂通天下之故故曰無隱集釋遇父子之感則仁顯君臣之感則義著此聖人有感無隱也天道之神春感而物忽生焉秋感而物忽成焉若是之類皆隨感而應者亦何隱之有形而上者得意斯得名得名斯得象不得名非得象者也故語道至於不能象則名言亡矣徵引易上傳之十二章形而上者謂之道集解形而上之理如天地鬼神之奥性命道德之微象猶言情狀性之類非謂理有象也髙注如實見天道斯得其元亨利貞之名得其名斯得其生長收藏之象苟恍惚不可為象豈復有可名者哉愚按此節大意見語道者貴得名得象而得名尤要名名之猶言也首以得意引起中叠二語見得名之要末言不能象仍是不得名耳觀後篇言得辭斯得象矣可悟此節意旨歸宿所在語意云道形而上者也語道者果能真知道之意即能得其所以名果能得其名即能得其可見之象若不得其所以名非能得其象者也語道而至於不能象則雖有所名言亦妄而不足信只如無有而已矣道何由以顯乎甚矣語道之非易也中庸即鳶飛魚躍以明費隱易即陰陽以見道孟子即情以狀性所謂名與象者可見世人知道之自然未始識自然之為體耳李注欲識自然之為體者莫如求之吾性分之間故邵子曰性者道之形體愚按此節大意見知道之難也言道非有真知所言皆彷彿影響間耳自然者無為之意體猶言形體也如二氏言道崇無黜有雖知道之自然卒歸於空寂而無實非知道體者也嘗見瞽者辨色言日紅似火火似花玉白似雪雪似鹽人不能窮其辨及細究其形質則茫然不能得也言道者亦然有天德然後天地之道可一言而盡補注此本中庸之意而言李注誠者天德也天地之道可一言而盡亦曰誠而已矣正明不為日月所眩正觀不為天地所遷徵引易下傳之一章天地之道貞觀者也日月之道貞明者也本義貞正也觀官換反示也補訓易言日月之貞明天地之貞觀此深一層説明以所見言觀示意當以立論為言有洞見聖人之正明也有確論聖人之正觀也不遷謂天地之觀有遷移而聖人之正觀不因之遷移集解以天地變異言恐與日月之明不類張注可眩者於理必未明可遷者於理必未定正明正觀不外乎理之至正者也理苟至正天地合德日月合明縱欲眩之遷之不可得而況於人乎愚按此節大意引易以言聖人見其有得於天地日月而能與之並也就言道上見正蒙初義卷三
