body:
  text: 正蒙初義卷十三邳州知州王植撰有司篇第十三補訓此以有司名篇不専主有司大約皆言在上之事愚按此篇凡九節亦節各一義文不相屬内道千乗之國節入近思録治體有司政之綱紀也始為政者未暇論其賢否必先正之求得賢才而後舉之集釋此解先有司舉賢才章集解論賢否舉賢才之事也言先當正其已在位者之有司然後舉賢才而續用之也愚按此以先有司舉賢才二句合併言之政之綱紀猶言政之要務見有司之重也正者訓飭之意猶教之也諸家多以正之耑指綱紀然孔子原言有司豈應㤀却有司専言正綱紀耶為政不以徳人不附且勞補注釋孔子為政以徳之意集解為政不以徳則人不親附而我亦勞苦而不得寜盖徳者治人之具以簡御煩之道也髙注不如衆星拱則不附不如居其所則勞子之不欲雖賞之不竊欲生扵不足則民盜能使無欲則民不為盜假設以子不欲之物賞子使竊其所不欲子必不竊故為政者在乎足民使無所不足不見可欲而盜必息矣補注釋孔子告康子患盜之語李注此本孟子菽粟如水火而民焉有不仁之意以解此章雖未必本意然亦一義也愚按朱子語類如横渠之說則是孔子當面以季康子比盜矣孔子於季康子雖不純於為臣要之必不面斥之如此據此則張子解不欲字不如朱注言不貪欲之為善為政必身倡之且不愛其勞又益之以不倦補訓此将論語先勞不倦滚作一團說身倡先之也不惜其勞勞之也益之不倦無倦也愚按朱子語類問先之勞之諸說孰長曰横渠說好又問以身為之倡者果勞乎曰非是之謂也既以身為之倡又更不愛其勞而終之以無倦此是三節事據此則朱子㸔張子之說與注無大異然玩張子說勞字終與注異天子討而不伐諸侯伐而不討故雖湯武之舉不謂之討而謂之伐陳恒弑君孔子請討之此必因周制鄰有弑逆諸侯當不請而討孟子又謂征者上伐下敵國不相征然湯十一征非賜鈇鉞則征討之名至周始定乎徴引禮王制諸侯賜弓矢然後征賜鈇鉞然後殺補訓此明征討伐三字之義周制鄰有弑逆不請而討是懸想之詞集釋討者征不庭也伐者正有罪也湯武以臣正君故不言討書曰伐桀伐紂存萬世君臣之戒者也補注孟子謂敵國不相征然湯云十一征若非賜鈇鉞得専征伐則湯之時征討之名尚未定也野九一而助郊之外助也國中什一使自賦郊門之内通謂之國中田不井授故使什而自賦其一也補訓此釋孟子國中二句之義與常解無異道千乘之國不及禮樂刑政而云節用而愛人使民以時言能如是則法行不能如是則法不徒行禮樂刑政亦制數而已耳徴引易節卦象君子以制數度補訓此釋論語道千乘節之義畧敬事而信句可疑如是指節用二句張子蓋以此為存諸心同於楊氏之説也禮樂刑政即法凡制有數之多寡故云數富而不治不若貧而治大而不察不若小而察補注國家以平治為本事理以明察為尚補訓富貧大小以國言治以紀綱無不立人民無不安言察以利害無不明政事無不理言報者天下之利率徳而致善有勸不善有沮皆天下之利也小人私己利於不治君子公物利扵治徴引禮表記報者天下之利也陳注報以交際往来言補注釋表記之意補訓張子解報字非陳氏交際往来之說宜主報徳言有徳而善䝉此典故勸無徳而不善不䝉此典故沮勸善沮不善有益於天下故為天下之利如是斯為治平之世矣君子欲天下皆以善而蒙報故利之愚按率徳而致三句推所以為利之故私已四句正解利字言小人特以陪起君子耳率徳而致言必循徳方能致此報也正䝉初義卷十三
