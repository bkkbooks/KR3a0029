body:
  text: 正䝉初義卷十六邳州知州王植撰王禘篇第十六補訓首節從禮説起以下雜引禮制間及論語左傳之言亦闗乎禮制者也春秋一段苗而不秀一節無所屬故綴於末愚按此篇凡二十三節所論祫禘烝嘗之制有考㨿未深者餘亦多有出入當分别讀之禮不王不禘則知諸侯嵗缺一祭為不禘明矣至周以祠為春以禴為夏宗廟嵗六享則二享四祭為六矣諸侯不禘其四享歟夏商諸侯夏特一祫王制謂礿則不禘禘則不嘗假其名以見時祀之數耳作記者不知文之害意過矣徵引禮䘮服小記禮不王不禘大傳禮不王不禘王者禘其祖之所自出以其祖配之王制天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝陳注此盖夏殷之祭名王制又云天子犆礿祫禘祫嘗祫烝諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿諸侯礿犆禘一犆一祫嘗祫烝祫陳注祫合也時祭之祫則羣廟之主皆升而合食於太廟而毁廟之主不與三年大祫則毁廟之主亦與焉天子之禮春礿則特祭者春物全未成止一時祭不祫也夏物稍成秋物大成冬物畢成皆可祫諸侯所以降於天子者夏祭之禘今嵗犆則来嵗祫祫之明年又犆不如天子每嵗三時皆祫也南方諸侯夏来朝故闕禘西方諸侯秋来朝故闕嘗四方皆然廢一時之祭王事重也此章先儒皆以為夏殷之制周更時祭之名而後禘專為大祭周禮春官大宗伯之職以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以烝冬享先王肆音剔疏云肆獻祼是祫之大祭饋食是禘之次祭張子經學理窟祭祀篇天子七廟一日而行則力不給故禮有一特一祫之文特則祭一祫則徧祭如春祭享祖夏祫羣廟秋祭曽冬又祫来春祭祖夏又祫秋祭禰冬又祫李注張子此條皆仍注疏舊說而以諸侯缺一祭為不禘也夏商時祭春礿夏禘秋嘗冬烝并祫為五享周人改禘為大祭則春祀夏禴秋嘗冬烝并禘祫為六享矣夏商諸侯廢時祭之禘只四祭周之諸侯廢大祭之禘又缺時祭之一亦只四享也王制云諸侯礿特禘一特一祫義應以一特一祫為句而注疏以禘一為讀其下云特一祫言諸侯於夏祭一禘之時則廢其祭特行一祫之禮而已張子據此以為諸侯不禘之証愚按此節大意論禘祫四祭皆以夏商與周制互明而總以見不王不禘之意首三句即周之不禘知夏商之缺一祭為不禘也至周六句承上缺一祭之意而知周之諸侯亦四祭也夏商諸侯以下又申首段意周禮不王不禘則知諸侯之嵗缺一祭者為不禘明矣則知者推論之詞此諸侯以夏商時言故下言至周以别之嵗缺一祭即櫽括礿則不禘四句意非别有成文諸侯不禘下仍當補嵗缺一祭意此諸侯以周時言盖周之諸侯既缺一祭又不敢禘為四享無疑也夏特一祫以下見夏商未嘗有禘猶周之制王制欲明夏商四時祭名乃謂礿則不禘實何嘗有禘哉舊説或不知諸侯缺一祭句原以夏商諸侯言又疑張子不知時禘大禘之異故於此章意㫖多未清晰又據理窟所云則張子非不知一特一祫之為句此特因舊注而未及改耳禮祫則不禘之文四時缺一祭耳非定缺禘也張子直以為缺禘未確祫禘祫嘗祫烝之文只以合祭而謂之祫固非三年大祫之祫亦非與禘嘗烝各為一祭周禮六享亦總祫禘與時祭言非一嵗之祭也張子此節謂宗廟嵗六享下節謂夏商嵗五享諸侯亦四皆緣舊說而誤但以張子之意論之周之諸侯固四享夏商春礿秋嘗冬烝又夏之祫亦當四享也舊謂夏商三享更誤禘於夏周為春夏嘗於夏商為秋冬作記者交舉以二氣對互而言耳徵引禮祭統春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰烝礿禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也故曰莫重於禘嘗陳注此夏殷之禮陽道常饒隂道常乏饒故及於夏始為盛乏故及於秋已為盛祭義君子合諸天道春禘秋嘗郊特牲春禘而秋嘗陳注禘讀為禴王制春曰礿語詳首節補注石林葉氏曰礿禘之祭其用物薄主於灌獻順乎陽陽於春夏為用也嘗烝之祭其用物多主於饋食順乎隂隂於秋冬為用也然言其盛則止及於禘嘗而不及礿烝者盖陽達於春物方蠢動隂終於冬物已退藏故古之君子其言郊社則以禘嘗對之亦舉其盛者耳李注王制禘為夏祭而祭義郊特牲又有春禘之文春秋禘亦多在春故曰於夏周為春夏嘗秋祭三代同之而曰於夏商為秋冬無考交舉者每對舉禘嘗也愚按此節大意明古人禘嘗對舉之義也祭統所云乃夏商之制故以二氣對舉張子則兼周禘言之其實周禘在四時之外如中庸禘嘗之義亦大祭時祭兼舉不以二氣對互為言也祫禘之期經無明文漢光武時張純奏曰禮三年一祫五年一禘禘祭以夏四月祫祭以冬十月按此則夏商時禘周大禘皆在夏又按祭義郊特牲春禘之文陳注謂禘當讀禴春秋兩書禘一閔公二年夏五月一僖公八年秋七月於夏時則一春一夏然亦魯禘非周禘也張子春禘之說未知果何所據作記者如中庸祭統皆是不專指祭統享嘗云者享為追享朝享禘亦其一耳嘗以配享亦對舉秋冬而言也夏商以禘為時祭知追享之必在夏也然則夏商天子嵗乃五享禘列四祭並祫而五也周改禘為禴則天子享六諸侯不禘又嵗缺一祭則亦四而已矣王制所謂天子犆礿祫禘祫嘗祫烝既以禘為時祭則祫可同時而舉自注礿以物薄而犆嘗從舊諸侯礿犆自注如天子禘一犆一祫言於夏禘之時正為一祭特一祫而已然則不王不禘又著見於此矣下又云嘗祫烝祫則嘗烝且祫無疑矣若周制亦當缺一時之祭則當云諸侯祠則不禴禴則不嘗徵引禮祭法逺廟為祧有二祧享嘗乃止陳注逺廟為祧言三昭三穆之當逓遷者其主藏於二祧也此不在月祭之例但得四時祭之耳故云享嘗乃止大傳不王不禘王制天子犆礿一段俱見首節周禮春官司尊彛凡四時之間祀追享朝享又大宗伯六享見首節黄氏瑞節曰禘祫之説不一禮記方鄭二家皆非是往往因王制所説四時祭名有所謂禘遂例以大禘釋之張子云假其名以見時祀之數此語最明今考以禘為四時之祭之一惟王制有此盖禘天子大祭也祭始祖自出之帝於始祖之廟而以始祖配之只祭此二位其禮極嚴祫有二有時祫有大祫時祫者祭始祖與親廟而不及祧廟也大祫者三年而祫則合已毁未毁之廟而祭於始祖之廟也毁廟即祧廟也方氏分祧毁為二非也王制所謂祫禘與大禘之禘不同張子所云假禘之名以見數是已天子犆礿者春祭時物不備故每廟特祭不遷主於祖廟也祫禘祫嘗祫烝者夏秋冬三時之祭禮物可備故皆合羣主於祖廟也天子之禮也諸侯下天子一等故春之礿犆秋之嘗祫冬之烝祫皆與天子同惟夏之禘則或一犆焉或一祫焉也張子云不王不禘又著見於此釋王制説也犆音特礿禴通補訓祭法享嘗乃止嘗者秋祭乃時祭之一舉一以例三也享似是虛字言但享時祭耳張子以享為禘而以嘗配之周禮追享朝享鄭司農注追享朝享謂禘祫也在四時之間故曰間祀後鄭又云追享謂追祭遷廟之主朝享謂朝受政於廟張子似以追享朝享多端而禘為其一與二鄭之説並不同㨿張子之意盖謂禮所謂享嘗云者享為追享朝享之享禘亦享之一耳嘗以配享亦是對舉秋冬而言夏商以禘為時祭知追享之必在夏故以嘗配言對舉秋冬以配夏也夏商嵗五享禘列四時祭中併大祫而為五周改禘為禴則祠禴嘗烝併祫禘而為六諸侯不禘又嵗於四時闕一祭僅有四祭王制天子特礿祫禘祫嘗祫烝是惟礿特祭各廟之主禘嘗烝皆合祭羣廟之主張子謂禘為時祭則祫可同時而舉分禘祫為二而不知祫禘即於禘禮用祫也是時祫非三年大祫是時禘亦非五年大禘不王不禘又見於此者謂有祫而無禘也下文云嘗烝且祫無疑者謂行嘗烝之祭者兼行祫不似禘之特一祫也但頭緒愈多不見分曉末云周制缺一時之祭當云祠則不禴禴則不嘗不當云礿則不禘禘則不嘗也愚按此節大意合前二節之意而申言之首七句先言禘為享之一次方言嘗為秋冬之祭故以配享次方言禘之為追享當在夏故上文言秋冬層層補足以見其義即二氣對舉節之意也夏商天子以下言諸侯不禘又缺一祭即首節周制四享之意也王制所謂以下言夏商天子禘祫並行諸侯有祫無禘以合於不王不禘之說亦首節首三句及夏特一祫之意也末段因夏商之制有礿則不禘禘則不嘗之文而設言以明周制嵗缺一祭當云之名義只是餘意然亦不外首節之意細玩張子之意盖謂夏商禘列四祭故記者多禘嘗並舉而諸侯則當缺時禘不用如周不王不禘之禮周則不王不禘而亦當嵗缺一祭如夏商礿則不禘禘則不嘗之文故但四享觀其所云夏商以禘為時祭則張子非不知時祫大祫之分也特謂夏商諸侯併時禘亦不得用耳觀其所云天子享六諸侯亦四又非不知嘗祫烝祫之即於嘗烝用祫也特謂夏禘雖不行亦當行一祫耳舊說於此多所疑駁得無亦有考據未深之失乎庶子不祭祖自注不止言王考而已明其宗也自注明宗子當祭也不祭禰自注以父為親之極甚者故又發此文明其宗也庶子不為長子斬不繼祖與禰故也自注此以服言不以祭言故又發此條徵引禮䘮服小記庶子不祭祖者明其宗也庶子不為長子斬不繼祖與禰故也又云庶子不祭禰者明其宗也陳注據適士立二廟祭禰及祖今兄弟二人一適一庶俱為適士其適子之為士者固祭祖及禰矣庶子雖適士止得立禰廟不得立祖廟明其宗有所在也不得為長子服斬衰三年者以已非繼祖之宗又非繼禰之宗則長子非正統故也不祭禰者庶子止得供具牲物而宗子主其禮也上猶得立禰廟以其為適士也此言不祭禰以此庶子非適士或未仕張子經學理窟宗法篇宗子既廟其祖禰支子不得别祭所以嚴宗廟合族屬故曰庶子不祭祖禰明其宗也又云言宗子者謂宗主祭祀宗子為士庶子為大夫以上牲祭於宗子之家非獨宗子之為士為庶人亦然又云古所謂支子不祭也者惟使宗子立廟主之而已支子雖不得祭至於齋戒致其誠意則與祭者不異與則以身執事不可與則以物助之但不别立廟為位行事而已後世如欲立宗子當従此義雖不與祭情亦可安若不立宗子徒欲廢祭適足長惰慢之志不若使之祭猶愈於己也補訓此錄䘮小記之文而注其中已見大意集釋適子本也庶子支也支不祭不斬所以重宗子也愚按陳注以不祭祖為庶子之為適士者不祭禰為庶子之非適士者張子之説又異喪服小記别子為祖繼别為宗繼禰者為小宗陳注云别子有三一是諸侯適子之弟别於正適二是異姓公子來自他國别於本國不來者三是庶姓之起於是邦為卿大夫而别於不仕者皆稱别子為祖者别與後世為始祖也繼别為宗者别子之後世世以嫡長子繼别子與族人為百世不遷之大宗也繼禰者為小宗謂别子之庶子以其長子繼已為小宗而其同父之兄弟宗之也至𤣥孫之子於父之高祖無服不可統其父同高祖之兄弟故遷易而各從其近者為宗矣故曰有五世而遷之宗其繼高祖者也疏曰族人一身事四宗事親兄弟之適是繼禰小宗也事同堂兄弟之適是繼祖小宗也事再從兄弟之適是繼高祖小宗也小宗凡四獨云繼禰者初皆繼禰為始也此段疏大小宗甚明附錄於此庶子不祭殤與無後者註不祭殤者父之庶盖以殤未足語世數特以己不祭禰故不祭之不祭無後者祖之庶也雖無後以其成人備世數當祔祖以祭之巳不祭祖故不得而祭之也祖庶之殤則自祭之也言庶孫則得祭其子之殤者以己為其祖矣無所祔之也凡所祭殤者惟適子此據禮天子下祭殤五皆適子適孫之類故知凡殤非適皆不當特祭惟當従祖祔食無後者謂昆弟諸父殤與無後者如祖廟在小宗之家祭之如在大宗自注見曽子問注徵引禮䘮服小記庶子不祭殤與無後者殤與無後者従祖祔食鄭氏注云不祭殤者父之庶也不祭無後者祖之庶也此二者當従祖祔食而巳不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者惟適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之祭法天子下祭殤五適子適孫適曽孫適𤣥孫適来孫陳注以尊祭卑故曰下祭曽子問凡殤與無後者祭於宗子之家鄭氏注云言祭於宗子之家者有異居之道焉凡祖廟在小宗之家祭之亦然陳注凡殤非宗子之殤也無後者謂庶子之無子孫者也此二者若是宗子大功内親則於宗子家祖廟祭之發明不祭殤者父之庶不祭無後者祖之庶各釋首句父之庶祖之庶皆就庶子自己言殤則己之子也己子為父之孫當祔己之禰廟以不祭禰故不祭之無後則己之兄弟也兄弟為祖之孫當祔祖廟以不祭祖故亦不祭之言庶孫則得祭其子之殤者三句又釋祖庶之殤則自祭之句庶孫是己為祖之庶孫又當别立小宗者祭其子之殤子之殤乃己之孫也若己非庶孫則己子之殤在己為適孫在父為適曽孫在祖為適𤣥孫已當下祭固不待言若祖父在則有祖父下祭己亦不必自祭之矣凡所祭殤者惟適子與凡殤非適兩適子俱指殤者言如皆適子適孫之謂不指主祀適子言補訓父庶祖庶究竟只是一人盖對父言子對祖言孫文法如是祖庶字又是接上文祖之庶説来凡祭殤者惟適子謂適子為殤當特祭非適不當特祭惟従祖祔食以補上文不祭殤之意見殤自有所祭也無後者謂昆弟諸父則前所云無後者兼兄弟伯叔之無後者為是上文言不祭殤與無後殤當從祖祔食不及無後者末又補言如祖廟在小宗家則祭殤與無後者如在大宗亦從祖祔食高注世數親服五世之數也祭殤惟適子者適子有廟得特祭也愚按此節大意解鄭注以釋禮文不祭殤與無後之義與上節皆以明庶子之禮發明以不祭殤者父之庶不祭無後者祖之庶以下各釋首句言庶孫則得祭其子之殤以下三句又釋祖庶之殤則自祭之句於文義甚明後則未及詳竊謂此據禮天子下祭殤五五句又釋鄭注凡所祭殤者句殤與無後至末又釋鄭注無後者謂昆弟諸父句而帶殤與無後並言又以曽子問補足其意謂昆弟諸父之殤與無後者宗子大功内親則祔祭於大宗之家小宗大功内親則祔祭於小宗之家也總分六段看首句為經第二三段所釋正解首句之意第四五六段所釋又補殤與無後自有所祭之義也檀弓上長殤中殤下殤陳注十六至十九為長殤十二至十五為中殤八嵗至十一為下殤七嵗以下為無服之殤生未三月不為殤張子殤未足語世數二語言殤非隔於世數之逺而不得祭特以己不祭禰而不祭也無後皆兼伯叔兄弟巳不祭祖亦兼曽祖言無後者成人備世數似當祭又以己不祭祖而不祭也末殤與無後之殤承上仍以庶殤言若適殤則固已特立廟矣殷而上七廟自祖考而下五并逺廟為祧者二無不遷之太祖廟至周有百世不毁之祖則三昭三穆四為親廟二為文武二世室並始祖而七諸侯無二祧故五大夫無不遷之祖則一昭一穆與祖考而三故以祖考通謂為太祖若祫則請於其君并高祖干祫之自注干祫之不當祫而特祫之也孔註王制謂周制亦粗及之而不詳耳徵引禮王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人祭於寢陳注諸侯太祖始封之君也大夫太祖始爵者也祭法王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟為祧有二祧諸侯立五廟曰考廟王考廟皇考廟顯考廟祖考廟大夫立三廟曰考廟王考廟皇考廟適士二廟官師一廟庶士庶人無廟陳注考廟父廟也王考祖也皇考曽祖顯考高祖祖考始祖也逺廟為祧言三昭三穆之當逓遷者其主藏於二祧也古者祧主藏於太祖廟之東西夾室周藏於文武之廟大傳大夫士有大事省於其君干祫及其高祖陳注省問於君而君賜之乃得行焉干者自下干上之義張子經學理窟周禮篇守祧先公之遷主於后稷之廟疑諸侯無祧廟亦藏之於始祖之廟宗法篇王制言大夫之廟一昭一穆與太祖之廟而三若諸侯則以有國指始封之君為太祖若大夫安得有太祖朱子祫禘議曰王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無二祖而皆及其祖考也其制皆在中門外之左外為都宮内各有寢廟别有門垣太祖在北左昭右穆以次而南天子太廟百世不遷一昭一穆為宗亦百世不遷二昭二穆為四親廟高祖以上親盡則毁而逓遷昭常為昭穆常為穆諸侯則無二宗大夫又無二廟其遷毁之次則與天子同儀禮所謂以其班祔檀弓所謂祔於祖考者也三代之制其詳雖不得聞然其大畧不過如此補注此釋王制天子七廟諸侯五廟大夫三廟之意補訓商書七世之廟可以觀德是殷已有七廟故張子言之周有百世不毁之祖謂后稷也三昭三穆之中高曽祖禰為四親廟文武為二世室此從後世言之若周初無二世室時何為七廟故劉歆謂三昭三穆與太祖之廟而七文武為宗不在數中其説優也唐孔穎達作禮記疏愚按王制天子諸侯大夫太祖之廟皆謂始祖也祭法王與諸侯祭至祖考大夫止至皇考陳注謂祖考始祖皇考曽祖也與王制不同大傳言干祫方及高祖亦同於祭法者也張子之意則據祭法以明王制而言商周之不同殷而上七廟自祖考而下五無不遷之太祖廟祖考祭法陳注謂始祖此謂高祖之父也合四親廟為五逺廟則高祖之曾祖及祖見在祧廟與曽祖以前之祧主一世一遷者為昭穆二祧也止有二祧而無不遷之始祖故曰無不遷之太祖廟其說與祭法陳注祧主藏東西夾室者不同大夫無不遷之祖此祭法與大傳之說也張子則據此以通之王制謂大夫之曾祖謂之祖考而通稱則曰太祖故王制亦云並太祖而三非如天子諸侯以始祖為太祖也其說與朱子禘祫義言大夫有太祖廟者亦不同總之首段言殷以上天子之制也天子如此諸侯以下無不遷之祖可知至周以下至干祫之皆謂周制也天子諸侯有不遷之祖而大夫則無之雖借祭法明王制意只以釋王制為主故末及孔氏之注盖孔注王制但大概謂之周制而不辨殷周之不同故曰粗及之而不詳鋪筵設同几疑左右几一云交鬼神異於人故夫婦而同几求之或於室或於祊也徵引禮祭統鋪筵設同几為依神也詔祝於室而出於祊此交神明之道也孔疏人生時形體異故夫婦别几死則魂氣同歸於此故夫婦共几祝官以言詔告祝請其尸於室求之明日繹祭出廟門外廣求神於門外之祊陳注筵席也几所憑以為安者祝於室出於祊未知神之所在於彼乎於此乎故曰此交神明之道也張子經學理窟祭祀篇鋪筵設同几只設一位以其精神合也後又見合葬孔子善之知有此義然不知一人數娶設同几之道又如何此未易處發明疑左右几是疑同筵異几夫婦同几是止設一几也愚按此節大意釋祭統設同几句於室於祊帶言之二說並存意主前說玩理窟所云自見祭社稷五祀百神者以百神之功報天之德耳故以天事鬼神事之至也理之盡也徵引禮王制天子祭天地諸侯祭社稷大夫祭五祀月令春祀户夏祀竈中央祀中霤秋祀門冬祀行禮運禮行於郊而百神受職焉補訓人皆知祭百神所以報百神之功而不知乃以百神之有功而報上天之德耳百神各有其功而莫非天之為故以事天者推而事鬼神也愚按此節大意明祭祀之精意也人本乎祖萬物本乎天則事天事祖足矣先王制禮祀祖矣並始祖所自出者而祭之事天矣並分天職以宣化者而祭之是又不僅報享之常而已故此以為事理之極至言其義更深且逺也天子因生以賜姓諸侯以字為謚盖以尊統上卑統下之義徵引左傳隠公八年無駭卒羽父請諡與族公問族於衆仲衆仲曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族公命以字為展氏杜注諸侯位卑不得賜姓故其臣因氏其王父字或即先人之諡稱以為族朱子曰姓是大總腦處氏是後来次第分别處如魯本姬姓其後有孟氏季氏同為姬姓而氏有不同諸侯以字為諡竊恐謚本氏字傳寫之訛先儒承訛解將去義理不通如舜生溈汭武王遂賜胡公滿為溈姓即因生賜姓如鄭之國氏本子國之後駟氏本子駟之後即以字為諡因以為族杜預㸃諸侯以字為句亦是强解補訓生當指所生之地言左傳為諡因以為族連讀張子截斷至為諡止故朱子疑諡字當作氏以尊卑言天子尊諸侯卑以上下言諸侯為上大夫為下天子因生以賜諸侯之姓是尊者統其上諸侯以字為氏因以為大夫之族是卑者統其下愚按此節大意解左傳姓族之義也補註駁朱子之說謂以諡為氏與上文請諡與族不相應然以實考之則以諡為族如宋戴氏之類是已因字為諡則未之前聞且公問族而仲對以氏族公命以字為展氏正上下相合何乃疑其不相應乎杜注句法亦未安朱子之説自不可易天子因生以賜姓難以命於下之人亦尊綂上之道也補注此承上章而言補訓只可命諸侯不可徧賜大夫故云難以命於下之人上節是合天子諸侯大夫言未明言下之人此節補足其意故用亦字據玉藻疑天子聴朔於明堂諸侯則於太廟就藏朔之處告祖而行徵引禮玉藻篇天子聴朔於南門之外諸侯皮弁以聴朔於太廟陳注聴朔者聴月朔之事也南門國門也天子聴朔於南門示受之於天諸侯聴朔於太廟示受之於祖原其所自也補訓解玉藻南門本謂國門張子疑其為明堂明堂在國之陽也論語注天子常以季冬頒来嵗十二月之朔於諸侯諸侯受而藏之祖廟月朔則以特羊告廟請而行之發明諸侯下作一句藏朔之處即太廟也受命祖廟作龜禰宮次序之宜徵引禮郊特牲卜郊受命于祖廟作龜于禰宮尊祖親考之義也陳注告於祖廟而行事則如受命於祖此尊祖之義作猶用也用龜以卜而於禰宮此親考之義卜郊卜牲也補訓釋郊特牲張子即尊祖親考之義而見其有次序集解謂卜郊先受命而後作龜先祖而後禰次序之宜也公之士及大夫之衆臣為衆臣公之卿大夫卿大夫之室老及家邑之士為貴臣上言公士所以别士於公者也下言室老士所以别士於家者也衆臣不以杖即位疑義與庶子同徵引儀禮䘮服公士大夫之衆臣為其君布帶䋲屨子夏傳曰公卿大夫室老士貴臣其餘皆衆臣也君謂有地者也衆臣杖不以即位近臣君服斯服矣傳注室老家相也士邑宰也近臣閽寺之屬君嗣君也近臣従君䘮服無所降也禮䘮服小記庶子不以杖即位陳注適庶俱有父母之䘮者適子得執杖進阼階哭位庶子至中門外則去之矣補訓釋儀禮意在衆臣貴臣之分衆臣不與貴臣同庶子不與適子同故疑衆臣不以杖即位其義與衆子不得執杖進阼階同也儀禮注解公士士字為卿與此不同高注公之士為公之衆臣公之卿大夫為公之貴臣卿大夫之室老及家邑之士為卿大夫之貴臣其餘為卿大夫之衆臣愚按儀禮公士大夫連讀之衆臣總承張子公士與大夫之衆臣作兩截讀傳公卿大夫連讀室老士總承張子公與卿大夫與室老士作三層讀故義異末二句又明傳不以杖即位之義適士疑諸侯薦於天子之士及王朝爵命之通名盖三命方受位天子之朝一命再命受職受服者疑官長自辟除未有位於王朝故謂之官師而已徵引禮祭法適士二廟官師一廟陳注官師者諸侯之中士下士為一官之長者周禮春官大宗伯之職以九儀之命正邦國之位一命受職再命受服三命受位注受職受職事受服受祭衣服為上士受位受下大夫之位也補注此以周禮春官九命之事釋禮記祭法適士官師之義集解諸侯薦於天子之士謂天子之上士也王朝爵命諸侯之命卿也命卿亦謂之適士者諸侯之命卿與天子之上士同其爵補訓三命方受命天子之朝適士已受三命也若一命受職再命受服者疑為官長自行辟除尚未有位於王朝故僅謂之官師而已公卿為官長百僚之長也師亦訓長乃一官之長耳辟徵辟也除者除舊用新今只作選用意小事則專達盖得自達於其君不俟聞於長者禮所謂達官者也所謂達官之長者得自達之長也所謂官師者次其長者也然則達官之長必三命而上者官師則中士而再命者庶士則一命為可知徵引周禮六官之屬皆曰大事則從其長小事則專達禮檀弓下篇公之䘮諸達官之長杖補訓此與上節相聨仍辨適士官師意達官之長必適士而上官師庶士可稱達官不可稱達官之長周禮孔疏云小事無長官可諮自專行事專達猶專行也張子謂自達於君與舊説異禮達官謂名達於上張子謂凡得自達諸官之長也專達之達與達官之達本不同張子看作一様補注張子盖以達官為官師達官之長為適士也賜官使臣其屬也自注若卿大夫以室老士為貴臣未賜官則不得臣其士也徵引周禮春官大宗伯九儀之命六命賜官補訓此因上言三命而及之也周禮鄭康成注賜官者使得自置其臣治家邑張子謂使臣其屬意與鄭同發明賜官惟卿大夫有之臣其屬即臣其室老士也祖廟未毁教於公宮則知諸侯於有服族人亦引而親之如家人焉徵引禮昏義古者婦人先嫁三月祖廟未毁教於公宮祖廟既毁教於宗室公宮祖廟也補訓解昏義集解祖廟未毁謂五廟之裔與公同祖者其祖廟猶未遷毁也公雖不服族人之䘮然其祖廟猶存則為有服之屬期之䘮達乎大夫諸侯絶矣尊其尊義也祖廟未毁教於公宮親其親仁也下而飲者不勝者自下堂而受飲也其争也争為謙譲而已補訓論語注下乃射畢衆耦皆下飲又是勝者揖不勝者升堂取觶立飲也此云下堂受飲是下飲作一事㸔其争也君子謂雖若有争而以揖讓為主不失為君子此云争為謙讓亦是别解愚按此節大意解下而飲二句之義也朱注據儀禮大射之文此則因文立訓而已故吾黨解書必以考亭為不易君子之射以中為勝不以貫革為勝侯以布鵠以革其不貫革而墜於地者中鵠為可知矣此為力不同科之一也徵引儀禮鄉射禮射不主皮補訓此釋鄉射禮文射不主皮以明論語之意集解侯即今所謂躱箭革又棲皮於中以為的名之曰鵠鵠鳥之小而飛最疾者取其難中中之為能也不貫革而墜於地則是已中其革特不貫耳故曰中鵠為可知矣知死而不知生傷而不弔畏壓溺可傷尤甚故特致哀死者不弔生者以異之且如何不淑之詞無所施焉徵引禮曲禮上篇知生者弔知死者傷知死而不知生傷而不弔檀弓上死而不弔者三畏厭溺雜記上如何不淑陳注慰問之辭言何為而罹此㐫禍也補訓檀弓三者本謂不足弔張子以為特致傷於死者而不弔生者以合於傷而不弔之説非本㫖異别也高注畏威古通用刑也不盡道而死桎梏者也壓如立巖墻之下而死溺徒涉而死愚按死者可傷尤甚故特致哀以别於弔生之禮且死非其道於生者之前難於措詞故不當弔當作兩層博依善依永而歌樂之也雜服雜習於制數服近之文也李注樂音岳徵引禮學記不學博依不能安詩不學雜服不能安禮陳注詩人比興之詞多依托於物理不能廣求物理之所依附者以騐其實於詩詞必有疑殆而不能安者矣雜服冕弁衣裳之類極為繁雜無以盡識其制於禮文必有彷彿而不能安者矣書舜典歌永言聲依永注既形於言必有長短之節故曰歌永言既有長短必有清濁高下之殊故曰聲依永易節卦象君子以制數度補注釋學記不學博依不能安詩不學雜服不能安禮之意補訓善依永而歌樂之是以詩為樂章非泛言詩善於依永而歌以樂之也雜習於制數服近之文是以習字貼雜字以制數服近解服字服近二字或取服用切近之意謂之文則不僅冕弁衣裳諸物此説費力不如陳氏明暢春秋大要天子之事也故曰知我者其惟春秋乎罪我者其惟春秋乎補訓大要謂大指之𦂳要處愚按此節大意釋孟子言春秋之意也大要猶云大槩總一書之大義而言之也文成數萬其指數千一部春秋従何處説起張子引孟子成語祇加大要二字見得天子之事一語是孟子讀書能得其要處苗而不秀者與下不足畏也為一説發明為一説總是欲人及時勉學也補訓後生四十五十無聞而不足畏即是苗而不秀故聨為一説正蒙初義卷十六
