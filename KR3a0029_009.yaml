body:
  text: 正蒙初義卷九邳州知州王植撰至當篇第九華注此篇専明學之全體大用首十二節明體用之不相離言徳言敦化言大徳言禮器言誠皆體也言福言川流言不器言禮運言樂皆用也仁道有本以下五節専在用上說而體在其内易簡以下至末在體上說而用自該愚按此篇凡五十四節首十二節言徳而有大徳小徳之分盛徳之實未能如玉以下七節言成巳及人之徳易簡理得以下七節言五達道而及仁義後又専言仁愛人以下六節因上言安土併及樂天遂言徳之樂天而及聖之合天有容物以下六節言久大之道與天合徳易簡以下五節言屈伸之幾敬斯有立以下五節言禮將致用以下四節言徳業知崇天也二節言知禮末二節以徳之難言結之總之皆以明徳之義也分十叚乃明其各叚中多節節相生聯貫而下視他篇當自為一體但亦須清脉絡分主客不得一味牽合耳内恭敬樽節二節朱子近思録入教學知崇天也二節入論學至當之謂徳百順之謂福徳者福之基福者徳之致無入而非百順故君子樂得其道徴引禮祭統福者偹也偹者百順之名也樂記君子樂得其道小人樂得其欲補訓此言人當以徳致福也重徳不重福以至當起以得道結首尾雜引祭統樂記之言以明己意非為釋經也凡事合理至當不易是謂有徳百事順利無徃不通是謂有福徳者福之根基福者徳之所致以徳致福無徃而非百順矣故君子樂得其道而凡事必底於至當也李注得其道者徳也循天下之理之謂道得天下之理之謂徳故曰易簡之善配至徳徴引禮樂記徳者得也易上傳之六章易簡之善配至徳補訓此承上文道徳二字推言之重徳故引易歸在徳上集釋至徳乾健坤順之徳也循理而有得焉故配之發明易簡當行之理即可循之道也至徳即得諸己者配字輕謂循易簡之善而得諸己便是至徳與易解異愚按配字即照易作配乾坤之徳說似有着落然諸家多不主此說未詳是否大徳敦化仁智合一厚且化也小徳川流淵泉時出之也補訓此承上文徳字而釋中庸大徳小徳之分神化篇大徳敦化然後仁智一而聖人之事備此與前同意敦貼仁化貼智與本㫖不同集釋仁智之徳大徳也孝弟之類小徳也大徳即小徳之所自出也髙注仁智合一既厚且化則小徳川而且流矣淵泉川也時出流也大徳不踰閑小徳出入可也大者器則小者不器矣補訓此引子夏之言以申大徳小徳之義閑者物之闌也噐字從閑字生與論語解大異出入可謂或出或入無不可髙注士君子於根本節目大處不出規矩已成大噐於其細行如珠走盤不拘一隅而又不噐焉是以規矩為方圓也徳者得也凡有性質而可有者也徴引禮樂記徳者得也補訓此又釋徳字之義人皆可有所以致勉人皆有理為性有形為質性以具道質以體道行道有得無難也日新之謂盛徳過而不有不凝滯於心知之細也徴引易上傳之五章日新之謂盛徳補訓此又推言徳之所以盛也發明不凝滯於心知之細疑作一句讀即所云存象之心也細便不盛凝滯便不日新正相反愚按此以過而不有解日新就已成之徳言非用功語諸家以不凝滯於心為句雖亦可通但以知之細為察之精未確亦與日新之義不合前大心篇心知廓之莫究其極亦心知連用發明之說為允浩然無害則天地合徳照無偏繫則日月合明天地同流則四時合序酬酢不倚則鬼神合吉凶天地合徳日月合明然後能無方體能無方體然後能無我徴引易乾卦文言夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶上傳之四章神無方而易無體九章可與酬酢華注人能浩然無害則合徳於天地照無偏繫則合明於日月合徳合明則與天地同流而酬酢不倚矣豈不與四時合序與鬼神合吉凶乎無方體而無我正所謂同流不倚也以上二句作主不平列集解應事接物為酬酢不倚者應之皆當無所偏倚如鬼神之能知吉凶而應對不謬也故曰鬼神合吉凶愚按此節大意釋易文言以明徳之盛也前平說後串說平說順易文串說則張子所見也無方體即天地同流之意無我即酬酢不倚之意禮器則藏諸身用無不利禮運云者語其達也禮噐云者語其成也達與成體與用之道合體與用大人之事備矣禮噐不泥於小者則無非禮之禮非義之義葢大者噐則出入小者莫非時中也子夏謂大徳不踰閑小徳出入可也斯之謂爾徴引禮噐禮運禮二篇名集解用無不利上疑缺禮運則三字補訓此申言大者噐小者不噐之意禮運禮噐借篇名以見義禮字輕𢃄下文言噐不言運禮噐屬大者不泥於小即所以運也夫禮記中有以禮噐禮運名篇者禮謂之噐則藏諸身也禮謂之運則用無不利也其謂之禮運者語其徳之運而無不達也其謂之禮噐者語其噐之成也達與成乃體與用之道成為體而達為用也合體與用大人之事備矣禮噐成而兼運不泥於小者則於非禮之禮非義之義可信其無矣盖大者噐則出入小者莫非時中而豈有非禮非義乎子夏所謂大徳不踰閑小徳出入可也其斯之謂歟發明徳不外禮故以禮言禮噐禮運雖借用禮經篇名實不専指書言禮噐是修性而成噐於己禮運是達順而運諸天下觀下章可見用無不利未便是用如規矩可以成方圓只是可以利用愚按此借禮噐禮運以明大徳小徳體用之分上半節大徳小徳並言禮噐不泥於小以下歸重大徳盖張子於斯道有豁然一貫之妙随舉一義皆見至理如以驕吝釋大化之義以膚受之行得隂陽象法之理之類所謂随手拈出頭頭是道者也但就二篇大義講則拘矣禮噐則大矣修性而非小成者與運則化矣達順而樂亦至焉爾徴引禮學記七年論學取友謂之小成禮運體信以達順補注此又申明上章禮噐禮運之意補訓禮云成噐則大矣其能修性而非小成者歟禮云運則能化矣能達之無不順而樂亦無不至焉耳噐屬大徳運屬小徳禮字帯言分别處只在噐與運修性即復性之謂小成與大反運則化者運行則有變化也樂音洛順則有和樂之意愚按大與非小成只是一意化與順樂亦只是一意化者運用之熟變化生心故達之事物而無不順也所達者順則随感而應左右逢原怡然自得於天理之趣矣樂只足順意大與小成對非孟子所謂大化盖大而至化有安勉之分噐為體而運為用一時俱到不可以安勉分也舊多誤解萬物皆備於我言萬物皆有素於我也反身而誠謂行無不慊於心則樂莫大焉發明此與孟子義别素是素豫吾内之意補訓此承上文推達順樂至之意行無不慊是達順樂莫大焉是樂至愚按此節大意釋孟子皆備章以明成徳之事亦因上文達順樂至而類及之也不曰素具而曰有素宜以工夫言未能如玉不足以成徳未能成徳不足以孚天下修己以安人修己而不安人不行乎妻子况可愾於天下徴引詩秦風小戎篇言念君子温其如玉禮聘義昔者君子比徳於玉焉哀公問君行此三者則愾乎天下矣陳注愾猶至也暨也集解人必成徳而後及人若未能克治充養使如玉之精則不足以成徳未能成徳則本亂矣故不足以孚化天下盖修己以安人為極苟使修己而不能安人則其所謂修者亦粗焉耳徳之未成雖妻子亦不可化况至於天下哉補訓上言徳不成不足孚天下下又斡入一層見妻子且不安况孚於天下孚主感孚言愚按此節大意見人必修己而後足以及人也修己不安人修己淺㸔若果格致誠正以修己而有不足安人者乎此與上節不必相聯正己而不求於人不願乎外之盛者與集釋不求於人但不願乎外耳正己則純全乎中所以為盛華注必正己而不願方可不能正己而但言不願亦庸人之因任而已愚按此節大意釋中庸以見正己之重也仁道有本近譬諸身推以及人乃其方也必欲博施濟衆擴之天下施之無窮必有聖人之才能𢎞其道補注釋論語之意補訓此言為仁之方在推己及人仁道有本己身即本也聖人之才當兼有位以展其才愚按其道即指博施濟衆言制行以己非所以同乎人徴引禮表記聖人之制行也不制以巳補注釋表記之意集解君子制行以立教當随人資性髙下而教之不可概以己之所能者病人而律之也不然則民將苦其難而阻於進矣非所以同乎人也必物之同者己則異矣必物之是者己則非矣補訓必以物之大同者方為同専以已則獨異而不同矣必以物之公是者方為是専以已則有非而無是矣集解物人也同者人心之所同然理之當為者也然非謂人所同為者己即為異也使舉世皆惡而我獨為善則我之異正所以同乎理安在其為異哉故朱子曰不求俗而求同理愚按此節大意即人巳之公私以明同異是非之義所以醒世之以同已為同我是為是者也玩上下節皆言同人之意當以集解補訓為是能通天下之志者為能感人心聖人同乎人而無我故和平天下莫盛於感人心徴引易同人卦彖惟君子為能通天下之志咸卦彖聖人感人心而天下和平集解同乎人者通天下之志也有人而無己故無不感愚按此節大意釋咸之彖而本同人之彖以言之亦明同人之徳也首二句提起同人無我即通志之實如欲立欲達與聚勿施是也末句感人心内仍有通志意在語意云易言聖人感人心而天下和平夫感人心未易言也必能通天下之志而為一者斯能感人心若聖人同乎人而無私己之見是能通天下之志者豈不足以感人心乎故和平天下而致時雍風動之化莫盛於能通志以感人心也道逺人則不仁發明制行而不同乎人此逺人而不仁者也人乃人我之人逺即不同之意與中庸義異愚按此節大意見道之不可逺人也玩本文及上節大意集釋所謂以道為逺而不求所以不仁者非矣易簡理得則知幾知幾然後經可正天下達道五其生民之大經乎經正則道前定事豫立不疑其所行利用安身之要莫先焉徴引易上傳之一章易簡而天下之理得矣下傳之五章知幾其神乎又云利用安身以崇徳也坤卦文言則不疑其所行也補訓人能得易簡之理則能洞知幾微知幾然後經常可以得正經者何也天下之達道五其即生民之大經乎經正則道能前定而不窮事能豫立而不困行之天下何疑阻之有所謂利用安身之要莫先於此矣易簡理得知幾屬知經正道行屬行利用安身言其效易簡理得只言至易至簡之理不必深言乾坤知幾是知其幾微處亦不必言先事見幾利用安身串說利其施用以安其身也華注道不外乎經而其動也有幾其理本易簡易簡理得得其原也得其原故親義序别信之類俱能黙運於幾如言孝則視無形聽無聲言忠則格君心之非皆不待事理暴著始用挽囘所以能經正愚按此節大意見經正之要也易簡理得與知幾推經正之由道前定事豫立不疑所行推經正之效玩上下語脉歸宿停頓皆注此處此節亦更端另起與上不聯性天經然後仁義行故曰有父子君臣上下然後禮義有所錯徴引易序卦傳下篇有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯孝經夫孝天之經也集解人惟視天經為性外之物故仁義冺而道有不盡必能以為性所固有而盡之然後仁義施行道無所失故易傳曰有父子君臣上下然後禮義有所錯補訓天經只是上文經正之經出於天故云天經天經之肫然為仁秩然為義不必如髙注分貼君臣父子禮義可包仁在内錯即措置意愚按此節大意性天經即是有父子君臣上下仁義行即是禮義有所錯引易以証己說也性是活字然只是以為性所固有之意補訓作堯舜性之之性似太深仁義以用言方與禮義字合李注天經出於仁義之性非此節意仁通極其性故能致養而静以安義致行其知故能盡文而動以變補訓此承上仁義而推言其妙通者通達無間致養是借用易萬物致養字致字不甚着力猶言得其養也致行之致有力文以理之燦然見於事物者言静内斂主乎安動外應主乎變髙注仁通極其性則根於心矣故能致其養而静以安義致行其知則允蹈之矣故能盡其文而動以變静以安則止而不遷動以變則動而不括静無不適而動無不利矣愚按此節仁舉其體義舉其用或以為有疵然朱子有曰仁存諸心性之所以為體也義制乎事性之所以為用也又曰以存心制事言之則仁體而義用也正張子之意仁以内言體言故曰養曰静義以行言用言故曰文曰動仁者吾心之徳通極於性者仁得於心一如其本然之性也仁存則内得所養而静有天理之安矣義者制事之宜致行其知者義之克盡足以推行其所知也義得則外盡事物之條理而動有變化之妙矣誠明篇通極於性以本然所具言此通極其性乃功之有成者語同而義異補訓以為相類欠明義仁之動也流於義者於仁或傷仁體之常也過於仁者於義或害補訓上分言仁義此互言之以見其相須而不可偏義為仁之動而應物者主剛方裁制言偏於義則慈愛之心不足故傷仁仁為體之常言其體有常主惻怛慈愛言過於仁則裁制不足而害於義義為仁之動仁只言體之常語有分辨重仁邊愚按義言仁之動仁不言義之體而曰體之常者仁統萬善義特其一耳體之常猶言體之主乎内者也此仁義皆就用言故言仁亦曰過於仁體之常云者對義言之亦所謂以存心處事言之則仁體而義用者也立不易方安於仁而已乎徴引易恒卦大象君子以立不易方髙注君子之恒恒於仁而已補訓恒卦易方非方所謂事理當然之則未嘗専指仁張子以為方即仁不變易即能安也愚按此節大意引恒卦之象而以安仁實之見仁之重也此仁宜兼心之徳愛之理言安所遇而敦仁故其愛有常心有常心則物被常愛也徴引易上傳之四章安土敦乎仁故能愛補訓引易以明安仁者之能用愛也易云安土敦乎仁故能愛盖安于所遇而敦篤其仁故其愛有常心而不變愛有常心則物亦被其常愛而不衰也華注此仁就愛之理說王文緝曰重常字意常愛本於常心常心全從敦字㸔出大海無潤因暍者有潤至仁無恩因不足者有恩樂天安土所居而安不累於物也徴引易上傳之四章樂天知命故不憂安土敦乎仁故能愛補訓此承上文敦仁能愛而言其無私也借海以喻仁下以不累於物足其意無潤謂無意於見潤非真無也不累於物只言無私心有心市恩即是私仁者之愛豈出於私乎大海無意於潤物因人之暍者借其潤而乃見海之有潤猶至仁之無意於施恩因人之不足者求其恩而乃見仁者之有恩盖仁者樂乎天安乎土随所居而安一毫不累於物非有所私而市恩也集釋暍暑而渴也愚按樂天三句正申明上二句非有二意易樂天屬智安土屬仁此俱以仁言之物物欲也愛人然後能保其身自注寡助則親戚畔之能保其身則不擇地而安自注不能有其身則資安處以置之不擇地而安葢所達者大矣大達於天則成性成身矣徴引禮哀公問孔子曰古之為政愛人為大不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能成其身補訓此因上文愛人及樂天安土而引哀公問全照禮文不用别解所達者大即樂天也樂乎天理則上達於天補注古之為政愛人為大不能愛人不能有其身故曰愛人然後能保其身不能有其身不能安土故曰能保其身則不擇地而安不能安土不能樂天故曰不擇地而安盖所達者大矣不能樂天不能成其身故曰大達於天則成性成身矣愚按此因上文引易辭樂天安土而及哀公問樂天安土之義以辭之同而類舉之也然自此節以下乃言聖人樂天與天合徳不復及仁者用愛之事自是另發一義耳上達則樂天樂天則無怨下學則治己治己則無尤補注與天為一故不怨天治己不暇故不尤人華注以上達配無怨以下學配無尤與論語解異愚按此節大意釋論語不怨不尤之意而以樂天治己分配言之意只以樂天與上下文相屬補注以上達謂大達於天下學謂愛人之事殊不必盖此與下節雖亦借用易樂天而意各有主與前専明用愛者固不同也不知來物不足以利用不通晝夜未足以樂天聖人成其徳不私其身故乾乾自强所以成之於天爾徴引易上傳之十章遂知來物下傳之五章利用安身四章通乎晝夜之道而知乾九三爻君子終日乾乾大象君子以自强不息補訓此承上文樂天而言聖人成徳之事人若不能知來物則不足以利乎用不通晝夜之道則未足以樂乎天聖人務成其徳不以私欲累其身故乾乾自强不息所以成其為天徳與天無間而樂之也易知來物以筮言此泛言知方來事物之理也知來物只是精義通晝夜之道則於人世吉凶禍福之道皆㸔得透徹而無所惑故能樂天以利用引起樂天利用而後樂天也聖人正是能樂天者愚按上四句反起下四句正承聖人以下雖不言知來物通晝夜然乾乾自强内當無所不包成之於天則能樂天矣君子於仁聖為不厭誨不倦然且自謂不能葢所以為能也能不過人故與人争能以能病人大則天地合徳自不見其能也補訓君子於仁聖之徳為之不厭以之誨人亦不倦然且自謂不能盖正所以為能也凡人小能不過乎人故與人争見其能且以己之能病人之能若能之大者則與天地合其徳自不見其能故自謂不能也無不能而自謂不能是正意能不過人反言以形之末二句又繳正意争則必病亦驕吝相因之意愚按此節大意即論語聖仁章見與天合徳之盛亦因上文成之於天而及之也聖人自謂不能非故為自謙之詞也大與天同實不自見其能耳君子之道達諸天故聖人有所不能夫婦之智淆諸物故大人有所不與補訓君子之道大而通諸天故聖人有所不能夫婦之智淆雜於事物之細故大人有所不與知然其與天地合徳固不以此加損也淆諸物舊說以混於物欲言愚意只是錯雜而見諸𤨏屑之物聖人豈一一求其知故云不與大人即聖人對天言聖人對夫婦言大人文法小異耳愚按此節大意因上文言聖人自謂不能而引中庸夫婦之愚節以見聖人有所不能不與也意以明聖人不重道之大意匹夫匹婦非天之聰明不成其為人聖人天聰明之盡者爾徴引書泰誓上惟天地萬物父母惟人萬物之靈亶聰明作元后補訓此因上文夫婦之智與聖人不同而推言其義集解天之聰明性也必禀是性而後有生非性即不成人矣此匹夫匹婦本皆得天之聰明以有成但氣拘物蔽而不能盡聖人則天聰明之盡者耳李注天聰明之盡故曰亶愚按聰明以心言非以耳目言得之於天故曰天之聰明亦本臯陶謨天聰明自我民聰明說命惟天聰明來盡者至極之義大人者有容物無去物有愛物無狥物天之道然天以直養萬物代天而理物者曲成而不害其直斯盡道矣徴引易上傳之四章曲成萬物而不遺補訓大人者有以容納乎物未嘗絶去乎物有以仁愛乎物未嘗偏狥乎物此如天之道然盖天無心成化一本乎理以直養萬物者也聖人代天而理物於物皆曲成而不害其為直斯亦如天之養物而盡其道矣此言有位之大人也集解去物容物之反狥物愛物之流天之道然言天道之當然也天以直養下正申其為天道之意不害其直正是曲成愚按此節大意言大人之法天以理物也無去無狥即是直養曲成而不害其直兼無去無狥言盡道盡天之道也補訓欲以曲成頂無去不害其直頂無狥玩不害其直即上直養之直不宜偏承無狥此以下又另起以無去無狥與可久可大二意相錯言之皆所以盡天地之道而肖之也此與清為異物節同意志大節與金和三節同意志大則才大事業大故曰可大又曰冨有志久則氣久徳性久故曰可久又曰日新徴引易上傳之一章有親則可久有功則可大可久則賢人之徳可大則賢人之業五章冨有之謂大業日新之謂盛徳華注此釋易辭而總歸之於志補訓才大以建事業氣定以養徳性富有有之多日新日日新也清為異物和為狥物補訓此言清和之偏亦申無去物無狥物之意大人則徳備清和者也李注此隘與不恭之道君子所以不由金和而玉節之則不過知運而貞一之則不流道所以可久可大以其肖天地而不離也與天地不相似其違道也逺矣徴引易上傳之四章與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流下傳之一章天下之動貞夫一者也補訓此引易文而釋之以申可久可大之意不過不流肖天地出易而張子以己意為之說兼用孟子金聲玉振智之事聖之事以相叅似暗照孔子說故不拘易本文易言與天地相肖而必云不過不流試觀之於聖人聖人之徳如金以和之於始玉以節之於終則不至於過差矣聖人有知以運之而正以一之則不至於流失矣此其為可久可大之道也道所以可久可大者以其肖天地而與天地不異也若與天地不相似則其違道也逺矣聖人不過不流豈其違道而與天地不相似乎孟子金聲玉振金以宣之欲其和也玉以振之欲其節也知周萬物道濟天下有始有終有金和玉節之意故不過知以運之而貞以一之故旁行而不流離異也易本從乾之易知說到可久從坤之簡能說到可大可久所以肖天可大所以肖地然不分亦可發明和之以金運之以智所以可大節之以玉貞之以一所以可久久者一之純大者兼之富補注此承上道所以可久可大而言也補訓何謂乆乆者一之至純不息而乆也何謂大大者兼之至富統括而大也此専言聖人不兼天地集釋一者守之正兼者蓄之多大則直不絞方不劌故不習而無不利徴引禮聘義亷而不劌義也陳注劌傷也易坤卦六二爻直方大不習無不利補訓此又専申大字之意雜引易論語聘義易詞以明之非専釋易大則兼直方直而不絞方而不劌故不待學習而自無不利髙注絞急切也常情直多絞方多劌惟大則自不絞不劌易簡然後能知險阻易簡理得然後一以貫天下之道易簡故能悅諸心知險阻故能研諸慮知幾為能以屈為伸徴引易下傳之十二章夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能悅諸心能研諸慮本義至健則所行無難故易至順則所行不煩故簡然其於事皆有以知其難而不敢易以處之也是以其有憂患則健者如自髙臨下而知其險順者如自下趨上而知其阻悅諸心者心與理合乾之事也研諸慮者理因慮審坤之事也五章知幾其神乎上傳之一章易簡而天下之理得矣下傳之五章屈伸相感而利生焉尺蠖之屈以求伸也龍蛇之蟄以存身也李注平易者險之反簡約者阻之對以險阻遇險阻則不能知險阻而亦無以處此險阻也易簡理得則險阻不難於知而處之矣平日則以悅諸心臨變則以研諸慮研慮而知幾則雖遇險阻在前以屈為伸而處之裕如也集解易簡理得然後一以貫天下之道是解所以能知險阻之意補訓易能知險簡能知阻皆以處事言易簡貼悦心知險阻貼研慮與本義悅心屬乾研慮屬坤不同悦心主自然說研慮有研審之功因研慮以知幾知幾故能以屈為伸也有屈必有伸常存屈意自能伸愚按此節大意引易傳而釋之從易簡㸔出知幾屈伸不専主釋易也易乾坤易簡本言聖人之徳知險阻悅心研慮本義意已備此無大異但於知險阻中㸔出知幾屈伸意則張子所獨見耳此又更端從易簡言及屈伸不必與上聯宋子銳臣云屈伸相感天道有自然之理内外交養學亦有屈伸自然之機此易所云屈伸之義也張子以屈為伸頗類老氏知雄守雌柔能勝剛之說或因易尺蠖之屈二語而為此言歟君子固無争心然有時為朝廷正紀綱為萬世正學術必有毅然不可屈之氣又如顔子犯而不校孟子三自反只是不與較量耳非以此為勝人之術也君子無所争彼伸則我屈智也彼屈則吾不伸而伸矣又何争補訓此承上以屈為伸而引論語無争之言以明之髙注彼直而伸則我曲而屈不可争也不争智矣若曲在彼則直在我吾不伸而伸不必争也又何争無不容然後盡屈伸之道至虚則無所不伸矣君子無所争知幾於屈伸之感而已精義入神交伸於不争之地順莫甚焉利莫大焉補訓此承上文無争屈伸之意而言上三句截住下申上意知幾於屈伸之感即能盡屈伸之道也交伸於不争之地即無所不伸也精義入神即是幾之盡處順利是因精義𢃄利用意愚按上三句虛下以君子無所争與精義入神指其實而申明之天下之事不過一屈一伸自然相感而已人必無所不容然後盡屈伸之道盡屈伸之道者不求伸也至於虛之至而我見胥化則亦無所不伸矣無不伸者不終屈也至虛視無不容較深盡其道者其惟君子乎君子無所争者知屈伸相感之幾而已知幾者不求伸也至於義之精而入於神伸固伸屈亦無非伸是交伸於不爭之地矣交伸者不終屈也精義入神視知幾較深究之無争即無不容之實知幾而至於精義入神即至虛之實無二意天下何思何慮明屈伸之變斯盡之矣徴引易下傳之五章天下何思何慮華注屈伸之變即隂陽二氣之循環明之則順時而行無所不利何思慮之有明字要㸔得深愚按此節大意以屈伸實何思何慮之言但借易為說非専釋易微而天道之隂陽顯而人事之進退内而理欲之消長外而物我之交接無非屈伸之變故明此足以盡何思何慮之道須㸔得精深廣大方得勝兵之勝勝在至柔明屈伸之神爾華注此即兵道以明屈伸非論兵也補注老子曰柔能制剛柔屈也勝伸也敬斯有立有立斯有為補訓此又起一意與上不聯盖於篇將終而提敬字以為要道也敬兼體用心不放有立也事不苟有為也集解有立以體言有為以用言李注君子莊敬日强有為之本也敬禮之輿也不敬則禮不行徴引左傳僖公十二年内史過曰禮國之幹也敬禮之輿也不敬則禮不行補訓此承上敬字而言敬以行禮也然張子尤重在禮上上言敬引起行禮耳集解敬以心言禮以文言恭敬撙節退讓以明禮仁之至也愛道之極也徴引禮曲禮上君子恭敬撙節退讓以明禮補訓曲禮云君子内存恭敬之心外有撙節退讓之文以發明禮之用示天下後世其心大公而澤及人可謂仁之至也愛道之極也明禮可不急哉仁主於愛仁即是愛之道仁之至即為愛道之極愚按此節大意釋曲禮以明禮之重也舊說明禮以己之盡禮言於仁之至愛道之極難合補訓得之張子倡道關中以禮立教宜其所見如此也己不勉明則人無從倡道無從𢎞教無從成矣補訓此與上節一意上正言此反言明禮為仁之至則有以倡人𢎞道成教矣明禮則為仁之至若己不能勉以明禮則人無由而倡之道無由而𢎞之教無由而成之矣所以君子必恭敬撙節退讓以明禮也禮直斯清撓斯昏和斯利樂斯安徴引書舜典夙夜惟寅直哉惟清蔡傳人能敬以直内不使少有私曲則其心潔清而無物欲之汚禮樂記樂則安安則久補訓此承上禮字而言行禮必直與和交盡也行禮者非苟而已也人能直以無私則其心清有私而撓曲則其心昏可見直為行禮之本也又須以和順從容為貴和斯行之無不利因和而樂斯行之無不安如是以行禮則禮明於天下後世矣撓曲也與直反昏與清反禮之用和為貴小大由之可知其利樂承和言補注直者禮之體和樂者禮之用髙注利則行之順安則得之固將致用者幾不可緩思進徳者徙義必精此君子所以立多凶多懼之地乾乾徳業不少懈於趨時也徴引易乾九三爻文言忠信所以進徳也修詞立其誠所以居業也知至至之可與幾也知終終之可與存義也又曰乾乾因其時而愓本義知至至之進徳之事知終終之居業之事下傳之九章二多譽四多懼又云三多凶五多功補訓此以下言徳業又是一意致用屬業進徳屬徳故乾乾總言徳業不重釋易只見君子當進徳修業君子進徳居業之功不可不知也將致用以居業者見幾不可或緩不見幾則不能致用也思為善以進徳者徙義不可不精不徙義則不能進徳也此君子所以立於多凶多懼之地乾乾以求進徳居業終日至夕因時而惕不敢稍懈於趨時也本義知至屬進徳知終屬居業張子以幾屬致用義屬進徳分貼與易不同此九三爻多凶為正多懼𢃄言以其相類耳發明多凶多懼即居上易驕在下易憂之地動静不失其時義之極也義極則光明著見惟其時物前定而不疚徴引易艮卦彖動静不失其時其道光明下傳之九章六爻相雜惟其時物也補訓此因上文精義趨時而推言之引艮彖以明其義語氣至著見截時物前定又借以明艮彖光明即照不疚意言動静光明無曖昧也髙注時物謂當幾之物愚按上三句推動静不失所以光明之故由於義之精下二句又推精義所以能光明之故因其時物之前定光明與不疚意同玩有徳篇行前定而不疚光明也數語可見語意云易言動静不失其時言其義之極精也義極則自然光明而著見矣夫義豈取辦一時惟其當時之物皆前定而不撓故動静光明而不疚耳有吉凶利害然後人謀作大業生若無施不宜則何業之有徴引易上傳之十一章吉凶生大業補訓此承上文業字引易大傳以見業之出於不得已上正下反語氣如天下有道丘不與易意補注當凶害之時則人謀作至於反凶為吉轉害為利則大業生矣說苑所謂力勝貧謹勝禍慎勝害戒勝災是也天下何思何慮行其所無事斯可矣徴引易下傳之五章天下何思何慮補訓此承上文而言大業之生不過行所無事也集釋事之至也因其事處之於理尚何待思慮為知崇天也形而上也通晝夜而知其知崇矣徴引易上傳之七章夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地本義窮理則知崇如天而徳崇循理則禮卑如地而業廣十二章形而上者謂之道四章通乎晝夜之道而知補訓此合下節引易知崇禮卑而明其意與上不甚聯易云知崇又云崇效天盖言知崇如天也形而上之道也知何以崇能如易所云通乎晝夜之道而知則其知崇矣知崇如天不囿於形象之間故云形而上通晝夜而知則無不知故崇發明通晝夜而知謂知動静循環之理吉凶利害消長之道也知及之而不以禮性之非已有也故知禮成性而道義出如天地位而易行徴引易上傳之七章又云天地設位而易行乎其中矣成性存存道義之門補訓知崇如天則知及之矣而不能以禮成其性雖知之非已有也故由知及而循禮以至於成性天下之道義皆出於其中亦如天地之設位而變化之易行乎其中也上節言知崇此節言禮卑從知說到禮以成性存存道義之門原兼知禮而言也知禮成性合知崇禮卑而言而此節重在禮易云門故此言出由門而出也天地位而易行借以相形不重愚按知及之禮以行之則所行無非道義故曰道義出易成性言其本然之性存存乃全其性之本然此成性即存存意知徳之難言知之至也孟子謂我於辭命則不能又謂浩然之氣難言易謂不言而信存乎徳行又以尚辭為聖人之道非知徳達乎是哉徴引易上傳之十二章黙而成之不言而信存乎徳行十章易有君子之道四焉以言者尚其辭補訓上文言徳可謂詳盡矣於篇末發出徳難言之意見徳雖言之而不盡也此是通篇結語首句提起孟子二語易二語總明言之難末仍以知徳結之髙注道非真得於己難以言語形容天下莫難言者徳也知徳之難言則知之至矣故孟子於辭命浩然皆難言也易謂不言而信亦以徳行在乎黙識不假言辭又以尚辭為聖人之道見辭之不易也非真知徳能通於是哉闇然修於隐也的然著於外也補訓此承上文徳之難言而推所以不輕言之義華注此釋中庸闇然的然之意發明不言而信存乎徳行君子所以修於隐未少有得而徒尚口說小人所以著於外也愚按此節大意合華冉二注始備正蒙初義卷九
