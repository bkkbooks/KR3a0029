body:
  text: 正蒙初義卷五邳州知州王植撰動物篇第五華注此篇明人物之形質無非陰陽之所為明而為秩序幽而為鬼神散而為形聲臭味皆是物也愚按此篇凡十三節節各一義文不相蒙宋子鋭臣云大意見無物不有陰陽而陰陽無不有理欲人即物窮理也首節物之初生以下八句朱子入近思録道體動物本諸天以呼吸為聚散之漸植物本諸地以陰陽升降為聚散之漸物之初生氣日至而滋息物生既盈氣日反而遊散至之謂神以其伸也反之為鬼以其歸也徵引易乾卦文言本乎天者親上本乎地者親下本義本乎天者謂動物本乎地者謂植物朱子曰此息只是生息之息非止息之息孟子言日夜之所息程子謂息字有二義愚謂只是生息至之謂神反之謂鬼固是然風雷山澤亦有神今之廟貌亦謂之神亦以方伸之氣為言耳此處要錯綜周遍而觀之伸中有屈屈中有伸伸中有屈如人有魄是也屈中有伸如鬼而有靈是也人死便是歸祖考來格便是伸華注明物之生死皆陰陽合散之所為補訓物有動植之不同動物本諸天而親上以其一呼一吸即為聚散之漸植物本諸地而親下以其陰陽之一升一降為聚散之漸凡此者皆氣之為也蓋凡物之初生氣日至而滋息是為聚也物生既至盈滿氣日反而遊散是為散也其至也謂之神以其氣之伸也其反也謂之鬼以其氣之歸也凡天下之物何非鬼神乎聚散以漸而至故曰漸氣字雙承呼吸升降言滋息承聚遊散承散李注氣滋息則伸而為神氣遊散則歸而為鬼自聚散之漸以至於大聚大散皆然也補注動物之呼吸在於一息之間植物之陰陽升降在於一歲之間故動物有呼吸則生無呼吸則死植物陰陽升降則生不升降則死史氏管窺曰動物植物各有種類其所由來皆是天地開物之時二氣交感之所生自此各從其類生生不息而天地生物之氣未嘗不行其間以植物驗之亦各以種類相傳雖謂之物自生物可也然從生至死歲一榮枯生於春者必待春氣應而後生春氣未應彼亦不能以自生也生於夏生於秋生於冬莫不皆然蓋以開物之始所稟之氣各有不同故自是以來所生之氣感之而後應候而生耳謂植物自相生不有資於天地之氣可乎動物之始終雖與陰陽升降之候不相應然其一呼一吸即其所稟陰陽之氣也其壽命之久近亦係其開物之始所稟之氣各有不同而已氣於人生而不離死而遊散者謂魂聚成形質雖死而不散者謂魄華注此與下節明人之生死無非陰陽合散之所為補訓此專言人也魂固是氣魄亦是氣之結成故總言氣髙注張子蓋以精神為魂體骸為魄非謂别有死而不散之物也海水凝則冰浮則漚然冰之才漚之性其存其亡海不得而與焉推是足以究死生之説大全伊川程子改與為有補訓此承上言人之生死而以海水氷漚喻之也集解人之生死其存其亡亦猶海水之氷漚也氷漚雖不外於海而海不與人之生死雖不外乎太虛而太虛亦何所容心一自然而然也彼佛老者乃謂有神人焉以主之而使之生死多見其入於邪而不得其情也集釋漚水上泡也髙注才性以氣質言有息者根於天不息者根於地根於天者不滯於用根於地者滯於方此動植之分也華注此與首章相發明而又以滯與不滯明動植之分集解不滯於用得天之動也滯於方得地之靜也補注有息者謂動物動物自首生故根於天頭向上也不息者謂植物植物自根生故根於地頭向下也息鼻息出入之氣沈毅齋曰動物本天陽物也然胎生者九竅卵生者八竅則動物中已自有對矣而乾男坤女又未嘗無陰陽焉植物本地陰物也然陰木疏理而柔陽木縝理而密則植物中已自有對矣而乾男坤女又未嘗無陰陽焉是無物而無兩也至動植之物其稟氣殊類陽也而氣稟之中自有消長屈伸陽中之隂陽也其賦形異狀陰也而形質之中自有上下內外陰中之陰陽也是豈所謂一者乎生有先後所以為天序小大髙下相並而相形焉是謂天秩天之生物也有序物之既形也有秩知序然後經正知秩然後禮行徵引書臯陶謨天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉蔡傳敘者君臣父子兄弟夫婦朋友之倫敘也秩者尊卑貴賤等級隆殺之品秩也補訓此專以人言見天序天秩有自然之典禮也借臯陶謨發此意先後以時言然當兼分在內如父兄先而子弟後時也君先臣後分如是耳小大髙下並以分言序秩皆自然故云天序天秩五倫即經常之道故云經正華注知其同出於天而後經正禮行不然其不以經禮為強人者幾希矣凡物能相感者鬼神施受之性也不能感者鬼神亦體之而化矣補訓此推明物之相感不相感以見鬼神之體物不遺也施屬陽受屬陰性字兼理氣張注物能相感者如雌雄牝牡之類必待交感而後能生育也不能感者如草木之類自能開花結實傳生種類以此見得陰陽之理無物無之鬼神之功無往不然有如此者物無孤立之理非同異屈伸終始以發明之則雖物非物也事有始卒乃成非同異有無相感則不見其成不見其成則雖物非物故曰屈伸相感而利生焉徵引易下傳之五章屈伸相感而利生焉補訓此借易以明屈伸相感之意物言屈伸事言相感互見之也天下之物必無孤立之理以其有同異屈伸之相感也若非有同異屈伸終始循環以發明此物則雖有物不成其為物也事有始有卒乃成其事以其有同異有無之相感也若非同異有無之相感則不見其事之成不見其成則雖物非物矣易故曰屈伸相感而利生焉蓋物必屈伸相感而成其物事必屈伸相感而成其事此利之所由生也若孤立無感何利之有陰陽對待故物無孤立之理有同有異有屈有伸即不孤立也在物為同異屈伸在事為同異有無屈則無伸則有其理一也事不成雖物非物此物謂事即中庸不誠無物之意易屈伸相感以歲功言引來只泛言事物事物成其事物即利之生也補注同異屈伸即終始也此大學格物窮理之事同異有無即始卒也此大學修己治人之事發明孤立者偏陰偏陽也語録謂雖一件物亦有陰陽即無孤立意非同異屈伸為句終始以發明之為句集解發明者發見明揚之也事又人身所為者如進退必有時二者相禪相感而後道盡否則進而不能退則其進為貪祿退而不能進則其退為忘世又如同異必以同與異二者相感然後理當而事成否則同而不能異則其同為隨俗習非異而不能同則其異為亂常拂理愚按同異屈伸終始以發明之所該甚廣以人言之如首員而足方動作而靜止面陽而背陰無不對待成兩而其中則有同有異有屈有伸相為終始而後成其為人推之凡物皆然也即人之一體言之如肘動而臂止臂合而指分皆有對待相感之妙推之凡物又皆然也此理自天地鬼神日月寒暑山川人物以及一草一木一枝一節無物不具隨在皆可體會在人自悟之耳事有始卒所該亦廣集解以進退同異言之亦舉一以例其餘獨見獨聞雖小異怪也出於疾與妄也共見共聞雖大異誠也出陰陽之正也性理拾遺張子曰天地之雷霆草木至怪也以其有定形故不怪人之陶冶舟車亦至怪也以其有定理故不怪今言鬼者不可見其形或云有見者且不定一難信又以無形而移變有形之物此不可以理推二難信又嘗推天地之雷霆草木人莫能為之人之陶冶舟車天地亦莫能為之今之言鬼神以其無形則如天地言其動作則不異於人豈謂人死之鬼反能兼天人之能乎補訓此以變異言重下段陰陽之正其分别處只在獨與共上補注獨見獨聞若鬼物形象雖小異為怪非出於疾則妖妄之説也共見共聞若日食星變雖大異為誠出陰陽之正非疾與妄也賢才出國將昌子孫才族將大補訓上節言變異此節言吉祥皆物理也李注此篇多言鬼神屈伸之事此條言家國昌大之徵者如中庸言國家興亡禎祥妖孽至誠先知禍福與鬼神合其吉凶此以為莫大於賢才之生出乃禎祥之盛者耳人之有息蓋剛柔相摩乾坤闔闢之象也徵引易上傳之一章剛柔相摩八卦相蕩十一章闔户謂之坤闢户謂之乾本義闔闢動靜之機也補訓此因上文有息而推言其理剛柔相摩易本言卦之變化此則借以言陰陽之推遷李注剛柔相摩乾坤闔闢乃天地之呼吸耳寤形開而志交諸外也夢形閉而氣專乎內也寤所以知新於耳目夢所以緣舊於習心醫謂飢夢取飽夢與凡寤夢所感專語氣於五臟之變容有取焉耳徵引內經素問脈要精微論五藏者中之守也又曰甚飽則夢豫甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭莊子齊物論其寐也魂交其覺也形開補訓此推言寤夢之理以見夢皆氣之為也寤夢所感寤是帶言專語氣於五藏之變謂氣因五藏之盛衰而變異集釋形耳目之類寤則知新事於見聞夢多想舊事於所習此亦陰陽相感之一端也李注夢有緣耳目聞見者有無所緣而若有聞見者有係乎吉凶之兆者然而無所緣者緣之變也吉凶之兆緣已往而驗之將然者也皆所謂緣舊於習心也飢夢取飽夢與其一端耳愚按形開志交陽也形閉氣專陰也耳目之知新陽根陰也夢之緣舊陰根陽也五藏之變亦不外陰陽五行之理故可取聲者形氣相軋而成兩氣者谷響雷聲之類兩形者桴鼓叩擊之類形軋氣羽肩敲矢之類氣軋形人聲笙簧之類是皆物感之良能人皆習知而不察者耳徵引莊子人間世篇名也者相軋也在宥篇焉知曾史之不為桀跖嚆矢也補訓此推論聲音之理由於形氣相軋摩而成形氣皆物也自然有聲故曰物感之良能人聲氣從形出笙簧以人之氣從笙簧之形出集解軋相摩擊猶所謂相感也人呼於谷而谷中有響以應之陽在陰中不得出則奮擊而成雷是兩氣也髙注敲莊子作嚆矢之猛者凡矢發必有聲或曰如今之帶簧箭蓋響箭也形也聲也臭也味也溫涼也動靜也六者莫不有五行之别同異之變皆帝則之必察者歟徵引詩大雅皇矣篇不識不知順帝之則補訓此即形聲臭味溫涼動靜皆有五行之别而推及於帝則以見凡物皆天理所寓也六者不外五行五行不外帝則與周子五行一陰陽陰陽一太極之旨相符目於色耳於聲鼻於臭口於味體於溫涼動靜類舉而言之形當以髙注五色為是溫涼猶言寒暑以氣言當兼四時動靜當以人物言亦隨乎四時如書所云析因夷隩孳尾希革毛毨氄毛可見五行之别即同異之變非五行有同異重在異一邊集解形有五目為木耳為火口為土鼻為金前後二陰為水聲有五角為木徵為火宫為土商為金羽為水臭有五羶為木焦為火香為土腥為金朽為水味有五酸為木苦為火甘為土辛為金鹹為水溫涼有五春為木夏為火秋為金冬為水四季為土動靜有五動之始為木終為火靜之始為金終為水動靜之間為土察昭著也髙注形五青紅黑白黃也愚按集解解聲臭味俱本禮記月令形五則用素問金匱真言論專言人之形與下頗不倫髙注訓形為色亦本之月令故可從集解解動靜以一時之動靜言補訓引堯典以一歲之動靜言二説兼之為盡正蒙初義卷五
