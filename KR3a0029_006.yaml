body:
  text: 正蒙初義卷六邳州知州王植撰誠明篇第六補訓此以誠明名篇因篇首誠明二字也誠明却是為言性張本大抵此篇祇重言性上誠明以下六節言誠處多性者萬物一源以下十四節言盡性而極發性命之旨性於人無不善節並提性命下十二節接善反言性生末三節乃繳出順受意愚按此篇凡三十六節篇中言性直言性體處少言盡性處多首言誠明中兼言命言至命言窮理言心言氣質之性言帝則言天理皆不外盡性之旨末言順命亦所以盡性也提一學字是盡性之功夫誠莊則學之要和樂則學之道也內性者萬物之一源一節入近思録道體上達反天理一節形而後有氣質之性一節德不勝氣以下九句莫非天也一節俱入論學湛一氣之本一節纎惡必除一節俱入克治誠明所知乃天德良知非聞見小知而已補訓篇首提出誠明二字見其有良知之妙用李注誠者天德也誠而明者天德之良知也聞見之知亦知也未能反身而誠則所知者猶自於外故曰小知華注聞見之知見其偏而不知其全明其流而不知其源故小天人異用不足以言誠天人異知不足以盡明所謂誠明者性與天道不見乎小大之别也補訓此承上文而申言誠明之旨華注勉而中即為天人異用思而得即為天人異知安排造作之用私心推測之知更不待言矣李注聖人之誠天德也故與天無異用聖人之明天明也故與天無異知在聖者性也在天者天道也無小大之别也義命合一存乎理仁智合一存乎聖動靜合一存乎神陰陽合一存乎道性與天道合一存乎誠發明首二句就人性言中二句就天道言末句總言李注天有正命焉通極於性此其與義合一者也故曰存乎理言非氣數所得干也仁智一而聖人之事備故曰存乎聖補注動而無動靜而無靜故曰動靜合一存乎神一陰一陽之謂道故曰陰陽合一存乎道性者人所受之天理天道者天理自然之本體故曰性與天道合一存乎誠愚按此節大意推言理聖神道與誠之義也玩上下節重在誠上五句皆以理言未及人功義命合一當以李注為正蓋張子之論命如命禀同於性天所命者通極於性等語皆於氣數中認取理字義者理之所宜也命者數之一定也義固理命兼理氣而亦當認取理字仁且智夫子其聖矣乎仁智合一存乎聖也兩在故不測動靜合一存乎神也陰陽遞運者氣也其理則所謂道陰陽合一存乎道也大哉乾元萬物資始誠之原也乾道變化各正性命誠斯立焉故曰性與天道合一存乎誠動靜合一聖人亦有之而此當以天言若聖不可知之神不當以動靜為說也天所以長久不己之道乃所謂誠仁人孝子所以事天誠身不過不己於仁孝而已故君子誠之為貴徵引易恆卦彖天地之道恆久而不已也禮祭義惟聖人為能享帝孝子為能享親補訓此以天引起仁人孝子歸重在君子上誠之雖承仁孝說下然當活看中庸誠之之字有力此只言誠補注仁人事天不己於仁孝子誠身不己於孝即天之誠也此君子所以誠之為貴也愚按此言誠重在不己惟不間斷方是誠若仁孝有己時即是不誠乃者難之之詞誠之為貴誠內有不己意在誠有是物則有終有始僞實不有何終始之有故曰不誠無物補訓此明不誠無物之意不重釋中庸張子借以明其理耳補注誠僞字下皆當讀斷髙注如舜之大孝誠有是物者也其終身慕父母有終有始矣若夫僞者實無是物何終始之有自明誠由窮理而盡性也自誠明由盡性而窮理也徵引易說卦之一章窮理盡性以至於命補訓上節專言誠明此兼明誠言之以易語證中庸之意窮理貼明盡性貼誠由即自也張注在明誠分上窮與盡字煞有功夫在誠明分上只是性無不盡而理無不窮也須有分别性者萬物之一源非有我之得私也惟大人為能盡其道是故立必俱立知必周知愛必兼愛成不獨成彼自蔽塞而不知順吾理者則亦末如之何矣李注此盡其性所以能盡人物之性也補注性者我之所得於天即萬物之所同得非有我之得私也惟大人能盡其性而不私於一己故立必與萬物俱立知必周萬物而知愛必兼萬物而愛成必與萬物俱成彼自蔽塞而不足與立與知與愛與成者則亦無可奈何也葉氏曰立者禮之幹也知者智之用也愛者仁之施也成者義之遂也張子之教以禮為先故首曰立天能為性人謀為能大人盡性不以天能為能而以人謀為能故曰天地設位聖人成能徵引易下傳之十二章天地設位聖人成能補訓此承上文能盡其性而申明之盡性亦當兼己物集解專言己性補注專言人物之性皆失之偏易成能本以作易言此借言盡性集解人性皆善由於天德故曰天能然禀或不同不能不賴之人為則所謂人謀也大人盡性者不恃其天性之善而惟勤其人謀之力也故曰二句亦斷章取義盡性然後知生無所得則死無所喪補訓此亦承上文盡性說來形容盡字之妙盡者無餘剩無缺缺全而受之天全而歸之天何得何喪愚按此節亦如孟子大行不加窮居不損之意人能盡性則全受全歸其生也未嘗於本性之外有私得其死也未嘗於本性之中有缺失也補訓亦此意而微失之巧集解專照首篇立說謂即聚亦吾體散亦吾體之意盡性者明於此理故生不以為得死不以為喪與此章前後言性之旨不合未嘗無之謂體體之謂性集解體物之形體也有象可觀有形可執何嘗無有氣也氣必有理寓其間是其體即為性也愚按此節髙注以體為性體二句滚作一層語氣難合集解照塞吾其體帥吾其性之意為是未嘗無者有之謂也末篇凡可狀皆有也凡有皆象也凡象皆氣也又曰有無虛實通為一物者性也當與此參看天所性者通極於道氣之昏明不足以蔽之天所命者通極於性遇之吉凶不足以戕之不免乎蔽之戕之者未之學也性通乎氣之外命行乎氣之內氣無內外假有形而言耳故思知人不可不知天盡其性然後能至於命徵引易辭見前自明誠節補訓此推言性命之旨氣之昏明以氣質言遇之吉凶以氣數言皆可言氣故下言氣內氣外拈出學字正示人以盡性下手處道性命異名而同實故相通通即此通之彼也張注性者人之所受於天者也道者天之所統乎物者也在人曰性在天曰道理本相通非二物也氣者陰陽所為性之郛殼也命即天道流行賦豫萬物道之用也遇乃外至之境無關性分事但形氣與之相接者也此段須從源頭看下來天道本是至善底物故為性為命亦皆有善而無惡易曰繼之者善也成之者性也又曰乾道變化各正性命保合太和其故可知矣至於氣亦天所命以為載性之具但出於陰陽所為不無清濁之分故人得之而有昏明之殊却是形而下者不足以蔽性之本體也遇則出於性之外矣雖有吉凶不足以戕害吾性之所固有但人不知學則理不足以勝氣而性反為所蔽者有之不能素位而行而理反為所戕者有之要之皆由下流濁而病上源非源濁而害流也蓋性常通乎氣之外直上達天德何有於氣命則無時不行乎氣之內當順受為正以此知天人未始相離性命未始不相通而狥欲自私行險僥幸者是皆不知至善之所由來也愚按此節首八句見氣與遇不足言性命性通氣外以下又見性命之一理語意云人皆言性命矣亦知性命之理何如乎夫性命皆出於天天所性者通極於道蓋無不善也氣之有明有昏特禀之有差耳何足以蔽吾性乎天所命者通極於性蓋無不正也遇之有吉有凶特偶爾所值耳何足以戕吾命乎此性命之本然也而人或不免蔽吾性而戕吾命者特以未之學耳且性與命豈二物乎專言性則性純乎理而通乎氣之外專言命則命有窮通禍福而行乎氣之中究其實則氣本無內外可言但因人之有形而分內外焉耳性與命固無不一也故思知人不可不知天命之外無性也盡其性然後能至於命性之外亦無命也人奈何不學焉以盡性命之理哉以性命對氣與遇則性命皆屬於理而氣與遇不足言猶末篇所謂性通極於無氣其一物耳命禀同於性遇乃適然焉之意蓋一陰一陽之謂道而繼之者善此性善之原也故曰性通極於道非氣則理亦無掛搭處而理實宰乎氣故曰命通極於性通極者理相通而根極之之謂此性命之本然也既云氣與遇不足道又云通氣外行氣中者又是以性與命對言性純乎理而命則有窮通得失吉凶禍福之數也然性通氣外二句不重重在無內外上就性論性則通乎氣外就命論命則行乎氣中其實氣無內外特假有形而言耳故思知人之性不可不知天之命盡其性然後至於天之命也氣無內外句是下半節主意正見性命合一而人不可不學以盡性至命舊說但謂張子為中外字自作斡旋之辭失其旨矣天所命命通氣外二命字以氣數言不可作天命謂性之命至於命命字乃以理言而與上自不相悖蓋人受得天命之性時而氣數之命即存乎其中但所舉以為言者不同耳宋子鋭臣云修之吉悖之凶此常理也即天命也或修之未必吉悖之未必凶此遇之適然不足以害其命之正也須於氣數中認出理字來故下云行乎氣中若天命謂性之命命在性先不當云通極於性且於遇字亦不對針矣知性知天則陰陽鬼神皆吾分內耳補訓此見性天之藴無窮也陰陽鬼神氣也而理實為主知性天則吾之性天此理陰陽鬼神亦此理皆屬吾分內事耳只言其理之一若燮理感格是進一層語集釋性與天即陰陽鬼神之理之氣在吾身者故曰分內天性在人正猶水性之在氷凝釋雖異為物一也受光有大小昏明其照納不二也問氷水之說何謂近釋氏朱子曰水性在氷只是凍凝成箇氷有甚造化及其釋則這氷復歸於水便有迹了與天性在人自不同問程子器受日光之說便是否曰是除了氣日光便不見却無形了集解受光上疑有缺文張注此言天性人性之無異猶水與氷雖有凝釋之分其實一也程子有器受日光之喻張子意謂人之氣質既有不齊受光不無小大昏明然論天日之照納則何嘗有異哉即氣不足以蔽之說也愚按此節大意上四句以天地之性言見天人之性無二下二句以氣質之性言見氣質不同而理無不同也上下本自一串凝即謂氷釋即謂水無生死意舊說俱屬添設張子以氷水喻天人本有未精又添出生死一層豈不因病而加之癘乎語意云天性在人猶水性之在氷蓋凝則為氷釋則為水本非二物天之所賦人之所受亦非有二理也人之氣禀所具雖有清濁純駁之不同而性無不同猶物受日月之光有大小昏明而上照下納者不二也天良能本吾良能顧為有我所喪耳集釋明天人之本無二補注天性在人故天之良能人皆有之顧一時為有我之私所喪耳所以人不可不學上達反天理下達徇人欲者歟補訓論語朱注與此意同但此反字以失而能復言稍異愚按此節大意釋論語之意見人當存理而遏欲也大概亦因言性而及天理即謂性故曰反性其總合兩也命其受有則也不極總之要則不至受之分盡性窮理而不可變乃吾則也天所自不能己者謂命不能無感者謂性雖然聖人猶不以所可憂而同其無憂者有相之道存乎我也徵引易上傳之五章鼓萬物而不與聖人同憂詩大雅生民篇誕后稷之穡有相之道集傳相助也或問朱子曰物所不能無感謂性曰有此性自是因物有感見於君臣父子日用事物當然處皆感也所謂感而遂通是也此句對了天所不能自已謂命蓋此理自無息止時晝夜寒暑無一時停故逝者如斯而程子謂與道為體這道理古今晝夜無須臾息故曰不能已問性只是理安能感恐此語只可名心否曰橫渠此言雖未親切然感固是心所以感者亦是此心中有此理方能感補注性之總要處合太虛與氣化言之也為萬殊之一本也天命而人受之有物有則也為一本之萬殊也補訓不極二句反言盡性窮理以下正言盡性窮理是盡性不變其則是至命髙注造化運行無一息之停此謂命寂然無朕觸感乃見此謂性天與聖人一也而聖人有憂者欲盡其輔相之道則不能同天地之無心有心則有憂矣愚按此節大意自乃吾則也以上言盡性然後至命以下言盡性至命正以助天比上深一層補訓謂無心異於有心於雖然猶字語氣皆不合髙注得之性自是理之總名合兩者以虛與氣合而為言首篇所謂合虛與氣有性之名是也性以人之所具言而云其總乃是從上源處說命以天之所賦言而云其受乃是從在人後說故補注有萬殊一本之語不可變者盡性窮理之造其極即所謂至於命者也天所二句見性命一理天不己而不得不命之人性有感而不得不通之物皆自然而然在天與在人一也然聖人盡性至命必自居於有憂而不敢同於天之無憂者蓋性命之賦於天天所能也盡性至命以合於天非天所能也相天之道存乎我故有憂以助化育所不及也有憂以相天兼盡性盡人物之性方盡宋子鋭臣云前後命字多以氣數言惟此與盡其性節以理言似若有不同者蓋命一而已人禀此理時即已禀此不齊之氣但言命者或抽出上一截言之則為理或抽出下一截言之則為氣數猶形而後有氣質之性而天地之性存焉離氣以言性與即氣以為性皆不知性也知此則或言理或言氣或言理而忽及氣或言氣而忽及理皆有左右逢原而不相悖者如孟子立命之命以理言莫非命也之命以氣言而朱子以為發其末句未盡之意皆此意也湛一氣之本攻取氣之欲口腹於飲食鼻舌於臭味皆攻取之性也知德者屬厭而已不以嗜欲纍其心不以小害大末喪本焉耳徵引左傳昭公二十八年閻沒女寬諫魏獻子云願以小人之腹為君子之心屬厭而已杜注屬足也厭同饜問湛一氣之本攻取氣之欲朱子曰湛一是未感物之時湛然純一此是氣之本攻取如目之欲色耳之欲聲便是氣之欲曰攻取是攻取那物否曰是補訓此言湛一攻取之分見不可任氣為性也湛一攻取皆串字湛一者湛然純一也攻取者攻而取之也上攻取言欲下言性氣質之性即謂欲也華注氣之湛一即性之本體也氣之攻取亦性之發用也然攻取之性一縱即纍其湛一知德者不以纍其心則雖當攻取之時而不失湛一之本矣心能盡性人能𢎞道也性不知檢其心非道𢎞人也髙注心有覺而性無為也愚按此節大意以心性釋論語人道之義亦因言性而及也先下注語而後出本文亦訓釋之一體論語朱注採入盡其性能盡人物之性至於命者亦能至人物之命莫不性諸道命諸天我體物未嘗遺物體我知其不遺也至於命然後能成己成物不失其道補訓此推言盡性至命之旨以盡性引起至命莫不以下申明其意此節側重至命上成己成物側重成物上補注因中庸言盡其性能盡人物之性則知至於命者亦能至人物之命莫不性諸道其性同也命諸天其命同也我體物未嘗遺我之性命即物之性命也物體我知其不遺物之性命即我之性命也物我一體無有間斷故推而至於命然後能成己成物各盡其道無一毫有我之私也張注一盡性萬事畢何消又說到至於命蓋在人言之謂之性自天言之謂之命命者天理至善之極也猶大學言明德新民而必要之於止至善非成己成物之外别有至命道理也愚按體猶備也以我之性命中萬物皆備知人物亦能備我之性命也無功夫至於命句內有盡性意己物同此性命故盡性而至於命然後成己成物不失其道矣重在成物正收應至人物之命以生為性既不通晝夜之道且人與物等故告子之妄不可不詆徵引易上傳之四章通乎晝夜之道而知本義通猶兼也晝夜即幽明死生鬼神之謂補訓此言生與性之分借告子以為說引易去知字通字當作通曉之通不通晝夜之道只是借易語以見其不明理耳生死即晝夜之道生死氣也非性也以生為性是不能通晝夜之道也舊講泥道字以晝夜貼生道貼性缺妥愚按此以生與死對故以晝夜為說與朱注作知覺運動者異不通晝夜之道猶云不知陰陽之理非謂但通晝夜不通晝夜之道也人與物等即所謂犬牛之性猶人者也人物所性不同而所為生者無異故云相等李注謂性無生死蓋又照首篇聚散吾體之旨與此章性字不合性於人無不善繫其善反不善反而已過天地之化不善反者也命於人無不正繫其順與不順而已行險以僥幸不順命者也徵引易上傳之四章範圍天地之化而不過補訓此申言性命之旨孟子易中庸張子雜引以明己意李注過天地之化者釋老是也溺於空淪於靜自謂見性而實不足以盡性行險僥幸之小人自謂己能為命而實乃不順命也既不順命烏能立命哉二者髙下雖有間然不能順性命之理則一耳髙注順帝之則所謂範圍天地之化而不過也失其則則過之矣日用動靜莫非天地之化也華注遇有吉凶隨其所處各有當盡之道此命無不正也盡其道雖誅夷戮辱不失為順命不盡其道雖死牖下不免為行險以僥幸愚按此當與天所性者節參看性無不善通極於道者也善反其初則不以氣蔽之者也命無不正通極於性者也順受其正則不以遇戕之者也此節實為下十四節之綱形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉朱子曰天地之性則太極本然之妙萬殊之一本也氣質之性則二氣交運而生一本而萬殊也天地之性是理也才到有陰陽五行處便有氣質之性於此便有昏明厚薄之殊論天地之性則專指理而言論氣質之性則以理與氣雜而言之氣質陰陽五行所為性即太極之全體但論氣質之性即此體墮在氣質之中耳非别有一性也氣質之說起於張程極有功於聖門有補於後學前此未曾有人說到故張程之說立則諸子之說定矣勉齊黃氏曰自孟子言性善而荀卿言性惡揚雄言善惡混韓文公言三品及至橫渠張子分為天地之性氣質之性然後諸子之說始定蓋自其理而言之不雜乎氣質而為言則是天地賦豫萬物之本然者而寓於氣質之中也故其言曰善反之則天地之性存焉蓋謂天地之性未嘗離乎氣質之中也其以天地為言特指其純粹至善乃天地賦豫之本然也曰形而後有氣質之性其所以有善惡之不同何也曰氣有偏正則所受之理隨而偏正氣有昏明則所受之理隨而昏明木之氣盛則金之氣衰故仁常多而義常少金之氣盛則木之氣衰故義常多而仁常少若此者氣質之性有善惡也曰既言氣質之性有善惡則不復有天地之性矣子思子又有未發之中何也曰性固為氣質所雜矣然方其未發也此心湛然物欲不生則氣雖偏而理自正氣雖昏而理自明氣雖有贏之而理則無勝負及其感物而動則或氣動而理隨之或理動而氣挾之由是至善之理聽命於氣善惡由之而判矣此未發之前天地之性純粹至善而子思之所謂中也記曰人生而靜天之性也程子曰其本也真而靜其未發也五性具焉則理固有寂感而靜則其本也動則有萬變之不同焉愚嘗以是而質之先師矣答曰未發之前氣不用事所以有善而無惡至哉此言也西山真氏曰性之不能離乎氣猶水之不能離乎上也雖不離乎氣而氣汩之則不能不惡矣雖不離乎土而土汩之則不能不濁矣然清者其先而濁者其後也先善者本然之性也後惡者形而後有者也故所謂善者超然於降衷之初而所謂惡者雜出於有形之後其非相對而並出也昭昭矣張子曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉程子曰性即理也天下之理原其所自來未有不善喜怒哀樂未發何嘗不善發皆中節則無往而不善凡言善惡皆先善而後惡言吉凶皆先吉而後凶言是非皆先是而後非觀二先生之言則本然之性與氣質之性其先後主賓純駁之辨皆判然矣張子有言為學大益在自求變化氣質此即所謂善反之者也程子亦曰學至氣質變方是有功亦是張子之意補訓此承上文善反而言性有氣質與天地之分當不徇乎氣質而復乎天地之性也華注天地之性非形則無所受形者氣與質之所聚而成也氣質有美惡故性有純雜而天地之性未嘗不存君子能變化氣質則不離乎氣質而天地之性全矣愚按易言立天之道曰陰與陽立地之道曰柔與剛陰陽氣也剛柔質也此言氣質之性所由始也此節孟子性無善無不善也章朱注採入人之剛柔緩急有才與不才氣之偏也天本參和不偏養其氣反之本而不偏則盡性而天矣性未成則善惡混故亹亹而繼善者斯為善矣惡盡去則善因以亡故舍曰善而曰成之者性徵引易上傳之五章繼之者善也成之者性也詩大雅文王篇亹亹文王集傳亹亹强勉之貌補訓此申言善反以成性之意首數句言氣質易偏天本數句言當化其偏反其本性未成以下言繼善成性正是善反處善因以亡似有語病氣質之性固多偏必善反之乃至於成性也人之剛柔緩急其中有才與不才者氣質之偏為之也天道本剛柔緩急參和而不偏人能養其氣復其本然則盡性而合天矣盡性者在易謂之成性當性未成時則善為惡所混而多偏故必亹亹而繼續其善不使間斷斯謂之善矣繼善不已而惡盡去則並不見善是善因以亡故不復曰善而但曰成之者性也成性者所謂天地之性而不狥乎氣質者也剛與柔對緩與急對用之當則才用之不當則不才重不才邊故接云氣之偏天謂在天之道所以生人者參和者相參而和猶云相雜而適均之意承上剛柔緩急言集釋陰陽相參似覺添出李注剛柔緩急即氣質之性參和不偏者天地之性也華注易本以繼善說天命之流行成性說萬物之禀受此以繼善作工夫成性作究竟也德不勝氣性命於氣德勝其氣性命於德窮理盡性則性天德命天理氣之不可變者獨死生修夭而已故論死生則曰有命以言其氣也語富貴則曰在天以言其理也此大德所以必受命易簡理得而成位乎天地之中也所謂天理也者能悅諸心能通天下之志之理也能使天下悅且通則天下必歸焉不歸焉者所乘所遇之不同如仲尼與繼世之君也舜禹有天下而不與焉者正謂天理馴致非氣禀當然非志意所與也必曰舜禹云者餘非乘勢則求焉者也徵引易上傳之一章易簡而天下之理得矣天下之理得而成位乎其中矣本義成位謂成人之位十一章聖人以通天下之志下傳之十二章能悅諸心朱子曰張子只是說性與氣皆從上靣流下來自家之德若不能有以勝其氣則只是承當得他那所賦之氣若是德有以勝其氣則我之所以受其賦豫者皆是德故窮理盡性則我之所受皆天之德其所以賦豫我者皆天之理氣之不可變者惟死生修夭而已蓋死生修夭富貴貧賤這却還他氣至義之於君臣仁之於父子所謂命也有性焉君子不謂命也這箇却須由我不由他性命於氣是性命都由氣則性不能全其本然命不能順其自然性命於德是性命都由德則性能全天德命能順天理問窮理盡性則性天德命天理這處性命如何分别曰性是以其有定者而言命是以其流行者而言命便是水恁地流底性便是將碗盛得來大碗盛得多小碗盛得少淨潔碗盛得清汗漫碗盛得濁華注此言窮理盡性者之能立命集解吾能盡性而有所得所謂德也吾之心有仁義禮智信之理所謂性也吾之身有吉凶禍福死生夭壽之禀所謂命也性雖載於氣禀者有不同而本無不善命雖出於氣禀而有定則然天理亦有可回者使不能修德則德不能勝其氣禀性將拘於氣禀而不能開命各隨其氣禀而不能回矣是性命皆由於氣也能修德則德能勝其氣禀矣故性能復其初而氣禀不能拘天亦祐有德而氣禀可以反是性命皆由於德矣以上是言理窮理盡性正是修德以下才著人言性天德者純然至善復其本體與天為一也命天理者百福駢集皆天理之所致回氣禀而得福者也氣之不可變獨死生修夭者謂富貴福慶之類雖氣禀所不當有皆可以天理而回之其不可變者獨死生修夭而已成位指爵位即受命之意也與易不同所謂天理也者以下又言天理可以回氣禀得天命之故修德而有天理則德澤及民能使天下各得其所悅而且通如此則歡欣交洽天下必歸之矣此大德所以必受命易簡理得而成位也所乘者勢也如伊周事繼世之君而不有天下勢在商周不可回也所遇者時也如孔子時遇衰微之極而無天子薦之故亦不能回天命而有天下此皆變也非常也張子以命為天理所當得以遇為一時氣數所遭非理之常也故有命遇之說補訓論語死生有命富貴在天天命相似張子引來以命為氣天為理與本旨異易易簡成性張子引來以易簡理得貼大德以成位貼受命易悅心謂心與理㑹而悅通天下之志以卜筮言張子悅心以悅人心言與通天下之志一例看皆與本旨不同論語不與謂不以富貴為樂張子引來謂舜禹乃天理馴致而有之非氣禀之所當然亦非志意所得與氣禀猶言氣數下乘勢跟氣禀求跟志意愚按此節首四句性命平舉窮理盡性五句漸側在命上論死生以下七句專明命天理意性天德者盡性合天之謂命天理則謂除死生修夭之不可變外富貴福澤皆可以理致也命皆以氣數言朱注數條亦微異本旨引論語二句死生有命輕應氣不可變二句富貴在天重正應命天理之云故曰此大德受命易簡成位也所謂天理以下八句正明天理之實天下之歸即命天理之實也舜禹有天下七句正見德勝氣所以命天理處如此則命字非有二義上下原自一貫補訓以命天理言氣禀之偏可變下半節方言氣數故謂上下當作兩截看而又疑其文義不倫仍是未細看耳所乘所遇集解分貼竊意所乘所遇猶言時勢不同當兼孔子伊周言之孔子勢未得而時未遇伊周遇繼世之賢而勢不可反也不言伊周而言繼世之君者錯舉成文耳非氣禀當然二句正解不與二字乘勢如繼世之君是也即湯武應天順人亦是求則篡奪之類也利者為神滯者為物是故風雷有象不速於心心禦見聞不𢎞於性補訓此極言性之𢎞也以風雷形心以心形性總歸重性上集解無所不至之謂利風雷雖輕清之物有象則猶不免為物也故千里不同風百里不聞雷不若心之瞬息之間無所不至然心猶不失為氣也為見聞所禦則亦有所礙而不能通有所拒而不能容矣安能如性之無不包哉上智下愚習與性相遠既甚而不可變者也張子語録性相近也習相遠也性則寬褊昏明名不得是性莫不同也至於習之異斯遠矣李注程子以為上智下愚自不肯移其義甚精如其肯移也罔念作狂克念作聖未有不因習而遷者也張子則以為上智下愚之不移自其習成言之愚按此節大意釋論語上智下愚之所以不同亦因言性而及之也此看性字亦不必專主氣質如朱子之說習與性相遠既甚謂其所習之善惡與其本性甚遠以習字為主髙注以上智純於性下愚純於習為相遠補訓謂習與性皆相遠俱不合本旨纎惡必除善斯成性矣察惡未盡雖善必粗矣補訓此言去惡從善之功也上下一反一正纎細也發明首二句即前章惡盡去則善因以亡故舍曰善而曰成之者性意華注王文緝曰除惡屬行邊察惡屬知邊不識不知順帝之則有思慮知識則喪其天矣君子所性與天地同流異行而已焉徵引詩大雅皇矣篇不識不知順帝之則集傳文王能不作聰明以循天理補訓此引詩而釋之以明性與天地相通也見人不可作聰明以斫喪其性不重文王所謂性者出於天而為上帝之則也詩云文王能不識不知以順上帝之法則蓋帝則宜順若有思慮知識則私意橫生而喪其帝則矣以是知君子所性與天地同其流但異行而已人當順帝則如文王可也詩只云知識張子添思慮二字以見其出於有心之私同流異行重同流上不識不知就應事接物上言或專主靜非也在帝左右察天理而左右也天理者時義而已君子教人舉天理以示之而已其行己也述天理而時措之也徵引詩大雅文王篇文王陟降在帝左右集傳文王之神在天一升一降無時不在上帝之左右易豫卦彖豫之時義大矣哉補訓此亦引詩而釋之以見天理之重也以在為察以帝為理與本旨不同左右只是不相離之意因時合宜為時義時義正是當察處和樂道之端乎和則可大樂則可久天地之性久大而已矣徵引禮樂記心中斯須不和不樂而鄙詐之心入之矣易上傳之一章有親則可久有功則可大補訓此推出和樂之義以明道非强致首句提起下申其義集解天地之性指人言即道也非指天地久大道也大以和推久由樂得故和樂為道之端愚按人禀天地之性萬理渾全無時而息本至久且大也學者能和則從容不迫可充而大能樂則終始不倦可積而久久大則全乎道之體而天地之性無虧矣故和樂為道之端莫非天也陽明勝則德性用陰濁勝則物欲行領惡而全好者其必由學乎徵引禮仲尼燕居禮也者領惡而全好陳注與釋回增美質大意相類朱子曰只將自已意思體驗便見得人心虛靜自然清明才為物欲所蔽便暗了此陰濁所以勝也補訓此提出學字示人以工夫之要也天以氣質之禀於天者言華注陽明陰濁皆天之氣也善學者扶陽而抑陰以明而勝濁乃所以全天之本然也凡天理邊事必蕩蕩平平光明正大順乎人心人欲邊事必猥瑣齷齪隱僻曖昧拂乎人心故有陽明陰濁之别惡與好之殊愚按陽明陰濁猶所謂人心道心者也皆禀於天故曰莫非天陽明勝即道心發見之時陰濁勝即人心滋長之時是二者人皆有之所以充道心而遏人心者惟恃乎學而已矣不誠不莊可謂之盡性窮理乎性之德也未嘗僞且慢故知不免乎僞慢者未嘗知其性也補訓此言學必內誠外莊乃能盡其性也上二句反言中二句正言末二句申上二句之意重盡性上窮理帶言故下言知性以包窮理華注性者真實無妄不誠則妄矣性者有物有則不莊非則也故曰不可謂之盡性集釋僞慢者客感客形之流弊非性之德也僞則不誠慢則不莊勉而後誠莊非性也不勉而誠莊所謂不言而信不怒而威者與徵引禮樂記天則不言而信神則不怒而威補訓此承上文誠莊而言安勉之分不勉而誠則不言而信不勉而莊則不怒而威生直理順則吉凶莫非正也不直其生者非幸福於回則免難於苟也徵引詩大雅旱麓篇求福不回集傳回邪也禮曲禮上篇臨難毋苟免補訓前言性係善反不善反命係順受不順受下接善反以明性此則申命無不正係於順受不順受之旨也生理本直能順其理而不枉則莫非正命不直其生則不能順其理以回曲而幸得福以苟且而免於難是倒裝句法屈伸相感而利生焉感以誠也情僞相感而利害生雜之僞也至誠則順理而利僞則不循理而害順性命之理則所謂吉凶莫非正也逆理則凶為自取吉其險幸也徵引易下傳之五章屈伸相感而利生焉十二章情僞相感而利害生說卦之二章聖人之作易也將以順性命之理補訓此承上順理而申言其義引易二語以誠引起誠僞見人不能皆誠中言誠則利僞則害末言利即順受害即不順受通作三層看所謂直與不直者誠僞之分也易云屈與伸相感而利以生其感以實理天道然也易又云情與僞相感而利與害生雜以心之僞人事然也人能至誠以感則順乎當然之理而利生矣若僞以感則不循當然之理而害生矣順理者順性命之理則所謂吉凶莫非正命無不利也不順理而逆之則其凶為自取而應得吉為僥幸而不應得徒有害也然則欲順理以受正命者當有誠而無僞矣易屈伸相感以感應之理言情僞相感以卦爻之應言張子借用以屈伸句引起情僞句與本旨不同下誠僞通承情僞句順性命之理承順理句說吉凶莫非正所謂利也逆理承不順理句說取凶幸吉所謂害也莫非命也順受其正順性命之理則得性命之正滅理窮欲人為之招也徵引禮樂記人化物也者滅天理而窮人欲者也補訓此又承上文而申順受不順受之意引孟子二語虛言其理下分順受不順受集釋順性命之理而命得其正吉凶有所不較若滅絶天理窮極人欲不正而死豈曰命乎李注言命而兼言性者順性之理即所以順命也愚按上三節大意相同生直理順節言順理則吉凶皆正命不順理則吉凶皆非正屈伸相感節推出誠僞一層意言不誠者有得禍之理而無獲福之道詞旨加嚴此節人為之招直見凶禍之不可免而所謂險幸苟免者亦幾難望矣蓋反覆言之而意愈嚴也補訓仍兼吉其險幸說殊不必正䝉初義卷六
