body:
  text: 正䝉初義卷十四邳州知州王植撰大易篇第十四補訓此篇論易可與程朱傳義相發明大易二節以易較諸子之說所以闢異端一物三才以下十二節雜引易語而訓以己意潔靜節引禮記之言以其言易附入易中也天下之理得以下十七節専論乾卦坤至柔三節由乾而及坤造化之功以下十節明說卦一陷溺以下十七節又雜言易義往之為義節専明一字故居末愚按此篇凡六十三節程子之説易以理朱子之説易以數張子亦以理說易而與程子又有不同者叅而攷之義固各有當也讀者不得執一以廢一首節入近思録辨别異端大易不言有無言有無諸子之陋也集解理氣不相離故大易不言有無老荘之類乃言有生於無則是以道為虚無隔理氣而為二矣何其陋哉愚按此節大意明易之異於諸子也易不言有無如一隂一陽之謂道形而上者謂之道形而下者謂之器是也諸子言有無如老子萬物生於有有生於無是也此只以易與老荘諸子分别如晉人好以易及老荘並言故以此正之諸家或並及釋氏空無與徇生執有之謬竊謂此又是一義不必牽及易語天地隂陽情偽至隠賾而不可惡也諸子馳騁說辭窮髙極幽而知徳者厭其言故言為非難使君子樂取之為貴徴引易上傳之十二章設卦以盡情偽八章言天下之至賾而不可惡也十二章又云探賾索隠補訓易中所言天地隂陽及人之情偽雖極扵至隠深至繁賾而皆有至理其言可取而不可惡也若諸子馳騁說辭窮其髙極其幽無所不至而知徳者厭其言之怪誕而不足信故言為非難使君子樂取之乃為貴耳厭惡字相形可厭便不可取不可惡便可取知徳猶言知道即君子也髙注皆實理故不可得而惡愚按此節大意同上節上節言有無似指老氏意多此節馳騁說辭似指荘列意多易一物而三才隂陽氣也而謂之天剛柔質也而謂之地仁義徳也而謂之人徴引易説卦之二章立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦華注王文緝曰一物即一理也易只一理而天地人三才之道具於其中隂陽剛柔仁義分言之有三才之别合言之總此一隂一陽之理而已張注氣之輕清者屬乎天如寒暑之類是也質之凝重者屬乎地如山川是也合天地之氣質而成性屬乎人仁義是也三者一而已矣氣質之說雖自張程始發明之實具之於易隂陽是氣剛柔是質聖人言下本自明白漢唐以下諸儒特未之察耳愚按此節大意釋易說卦立天之道六句見其止是一理而分之則有三也隂陽剛柔仁義本一物也以其氣而屬之天以其質而屬之地以其徳而屬之人實則一而已矣非太極分為兩儀之謂補訓謂一理即太極但不必指定尚介騎牆易為君子謀不為小人謀故撰徳於卦雖爻有小大及繫辭其爻必諭之以君子之義徴引易下傳之九章雜物撰徳辨是與非繫辭傳本義繫辭謂文王周公所作之辭繫於卦爻之下者補注易卦之辭必曰利貞曰利君子貞曰小人勿用曰君子吉小人否皆為君子謀不為小人謀也小謂隂大謂陽也發明吉凶者言乎失得悔吝者言乎小疵無咎者善補過是禍福皆縁道義而有故曰為君子謀張注易雖為卜筮而設然聖人繫辭直是教人以决疑趨避通志成務故論吉凶而不論禍福今人必以徴驗求卜筮是専為禍福起見豈足以言易哉為禍福一定之說者術家小數非知易者也愚按此節大意總論大易示人之理語意云易之為書但為君子謀不為小人謀故每卦中所以具其一卦之理者雖爻有隂小陽大之不同及至聖人繫辭於爻下必諭之以君子之義也易豈為小人謀哉為君子謀兼補注所舉易辭發明所舉易義其理乃備此句為綱下申明之撰徳於卦者一卦中具有一卦之理也此句虚下言爻正以明卦以每卦各有六爻也繫辭𦂳接其爻說専指六爻之小象言每爻必諭以君子之義故曰易為君子謀也舊說皆以卦爻平舉或分兩層皆未合明章𢡟易論引伸張子之意甚暢其畧曰夫黄裳元吉南蒯終以取敗元亨利貞穆姜不得而用也易果不為小人謀乎曰此所謂不謀之謀欲使天下後世之皆為君子而不為小人也夫拔茅征吉户庭無咎謀出䖏也揚於王庭括囊不害謀語黙也乾而惕厲震而修省損而懲忿窒慾益而遷善改過謀所以修身也臨而保民觀而設教巽而申命行事噬嗑而明罰勅法謀所以治人也飲食於需宴息於隨避難於否致命於困反身修徳於蹇則於處常䖏變之事無一不為之謀焉易之拳拳於君子如此其於小人也履霜則恐其堅娶女則憂其壮童牛是牿金柅是繫惡羸豕之躑躅戒剥床之滅貞誠不為之謀矣然使小人知所悟焉必将曰覆餗而刑剭負乘而致寇易盖戒我不可以覆餗而負乘也獲狐於田射隼於墉易又教我不可以為狐而為隼也小人勿用小人弗克吾而不為小人則用矣克矣能反乎此則易之一言一字皆小人之藥石又况剥之六五許其貫魚之利復之六四美其獨復之道然則易之不為謀特不為之謀為小人之事耳小人而欲為君子易固未始不為之謀也一物而兩體其太極之謂與隂陽天道象之成也剛柔地道法之效也仁義人道性之立也三才兩之莫不有乾坤之道徴引易說卦傳二章已見一物三才節上傳之十一章易有太極是生兩儀五章成象之謂乾效法之謂坤補訓此一物即指太極太極中具有乾坤之道是兩體也象之初成尚未成形即上文氣也法之呈效其形可見即上文質也性所由立即上文徳也乾坤兩也合之為太極故太極一物而兩體成象效法易分言乾坤此合言乾坤不同集釋隂陽剛柔仁義皆兩也剛仁與乾陽之道柔義與坤隂之道愚按此節大意釋說卦兼三才而兩之之義而以易有太極是生兩儀明之也此所謂太極亦不専以理言當與一物兩體氣也意叅㸔一物指太極而兼天地人兩體指乾坤而兼隂陽剛柔仁義分之則一才各有兩體合之則三極只是一物而隂陽剛柔仁義各具乾坤之兩體也三才節見天地人只是一理此見天地人各有兩體三才節一物指隂陽言三才同是隂陽之理此一物指太極言隂陽本於一理語意各有所主李注謂申一物三才節之意竊謂俱釋說卦二章之言但上節明立天之道六句此則明三才兩之之義固未可合一耳隂陽剛柔仁義之本立而後知趨時應變故乾坤毁則無以見易徴引易上傳之十二章乾坤成列而易立乎其中矣乾坤毁則無以見易本義凡陽皆乾凡隂皆坤畫卦定位則二者成列而易之體立矣乾坤毁謂卦畫不立乾坤息謂變化不行下傳之一章剛柔者立本者也變通者趨時者也髙注隂陽剛柔仁義者乾坤之道也趨時應變者易也本立者三才之體具趨時者三才之用行張注天道之發育萬物只是以隂陽作材料地道之成遂萬物只是以剛柔為設施人道之云為萬事只是以仁義作本領雖時㑹遷移亘古及今千變萬化無有窮盡要不外此而已苟非此則無本不立将何藉以趨時應變乎愚按此節大意釋上傳十二章之義也本義言畫後之易張子之意則不専指卦畫竊謂有隂陽而生萬變畫前之易然也有竒耦而成爻象已畫之易亦然也兼之乃備其㫖六爻各盡利而動所以順隂陽剛柔仁義性命之理也故曰六爻之動三極之道也徴引易上傳之二章六爻之動三極之道也本義六爻初二為地三四為人五上為天極至也三極天地人之至理三才各一太極也十二章變而通之以盡利說卦之二章将以順性命之理補訓上傳六爻之動三極之道也此明其義性命之理總承隂陽剛柔仁義言六爻盡利而動是六爻之動順隂陽剛柔仁義性命之理是三極之道愚按易六爻之動以卦爻之變動言三極之道謂卦中自具天地人之理也諸說于此節多将盡利順理㸔作有力字似以人之用易者言與易本㫖不同竊意利如孟子以利為本之利盡利而動猶言順其自然而動非利害之利盖易卦以隂陽立體而隂變為陽陽變為隂以成六爻之位皆盡利以變動所以然者天之隂陽地之剛柔人之仁義皆因時盡變不拘一體六爻之動由此道而已亦以卦爻言不以人之用易言陽徧體衆隂衆隂共事一陽理也是故二君共一民一民事二君上與下皆小人之道也一君而體二民二民而宗一君上與下皆君子之道也徴引易下傳之四章陽卦多隂隂卦多陽其徳行何也陽一君而二民君子之道也隂二君而一民小人之道也本義震坎艮為陽卦皆一陽二隂巽離兊為隂卦皆一隂二陽補訓易下傳四章張子分疏其義隂體陽事先言其理下分兩邊說陽徧體衆隂衆隂共事一陽此理之常也二君共一民所令不一一民事二君則無所従上與下皆為小人之道以其與理悖也一君而體二民無不徧二民而宗一君有常尊上與下皆為君子之道以其與理合也卦體大概如此然吉凶不盡在是也華注天下之理陽為主而隂輔之則吉主不可分分則爭戰國南北朝是也輔不可二二則不忠馮道之類是也故曰小人一君體二民是一統之象二民宗一君是歸仁之象故曰君子不特天下大勢如此一國一家一事一物之理皆然吉凶變化悔吝剛柔易之四象與悔吝由贏不足而生亦兩而已徴引易上傳之二章吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也本義悔自凶而趨吉吝自吉而向凶十一章易有四象所以示也本義四象謂隂陽老少集解吉凶悔吝以辭言變化剛柔以變言四象各有兩反覆相因悔吝似一物也故又特言其由贏生吝由不足生悔亦兩而已葢悔自凶而趨吉吝自吉而向凶吉者大獲為贏凶者破敗為不足然則隂陽之理何所不體而天下何物不有兩哉補訓易四句皆言象故為易之四象贏有餘也與盈同兩不外隂陽即前兩體之兩愚按此節大意葢以吉凶四句實十一章四象之文與本義不同悔吝二句又明悔吝所以分為兩之義也以贏貼吝以不足貼悔者由吉来而生吝由凶来而生悔也贏不足仍不外吉凶之義尚辭則言無所苟尚變則動必精義尚象則法必致用尚占則謀必知来四者非知神之所為孰能與於此徴引易上傳之十章易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占又云非天下之至神其孰能與於此九章知變化之道者其知神之所為乎下傳之五章精義入神以致用也上傳之十一章備物致用十章遂知来物集解易之辭皆至理也故尚辭則言無所苟易之變老陽變為少隂老隂變為少陽者一時而已尚變則仕止久速辭受取予皆當乎時故動必精合於義理也卦之象何用不具故尚象則法度必可以致之於用占之辭吉凶有定也故尚占則謀必知来然四者實自然而然神之所為也非知其為神之所為則以易理為出於人為我亦或容心於其間其孰能言動法謀之胥善哉集釋易有聖人之道四焉辭變象占是也如不恒其徳或承之羞辭也亢龍有悔龍戰於野變也離為網罟益為耒耜象也潛龍勿用飛龍利見占也尚存心於此也補訓象以制器故言法制作之法度也愚按此節大意釋易傳十章之文而雜舉論語易辭以明之也易非天下之至精則辭不足待天下之問非深不足通天下之志非通變極數則文不足以成物象不足以制器幾不足以成務非周知兼體則其神不能通天下之故不疾而速不行而至徴引易上傳之十章問焉而以言其受命也如響非天下之至精其孰能與於此本義此尚辭尚占之事傳又云參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此本義此尚象之事變則象之未定者也傳又云寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至本義所以極深者至精也所以研幾者至變也補訓此雜引上傳十章之辭而以己意貫之以釋其義易之辭足以待天下之問而告之惟其理之至精也若非天下之至精則其辭不足以待天下之問矣易足以通曉天下人之志而決其疑惟其理之至深也若不深則不足以通天下之志矣揲蓍求卦者通其揲之變遂成天地竒耦老少之文極其七八九六之數遂定天下卦爻之象而且能研幾以成天下之務也若非通變極其數則其文不足以成物其象不足以制器其幾亦不足以成務矣易能周知無隠而兼體不遺於天下之故惟其神故不疾而速不行而至也若非周知兼體則其神不能通天下之故且不疾而自速不行而自至矣集解至精辭之精宻無所不具也深理之𤣥微無所不包也辭足以待天下之問則其理足以通天下之志矣二意不甚相逺變揲蓍之變也分二掛一揲四歸竒為一變通變總三揲兩手之策也極究察也數七八九六也文謂隂陽老少之畫非通變則隂陽老少之文不成何以成物象謂卦爻動静之象非極數則卦爻動静之象不明何以制器無文象以成物制器則是其幾之不辨不足以成務矣成務即成物制器也通天下之故即是待問通志成務不疾而速不行而至承上神字說愚按易傳分辭變象占至精節言辭占極深即至精者為之至變節言象變研幾即至變者為之而以至神總承張子義大同示人吉凶其道顯矣知来藏往其徳行神矣語蓍龜之用也徴引易上傳之九章顯道神徳行是故可與酬酢可與祐神矣本義道因辭顯行以數神酬酢謂應對祐神謂助神化之功十一章神以知来知以藏往補注釋易顯道神徳行之意發明藏往以下章明患而弭其故觀之是謂今日吉凶既明從新徑往吉一邊去将前日既往故事盡掩藏消弭了補訓易只用蓍龜帶言易中兼言龜蓍亦如此愚按易道以吉凶之理言徳行以民生趨避之行言謂易能顯之神之也張子道與徳行即以易而言之顯道者危使平易使傾懼以終始其要无咎之道也神徳行者寂然不動㝠㑹於萬化之感而莫知為之者也受命如響故可與酬酢曲盡鬼謀故可以祐神徴引易下傳之十一章危者使平易者使傾其道甚大百物不廢懼以終始其要无咎上傳之十章寂然不動感而遂通天下之故又云問焉而以言其受命也如響下傳之十二章人謀鬼謀補訓上釋顯道神徳行二句此又申明之並釋可與酬酢二句俱是用易釋易㝠㑹猶云黙契萬化乃天下萬事之變化不齊者集解危懼則得平安慢易則必傾覆大抵能危懼以終始其事其要得無咎易辭所顯此道而已易無思無為也寂然不動而萬化之感自然能㝠㑹無遺而莫測其所以為之者不為神乎可與酬酢謂易可以之應對乎人鬼謀吉凶也鬼神主吉凶以示人而不能使之趨避易能曲盡以示人故可以祐助鬼謀之所不及愚按上節言示人吉凶此則謂吉凶非有一定當危懼以得无咎上節言知来藏往此則謂往来萬變之不齊易能於寂然不動之中一一㝠契而示之幾皆較前深一層下二語通承道行舊說或以酬酢承顯道祐神承神徳行未確開物於幾先故曰知来明患而弭其故故曰藏往極數知来前知也前知其變有道術以通之君子所以措於民者逺矣徴引禮仲尼閒居篇有開必先易上傳之十章神以知来知以藏往五章極數知来之謂占通變之謂事十二章舉而措之天下之民謂之事業補訓易示人吉凶凡事物皆開曉於幾兆之先是能知未来也患之已見者為故明於患而有以消弭之是往者得以藏也易本是包藏之藏此作掩藏之藏極數知来之謂占謂究極其揲蓍之數以知来所以占也通變之謂事謂通其變吉則趨凶則避而事業以之出也二句合看極數知来可以前知前知其變之如何而有道術以通之君子所以措於民者逺矣此又合措之天下之民謂之事業句来說事字道術二字要着眼不是耑計利害為趨避自有善全之道術法也本道而善其用謂之道術集解以弭字解藏故字解往言人之舊所習行者不知患而妄為易則能明其患以示人而消弭之故曰藏往與易本㫖不同愚按此節大意解上傳十章知来藏往而以五章極數知来二語明之也措民之謂事業又借說一事字意只以知来藏往為主補訓謂並釋極數知来二句尚未審上四句知来藏往平舉下五句又従知来言及通變前知即知来之意有道術以通之則藏往之理存乎其中矣以語之相近故舉以相証也潔淨精微不累其迹知足而不賊則於易深矣徴引禮經解潔靜精微易教也易之失賊其為人也潔静精㣲而不賊則深於易者也補訓此張子引禮之言易者而明其義以不累其迹訓潔静精微以知足訓不賊葢滯於象數之迹則不潔靜亦不精微潔静精微者圎融神妙自然不累於迹過求髙逺反害道知足者理明而止故不賊李注易者稽實待虚存體應用如明鏡然物来畢照而本無物也雖窮乎天地鬼神之奥而近在日用民行之間故惟不累於迹而知足者為深於其道記所謂潔静精微而不賊者此耳天下之理得元也㑹而通亨也說諸心利也一天下之動貞也徴引易乾卦乾元亨利貞上傳之一章易簡而天下之理得矣八章觀其㑹通以行其典禮下傳之十二章說諸心研諸慮一章天下之動貞夫一者也補訓此引易語以釋元亨利貞四字髙注以乾之四徳言學也華注四句俱在心學上説只是理得於心加以天下二字有兼收統貫之義故曰元就其㑹通而言曰亨就其恱心而言曰利就其一而言曰貞愚按㑹而通言㑹合而貫通也若作嘉之㑹㑹以禮言與上下句未合悦猶易之言和所謂和順於道徳者也一者一之也亦與所謂貞夫一者微異葢學之序始於有得而漸至㑹通能恱諸心則固克協於一則成故以此為元亨利貞始終之義與易之言仁義禮智者亦不必作一說乾之四徳終始萬物迎之隨之不見其首尾然後推本而言當父母萬物徴引易乾卦彖乾元亨利貞彖傳大哉乾元萬物資始老子賛𤣥篇迎之不見其首隨之不見其後書泰誓上惟天地萬物父母發明元者物之始貞者物之終亨利在終始之際元上有貞是迎之不見首貞下起元是隨之不見尾天下無一物不本此四徳者非父母而何愚按此節大意明元亨利貞及大哉乾元萬物資始之義也四徳循環非有終始可分乾元資始之云特推萬物所由本而言之此推本二字之義上下兩層分意也然四徳循環方能父母萬物此然後二字之義上下兩層合意也二說相須其義始備推本而言正明乾元資始之辭彖以元亨利貞並言而傳但言大哉乾元盖因言萬物資始故推其本而言耳上節明四徳此並及資始之詞下節専言資始資生此三節相承之序也舊說多未了然彖明萬物資始故不得不以元配乾坤其偶也故不得不以元配坤徴引易乾卦彖大哉乾元萬物資始坤卦彖至哉坤元萬物資生補注釋乾元資始坤元資生之意發明乾備四徳缺一非乾彖因明資始故止以元配乾坤資生為乾之偶故以元配坤李注乾始萬物而元尤始之始也坤雖代乾有終然順天時行始則偕始矣故曰乾元又曰坤元也仁統天下之善禮嘉天下之㑹義公天下之利信一天下之動徴引易乾卦文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事一動見上節補注釋文言元者善之長四句之意童氏發微曰仁義禮智皆善也而仁為之長故曰仁統天下之善禮則動容周旋無不中禮故曰禮嘉天下之㑹義以制事使天下之物各得其利不徇乎私故曰義公天下之利知正之所在而固守之信也即貞也故曰信一天下之動愚按本義扵嘉之㑹則云嘉美之㑹也於嘉㑹足以合禮則曰嘉其所㑹朱子又謂㑹為㑹聚齊集之意言三千三百許多嘉美一時鬭凑到此便動容周旋無不中禮玩張子語意似以行禮時相㑹接䖏言與嘉其所㑹意同與嘉美之㑹則異六爻擬議各正性命故乾徳旁通不失太和而利且貞也徴引易乾卦彖乾道變化各正性命保合太和乃利貞文言六爻發揮旁通情也上傳之八章擬議以成其變化集解此解乾卦彖傳而非其本㫖集釋六爻擬議如乾初爻則為潛龍二為見龍五為飛龍上九為亢龍此擬議而位之也發明各正性命是各得其所以當然之理旁通只是乾徳流貫六爻之内意太和即資始之理也惟不失太和故利且貞貞下復起元若始如此終不如此何以為利貞而元亨亦息矣各正保合易俱指萬物言張子則正性命指六爻不失太和指乾徳盖非乾徳則六爻不能正性命非六爻正性命則乾徳利貞亦不可見愚按此以六爻之各正處見乾徳之流通以乾徳為至葢乾之六爻本乾元之徳而分見者也聖人畫卦繋爻所以擬議而位置之者或潛或見或飛或躍一爻一義各正其性命以自全故乾徳之周流扵六爻中者有以不失其太和資始之理而利且貞焉以成其終也易本以乾道變化各正保合為天道之利貞而以首出庶物二語為聖人之利貞各正保合皆就萬物已成形後不相妨害䖏言張子雖與易異㫖然各正亦以六爻成象不相假借者言之意異而理同也顔氏求龍徳正中而未見其止故擇中庸得一善則拳拳服膺歎夫子之忽焉前後也徴引易乾卦九二文言龍徳而正中者也本義正中不潛而未躍之時也補訓此與下數節承上文六爻而明其義此言九二爻集解正中以聖徳之極言與易㫖不同止即龍徳正中也髙注擇中庸得一善則拳拳服膺求龍徳之正中也歎夫子之忽焉前後則未見其止矣愚按此節以下言九二九五以孔顔為說當與中正篇前十節叅看盖朱子言六龍各自為說内卦以徳學言外卦以時位言張子看六龍有一層進一層之義皆兼徳位言故以顔子為大人孔子為聖人顔子為見龍而不安孔子為飛龍也宋子鋭臣云忽焉前後即中正篇所謂中道不可識者也三十篇顔子龍徳而隠者也以位言龍徳聖修之極也以徳言大抵張子看乾卦六爻皆作此解而其意尤重在徳耳此篇明九二爻以徳言後以庸言庸行節申之乾三四位過中重剛庸言庸行不足以濟之雖大人之盛有所不安外趨變化内正性命故其危其疑艱於見徳者時不得舍也九五大人化矣天徳位矣成性聖矣故既曰利見大人又曰聖人作而萬物覩亢龍以位畫為言若聖人則不失其正何亢之有徴引易乾九二文言庸言之信庸行之謹又云見龍在田時舍也九三爻君子終日乾乾夕惕若厲无咎文言重剛而不中本義重剛謂陽爻陽位九四爻或躍在淵无咎文言或之者疑之也九五爻飛龍在天利見大人文言飛龍在天乃位乎天徳又云聖人作而萬物覩上九爻亢龍有悔文言知進退存亡而不失其正者其惟聖人乎補訓上節言二爻此言三四五上爻乾三四爻位過中重剛與二爻不同二之庸言庸行不足以濟三四之事雖以大人之盛徳䖏三四亦有不安故須外趨時而變化其用内以進徳修業正其性命之理三之行事四之自試皆趨變化也三四皆言進徳修業内正性命也危以厲无咎厲字言疑以或之者疑之也疑字言時不得舍足見徳之意葢不能見徳則不見徳可耳何必致其艱而必欲見之以其時與二不同不得舍藏故必艱於見徳也九五大人化矣化則聖故云天徳位成性聖文言位字本以君位言張子以位為到天徳地位天徳位則成性自然而聖人矣亢龍以爻之位畫為言至扵極而亢也若聖人䖏此則不失其正何至於亢李注九二有中正之徳葢大人也然猶為時舍如顔子之居陋巷則修其庸言庸行足矣三四以剛居重剛之位而不中危疑之地也正性命趨變化非庸言庸行所能盡故乾乾以修其徳而又難於見徳是其為大人同而時之舍不舍不同也周公伊尹之位是已九五雖曰大人而化而達扵天徳以成性矣徳與時位叅㑹堯舜其人也以時則有亢聖人䖏之則無亢自堯舜湯武以至周公孔子之所䖏皆是也愚按易重剛本言九三此過中重剛大概兼三四言之其危其疑艱於見徳連看惟其所䖏之地當趨變化正性命而不得守其常故必危疑自惕艱難以見其徳盖時不得舍故也時不得舍猶言時不得藏利見二句見大人不足盡之故又曰聖人不重利見作覩意聖人用中之極不勉而中有大之極不為其大大人望之所謂絶塵而奔峻極於天不可階而升者也徴引易乾九五飛龍在天利見大人荘子田子方篇顔淵曰夫子奔逸絶塵而回瞠若乎後矣補訓此明九五飛龍在天利見大人之意易本謂大人在位如飛龍之在天而人皆利見之張子謂聖人徳極於天大人望之而不可及與本㫖不同用其中至於極不待勉而自中有其大至於極不待為而自大中如字不依中庸作去聲讀絶塵奔之速而其塵不可見也大人之望聖人聖人如絶塵而奔其髙峻極於天而大人不可階而升也乾之六爻位不同而䖏之因以不同非人品有髙下張子分大人聖人似有隔礙補注聖人指九五而言大人指九二愚按此以絶塵而奔峻極於天為飛龍在天之解而以九二大人相形言之此大人自以九二言非利見之大人也上節九五大人化矣意自明白篇内論九五者凡五此耑論九五爻辭後至健篇申此節之意皆以徳言乾之九五節並明象傳大人造也文言位乎天徳之意成性節以九二明九五大而得易簡節申成性節之意皆重在徳宋子鋭臣云此大人即指顔子故引荘子語顔子之言乾之九五曰飛龍在天利見大人乃大人造位天徳成性躋聖者耳若夫受命首出則所性不存焉故不曰位乎君位而曰位乎天徳不曰大人君矣而曰大人造也徴引易乾卦九五爻飛龍在天利見大人象傳飛龍在天大人造也本義造猶作也九五文言飛龍在天乃位乎天徳本義天徳即天位盖惟有是徳乃宜居是位彖傳首出庶物潛室陳氏曰横渠此說不要作得時位大人看要作孔子㸔所謂君有君用臣有臣用聖人有聖人用學者有學者用此善學易者若耑指為堯舜湯武則不識易矣補訓此亦明九五之意乃大人二句見九五大人是言徳若夫以下辨其非言位與易本㫖不同彖傳大人造也文言位乎天徳張子合作一處云大人造位天徳謂大人造於位天徳成性而躋於聖即上成性聖矣之意受天之命首出庶物以君位言大人所性不在乎是故易不曰位乎君位而曰位乎天徳主徳言也不曰大人君矣而曰大人造也主徳造其極言也愚按位天徳連讀造者至於是之謂也後言造而位天徳者至其極之謂也髙注位已造聖人之徳非語氣庸言庸行盖天下經徳達道大人之徳施於是者溥矣天下之文明於是者著矣然非窮變化之神以時措之宜則或陷於非禮之禮非義之義此顔子所以求龍徳正中乾乾進徳思䖏其極未敢以方體之常安吾止也徴引易乾九二象𫝊見龍在田徳施普也九二文言庸言之信庸行之謹又云見龍在田天下文明九三爻君子終日乾乾文言君子進徳修業補訓此釋文言二爻以申顔氏求龍徳正中之意是字承庸言庸行乾乾進徳借三爻言二爻髙注庸言庸行此守經也方體之常也徳施普者即此庸言庸行之徳及於庶物也天下文明者即此庸言庸行之化被於天下也然非窮變化之神以時措之宜亦未為達權之聖人安知不陷於非禮之禮非義之義此顔子所以乾乾進徳未敢以守經之道自安而止之也華注此言大人必造到聖人而後為至也庸行庸言之謹信亦既足以表見於天下矣而非達權通變則所謂守之非化之者尚不能無毫釐之差顔子所以不肯止也愚按方體之常似以卓爾時言蓋對髙堅前後無方體者言也然只是守非是化故不安於是而自止補訓即以瞻前忽後為不以方體而安所止之解未確惟君子為能與時消息順性命躬天徳而誠行之也精義時措故能保合太和健利且貞孟子所謂始終條理集大成於聖智者與易曰大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞其此之謂乎徴引易乾卦彖傳大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞補注此釋乾彖傳大明終始以下二節之義華注大明終始六位時成所謂精義所謂與時消息智之事也時乘六龍以御天所謂時措所謂順性命躬天徳而誠行之聖之事也乾道變化以下乃言其徳之成就如此也補訓消息猶言進退君子能與時消息順性命之理身體天徳而誠篤以行之又能精義入神時措咸宜保合太和而不失行健而利且貞孟子集大成始終聖智之事與此相合故引之與時消息順性命躬天徳而誠行之即易大明數句之意精義時措保合太和健利且貞即易乾道變化數句之意愚按首四句為一段與時句屬知順性命三句屬行此釋易大明終始四句精義時措三句為一段精義時措知行對言保合利貞合承上句此釋易乾道變化四句終始聖智又承上二段知行意而引孟子以証之易本義大明四句言聖人之元亨乾道四句言天道之利貞兩不相貫依張子則下四句亦以君子言言君子體乾道之變化以制事使各正其性命故能保合太和而利且貞也此節各家之說不同以與時消息貼乾道變化順性命貼各正性命者集釋與補注之說也以終始聖智貼大明終始者補注與髙注之說也其説皆雜而無序以大明終始時乘六龍貼精義時措為始條理智之事以保合太和健利且貞為終條理聖之事者李注也以與時消息四句貼始條理智之事以精義四句貼終條理聖之事者補訓也其說亦分配未確竊意與時消息即大明終始六位時成之意也従終始㸔出消息從時成㸔出與時順性命躬天徳而誠行之即時乘六龍以御天之意也従六龍與天看出性命天徳従乘與御㸔出順躬誠行精義時措即變化各正之意也従乾道變化看出精義從各正性命看出時措與時消息知也至於知之至而義精矣順性命躬天徳行也至於行之熟而時措咸宜矣知者始條理之智也行者終條理之聖也保合利貞者大成之集也如此方於節次分貼䖏皆合又補訓謂此節承上節顔子思䖏其極而言有㑹於易遂以易証之竊謂篇内皆釋易此亦先舉易義而後舉其辭盖釋書之一體耳上節顔子思䖏其極就二五爻言此自明彖傳亦難相承為說也成性則躋聖而位天徳乾九二正位於内卦之中有君徳矣而非上治也九五言上治者言乎天之徳聖人之性故捨曰君而謂之天見大人徳與位之皆造也徴引易乾卦九二文言見龍在田利見大人君徳也九五文言飛龍在天上治也本義居上以治下文言又云飛龍在天乃位乎天徳象傳大人造也補訓此節申明九五而以九二相形非並論二五也成性句直以九五說起前云大人造位天徳成性躋聖此合言之謂成性則躋聖而位乎天徳矣徳與位位字乃實指君位言華注九二非特其位之未尊也大人而未至於聖人則徳猶未至於天故曰非上治九五非特其位之已極也大人即聖人則徳已位乎天故不曰位乎天位而曰位乎天徳李注此解上治上字為最上無以復加之意不指位言愚按易每卦以下三畫為内卦九二居内卦上下畫之中故曰内卦之中此節大㫖重徳補訓欲重位言玩起句不及位則重徳為允大而得易簡之理當成位乎天地之中時舍而不受命乾九二有焉及夫化而聖矣造而位天徳矣則富貴不足以言之徴引易上傳之一章易簡而天下之理得矣天下之理得而成位乎天地之中矣乾卦九二文言見龍在田時舍也九五象傳飛龍在天大人造也文言乃位乎天徳補訓此亦以九二形九五申上文徳與位皆造之意也大而得易簡之理二句總言以引起九二九五成位以君位言華注九二當成位而不受命九五雖已受命成位而聖造天徳則富貴之位又不足言也樂則行之憂則違之主於求吾志而已無所求於外故善世博化龍徳而見者也若潛而不見則為己而已未暇及人者也徴引易乾卦初九文言樂則行之憂則違之九二爻見龍在田文言善世而不伐徳博而化補訓此明初九文言憂樂二句之意而以九二相形非並論初二也樂則行之至求於外截住故善世二句虛說若潛而未見至末應上意為已即求志未暇及人即無求於外華注樂行憂違即用舍行藏也初九是憂則違之者成徳為行徳成自信則不疑所行日見乎外可也徴引易乾初九文言君子以成徳為行日可見之行也坤六三文言則不疑其所行也補注釋文言君子以成徳為行日可見之行也之意補訓君子以成徳為其行徳既成而能自信則不疑其所行而日見於外可也易有行而未成一轉以足勿用意此則未及愚按易成徳為行二句泛言其理下潛之為言也四句方言初九此亦但釋首二句意非謂初九如此也成徳者道徳行者功業也乾九三修辭立誠非繼日待旦如周公不足以終其業九四以陽居隂故曰在淵能不忘於躍乃可免咎非為邪也終其義也徴引易乾九三文言修辭立其誠所以居業也九四爻或躍在淵无咎九四文言上下無常非為邪也君子進徳修業欲及時也本義内卦以徳學言外卦以時位言進徳修業九三備矣此則欲其及時而進也補訓此並釋九三九四文言之義修辭立誠易本非說周公借周公以見其必勤如是方可居業而有終終字従居字生出九四以陽爻居隂位故取象於在淵四當進退未定之時輕進有咎全不進亦有咎不忘於躍而不遽躍乃可免咎發明終其義終進徳脩業之義也愚按上四句言進修之功下六句言仕進之時而仕進之時仍是終其進修之義也易九四進徳修業以已然者言欲及時謂及時而仕此不忘於躍亦重在仕終義云者徳成而仕乃進修者當然之義九四之不㤀於躍非有干進之邪心亦欲廣其徳大其業以終其進修之義而已集解以為行其義也之義李注以為進退之義補訓以為欲進之義皆於終字少来歴至健而易至順而簡故其險其阻不可階而升不可勉而至仲尼猶天九五飛龍在天其致一也徴引易下傳之十二章夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻乾九五爻飛龍在天華注聖人之於道純亦不已而從容中道所謂至健而易也易故愈不可測險莫險於此矣聖人之於道安土敦仁而一理泛應所謂至順而簡也簡故愈不可到阻莫阻於此矣此仲尼所以不可階而升也李注此以險阻為聖徳髙堅之象亦借言耳補訓意重下截見仲尼即飛龍在天也健順險阻是引起語愚按此節大意亦明乾九五爻之義也與前聖人用中之極節意同上五句借繫辭以明聖人同天之實不重繫辭下三句以論語猶天與易飛龍在天相陪言之見其理之一亦不以易與論語平重易本言聖人具乾坤之徳者能知天下之險阻此則言聖人健順之徳至險阻也不可階二句總承險阻補訓以不可階而升貼險不可勉而至貼阻似未確坤至柔而動也剛乃積大勢成而然也徴引易坤卦文言坤至柔而動也剛補注釋坤卦文言髙注坤者地之所以為地也積大成勢故坤元體雖柔順而生物發用䖏則動而剛也愚按積大勢成即中庸博厚二字指地之大體而言也乾至健無體為感速故易知坤至順不煩其施普故簡能徴引易上傳之一章乾以易知坤以簡能本義知猶主也乾健而動即其所知便能始物而無所難故以為易而知大始坤順而静凡其所能皆従乎陽而不自作故以為簡而能成物補訓釋乾以易知坤以簡能之義重在易簡二字上而不及詳知大始能成物髙注盧中菴曰無體者圓神不滯感速者一氣所感頃刻不留故曰乾知大始乾以易知不煩者無造始之勞施普者承天之施隨物成就故曰坤作成物坤以簡能愚按此節葢以無體貼易感速貼知不煩貼簡施普貼能也知字或不作主字解坤先迷不知所従故失道後能順聴則得其常矣徴引易坤卦彖先迷後得彖傳先迷失道後順得常補注釋坤卦彖辭先迷失道後順得常之意集解陽先隂後其常分也坤隂也先則越其常分非所能辨也必迷惑而不知所從故失道失道者行不中事幾也居乎後而順聴乎陽則倡之者陽我得所恃以為安矣故為得其常而有利造化之功發乎動畢達乎順形諸明養諸容載遂乎說潤勝乎健不匱乎勞終始乎止徴引易說卦之五章帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮本義邵子曰此卦位文王所定所謂後天之學也説卦又云離也者明也又云坤者地也萬物皆致養焉又云兊正秋也萬物之所説也又云艮東北之卦也萬物之所成終而成始也補訓此即説卦而少變其文以明其義易言帝此言造化之功即帝之所主宰也易言出乎震此言發乎動動震也發即出也易言齊乎巽此言畢達乎順順巽也畢達即齊也易言相見乎離此言形諸明形見為離明也易言致役乎坤此言養諸容載坤能容載萬物皆致養焉易言説言乎兊此言遂乎恱潤恱故遂也易言戰乎乾此言勝乎健健乾也因戰而勝也易言勞乎坎此言不匱乎勞其勞為無盡也易言成言乎艮此言終始乎止止艮也有始有終故成也發明發乎動者萬物萌芽發露也時為春畢達乎順時為春夏之交形諸明者物形既盛明白相見也時為夏養諸容載時為夏秋之交遂乎悦潤者物各遂其充足之性故説也時為秋勝乎健者自巽至兑皆隂卦忽與乾遇隂疑於陽必戰然陽氣無間可息故勝也時為秋冬之交不匱乎勞萬物歸藏於内而休息也時爲冬終始乎止者陽氣至此物之所成終而成始也時為冬春之交愚按易言勞者慰勞休息之義張子意似少異健動陷止剛之象順麗入悦柔之體徴引易説卦之七章乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊説也本義此言八卦之性情華注此以卦之性情明其剛柔補訓乾純陽震坎艮皆一陽之卦為剛坤純隂巽離兊皆一隂之卦為柔剛言象柔言體大概之詞無深意愚按此節諸家多照乾坤六子分剛柔然動作陷沒止息皆有果決自主之義與健俱為剛附麗欣悦深入皆有俯從順人之義與順俱為柔蓋以八卦之性情分剛柔也但以陽卦隂卦為說恐失之淺巽為木萌於下滋於上為繩直順以達也為工巧且順也為白所遇而從也為長為髙木之性也為臭風也入也於人為寡髮廣顙躁人之象也徴引易說卦之十一章巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦補訓説卦巽為木節張子釋其意有畧之者以其可不用解也一隂萌於下二陽滋於上下象其根上象其枝榦木之義取此繩直如匠之繩墨繩柔順以直物而能達也髪屬隂乃血之餘二陽在上一隂在下陽勝於上故為寡髮陽勝於上又即為廣顙易本言躁卦此言躁人之象謂躁亦是以人事言也集解巽漸也萌於下漸長於上為木之象也巽順也以繩直物順而無礙也巽又入也思之深入為巧工人性之巧且能順木之大小曲直而成器者也巽從也白則隨所遇而皆能從之由拱把而合抱由合抱而參天木之性長且髙也故巽為木又因而廣其象為長為髙臭風之類而善入者也故巽為風為入因而廣其象為臭寡髮廣顙皆上盛陽也葢隂血盛者髮多陽氣盛者髮少陽體勝者顙濶隂體勝者顙狹也為躁者變之極為震震為决躁也故曰其究為躁卦髮顙以人之體言躁亦以人之性言故曰人之象華注卦中所配之物亦約畧其象而已非有一定不易之深理然亦可見卦爻之象於天下之物無所不包故聖人畫八卦而天下之象數包括無遺固不特說卦傳所舉之物而已愚按卦之取象或以象或以義如木其象也繩直工白則其義也長髙又因木之象而取義也臭又因風之象而取義也寡髮廣顙又即人而取其象以配之也躁則取其象之變以為義也皆不外象與義坎為血卦周流而勞血之象也為赤其色也徴引易説卦之十一章坎為水節為血卦為赤補訓此釋坎為水節耑舉血赤二句餘皆畧之坎為水血亦水也故坎為血卦周流於人之身而勤勞不息血之象也其字跟血言血色赤也愚按此勞字與勞乎坎作休息慰勞之義者不同前不匱乎勞疑亦此解離為乾卦於木為科上槁附且躁也徴引易説卦之十一章離為火節為乾卦其於木也為科上槁本義乾音干補訓此釋離為火節乾卦科上槁二句躁當作燥發明節齋蔡氏曰火熯燥故為乾卦離中虚故於木為科上槁㸔来附麗之義指木言火燥之義指乾言愚按易舊説科空也木中空而上枯槁也諸家則訓科為鳥巢之窠槁為窠上之槁枝以附且躁為解科上槁句竊謂數節中皆句為之解此節不應畧為乾卦而耑解科上槁發明照舊説似理長艮為小石堅難入也為徑路通或寡也徴引易説卦之十一章艮為山為徑路為小石補注釋説卦艮為山節通或寡雖通而行之者或寡髙注為小石者剛在坤上為徑路者二隂開於下一陽阻於上故曰通或寡若震二隂在上前無阻之者則為大途矣李注難入寡通皆止之義愚按艮之為山固也然一陽在外則堅故為石剛在坤上則地上之石堅而難入者故為小石也二隂開於下故為通一陽阻於上則行者寡矣故為徑路也須理㑹艮之所以難入寡通䖏兌為附决内實則外附必决也為毁折物成則上柔者必折也徴引易説卦之十一章兊為澤節為毁折為附决補訓釋説卦兊為澤節徐氏曰柔附於剛剛乃决柔故曰附决金氣始殺條枯實落故為毁折髙注外附上柔皆指一隂而言補訓二陽在内本實而一隂附於外陽必决而去之物成從兊金秋令㸔出物到成實結果處則枝葉凋落故其上之柔者必毁折也坤為文衆色也為衆容載廣也徴引易説卦之十一章坤為地節為文為衆補注釋說卦坤為地節髙注畫多為衆色色相雜故文虚容為載廣故衆乾為大赤其正色為氷健極而寒甚也徴引説卦之十一章乾為天節為寒為氷為大赤補注釋說卦乾為天節胡氏曰乾為天而貫四時故在秋冬為寒為氷在夏為大赤髙注大赤純陽之正色陽極而隂生故曰健極而寒甚愚按乾卦後天位在西北為冬故為寒寒甚則凝而成冰矣健極即乾之性與冰之體而合言之也若云陽極隂生似不應即說到寒甚震為萑葦為蒼莨竹為旉皆蕃鮮也徴引易説卦之十一章震為雷節為旉為蒼莨竹為萑葦其究為健為蕃鮮補注釋說卦震為雷節髙注萑實荻也葦虛蘆也蒼深青色莨謂色之美蓋竹之筠也旉花蔕下連而上分者發明三者皆下本實而上榦虛取震一陽在下二隂在上之象補訓皆蕃鮮言上三者皆蕃盛而鮮美易本分言此合言之震為春令不特取物象而於時亦當蕃鮮愚按色必言青者東方之色也引本文而無釋語與前數節異意以皆蕃鮮句運化易辭以為之解歟一陷溺而不得出為坎一附麗而不能去為離徴引易坎卦本義坎險陷也其象為水陽陷隂中外虚而中實也離卦本義離麗也隂麗於陽其象為火體隂而用陽也補注釋坎離二卦之名義程子曰凡陽在中者為陷之象隂在中者為麗之象愚按一者陽也即坎之中一畫離之上下二畫也參兩篇陽陷於隂為水附於隂為火與此互相發艮一陽為主於兩隂之上各得其位而其勢止也易言光明者多艮之象著則明之義也徴引易艮卦本義艮止也一陽止於二隂之上陽自下升極上而止也大彖其道光明本義艮體篤實故又有光明之義大畜於艮亦以輝光言之補注釋艮卦體及彖象補訓一陽止於上更無可去故其勢止陽著見於外則光明借中庸語以証之髙注隂陽得位其分自安而止華注上下之分定斯治道光明矣愚按其勢止之義兼髙注補訓二說乃備華注以治道言之尤善説易學者宜具此識蒙無遽亨之理由九二循循行時中之亨也徴引易䝉卦彖傳䝉亨以亨行時中也本義九二以可亨之道發人之蒙而又得其時之中張子語録時中之義甚大䝉亨以亨行時中也䝉何以有亨以九二之亨行蒙者之時中此所以䝉時亨也䝉無遽亨之理以九二循循行時中之亨也蒙卦之義主者全在九二彖之所論皆二之義教者但只㸔䝉者時之所及則道之是以亨行時中也此時也正所謂如時雨化之若既引之中道而不使之通教者之過也當時而引之使不失其正此教者之功也䝉以養正聖功也是養其蒙以正聖人之功也補注釋䝉卦彖辭之意補訓借論語循循善誘以見發䝉之善本義以亨行稍斷與此異愚按此言時中之亨玩語録是謂以時而引之中道以使之通也舊皆以時中屬九二未是不終日貞吉言疾正則吉也仲尼以六二以隂居隂獨無累於四故其介如石雖體柔順以其在中而静何俟終日必知幾而正矣徴引易豫卦六二爻介於石不終日貞吉象曰以中正也本義豫雖主樂然易以溺人獨此爻中而得正是上下皆溺於豫而獨能以中正自守其介如石也故其思慮明審不俟終日而見凡事之幾微下傳之五章君子見幾而作不俟終日集釋此解豫之六二集解九四陽也居大臣之位而天下由之以豫者勢位薰灼足以動人故人多累焉六二爻位皆隂則異於四為無所累而挺然特立者矣故其介如石知幾而正補訓疾速也從不終日看出豫之九四為衆隂所附二以隂居隂獨不為四所動脱然無累雖其體隂而柔順然在中而能安靜故能早知幾而得其正也象出周公象傳出孔子此云仲尼亦大概之詞愚按首二句提起下申明之以隂居隂無累於四正見其介如石而以正自守也在中而靜即無累於四之實何俟終日即疾之意知幾又以繫辭見幾而作足正之義坎維心亨故行有尚外雖積險苟處之心亨不疑則雖難必濟而往有功也徴引易坎卦彖習坎有孚維心亨行有尚本義此卦上下皆坎是為重險中實為有孚心亨之象以是而行必有功矣張子語録與此同而其後又益數語曰今水臨萬仞之山要下即下無復凝滯險在前惟知有義理而已則復何迴避所以心通補注釋習坎有孚維心亨行有尚之意補訓維心亨故行有尚以故字跌出維字口氣外雖積險外以境言對心㸔不疑貼心亨往貼行功貼尚凡遇險而心内惶惑最害事處之泰然心自光亨可有功矣中孚上巽施之下説承之其中必有感化而出焉者蓋孚者覆乳之象有必生之理徴引易中孚卦本義孚信也彖傳説而巽孚乃化邦也補訓上巽以施之下說以承之是釋説而巽句其中必有感化而出焉者是釋孚乃化邦句感化以邦之人言出猶言起謂必有感化者出焉集解出於義理非語氣下訓孚字之意孚從爪從子以爪覆蓋卵乳之象有必生之理故取信意愚按此節大意解中孚彖詞而又以字義申明卦徳也易説上下交孚指君與本國臣民化邦指天下之人此以化邦為化本國之人則下宜以臣言字書鳥之孚卵皆如其期故曰孚鳥抱子恒以爪反覆其卵故從爪此雖上言卦徳下明字義然孚之必生與感之必化其意一耳宋子鋭臣云母之爪即上巽施之也子之卵即下恱承之也玩一蓋字實上下相承一意物因雷動雷動不妄則物亦不妄故曰物與无妄徴引易无妄象曰天下雷行物與无妄本義天下雷行震動發生萬物各正其性命是物物而與之以无妄也補注釋无妄象辭補訓上動字以物言下動字以雷言雷以實理而動物以實理而生皆无妄也物因雷動而生是雷與之以无妄也愚按物指草木昆蟲之類雷者行天之令以動物者也不曰天而曰雷者天命流行無所不在而雷之驚蟄藏振萌芽尤為最神是物之不妄者皆雷與之也不妄者本乎實理而不差妄之謂靜之動也無休息之期故地雷為卦言反又言復終則有始循環無窮人指其化而裁之耳深其反也幾其復也故曰反復其道又曰出入無疾徴引見復卦彖復亨出入無疾朋來无咎反復其道七日來復上傳之十二章化而裁之謂之變十章惟深也故能通天下之志惟幾也故能成天下之務恒卦彖終則有始也補訓此釋復卦彖辭反復其道之語而帶出入無疾言之易出入無疾言在己之一出一入皆無疾病張子不以人言作反覆其道一例㸔言入而反出而復皆以道而无咎也集解反往也靜也終也復來也動也始也終則有始以下又申解所以言反復之意言始終循環混混流行而無窮此天地自然之化也人則指其化而裁制之耳靜而深微萬化無形乃其反也動而有幾萬化萌焉乃其復也動靜相因固未有終而不始反而不復者故復卦辭曰反復其道又曰出入无疾出即復入即反也愚按此宜分三段首四句提起終則有始三句申明此意以上皆明反復其道深其反也以下皆明出入无疾終即反始即復也終始之化無窮所謂反復者裁之自人耳其實則固無休息也深幾以下重無疾意葢又以反復自然之妙理言之深而無形者其反之無疾也幾而有兆者其復之無疾也故言反覆而又曰出入無疾也益長裕而不設益以實也妄加以不誠之益非益也徴引易益卦象風雷益君子以見善則遷有過則改下傳之七章益長裕而不設補訓此釋九卦中益長裕而不設一語長裕不設者漸長而至充裕不必設意為之也實下遷善改過功夫則有益若有心求益無實功則為不誠之益豈能益乎以實則長裕不誠則為設猶孟子云助長也井渫而不食强施行惻然且不售作易者之嘆與徴引易井卦九三爻井渫不食為我心惻本義渫不停汙也九三以陽居陽在下之上而未為時用故其象占如此象曰井渫不食行惻也本義行道之人皆以為惻補注釋井卦九三爻辭發明井清渫而不食如人有才智而不見用勉强設施致行道之人皆為心惻蓋憫賢者不遇而天下不䝉其福也然而卒不見售明王之難遇如此華注史記以屈原當之亦足發明其意闔户靜宻也闢户動達也形開而目睹耳聞受於陽也徴引易上傳之十一章闔户謂之坤闢户謂之乾補訓此解易闔户闢户而推及於人之寤寐也闔户靜而密闢户動而達密者嚴密無罅漏之意達者通達無壅滯之意闔户為隂闢户為陽人之形開而目有所睹耳有所聞受乾陽之氣而然也李注形開而目睹耳聞此人身闢户之象也愚按天地一氣流行時而靜斂如户斯闔屬乎隂而謂之坤時而動發如户斯闢屬乎陽而謂之乾冬春晝夜皆是也動物篇以人之息言之此以人之寤寐言之義皆精妙可相叅看辭各指其所之聖人之情也指之以趨時盡利順性命之理臻三極之道也能從之則不陷於凶悔矣所謂變動以利言者也然爻有攻取愛惡本情素動因生吉凶悔吝而不可變者乃所謂吉凶以情遷者也能深存繫辭所命則二者之動見矣又有義命當吉當凶當否當亨者聖人不使避凶趨吉一以貞勝而不顧如大人否亨有隕自天過涉滅頂凶无咎損益龜不克違及其命亂也之類三者情異不可不察徴引易上傳之三章辭也者各指其所之下傳之一章聖人之情見乎辭又云變通者趨時者也上傳之十二章變而通之以盡利説卦之二章将以順性命之理上傳之二章六爻之動三極之道也下傳之十二章變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生一章吉凶者貞勝者也否卦六二爻大人否亨本義大人當安守其否而後道亨也姤九五爻有隕自天大過上六爻過涉滅頂凶无咎本義蓋殺身成仁之事損六五爻益六二爻皆云或益之十朋之龜弗克違損本義兩龜為朋十朋之龜大寳也或以此益之而不能辭其吉可知泰卦上六爻象曰城復於隍其命亂也補訓此節言辭由於情易之情異不可徒泥其辭也首二句總説指之以趨時至以利言者也言當變動者也然爻有攻取至以情遷者也言不可輕於任情之動也能深存二句總收上二段言當趨避者也又有義命至之類言不使人趨避者也末以三者情異總收通節凡易之辭各指其所往乃聖人之情所由見也下接指所之說指之以趨時變而盡其利順性命之理臻於三極之道也人能從其所指則不至陷於凶悔而果能趨時盡利矣此正易所謂以利言者也可見人當變動以趨時盡利然爻有攻取愛惡之本情本情素動因生吉凶悔吝而不可變者乃易所謂吉凶以情遷者不可不慎於所動也能深存聖人繫辭所命則變動情動二者之動可見矣二者之動皆言趨避之方又有義之當安命之已定當吉當凶當否當亨者聖人不使人趨避一以正理勝之而不顧其凶吉如大人否亨之類皆説得一定不使人趨避但當順受也合言之三者之情異學者不可不察也繫辭所命即上文指所之之辭華注此章論繫辭之義詳悉蓋聖人繫辭之義有三一是教人趨吉以避凶猶云如是則吉如是則凶是凶可反而吉吉可變而凶所謂變動以利言也一是直指爻象之吉凶因其吉而吉之因其凶而凶之乃不可變者為卦之本情如是也學者玩其占亦可曉然於吉凶悔吝之情形是二者皆賴人事為轉移有不得諉於命者然亦有吉凶亨否一順乎天不勞趨避正恐一趨避焉反為私意但當守正以聴之合前二者是有三樣繫辭之法學易者不可不察集解大人否亨必身否而後道亨也有隕自天休命自天而降也過涉滅頂凶无咎殺身成仁於義無咎也或益之十朋之龜弗克違義所當得不能違也城復於隍其命當亂不可逃也愚按易變動以利言謂揲蓍之初隂陽老少之象未定而蓍䇿之變動乃推出趨避之利以示人也吉凶以情遷謂求卦之後吉凶消息之情既具而易辭隨之以遷徙也意不甚逺張子㸔作兩義非本㫖又其命亂也易本以命令言政昏而否乃至也張子作氣數之命亦與本㫖異因爻象之既動明吉凶於未形故曰爻象動乎内吉凶見乎外徴引易下傳之一章爻象動乎内吉凶見乎外本義内謂蓍卦之中外謂蓍卦之外華注事有吉凶人未明也審乎爻象而可决矣是爻象可以明吉凶也愚按此節大意釋爻象動乎内二語亦先疏其義而後舉其文富有者大無外也日新者久無窮也徴引易上傳之五章富有之謂大業日新之謂盛徳一章可久則賢人之徳可大則賢人之業補注即天道篇富有廣大日新悠久之意愚按此節大意釋富有日新之義以天道言與天道篇言聖人者稍異朱子採此入本義顯其聚也隠其散也顯且隠幽明所以存乎象聚且散推盪所以妙乎神補訓此大概言易理非釋成語集釋作解顯仁藏用説不合華注幽明以隂陽之對待者言推盪以隂陽之流行者言即兩故化一故神之意惟推盪故有聚散而幽明之象因之愚按首篇多以象與神言易如言象可見神不可見而曰見此者謂之見易言聚散出入形不形之分而曰能推本所從來則深於易者也皆是此㫖蓋氣之聚而顯者陽之謂即明也氣之散而隠者隂之謂即幽也隠而幽顯而明於聚散之象見之而或聚或散推盪不窮者無非自然之妙理蓋神之所為莫知其然而然也知此則易之理可識矣變化進退之象云者進退之動也微必驗之於變化之著故察進退之理為難察變化之象為易徴引易上傳之二章變化者進退之象也補注釋大傳變化進退之象也之意華注變化是言物象進退是言隂陽變化之著如草木之春榮秋枯進退之理其所以榮枯者也所以榮枯者黙運潛孚人不能見故觀其象可以知其理焉愚按易變化以卦爻之變言進退以造化人事之消長言張子所謂變化者以氣之流行而有迹者言進退則隂陽消長之不可見者也隂陽消長亦氣也與變化對則無形故曰進退之理憂悔吝者存乎介欲觀易象之小疵宜存志靜知所動之幾微也徴引易上傳之三章憂悔吝者存乎介又云悔吝者言乎其小疵也本義介謂辨别之端蓋善惡已動而未形之時也於此憂之則不至於悔吝矣補訓釋憂悔吝句悔未至於吉而猶有小疵吝未至於凶而已有小疵欲觀易象之小疵釋憂悔吝宜存志靜知所動之幾微釋存乎介志靜猶云靜志也華注悔吝未至大咎每忽而不知惟天下之靜者乃有以燭其微而慎其幾焉往之為義有已往有方往臨文者不可不察補訓此耑明往字之義已往或不可挽方往尚有可圖不可概以為往而忽之髙注如否泰之往已往也諸卦之攸往将往也正䝉初義卷十四
