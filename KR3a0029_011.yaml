body:
  text: 正䝉初義卷十一邳州知州王植撰三十篇第十一補訓雜引成語附以己意其中得失相半讀者辨之愚按此篇凡三十三節前二十二節皆論孔子之事後十一節論顔子子路孟子仲弓之事也惟首四節大意相聨餘俱節各一義內困之進人也五句朱子採入近思録論學三十器於禮非强立之謂也四十精義致用時措而不疑五十窮理盡性至天之命然不可自謂之至故曰知六十盡人物之性聲入心通七十與天同德不思不勉從容中道徴引禮學記强立而不返易下傳之五章精義入神以致用也說卦之一章窮理盡性以至於命張子語録仲尼自志學至老德進何晚竊意仲尼自志學固己明道其立固己成性就上益進蓋如天之不已為天已定而所以為天不窮如有成性則止則舜何必孜孜仲尼何必不知老之將至且歎其衰不復夢見周公由此觀之學之進德可知矣又曰窮理亦當有漸見物多窮理多如此可盡物之性華注此釋志學篇意補訓孔子云三十而立又云立於禮張子合言以三十之立為器於禮也不惑重精義上知命已是至命至之而通達無間自言只曰知耳中庸盡人物之性此說耳順只是人物之理無不窮盡故聲入心通天德自然聖人亦自然與天合德如中庸所謂誠者不思不勉而從容中道也此與論語朱注不盡同李注器於禮者禮與性成强立者守禮不返愚按張子盡性與窮理一例看盡人物之性亦多言窮盡人物之理大心篇首節及此皆然常人之學日益而不自知也仲尼學行習察異於他人故自十五至於七十化而知裁其德進之盛者與補訓此與上合為一意上節敘此節論也李注聖學變化而自能名其所至氣候分明故曰化而知裁愚按易繫化而裁之謂之變謂天地之氣化無有間歇因其氣之變而裁之若者為一年若者為一時耳聖人一理渾然至誠無息亦如天道之化而自裁之為十年一變故曰化而知裁裁者裁截之意也上由十五至七十則非止以七十為化境舊說多未明窮理盡性然後至於命盡人物之性然後耳順與天地參無意必固我然後範圍天地之化從心而不踰矩老而安死然後不夢周公徴引易上傳之四章範圍天地之化而不過補訓此又申首節之意但自五十以下言窮理盡性然後至於命見孔子之知命由於窮理盡性也盡人物之性理無不明然後耳順而與天地參蓋天地間道理無不通徹可以參天地也意必固我皆私與矩相背無意必固我然後天地之化皆範圍統攝聖人之心即心即矩故從心不踰矩也孔子只說到七十止張子補出老而安於死不復夢周公以見自序所學之時已是衰甚之年也愚按天地無心而成化聖人無意必固我而即心即矩即首節與天同德意故曰範圍天地之化以不夢周公為不踰矩之事者張子以吾衰為孔子七十時所言故即此以見不踰矩之實也從心莫如夢夢見周公志也不夢欲不踰矩也不願乎外也順之至也老而安死也故曰吾衰也久矣徴引禮禮運此順之至也補訓此接上文從心一段而申明之欲不踰矩欲字即從心所欲之欲夢見周公乃行道之本志老而知道之不可行遂不復夢正是所欲不踰矩處於此並見得不願乎外而順之至順即順受其正之順安死即順受曰吾衰者自知其衰而安之也從心不踰矩其義無窮連不夢周公說於不夢周公看得深於不踰反看得淺張子於此似失之强合困而不知變民斯為下矣不待困而喻賢者之常也困之進人也為德辨為感速孟子謂人有德慧術智者存乎疢疾以此自古困於內無如舜困於外無如孔子以孔子之聖而下學於困則其䝉難正志聖德日躋必有人所不及知而天獨知之者矣故曰莫我知也夫知我者其天乎徴引易下傳之七章困德之辨也明夷卦彖內文明而外柔順以䝉大難文王以之內難而能正其志箕子以之詩商頌長發篇聖敬日躋發明此言困能進人補訓不知變計指不學言此是困而不學一路人而喻即孟子徴色發聲而後喻之喻謂不待困心衡慮而先自曉喻以向學乃賢者之常也此是不處困一路人一困猶不變一不由困而自喻兩路相形引起處困之進德下即舜孔推之賢者非優于舜孔然自有不遭困之賢人其為德最能辨其感動最神速因疢疾而生智慧是德之能辨處亦是感之神速處下學於困因困而用下學之功蒙難謂處困也躋升也李注張子以困而學之為遇困而能修治之義故其說如此補注人處困之時則能警悟通曉故為德辨能奮發興起故為感速舜之父頑母嚚象傲是困於內也孔子厄於陳蔡無上下之交是困于外也葉氏曰人處患難之時則操心危懼而無驕侈之蔽故其析理也明置身窮厄而有反本之思故其從善也速愚按友人趙子彤元云末二句引以證上人不知而天獨知之意非以莫知為處困也補訓疑張子以莫知作處困看非是孔子終身不遇是困補注専言厄陳蔡亦拘立斯立道斯行綏斯來動斯和從欲風動神而化也仲尼生於周從周禮故公旦法壞夢寐不忘為東周之意使其繼周而王則其損益可知矣徴引書大禹謨俾豫從欲以治四方風動補訓論語所云立道綏動同於舜當日之從欲風動乃存神而過化也仲尼因生於周從周之禮故公旦法壞於魯仲尼夢寐中不忘為東周之意所以遵王制也使其得位繼周而王則其所損益必大有可觀可知矣以至於立道綏動存神過化何難哉首數句極言孔子功化之盛中言孔子從周以遵王制末繼周損益應轉立道綏動神化意以首段為主下乃推原其故愚按此節大意雜引論語以明孔子功化之盛也損益可知雖見不盡從周畢竟重從周意從欲風動言過化而存神在其中李注有欲斯從為神有風斯動為化分配未確滔滔忘反者天下莫不然如何變易之天下有道丘不與易知天下無道而不隱者道不逺人且聖人之仁不以無道必天下而棄之也補訓此亦解論語以忘反二字貼滔滔莫不然即皆是如何變易即誰以易之天下有道丘不與易正惟無道方易所以然者蓋以道本不逺於人一變易即合道且聖人仁愛天下不肯謂天下不可易而遂棄之也愚按引道不逺人似言聖人之道本為人所易從見易天下之非難舊說以無道可轉有道為不逺未合聖人之仁二語論語朱注採入仁者先事後得先難後獲故君子事事則得食不以事事雖有粟吾得而食諸仲尼少也國人不知委吏乘田得而食之矣及德備道尊至是邦必聞其政雖欲仕貧無從以得之今召我者而豈徒哉庶幾得以事事矣而又絶之是誠繫滯如匏瓜不食之物也徴引書說命中惟事事蔡傳事其事也李注以夫子為欲祿仕未知是否補訓此雜引以明己意先事先難事事也後得後獲得食也吾得而食只是不可食人之食與對景公語異仲尼年少人不知為聖人為委吏為乘田所以為貧而仕得以食人之食及其道尊德備人皆知為聖人至是邦必聞其政雖欲為貧而仕不可復得及有公山佛肸之召知非徒然必有所事事而又堅執以拒絶之是誠繫滯如匏瓜不食之物也豈其可哉此節重末段所以發孔子欲應公山佛肸之意而究之不應者知其終無可事固不計食也豈徒乃公山章語匏瓜乃佛肸章語錯綜用之亦取大意相似愚按前五句虛仲尼以下舉其實而言之歸重末四語不待備而勉於禮樂先進於禮樂者也備而後至於禮樂後進於禮樂者也仲尼以貧賤者必待文備而後進則於禮樂終不可得而行矣故自謂野人而必為所謂不願乎其外也集釋解先進章而意不同不願乎外不待外之備也補訓此進字著力解以儀文分先後不待儀文之備而自勉於禮樂者其進先待其備而至於禮樂者其進後貧賤泛言自謂野人而必為不待文備也據此則文指禮物說非揖讓進反之儀李注解先進後進為急於行緩於行之意劉向所謂避小不備而就大不備則不備莫甚焉與此意同功業不試則人所見者藝而已補注釋論語吾不試故藝李注不如今說因不見用而多習於藝者為善鳳至圖出文明之祥伏羲舜文之瑞不至則夫子之文章知其已矣補訓伏羲時河出圖舜時鳳儀於庭文王時鳳鳴岐山皆文明之瑞也瑞不至知夫子之文章終已也本謂道止而不行張子取應文明之瑞故云文章亦借夫子之文章成語云然愚按此節大意解鳯鳥不至章論語朱注採入魯禮文闕失不以仲尼正之如有馬者不借人以乘習不曰禮文而曰史之闕文者祝史所任儀章器數而已舉近者而言約也補訓此釋史闕文一節其說大異以闕為闕失文為禮文史為祝史掌禮者祝史所任之儀章器數即禮之文禮文闕失仲尼能正是猶力所可及也不以仲尼正之譬如有馬不教人乘習今亡頂有馬句乘習教演之意李注有馬而未調良必求人以間習之喻禮文闕失當以人考正之夫子言我猶能知祝史殘闕之文蓋謙約之詞也愚按此以吾猶及三字専屬史之闕文作正意今亡矣夫専屬有馬句作喻意也舊說皆以舉近者而言約也為句則約為簡易之意李注以舉近者而言為讀約也為句則約為謙約之意李注為優師摯之始樂失其次徒洋洋盈耳而已焉夫子自衛反魯一嘗治之其後伶人賤工識樂之正及魯益下衰三桓僭妄自太師以下皆知散之四方逾河蹈海以去亂聖人俄頃之助功化如此用我者期月而可豈虛語哉補訓此合論語師摯之始自衛反魯太師適齊三章而言依朱注解師摯在官之始即夫子反魯正樂之時其時樂盛洋洋盈耳張子以為失次而徒有盈耳之聲其說異自衛反魯以下朱子採入適齊章注與與如也君或在朝在廟容色不忘向君也君召使擯趨進翼如自注此翼如左右在君也沒階趨進翼如自注張拱而翔賓不顧矣相君送賓賓去則白曰賓不顧而去矣紓君敬也補注此歷述鄉黨孔子之事而釋之也愚按不忘向君朱注亦採入而不甚然其說與與兼在廟翼如作兩解皆與今說異惟所謂紓君敬者則朱子用之上堂如揖恭也下堂如授其容紓也補注此釋鄉黨上如揖下如授之義愚按朱子語録駁此說謂升堂即納圭君前故執圭時言下堂不得也冉子請粟與原思為宰見聖人之用財也補訓粟即財也多寡之間酌之以義則財用不苟愚按此節大意解論語合記二事之意朱子採入注中聖人於物無畔援雖佛肸南子苟以是心至教之在我耳不為已甚也如是徴引詩大雅皇矣篇無然畔援畔離畔也援攀援也補訓此以見南子應佛肸召為主而引詩及孟子之言以明之言聖人於物無所畔援雖佛肸南子求見若誠亦可見之即孟子所云仲尼不為已甚之意不為已甚正找出無畔援意髙注聖人於物固無離畔以絶人亦不攀援以徇世愚按此無畔援蓋謂無適莫之成心與詩傳異首句提起雖佛肸三句一氣讀末斷一句子欲居九夷不遇於中國庶遇於九夷中國之陋為可知欲居九夷言忠信行篤敬雖蠻貊之邦可行何陋之有補訓此以居九夷為主而以言忠信三句釋何陋之意中國無所遇中國何嘗不陋但能言忠信行篤敬又何患九夷之陋愚按朱子或問云程子謂所居即化者聖人之事也張子謂忠信篤敬蠻貊可行者學者之事也栖栖者依依其君而不能忘也固猶不回也補訓此解孔子答微生畝語常解栖栖不専指依君此少異補注不回者往而不返之意仲尼應問雖叩兩端而竭然言必因人為變化所貴乎聖人之詞者以其知變化也補訓此重聖人因人為教補注如答顔淵仲弓之問仁子夏子游之問孝各因其材之髙下與其所失而告之蓋可見矣富而可求也雖執鞭之士吾亦為之不憚卑以求富求之有可致之道也然得乃有命是求無益於得也補注此以孟子釋論語富不可求之意補訓不憚卑以求富二句貼吾亦為之然得乃有命二句貼如不可求孟子求之有道得之有命二句原是兩意故張子亦分看愚按求之有可致之道亦與朱注所謂不可妄求者異愛人以德喻於義者常多故罕及於利盡性者方能至命未達之人告之無益故不以亟言仁大難名人未易及故言之亦鮮徴引禮檀弓上君子之愛人也以德易說卦之一章窮理盡性以至於命華注此釋罕言章意喻於義者常多不忍以小人待人也補注喻於義者喻人以義而勸之使然也顔子於天下有不善未嘗不知知之未嘗復行故怒於人者不使加乎其身愧於己者不輒二之於後也徴引易下傳之五章子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也補注怒人之不善不使加乎其身所謂不遷怒也愧己之未善不輒二之於後所謂不二過也李注此以不遷為不身自蹈之意愚按此節大意引易傳以解論語皆孔子所以稱顔子者也顔子之徒隱而未見行而未成故曰吾聞其語而未見其人也徴引易乾卦初九文言潛之為言也隱而未見行而未成補訓此以顔子明論語隱居行義之意隱即隱居之隱行即行義之行未見即為隱未成未能行若作德行未成說便與聞語未見人不合李注蓋言顔子方隱居以求志而未嘗行義以達道用則行舍則藏惟我與爾有是夫顔子龍德而隱故遁世不見知而不悔與聖者同徴引易乾卦初九文言龍德而隱者也又云遁世無悶不見是而無悶本義龍德聖人之德也補訓此引論語用行舍藏之言而以易及中庸釋之用行舍藏並言意重舍藏下文乃舍藏一邊語中庸遁世之語與文言相似故連引之與聖者同故云惟我與爾有是夫發明龍德能見能潛知進退存亡而不失其正者也龍德聖修之極也顔子之進則欲一朝而至焉可謂好學也已矣補訓龍能變化聖人之修到極至處方與龍同其變化故為龍德顔子之進從吾見其進來上言顔子有龍德此言顔子所以至於龍德由其好學顔子似未到聖修之極而云有龍德者因用行舍藏而見用則行舍則藏何異神龍之變化愚按此節大意因上文言龍德而論顔子之好學也上龍德而隱専以行藏一事言蓋顔子所已能此龍德兼聖人之全體大用言蓋孔子之事而顔子所欲至者也回非助我者無疑問也有疑問則吾得以感通其故而達夫異同者矣徴引易上傳之十章寂然不動感而遂通天下之故補訓此釋回非助我之意言顔子若有疑問則吾得以感而通其故而於或異或同之故無不達是能助我而回不然也孔子非真望其助姑訓助字之義如此放鄭聲逺佞人顔淵為邦禮樂法度不必教之惟損益三代蓋所以告之也法立而能守則德可久業可大鄭聲佞人能使為邦者喪所以守故放逺之徴引易繫辭上傳之一章可久則賢人之德可大則賢人之業補訓此明顔淵問為邦章意而意重下截禮樂法度顔子素明不必一一教之惟告之以損益三代耳如治厯明時顔子能辨數代之厯夫子但告之以行夏時而顔子即了然於胸中矣法即禮樂法度愚按此即所謂言必因人為變化者也法立能守數語論語朱注採入天下有道則見無道則隱君子疾沒世而名不稱蓋士而懷居不可以為士必也去無道就有道遇有道而貧且賤君子恥之舉天下無道然後窮居獨善不見知而不悔中庸所謂惟聖者能之仲尼所以獨許顔回惟我與爾為有是也補訓君子疾沒世至恥之言有道當見舉天下無道以下言無道當隱也雜引論孟中庸不拘本㫖或謂末二句當總應見隱二意細玩惟我與爾與惟聖句聨下當屬舍藏華注君子以用世為心不得已然後藏若懷居獨善者非聖賢之本心也懷居與論語義異愚按此節大意明有道則見無道則隱之義見孔子所以獨許顔子之故不専為釋隱見也觀上數節皆論顔子可見此與前用行節意大同但彼重藏意此重行意微有别顔子之行無可見孔子則其榜樣也獨許顔回二語補訓欲屬舍藏愚謂二段一氣貫下意實雙承言之仲由樂善故車馬衣裘喜與賢者共敝顔子樂進故願無伐善施勞聖人樂天故合內外而成其仁補訓此釋各言爾志章樂善則好義樂進則心虛樂天則無私李注此讀共敝之而無憾為句共字不斷愚按樂進進字似亦本吾見其進來內外總上意言之車馬衣裘物之在外者也善勞德之在內者也孔子老安少懷外盡其事而物無不公內盡其誠而善勞無不遍蓋合二賢之所長而用之也故曰合內外而成其仁補注以老少朋友為外安信懷之理為內未安子路禮樂文章未足盡為政之道以其重然諾言為衆信故片言可以折獄如易所謂利用折獄利用刑人皆非爻卦盛德適能是而已焉徴引易噬嗑彖利用獄豐大象君子以折獄致刑䝉卦初六爻利用刑人補訓此明片言折獄之意禮樂是大端文章是飾治具者重然諾以無宿諾言然之諾之謂許人也重之則不失信華注為政者必能盡禮樂文章之化則立道綏動無訟之可折矣子路之德未及此也顔淵從師進德於孔子之門孟子命世修業於戰國之際此所以潛見之不同徴引易乾卦初九潛龍勿用九二見龍在田史記第二序信命世之宏才注索隱云命者名也言賢人有名於世也補訓顔子從師進德無所表著為潛孟子命世乃以一世之豪傑自命有擔荷世道之意故為見孟子雖未大行然言之於當時之君欲見之行即是修業愚按此節大意論顔孟潛見之所以不同也命世即孟子所謂必有名世者犁牛之子雖無全純然使其色騂且角縱不為大祀所取次祀小祀終必取之言大者苟立人所不棄也補訓此釋子謂仲弓節意騂既純色角又周正以祀山川神所必享張子謂犁牛之子無全純又謂不為郊社大祀所取而用於山川為次祀小祀其說異大節立而人不棄亦與不拘世類之意不同大者立則小者或有不純即上無全純意正蒙初義卷十一
