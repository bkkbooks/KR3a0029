body:
  text: 正䝉初義卷二邳州知州王植撰參兩篇第二大全此篇論天地陰陽常變之道愚按此篇凡二十二節首七節皆論天地之道日質本陰以下七節皆言日月之行陽之德四節皆言陰陽之理火日外光四節言五行與水火之質性篇中推論天道皆與渾天説合惟地氣乘機之説與先儒所論稍異天道難測姑備一説可耳地所以兩分剛柔男女而效之法也天所以參一太極兩儀而象之性也徵引易説卦之一章參天兩地而倚數本義天圓地方圓者一而圍三三各一竒故參天而為三方者一而圍四四合二耦故兩地而為二上傳之五章成象之謂乾效法之謂坤本義效呈也法謂造化之詳密而可見者十一章易有太極是生兩儀補注此釋易參天兩地之義也髙注天輕清故理氣屬之地重濁故形質屬之剛柔男女皆以兩而成形故地數兩太極兩儀本乎一而為二故天數三男女兼人物言補訓形質為法理氣為性李注此張子之學微與周程間隔處也蓋太極雖不雜乎陰陽而實不離乎陰陽安得與之對而為三哉其後胡氏之學有所謂無對之善及與惡對之善無對之靜及與動對之靜朱子以為如此則是三角底太極者意其源流於此也愚按參天兩地易本言筮蓍起數之事言參天之三竒而立三之數兩地之二耦而立兩之數其餘如九六七八之數皆倚此而起張子則謂地所以立兩之數者蓋以地有質故因剛柔男女之有質者以見地而以其質之對待成兩者效地之法也天所以立三之數者蓋以天無形故因太極陰陽之為氣者以見天而以其氣之一物兩體者象天之性也本義就天地方圓圍徑取義意甚直㨗張子又借剛柔男女太極兩儀以見天地不免添出一層而分配處亦未確又分一與效象皆有力字當以聖人之立數者言玩此節及有德篇象生法必效似皆以效字作倣字學字之義不訓為呈也一物兩體氣也一故神自注兩在故不測兩故化自注推行於一此天之所以參也朱子曰此語極精一故神自注云兩在故不測只是這一物周行乎事物之間如陰陽屈伸往來上下以至於行乎十百千萬之中無非這一箇物事所以兩在故不測兩故化自注云推行於一凡天下之事一不能化惟兩而後能化且如一陰一陽始能化生萬物雖是兩要之亦推行乎此一耳一是一箇道理却有兩端用處不同譬如陰陽陰中有陽陽中有陰陽極生陰陰極生陽所以神化無窮兩者陰陽消長進退非一則陰陽消長無自而見非陰陽消長則一亦不可得而見一故神譬之人身四體皆一物故觸之而無不覺不待心思至此而後覺也此所謂感而遂通不行而至不疾而速也補訓此承上參天兩地而申言其義一與兩皆氣而理宰其中非一為理兩為氣一物兩體氣也謂陰陽之氣本是一物而分陰陽之兩體也一合兩故神妙不測兩運一故變化無窮合一與兩謂之參此節甚分明而上文以太極與兩儀為參似與此氣字不合蓋張子之意以太極即兼理氣與周子稍不同耳愚按一神兩化以首篇之義推之俱在太虚第二層内蓋兩而化者固二氣之運一而神亦止就發用處言也太極兩儀之云濂關所論有不可强同者大抵一神兩化之義非不精微然如周子所言則此義固存乎其中矣一物兩體竊嘗譬之人之兩手惟是一氣運動故動止相應不言而喻若各為一物則頑而不靈矣然雖是一物却分兩體若非有兩則運動者亦安能相應不窮乎太極兩儀太極只在兩儀上見補注陽動則一在動之中陰靜則一在靜之中似太極另為一物者其説已入太極圖説甲裏非張子本意蓋自注兩在即兩體之意補注太泥在字耳地純陰凝聚於中天浮陽運旋於外此天地之常體也恒星不動純繫乎天與浮陽運旋而不窮者也日月五星逆天而行并包乎地者也地在氣中雖順天左旋其所繫辰象隨之稍遲則反移徙而右耳間有遲速不齊者七政之性殊也月陰精反乎陽者也故其右行最速日為陽精然其質本陰故其右行雖緩亦不純繫乎天如恒星不動金水附日前後進退而行者其理精深存乎物感可知矣鎮星地類然根本五行雖其行最緩亦不純繫乎地也火者亦陰質為陽萃焉然其氣比日而微故其遲倍日惟木乃歲一盛衰故歲厯一辰辰者日月一交之次有歲之象也徵引左傳莊公七年夏四月辛夘夜恒星不見書舜典以齊七政蔡傳日月五星七者運行於天猶人君之有政事也淮南子東方木其神為歲星南方火其神為熒惑中央上其神為鎮星西方金其神為太白北方水其神為辰星晉書天文志金星水星一日移一度一月移一宫一歲一周天火星二日移一度二月移一宫二歲一周天木星十二日移一度一歲移一宫十二歲一周天土星二十八日移一度二十八月移一宫二十八歲一周天張子語錄五緯五行之精氣也所以知者以天之星辰獨此五星動或問朱子曰天道左旋日月右行如何曰自疏家有此説人皆守定張子説日月皆是左旋説得好蓋天行甚健一日一夜周三百六十五度四分度之一又進過一度日行速健次於天一日一夜周三百六十五度四分度之一起度端終度端無蠃縮正恰好被天進一度則日為退一度二日天進二度則日為退二度趕天不上積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所退之度又恰退盡本數遂與天㑹而成一年月行遲一日一夜三百六十五度四分度之一行不盡比天為退十三度十九分度之七至二十七日半强而一周天與初躔合又行二日有竒為二十九日半强與日會進數為順天而左退數為逆天而右厯家以進數難算以退數算之此是截法故謂之右行取其易見日月之度耳乃云日行遲月行速此錯説也厯家若順算則那相去處度數多今以其相近處言故易算蔡季通云西域有九軌厯是順算天無體二十八宿便是天體隨天而定日月五星則皆隨天左轉而緩急各不同不隨天而定也横渠少遲則反右之説極精如以一大輪在外一小輪載日月在内大輪轉急小輪轉慢雖都是左轉只有急有慢便覺日月似右轉了禮記月令疏云二十八宿及諸星皆循天左行一日一夜一周天一周天之外更行一度其説可證補訓此節推論天地日月星辰運轉之理也首言天地常體次言恒星隨天左旋日月五星逆天右旋次言日月五星右行有緩速不齊末帶釋辰字朱子詩傳啟明長庚皆金星也以其先日而出謂之啟明以其後日而入謂之長庚髙註金太白即啟明水辰星即長庚其説誤也五行以土為根本土性遲故行緩火内陰外陽故火星亦陰為質而陽萃於陰之外其氣比日而微故其遲倍於日日一歲周天火二歲周天也日月每月一㑹其交會之次謂之辰十二辰正月亥二月戍逆十二宫為一周亥為娵訾戍為降婁酉為大梁申為實沈未為鶉首午為鶉火已為鶉尾辰為壽星夘為大火寅為析木丑為星紀子為𤣥枵一歲而周故有歲之象補注恒星二十八宿經星也日月五星緯星也地在氣中以下釋言日月五星所以逆行之意月陰精以下乂詳言七政所以性殊之實金水二星金大水小或一在日先一在日後或俱在日先俱在日後常附日而行陽感乎陰也李注此條之意當合下二條觀之乃明自古言天者皆謂天動而地靜天左旋而日月五星右轉張子則謂地雖凝聚不動然其氣實與天左旋無少停息日月五星雖見為逆天而其實乃順天而行但比天稍遲而已蓋地氣既順天左旋中間辰象無獨自右行之理特以稍遲於天故見為移徙而右又各以七政性情分緩速焉月陰精右行最速實乃其左行最緩日雖陽精然本陰故右行雖緩左行雖速亦不能如恒星之純繫乎天也金水進退不離日乃陰精感召於陽之理其象甚顯其理則微矣土星者地類也地氣與天左旋宜鎮星亦若是然根本五行則不能與純陽純陰之氣並運而同流也言不純繫乎地即其不純繫乎天因日陽精而上地類故異其文耳火為日類而微正猶金水之為日類而微也故月受日光而金水附陽金水法月也火之行倍於日火法日也木星厯一辰則木一盛衰周天而符歲數故木曰歲星愚按此節大槩皆用渾天説惟地在氣中二語似㕘用先儒四遊之説蓋張子實見地有左旋之理如下節所云者但地之左旋亦畧有運動非同於天運之旋轉故天上所繫之辰象隨天稍遲人於地上望之則反見為右行耳蓋地雖有運動而未足以掩辰象右行之迹也或有謂順天左旋只是氣動非形動者多作周旋反覺蛇足又李注分并包乎地以上為古説地在氣中以下為斷以已意竊謂通節皆融㑹舊説而裁以已意亦截分不得凡圜轉之物動必有機既謂之機則動非自外也古今謂天左旋此直至粗之論耳不考日月出没恒星昏曉之變愚謂在天而運者惟七曜而已恒星所以為晝夜者直以地氣乘機左旋於中故使恒星河漢因北而南日月因天隱見太虚無體則無以騐其遷動於外也大全因一作回李注此節即申明地氣順天左旋之意而益知七政之為左旋也補訓夫謂地在氣中順天左旋者可類推也大凡圜轉之物其動必有機既謂之機則動必由内非自外為之也即凡物可知天地矣古今人皆謂天左旋此直是影響至粗之論耳不知考究日月出没恒星昏曉之變故但知天左旋而不知所以左旋也愚謂在天而自為運行者惟日月五星而已若恒星則不然在恒星所以分昏曉而為晝夜者直以地在氣中乘機而左旋故使恒星河漢因之而轉北為南及日月之因天隱見其出没亦有永短不同皆地氣乘機為之耳若太虚本無體舍却日月恒星則無以騐其遷動於外也但曰天左旋豈非得其粗不得其精者乎直猶但也七曜即七政以其有光曜謂之七矅晝夜即昏曉隱見即出没意上不及河漢以恒星因北為南帶出因南作回南為是集釋謂地左旋之説有疵固是然以黄氏瑞節所論潮汐証之地春東夏南秋西冬北浮水而動合觀四時是左旋之意非真如磨之圜轉也蓋東西南北方向不易而春夏秋冬乘氣機而自動恒星日月又因地遷而改觀理固有之也發明圜轉之物如輪磑之類動必有機如輪之轂磑之臍也恒星半在天上半在地下一星入即一星出故有昏曉之變因北為南者恒星當午謂之中星必左旋由北而東而南而西故云華注天左旋為粗論非謂天是右旋直謂太虚無體無以騐其動耳日月出没恒星昏曉乃其旋者其所以旋乃縁地氣乘機左旋而恒星河漢隨之也在天而運者惟七曜以日月五星係自為運轉之物非恒星之比而於七曜中又抽出日月與恒星並言者想因日月行於三百六十度中總不越恒星之度日所行之度其星即以光掩不可見故前後俱合言之愚按上節地在氣中二語尚是帶説此則專主以立言首四句虚提不考日月四句因太虚無體故以日月恒星明之下言恒星言河漢即是言天而因以見左旋之機未嘗不因乎地也不知地為天之機而但謂天左旋豈非至粗之論乎太虚無體正張子註明所以言恒星之故太虚即謂天無深意太虚無體以二十八宿為體蓋天所以分三百六十五度四分度之一者東方蒼龍七宿三十二星七十五度北方𤣥武七宿三十五星九十八度四分度之一西方白虎七宿五十一星八十度南方朱雀七宿六十四星百一十二度二十八宿合一百八十二星共三百六十五度四分度之一而天體因此以見不然蒼蒼者何以見其行度乎日月亦以天度為行度者也故並言之然意不重在日月恒星只是即日月恒星以明天而其意總重在即地之左旋見天之所以左旋應轉首四句意張子此説殆亦如邵子天何依依乎地地何附附乎天之意歟集釋謂地動則不能載物理固然矣然竊意天地相涵止是一氣天體圓故動然動者未嘗不與靜者相通地體方故靜然靜者未嘗不隨動者而運但天之運行則有度數次舎可推而地之大體乘氣而行但微有運動非天行遲速專因地而見亦非地竟塊然於中成一毫無運動之物也補訓引黄氏之説頗為得之但未必如先儒四遊三萬里之誕耳節首機字即凡物之樞機以見地為天之機是指實語地氣乘機機字謂地乘氣機而左旋各是一義湏分别㸔天左旋處其中者順之少遲則反右矣補注即上隨之少遲則反移徙而右之意集釋愚按朱子前章之意謂日行天上頗速五星與月行頗遲月如蟻行磨上頗慢於磨日如蟻與蟢子同行磨間蟢子又疾於蟻也地物也天神也物無踰神之理顧有地斯有天若其配然耳朱子曰天包乎地天之氣又行乎地之中故横渠云地對天不過補訓此見天之獨尊也有地在下斯有天在上譬如婦與夫對其實婦統於夫以家言之婦亦家人之一耳李注形神之相配如身心之對待地有升降日有脩短地雖凝聚不散之物然二氣升降其間相從而不已也陽日上地日降而下者虚也陽日降地日進而上者盈也此一歲寒暑之候也至於一晝夜之盈虚升降則以海水潮汐騐之為信然間有小大之差則繫日月朔望其精相感黄氏瑞節曰此段地有升降日有脩短及証以海水潮汐之候皆用舊説今考先儒皆謂地在天中水環地外四遊升降不越三萬里春遊過東方五千里其下降如其數秋遊過西方五千里其上升如其數夏遊在南故日在其北冬遊過北故日在其南此冬夏晝夜之長短因地有升降而然人處地上如在舟中但見岸之移而不知舟之轉也至於論潮則謂天包水水承地而一元之氣升降於太虚之中地乘水力與元氣相為升降氣升而地沉則海水溢上而為潮氣降而地浮則海水縮而為汐一晝一夜陰陽之氣再升再降故一日之間潮汐皆再其説與地有四遊相為表裏然以渾天術觀之天形斜倚半在地上北極出地三十六度其南五十五度正當地中乂其南十二度為夏至之日道天在地上最髙故晝長又其南二十四度為春秋分之日道天在地上稍低故晝夜半又其南二十四度為冬至之日道天在地上最低故晝短其南下入地纔三十一度而已此晝夜長短乃天地髙低自然之理非因地之升降然也潮汐消長則惟余襄公海潮圖序最明蓋潮之消息皆繫於月月臨夘酉則潮漲乎東西月臨子午則潮平乎南北晝夜之運日行一度月行十三度有竒故太陰西没之期常緩於太陽三刻有竒潮信之來率亦如是自朔至望常緩一夜潮自望至晦復緩一晝潮朔望前後月行差疾故晦前三日潮勢長朔後三日潮勢大望亦如之月弦之際月行稍遲故潮之去來勢亦稍小一月則潮盛於朔望之後一歲則潮盛於春秋之中春夏晝潮常大秋冬夜潮常大蓋歲之有春秋猶月之有朔望天地之常數也此潮之消息乃繫乎月之進退亦非因地之浮沉也張子特用舊説而未之易耳因附見之補訓此論地之升降而並及潮汐也因地之升降帶言日之脩短地雖凝聚至寒暑之候正言地之升降而寒暑帶脩短意下又言晝夜之盈虚升降而及潮汐夫地者乘氣機而為升降者也因地之有升降而日乃有長短晷刻之不齊以為寒暑之分所以然者何也地以陰質雖為凝聚不散之物然陰陽二氣升降於地之中循環相隨而不已也當其陽氣日上則地日降而下者以陽氣虚於下故地沉而降也當其陽氣日降則地日進而上者以陽氣盈於下故地浮而升也陽自子月而生日漸長而為暑陽自午月而降日漸短而為寒此一歲寒暑之氣侯如是也至於一晝夜之間亦有盈虚升降旦而陽生則地以虚而降潮於是生夕而陽降則地以盈而升汐於是至則以海水之潮汐騐之而可信也然其間潮有大小之差者則又繫日月朔望月之精與水相感月疾則潮大月遲則潮小而潮汐實則繫於地之升降也地有升降故日有脩短重上句脩短照下寒暑㸔地本陰陰之氣在地中而天之陽氣實升降其間故云二氣相從不已晝夜微升降寒暑大升降潮汐應月因朔望帶言日月與水皆陰類故其精相感按地有動有陷則非死物其升降亦或有之但不得有五千里之懸殊耳舟大而穩乘者不覺其動况茫茫大地其升降誰能知之哉若論寒暑修短則天行可據地運無憑姑存其理可耳集釋朔則月與日合得乎陽而陰之氣方生望則月與日對得乎陽而陰之氣方盛故潮水大春秋陰陽之和潮亦大月行弦上而濶近故似遲月行中天而狹髙故似疾非月實有遲疾也月有遲疾則一日行十三度者不足憑以算厯矣愚按此節全用四遊舊説惟朔望小大三句㕘用潮汐應月之義蓋天行地運理甚㝠渺非可執一以盡其故張子自是於渾天術外兼存舊説未可多議也海濤朝曰潮夕曰汐汐亦潮也一日一潮一汐黄氏海縮為汐潮汐皆再等語未是日質本陰月質本陽故於朔望之際精魄反交則光為之食矣朱子曰厯家説天有五道而今且將黄赤道説天正如一員匣相似赤道是那匣子相合縫處在天之中黄道一半在赤道之内一半在赤道之外東西兩處與赤道相交度却是將天横分為許多度數㑹時是日月在黄道赤道十字路頭相交處撞着望是月與日正相向如一箇在子一箇在午日所以食於朔者月常在下日常在上既是相會被月在下面遮了故日食望時月食謂之闇虚蓋火日外影其中實闇到望時恰當着其中闇處故月食至明中有闇虚其闇至微望時月與之正對無分毫相差月為闇虚所射故食黄氏瑞節曰春秋疏云日月同處則日被月映而形䰟不見故食朔則交會故食必在朔然而每朔皆會應每月皆食杜預云日月動物雖行度有大量不能不小有盈縮故有雖交會而不食者或有頻交而食者又云日月異道交互相錯月之一周必半在日道裏從外而入内半在日道表從内而出外或六入七出或七入六出凡十三出入而與日會厯家謂之交道通而計之一百七十三日有餘而有一交唐一行議云日行黄道月有九道其所行之道遇交則有薄蝕之變也至於合朔如合璧則不食其交不軌道則食也故騐日食者必以日躔月道之交騐之耳五代王朴云自古相傳皆謂近交則日月有蝕殊不知日月之相掩與闇虚之相射其理有異今據諸家之説所謂九道者青道二赤道二白道二黒道二與黄道而九月不行黄道止行八道但此八道斜出入於黄道之内外故謂之九道耳月一歲凡十三次經天則二十六次出入於黄道之内外一次經天則一次入一次出也或六次入七次出或七次入六次出各十三出入也此二十六次出入於黄道之時有二十四次皆不與日會惟有兩次與日會故疏云通計一百七十三日有餘而有一交也於此時方有食然而有食有不食者或日月同道之際道有分數故食亦有分數或小有盈縮遂從邉而過故有不食也吕氏詩記十月之交篇載孔疏之説亦然若以定法論之一歲兩交當兩食而春秋二百四十二年日食三十六唐二百九十年食百餘何也此杜預所謂有雖交而不食者或有頻交而食者也朱子與王朴之説合日月之相掩與闇虚之所射是日月食之理也補訓此推日月交食之理補注呉臨川曰由北直南而縱分之謂之度由東至西而横截之謂之道月二十九日半有竒而與日同度是為朔十四日九時有竒而與日對度是為望合朔之時縱雖同度横不同道若横亦同道則月掩日而日食對望之時縱雖對度横不對道若横亦對道則日射月而月蝕其蝕之分數由同道對道所交之多寡發明日質本陰故其精闇虚月質本陽故其魄能受日光朔而日月相會則日被月掩故日食是魄反交乎日也望而日月相對月為闇虚所射故月食是精反交乎月也愚按反交補訓作反覆相交竊謂反者自下而上之詞如杜詩反照入江之反日食則月在下上掩日光月食則日在下上奪月光又日外陽而内陰月外陰而内陽質言其内也精日之内陰即質也魄則月之外陰也書康誥哉生明武成旁死魄皆以月本黑之體為魄非言其内之質也日以其外陽之光交於月内陽之質故内外相映而光生若以其内陰之精對其本黒之體則月無光而食矣月質本陽故受日之光若以其本黒之陰體上掩乎日則日食矣集解以月之魄為陽補訓以月質為魄皆誤虧盈法月於人為近日遠在外故月受日光常在於外人視其初終如鈎之曲及其中天也如半璧然此虧盈之騐也朱子曰厯家舊説月朔則去日漸遠故魄死而明生既望則去日漸近故魄生而明死至晦而朔則又遠日而明復生所謂死而復育也此説誤矣若果如此則未望之前西近東遠而始生之明當在月東既望之後東近西遠而未死之明却在月西矣安得未望載魄於西既望終魄於東而遡日以為明乎故惟近日沈括之言得之蓋括之言曰月本無光猶一銀九日耀之乃光耳光之初生日在其旁故光側而所見纔如鈎日漸遠則斜照而光稍滿大抵如一彈丸以粉塗其半側視之則粉處如鈎對視之則正員也近歲王普又申其説月生明之夕但見其一鈎至日月相望而人處其中方得見其全明必有神人能凌倒景旁日月而往參其間則雖弦晦之時亦復見其全明而與望夕無異耳以此觀之則知月光常滿但自人所立處視之有偏有正故見其光有盈有虧非既死而復生也古今皆言月有闕惟沈存中云無闕蓋晦則與日相叠了或從上過或從下過皆不受光至初三方漸漸離開了人在下面側㸔見則其光闕至望日則月與日正相對人在中間㸔見則其光方員問月中影是地影否曰前輩有此説日月在天如兩鏡相照而地居其中四旁皆空水也故月中微黑之處乃鏡中大地之色畧有形似而非真有物也問弦之義曰上弦是月盈及一半如弓之上弦下弦是月虧了一半如弓之下弦又問是四分取半否曰二分二至亦是四分取半厯家謂紓前縮後近一遠三以天之圍言之上弦與下弦時月日相㸔皆四分天之一黄氏瑞節曰紓前縮後云者厯家謂春分月弦東井日在奎秋分月弦南斗日在角月在前日在後是也近一遠三云者厯家以周天為四分近一分遠三分也補訓此節論月之盈虧全繫於日也如鈎之曲如璧之半皆虧缺時也惟望則正員而盈按日食為月掩則月近日遠可據但未必大相隔絶耳補注童氏發微曰終謂晦朔以前初謂晦朔以後終如鈎晨見東方初如鈎昏見西方上弦則昏見中央下弦則晨見中央至望則日月相對而光滿晦朔則日月同會而月光滅矣愚按補訓以日為月掩為遠今厯家謂日徑七百五十里月徑六百里日道依天月下於日一萬一千五百里是以月徑六百里之廣猶日徑七百里之大每遇同道同度則月掩日光而無餘分其説與補訓相合雖日月圓徑及相去里數難以意測然其理大抵如此又據今説月在日之下則沈存中所謂或從上過或從下過者亦微異矣月所位者陽故受日之光不受日之精相望中弦則光為之食精之不可以二也李注復申日質本陰月質本陽一節之意集解月所位陽也日之光亦陽也陽與陽合故受日之精陰也陰陽相反故不受受日之光故光應之則明不受日之精故正與相對而精射之則食蓋光者用精者體用可兼乎外而體則貞一而不可以二也髙注相望中弦日月相對當上下弦之中謂望日也補訓日食易明故專言月質陽故受日光若本非陽質以黑窣之物日雖曜之不能明也愚按上不受以月言陰陽相反故不受也下不可二以日言體一而已故不可旁及也亦上下互發之文發明補訓謂日精强加之而月不能敵故食竊意月無光借日之光以為光正對闇虚則日不能為月之光故月食耳恐日無强加之理亦非月本有光而日奪之也日月雖以形相物考其道則有施受健順之差焉星月金水受光於火日陰受而陽施也補訓此節推論陰受陽施之理上只言日月下並言星又推金水火皆是陪説日光兼及星月金水火但能照金水不及星月日月雖以形相並而為物考究其道則日健而月順日施而月受有不同者焉豈獨日月為然凡星與月金與水受光於火日皆陰主受而陽主施也物與道對以形則各為一物以道則一施一受不同也星月為陰日為陽水陰根陽火陽根陰金體凝固為陰尤易明陰陽之精互藏其宅則各得其所安故日月之形萬古不變若陰陽之氣則循環逓至聚散相盪升降相求絪緼相揉蓋相兼相制欲一之而不能此其所以屈伸無方運行不息莫或使之不曰性命之理謂之何哉或問程子曰陰陽之精互藏其宅然乎曰此言甚有味由人如何㸔水離物不得故水有離之象火能入物故火有坎之象重離之中互坎重坎之中互離則各得其所安故日為離月為坎其形萬古不變而日常滿月多虧也若陰陽之氣則循環逓至其春秋聚散者相為推盪上下升降者相為求合絪緼交密充動者相為揉錯非相生合以兼之則相克勝以制之如是兩端而已欲一升之而不降欲一降之而不升皆不能也此其所以屈伸無方運行不息而合於鬼神無有使之而然是不曰性命之理神妙之道而然哉補訓此推論陰陽之精氣而歸於性命之理精屬體氣屬用分言之為精為氣合言之精亦氣之為也但以其結為形質者言耳故性命之理承氣説下而精可見補注陰陽有以質言者有以氣言者以質言則陽中有陰陰中有陽若日月之形是也以氣言則循環逓至若四時晝夜之類聚散相盪升降相求若風雲雨雷之類絪緼相揉若温凉寒暑之類是也集解陽之精而無陰則失其所蔽陰之精而無陽則失其所依如是則散而不成物矣互藏其宅然後陽得蔽而不洩陰得主而不散故各得所安相兼者相資也相制者相克也獨陽不生獨陰不成生者倡其成成者成其生不相兼乎陰長陽消陽長陰消反復循環不相制乎愚按日以陰精而藏於陽之宅者也月以陽精而藏於陰之宅者也與地純陰節日為陽精月為陰精不同此所謂精即前所謂質也循環句流行意多聚散二句對待意多聚散横説升降豎説絪緼又以交密處言相兼相制總承上四句一之不能謂或生或克不能齊之使一也程子專言升降亦舉一以該其餘耳性命之理謂其為天道之自然也尚未及賦予人物之性命日月得天得自然之理也非蒼蒼之形也徵引易恒卦彖日月得天而能久照莊子逍遥遊篇天之蒼蒼其正色耶補訓上文從日月説到性命之理此又借易辭而發揮之髙注自然之理往來屈伸莫或使之而然者也愚按正蒙中文相屬者多數節同義脉絡貫通其引經語非但註釋之體此節大意當云釋易恒卦彖辭以明日月之行亦自然之理也後倣此閏餘生於朔不盡周天之氣而世傳交食法與閏異術蓋有不知而作者耳朱子曰周天之氣謂二十四氣也月有大小朔不得盡此氣而一歲日子足矣故置閏天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲一日繞地一周無餘而常不及天一度積三百六十五日九百四十分日之二百三十五而與天㑹是一歲日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日㑹十二會得全日三百四十八餘分之積五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一歲月行之數也歲有十二月月有三十日三百六十者歲之常數也故日行而多五日九百四十分日之二百三十五者為氣盈月行而少五日九百四十分日之五百九十二者為朔虚合氣盈朔虚而閏生焉一歲閏率則十日九百四十分日之八百二十七三歲一閏則三十二日九百四十分日之六百單一五歲再閏則五十四日九百四十分日之三百七十五十有九歲七閏則氣朔分齊是為一章黄氏瑞節曰厯家以一日為九百四十分所謂九百四十分日之二百三十五者是一日内二百三十五分也所謂餘分之積五千九百八十八者一㑹餘四百九十九十二㑹乘之得五千九百八十八也所謂如日法九百四十而一者如算日之法以九百四十分為一日也得六者得六日也不盡三百四十八者將餘分五千九百八十八除之六日外猶餘三百四十八分也日行積三百六十五日九百四十分日之二百三十五與天會是一歲三百六十日而日行多五日又二百三十五分也月行積三百五十四日九百四十分日之三百四十八為十二會是一歲三百六十日而月行少五日又五百九十二分也將日行所多五日又二百三十五分合月行所少五日又五百九十二分通得十日又八百二十七分一歲之閏率也三歲一閏合三歲之間日行所過月行所少通得三十二日又六百單一分也五歲再閏合五歲之間日行所多月行所少通得五十四日又三百七十五分也十九歲七閏合十九歲日行所多月行所少通得整日一百九十每歲餘分八百二十七以十九乘之得一萬五千七百一十三以日法九百四十分而一除之得十六日猶餘六百七十三分并一百九十日通二百單六日又六百七十三分也今為七閏月每月二十九日通二百單三日每月餘分四百九十九分以七乘之得三千四百九十三以日法九百四十分而一除之得三日猶餘六百七十三分并二百單三日通二百單六日又六百七十三分也所謂氣朔分齊者十九年合氣盈朔虚得二百單六日不盡六百七十三分七閏月亦二百單六日不盡六百七十三分氣之分與朔之分至十九年而皆齊所謂氣朔分齊而為一章也補訓此因上文言日月而推及於閏法並帶言交食法以閏法為主閏餘者有餘日方置閏月也置閏而朔望定然後日食於朔月食於望可據而推其法相因補注周天二十四氣凡三百六十五日四分日之一月行十四日九時有竒則與日對二十九日半有竒則與日會十二會通計得日三百五十四有竒餘十日半有竒為閏與日對時則月為之食與日會時則日為之食此交食法即與閏同術也愚按補注謂二十四氣三百六十五日有竒極是考尚書解新安陳氏云二氣為一月必有三十日零二時五刻始交後月節氣合二十四氣該三百六十五日零二十五刻此氣盈之溢數也十二月有六小盡者此朔虚之虧數也一月無三十日全非朔虚而何二氣必三十日添二時五刻非氣盈而何節氣之有餘與小盡之不足二者並行不悖因此有餘不足而置閏於其間此與補注説同蓋朔者月與日會之名氣者二十四氣也朔虚之數不能盡氣盈之數故二者參合而置閏也補訓謂二十四氣僅三百六十日不能盡天行之度而朔又不能盡氣之三百六十日皆未是陽之德主於遂陰之德主於閉補訓此又言陰陽之德德者陰陽之所以為陰陽也當兼理氣言即陰陽而分觀之陽之德主於遂凡發生者皆陽之為也陰之德主於閉凡收藏者皆陰之為也補注沈毅齋曰自動靜而言之則主乎陰所謂乾不專靜則不直遂坤不翕合則不發散是也自小大而言之則陽常兼陰陰不兼陽又豈可以並言哉論其分則陽一而陰二陽尊而陰卑也在人則君臣父子之分也論其氣則陽始而陰成陽唱而陰和也在人則子弟臣妾之類也陰性凝聚陽性發散陰聚之陽必散之其勢均散陽為陰累則相持為雨而降陰為陽得則飄揚為雲而升故雲物班布太虚者陰為風驅斂聚而未散者也凡陰氣凝聚陽在内者不得出則奮擊而為雷霆陽在外者不得入則周旋不舎而為風其聚有遠近虚實故雷風有大小暴緩和而散則為霜雪雨露不和而散則為戾氣曀霾陰常散緩受交於陽則風雨調寒暑正徵引周禮宗伯保章氏以五雲之物辨吉凶詩弼風終風篇終風且霾又曰終風且曀集傳霾雨土䝉霧也陰而風曰曀朱子曰此一段見得陰陽之情陽氣正升忽遇陰氣則相持而下為雨蓋陽氣輕陰氣重故陽氣為陰氣壓墜而下也陰氣正升忽遇陽氣則助之飛騰而上為雲也陽氣伏於陰氣之内不得出爆開而為雷也陰氣凝結於内陽氣欲入不得故旋繞其外不已而為風至吹散陰氣盡乃已也戾氣飛雹之類曀霾黄霧之類皆陰陽邪惡不正之氣所以雹冰穢濁或青黑色華注此明風雨雲雷之屬總不外乎陰陽之相感補訓陰主閉其性凝聚陽主遂其性發散然陰之凝聚陽必為之發散其勢均歸於發散蓋陰陽相為用也陽方升而為陰所累陰壓陽則相挾持為雨而降雨者陽之為也陰方升而為陽所得陽助陰則飄揚為雲而升雲者陰之為也故凡雲物分布於太虚之中者陰氣為風所驅斂聚而未散則為雲也即此可知雨雲所由然矣凡陰氣凝聚束陽在内而不得出則陽奮發有聲而為雷霆陽在陰外不得入則周廻旋繞不舎而為風其凝聚有遠有近有虚有實故雷風有小有大有暴有緩即此可知風雷所由然矣陰聚而陽散同一散也有和不和之分和而散則為霜為雪為雨為露不和而散則為戾氣為曀霾即此可知霜雪雨露戾氣曀霾所由然矣大抵陰雖凝聚而常散緩以受交於陽則風雨得調而寒暑得正矣陰聚陽散其相資為用有如此均散句截上是冐語次言雨雲次言風雷次言霜雪雨露戾氣曀霾總承陰陽聚散來雲物物色也班分也疾雷為霆陰常散緩對凝聚言凝聚其性然也凝聚之中能因陽以為散緩則受交於陽矣非謂其不凝聚而散緩也集釋氣之聚遠而實故風雷大且暴近而虚故風雷小且緩愚按此太虚與前節太虚無體同義皆以蒼蒼之天言即首篇第二層内之屬於天地者也天象者陽中之陰風霆者陰中之陽補訓此推陰陽交互之理而以天象風霆明之集釋天象日月星辰是也集解陽者氣而已矣天象則稍有象故為陽中陰風交於物霆起於地本陰之類然有聲而無形有氣而無質故為陰中陽補注天象陽中陰所以聚而不散風霆陰中陽所以聚散無常雷霆感動雖速然其所由來亦漸耳能窮神化所從來德之盛者歟徵引易下傳之五章窮神知化德之盛也李注雷霆者鬰積之久而發者也凡天地之化皆以漸成非精義利用體神化於身者孰能知之補訓雷霆必積久而後動如十一月一陽生至四陽二月之時乃發聲豈非漸乎即偶然雷霆亦必氣積而後動無遽動之理神化俱承漸不承速徐氏發明分速為神漸為化未確以其兩反在前一反在後也德之盛以人言愚按此節大意即雷霆以明神化之理也兩而化即一而神者為之神與化不可分先後補訓駁發明是矣但徐氏又謂一而神兩而化為所從來而補訓亦謂神化承漸不承速竊玩張子之意蓋雷之震動即神化之一端所從來即所由來之變文也即雷之所從來以漸知天地之化皆以漸而成即此是窮神知化之盛德非以漸為神化而所從來又推本一層也神化中有速字意所從來即漸字意亦非承漸不承速也惟李注得之火日外光能直而施金水内光能闢而受受者隨材各得施者所應無窮神與形天與地之道歟徵引易上傳之六章夫乾其靜也專其動也直夫坤其靜也翕其動也闢晉書紀瞻傳陽動而外以含容為質陰靜而内以外接為用是以金水之明内鑒火日之光外輝剛施柔受陽勝陰伏朱子曰陰以陽為質陽以陰為質水内明而外暗火内暗而外明西山真氏曰日火外景金水内景本准南子之説道家謂日火揚光於外故日有食火有滅金水潛光於内故無窮以此為養生之法收視反觀潛神不矅集解直者照臨無礙之謂也受者隨材各得妍􅑦美惡未嘗有隱而必由於所感不能自施形與地之道也形則礙地不倡也施者所應無窮隨在光皆至焉神與天之道也神無物不體天所以倡也集釋水之明鏡之光隨材各得也愚按集釋諸家皆以金水火日相施受言即前金水受光於火日之意集解則以金水火日之施受於物言即此見天地形神之道以諸家則施即施光於金水受即受光於火日材即金水之材也以集解則施乃普照萬物受乃受他物之形材亦他物妍􅑦之材也二説皆通玩金水亦言光不言質則集解似勝友人趙子彤元云諸家謂施光於金水然既曰無窮則施及者不惟金水矣木曰曲直能既曲而反申也金曰從革一從革而不能自反也水火氣也故炎上潤下與陰陽升降土不得而制焉木金者土之華實也其性有水火之雜故木之為物水漬則生火然而不離也蓋得土之浮華於水火之交也金之為物得火之精於土之燥得水之精於水之濡故水火相待而不相害爍之反流而不耗蓋得土之精實於水火之際也土者物之所以成始而成終也地之質也化之終也水火之所以升降物兼體而不遺者也徵引書洪範五行水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡蔡傳潤下者潤而又下也炎上者炎而又上也曲直者曲而又直也從革者從而又革也易説卦之五章艮東北之卦也萬物之所成終而所成始也張子語錄中宫土寄王之説於理非也大率五行之氣分王四時土固多於四者然其運行之氣則均施錯見金木水火分主四時獨不見土之所主是以有寄王之説然於土夾在季夏之末者且以易言之八卦之作坤在西南西南致養之地在離兑之間離兑即金火也是以在季夏之末朱子曰五行之説正䝉一段説得最好不輕下一字問陰陽五行如何曰康節説得法密横渠説得理透問金木水火體質屬土曰正蒙有一説好只金與木之體質屬土水與火却不屬土補注水濡之水當作土補訓更即五行而推論之木曰曲直木既能曲反伸而直也金曰從革金一從改革而不能自反其本質也此木金之純乎質者然也水火雖有質而以氣為用故火炎上水潤下下與陰同降上與陽同升土不得而制其氣焉此水火之主乎氣者然也然而木金與水火有相資也木金者土之華實木為華而金為實其性有水火相雜於其間故木之為物雖生於土然以水浸之則生以火然之而火附木不相離蓋得土之浮華於水火之相交而成者也金之為物亦生於土然因土性之燥而得火之精因土性之濡而得水之精故水火相待有成而不相害以火爍之反流為水而不耗折蓋得土之精實於水火之相合而成也此木金之質生於土而必資水火之氣有然也若土者物之所以成始而成終也乃地之質也五行生成變化之終也水火之氣所以升降不外於土萬物皆兼體而無一之或遺者也此詳言五行先提木金以質言次及水火以氣言次言木金為土之華實而帶言水火次言土而以水火升降應前物兼體亦包金木在内書蔡傳曲而又直從而又革皆分兩義與此不同木不能無曲而究竟長大故為曲而反伸金融而從革不能自反其本質火氣炎上陽之升也水氣潤下陰之降也蔡傳潤而又下炎而又上此則謂潤於下炎於上也木金生於土中故為土之華實其性有水火之雜謂木金兼有水火之性此並言木金下分木金言之萬物生於土歸於土故為物之成始成終土之浮華上之精實即應上金木者土之華實浮華謂木精實謂金愚按此節大意釋書洪範之文以明五行之理也木金者以下舊解多雜竊意木金者土之華實其性有水火之雜二語為下二段之綱蓋水火之氣與陰陽升降交際於地之中無處而不在者也木生地上則為土之華而得水火之氣於土中此木性有水火之雜也故水漬則生火然而不離水生木木生火之理本如是也金生地中則為土之實而得水火之氣於土中此金性有水火之雜也故水火與金相資而不相害以火爍之反流為水而不耗火克金金生水之理本如是也得水火之精於土之燥濡與得土之實於水火之際同是一意流而不耗正相資而不相害處亦非兩層蓋土有燥有濡濡者即水之性燥者即火之性而金皆具之也火克金若難言相待然相克乃以成之金以成器為貴木以應用為才正見其相待也木得浮華於水火之交金得水火之精於土之燥濡皆以木金本然所具之性言至水漬火然流而不耗又是木金成質後與水火相資為用處惟其性如是故其用如是補訓以火爍金為得火之精金爍為水為得水之精混作一層未確李注以得金則水火相需而成烹飪為不相害亦落後一層土為化之終者蓋陰陽五行皆天地化生人物之具至天五生土則天地之化已全而人物由是以生也語錄一段前蓋駁土寄王四時各十八日之説而謂其均施錯見無時不有後引易卦又明土所以屬季夏之故也其理可㕘故附錄之冰者陰凝而陽未勝也火者陽麗而陰未盡也火之炎人之蒸有影無形能散而不受光者其氣陽也補注氷字恐當作水髙注或謂人為水之誤集解水生於天一其體質本陽也至冬則凝而成氷陰之凝聚而中之微陽不勝陰也火則陽麗於陰之外故有光而中之陰猶伏藏而未盡也故中暗火氣曰蒸薫也散猶施也指其光之燭物氣之蒸人而言言火之烈然炎熱人之觸之而薫蒸者有影而已非有形也能散而已不能受也補訓髙注謂陰未盡故火猶然盡則滅殊難解豈以陰為火所然之物乎張子是論水火非欲陽勝陰盡愚按此節可疑者頗多補注疑氷當作水髙注疑人為水之誤諸家以不能受為句李注以不能受光者為句以今考之前後多言水火陰凝陽麗又與外光内光陷陰附陰前後言水火之言相符氷之當為水似可據也上言水火而下專言火於文理固為偏承人之蒸解為火之蒸人於文義亦為强解人之當為水亦似可從也能散而不能受為句光者其氣陽也為句句法頗未穩以前節受光於火日句例之受光字連讀又非無謂也嘗以此三説之解解之水之為體陰之所凝結也陰以陽為質其外暗而内明殆陽之伏於中而未勝也火之為物陽之麗於陰也陽以陰為質其外明而内暗殆陰之伏於中而未盡也此陰陽互藏之理然也金水能受日月之光以照物若火之有炎水之有蒸則但有影而無形能散而為氣而不能受日月之光以鑑物者其氣已屬於陽故也如此則陽未勝陰未盡亦指其内明與内暗而言非欲其勝與盡也水之内明即陽火之内暗即陰亦非以所然之物為陰也然水有涸時即是陽勝火有滅時即是陰盡方言水火故言未勝未盡耳陽陷於陰為水附於陰為火補注此承上章而言陽陷於陰所謂陰凝而陽未勝也陽附於陰所謂陽麗而陰未盡也補訓入其中為陷見於外為附李注説者皆謂一陽陷於二陰之間為坎一陰麗於二陽之間為離非也凡能出入上下動靜發斂者皆陽也顧非陰則陽之出入上下動靜發斂不可得而見耳是故震陽動也坎陽陷也艮亦陽止也巽陽入也離陽麗也兑亦陽説也易卦所以分陰陽者蓋以陽為主而遇陰則為陽卦以陰為主而遇陽則為陰卦也陽在下而遇陰壓之則動矣陽在中而遇陰錮之則陷矣陽在上而遇陰承之則止矣陰在内則陽必入以散之矣陰在中則陽必附之以為明矣陰在外則陽必敷之以為説矣今謂巽陰入於二陽之下離陰麗於二陽之中是以入與麗屬陰故曰其説非也張子前文云陰在内陽不得入故周旋不舎而為風蓋不舎者所以入之也此條又以火為陽附於陰比之觀物言八卦處理獨精矣張注此觀坎離二卦自見又以河圖考之天一生水地六成之陽居内者微而陰在外者盛是陽陷陰中也地二生火天七成之陰居内者微而陽在外者盛是陽麗陰外也故周子太極圖以水陰盛居右火陽盛居左均是一義不可易之至理也正蒙初義卷二
