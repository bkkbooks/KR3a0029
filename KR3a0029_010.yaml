body:
  text: 正䝉初義卷十邳州知州王植撰作者篇第十發明此篇論帝王以及賢大夫皆達而在上其道行之事三十篇論孔子以及門人皆窮而在下其道明之事愚按此篇凡二十一節前十三節論古帝王之事有分論有合論周有八士以下八節論春秋列國君卿大夫之事有褒有譏作者七人伏羲神農黄帝堯舜禹湯制法興王之道非有述於人者也張子語録作者七人伏羲也神農也黄帝也堯也舜也禹也湯也所謂作者上世未有作而作之者也伏羲始服牛乗馬者也神農始教民稼穡者也黄帝始正名百物者也堯始推位舜始封禪者也堯以徳禹以功故别數之湯始革命者也若謂武王為作則武王已是述湯事也若以伊尹為作則當數周公恐不肯以人臣謂之作若孔子自數為作則自古以來實未有如孔子者然孔子已是言述而不作也補訓舉七人以實孔子之言也論語本無可指作是去而隐張子以七聖實之自為一解制為法度興起王業大槩渾說若謂黄帝非王禹湯方是興王太拘以述對作本孔子述而不作語以知人為難故不輕去未彰之罪以安民為難故不輕變未厭之君及舜而去之堯君徳故得以厚吾終舜臣徳故不敢不䖍其始徴引書臯陶謨在知人在安民又云惟帝其難之舜典四罪而天下咸服張子經學理窟詩書篇萬事只一天理舜舉十六相去四凶堯豈不能堯固知四凶之惡然民未被其虐天下未欲去之堯以安民為難遽去其君則民不安故不去必舜而後因民不堪而去之也補訓此承上文堯舜而言其待四凶之事䖍重其事之意舜居攝二十八載四罪事最在後在居攝為治之始而四罪非居攝第一事也髙注未彰之罪四凶也未厭之君三苖也君徳則於人無不容臣徳則於分有不敢也華注既云未彰未厭雖舜為臣而未可去若其既彰既厭雖堯為君而亦必去須㸔得活稽衆舍己堯也與人為善舜也聞善言則拜禹也用人惟己改過不吝湯也不聞亦式不諫亦入文王也徴引書大禹謨稽於衆舍己從人仲虺之誥用人惟己改過不吝詩大雅思齊篇不聞亦式不諌亦入集傳雖事之無所前聞者亦無不合於法度雖無諫諍之者亦未嘗不入於善張子經學理窟詩書篇與此同而末又益一語曰皆虛其心以為天下也集解此言聖人無不用人之善髙注不聞亦式敬之至也不諫亦入虛之至也别生分類孟子所謂明庶物察人倫者與徴引書小序帝釐下土方設居方别生分類孔氏曰生姓也别其姓族分其類使相從也補訓此於羣聖之中専言舜也因書序言别生分類與孟子言明物察倫相近故合言之李注自親親之殺尊賢之等以至於貴賤上下士農工賈鰥寡惸獨暨鳥獸草木魚鱉皆所謂别生分類也愚按别生分類孔氏但以姓族言之張子之意似濶凡五倫常變之殊道事物經權之異用皆所以别其生分其類也故為為明物察倫之義書序帝即謂舜故張子取以稱舜者釋之象憂喜舜亦憂喜所過者化也與人為善也隐惡也所覺者先也補訓此舉舜之愛弟而深贊之也集解過化謂事過即化無所留滯不藏怒不宿怨也與人為善謂取其愛兄之意也隐惡謂沒其殺己之惡也所覺者先不逆詐億不信也此四句舉經傳成文皆以解象憂喜舜亦憂喜之意李注即與象同憂喜一事而四美具焉好問好察邇言隐惡揚善與人為善象憂亦憂象喜亦喜皆行其所無事也過化也不藏怒也不宿怨也補訓此補足上文之意增出問察及行所無事不藏不宿數句其實只一意行無事過化總承不藏二句只結憂喜意過化上文已有此又從行所無事㸔出當串說下舜之好問好察邇言隐惡而揚善與人為善以及象憂亦憂象喜亦喜皆順理而行所無事也故所過者化也而於象不藏怒不宿怨也舜之孝湯武之武雖順逆不同其為不幸均矣明庶物察人倫然後能精義致用性其仁而行湯放桀有慚徳而不敢赦執中之難也如是天下有道而已在人在己不見其間也立賢無方也如是徴引易下傳之五章精義入神以致用也書仲虺之誥成湯放桀於南巢惟有慙徳湯誥將天命明威不敢赦補訓此言舜湯之事武是帯言故下明舜湯不及武明庶物叚不復粘孝執中立賢不復粘武首四句意本輕引起下文耳子事父為順湯武放伐其君為逆精義致用言義已精而致之於用有慙徳不敢赦是兩意欲放則有慙徳欲赦又不敢所以難致其中天下有道道是道徳之道言天下但求有道徳之人而用之髙注舜雖順湯武雖逆然一以瞽瞍為父一以桀紂為君其不幸均矣明物察倫生知也精義致用性其仁而行安行也虞帝所以不可及也湯放桀而有慙徳欲赦桀則畏上帝執中之難如是且天下不過欲其有道耳在人在己又何間焉所以立賢無方也舜之至徳湯之至公無以加矣愚按明庶物以下雖不粘孝武然言物倫則孝在其中言執中則武在其中上下未嘗不相應也天下有道句諸家之說不同愚謂此言天下但有一道而已不必在己不必在人也在人在己即以道言人己不間即商書用人惟己意立賢無方此湯所以公天下而不疑周公所以于其身望道而必吾見也大全疑周公上有坐以待旦四字補訓此言湯與周公之事文王望道而未之見周公繼志述事所以於其身望道而必吾見也集解湯之求賢周公之求道其公勤之心一而已矣帝臣不蔽言桀有罪巳不敢違天縱赦既已克之今天下莫非上帝之臣善惡皆不可掩惟帝擇而命之己不敢不聽補訓此又専言湯事不蔽不赦本一時事張子以為不赦後方不蔽又以帝臣兼善惡與本㫖異愚按書湯誥本文爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心論語少變其文則曰有罪不敢赦帝臣不蔽簡在帝心以有罪屬桀說然論語不蔽謂己不敢蔽此又以為善惡皆不可掩蔽也虞芮質厥成訟獄者不之紂而之文王文王之生所以縻縶於天下由多助於四友之臣耳徴引詩大雅綿之篇虞芮質厥成文王蹶厥生予曰有疏附予曰有先後予曰有奔走予曰有禦侮集傳生起也晉陶潛聖賢羣輔録文王有胥附奔走先後禦侮謂之四鄰孟懿子曰夫子亦有四鄰乎子曰吾有四友焉自吾得囘門人益親非胥附乎自吾得賜逺方之士日至非奔走乎自吾得師前有光後有輝非先後乎自吾得由惡言不至於耳非禦侮乎見孔叢子補訓此言文王頼四友之助也博物志謂閎夭太顛南宫适散宜生為四友依詩本文疏附先後奔走禦侮是四様臣非四人而閎夭四人在其中文王之生是蹶生之生張子或不作興起解集釋縻縶猶言繫也非文王之有心有聖徳自繫人之心也以杞包𤓰文王事紂之道也厚下以防中潰盡人謀而聽天命者與徴引易姤卦九五爻以杞包𤓰含章有隕自天本義𤓰隂物之在下者甘美而善潰杞髙大堅實之木也五以陽剛中正主卦於上而下防始生必潰之隂其象如此補訓此借易以形文王也文王之事紂與易理有合焉易云以杞包𤓰乃文王當日事紂之道也杞木上也𤓰下也以杞包𤓰是厚於下而防其自中潰瀾文王愛民而不使之畔亂亦猶是也在當日文王所以供臣職而盡人謀者如是後來天命乃聽其自至豈有圖度之私與紂不可謂之下下當指民文王厚下安民以服事殷不使背叛是厚下以防中潰也𤓰潰自内而外故曰中文王含晦章美而天實命之是有隕自天也有隕自天如俗云從天而墜愚按友人趙子彤元云下専以民言亦未盡當兼愛民御侯言盖文王為西伯率所屬之國以事紂即厚下以防中潰也上天之載無聲臭可象正惟儀型文王當㝠契天徳而萬邦信悅故易曰神而明之存乎其人不以聲色為政不革命而有中國黙順帝則而天下自歸者其惟文王乎徴引詩大雅文王篇上天之載無聲無臭儀型文王萬邦作孚集傳上天之事無聲無臭不可得而度也惟取法於文王則萬邦作而信之矣皇矣篇不大聲以色不長夏以革不識不知順帝之則集傳夏革未詳易上傳之十二章神而明之存乎其人補訓此承上言文王而兩引詩以明之上言儀型文王當㝠契天徳下言文王黙順帝則實只一意正惟與當字相應㝠契則無迹故云神而明之其人當指文王不指儀型文王者詩不長夏以革時講謂不長侈大而變革張子以革為革殷命長夏字不知作何解或長有中夏之意歟不大聲色照黙字㸔即無聲臭也黙順帝則即㝠契天徳天下自歸即萬邦信悦集解此本大雅文王詩而言天道無聲臭可象𤣥妙而難求文王能全天道者也正惟取法文王自當㝠契天道而萬邦信悦矣不必逺求也盖聖人者有形之天道求天道於天則微而難見求天道於聖人則有體而可法也神而明之存乎其人言欲神明天道在求之人與易㫖不同不革命而有中國言不有心作為以求革命而有天下也此本大雅皇矣詩而言華注引皇矣之詩正文王黙契天徳而天下歸之實則儀型文王即當㝠契天徳而萬邦信悦可知矣愚按此儀型文王與天道篇不知上天之載當存文王同意語意云文王之事詩嘗言之矣文王之詩曰上天之事無有聲臭可象是天徳如此也天徳當法而無聲臭則難見必也儀型文王之為人自當有以黙合乎天徳而萬邦亦從而信悦之矣易言神而明之存乎其人正黙契天徳者當存文王之謂也夫文王之為人何如乎即皇矣之詩觀之則夫不大著聲色以為政不革殷命而有天下但黙順上帝之則循理而行而天下自歸者其惟文王乎文王之㝠契天徳而萬邦信悦如此則儀型文王者不從可知哉可願可欲雖聖人之智不越盡其才以勉焉而已故君子之道四雖孔子自謂未能博施濟衆修己安百姓堯舜病諸是知人能有願有欲不能窮其願欲徴引書大禹謨敬修其可願蔡傳可願猶孟子所謂可欲凡可願欲者皆善也補訓此見人當盡其才以勉為善也才猶力也未能四是修己博濟安百姓是及人可願欲之善兼人己言是知雙承孔子堯舜有願有欲者人所能窮其願欲而使之無憾者人所不能也周有八士記善人之富也補注釋論語之意華注富多也愚按此節論語朱注採入重耳婉而不直小白直而不婉補注釋論語之意其以譎為婉以正為直二人各有短長也魯政之弊馭法者非其人而已齊因管仲遂併壊其法故必再變而後至於道補訓此釋論語齊魯之變一節意弊壊也馭猶用也車駕馬謂之馭馭法亦是以人馭此法周禮多用馭字管仲云云見非太公立法不善管仲經營伯業壊其法耳集釋法者先王之法道亦先王之道道由法立法由道成非其人三家是也魯則人亡而法存齊則人法兩亡也孟子以智之於賢者為有命如晏嬰智矣而獨不智於仲尼非天命耶徴引史記孔子世家昭公二十五年孔子適齊景公欲封以尼谿之田晏嬰不可公惑之孔子遂行李注言天限其智也愚按此節大意即孟子之文以論晏子也上下文皆論列各國大夫此當以晏子為主仲尼亦命非本意此節孟子朱注採入山楶藻棁為藏龜之室祀爰居之義同歸於不智宜矣徴引國語海鳥曰爰居止於魯東門之外三日臧文仲使國人祭之左傳文公二年仲尼曰臧文仲不智者三作虛噐縱逆祀祀爰居三不智也補訓此取國語之語廣論語不智之義補注楶與節同愚按此節論語朱注採入使民義不害不能教愛猶衆人之母不害使之義禮樂不興僑之病與徴引禮仲尼燕居子産猶衆人之母也能食之不能教也補注使民義即所以為教不害其平日之不能教也愛猶衆人之母雖過於愛不害其平日能使之義也但其禮樂不興是子産不學之病歟愚按此節大意合論語禮記之言以論子産上四語皆謂子産之善於治民末乃就其不足處言之諸家以首尾作一意中二句作一意解不害二字似涉牽强語氣亦重複無序上教字淺㸔見使民義亦是子産之教禮樂句深㸔見子産雖能教而不能興禮樂也如此與禮記不能教之言正未嘗相妨盖此言禮樂不興即禮所謂不能教耳獻子者忘其勢五人者忘人之勢不資其勢而利其有然後能忘人之勢若五人者有獻子之家則反為獻子之所賤矣補訓此釋孟子論孟獻子之言見五人意中無獻子之家尋常交富貴者非借其勢則利其財張子資勢利有本人情而言愚按此節孟子朱注採入顓臾主祀東䝉既魯地則是已在邦域之中矣雖非魯臣乃吾事社稷之臣也補注釋論語孔子之言盖顓臾既在魯地方七百里之中則是已在邦域之中矣雖非魯在内守官之臣亦是其所屬乃魯在外奉事社稷之臣也補訓論語朱注邦域社稷是二意張子是串㸔社稷上加事字君為社稷之主事社稷即事君正蒙初義卷十
