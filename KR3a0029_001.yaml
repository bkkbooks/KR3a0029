body:
  text: 正䝉初義卷一邳州知州王植撰太和篇第一大全此篇推明太和之氣陰陽運化人物賦受皆是物也愚按此篇凡二十二節前十一節發明太虚之妙兼體用言之後十一節明一神兩化之義皆太虚之用也其謂虚空即氣不可以有無言者見虚與氣未嘗相離其以清屬神濁屬形而對舉之者亦見虚與氣不可相無皆所以絀二氏虚無之謬而庸人之狥形者亦可以悟矣篇中言太虚有以未發之體言者有以流行之用言者有以究極之歸言者竊嘗以三層槩之其説己見總論矣而或者狃於舊説皆以太虚為理且謂與周子言太極同義不知太虚與太極確有不可得而强同者蓋太極一圖本易易有太極數語建圖屬書以發所見其説由理而氣而形從原頭説下因端竟委以極其義所謂太極云者雖云不離乎氣而實以其不雜乎氣者而言故形而上下之分劃然不淆而意之周匝言之簡盡皆純粹以精而無之可疑太虚之云則因二氏崇虚之見而為之説以訂其䝉其説由虚而氣而形蓋氣有清濁濁者滯於形象而不能通清者則虚空洞達神妙莫測足以超乎形象之外而為天地人物之本故名以命之曰太虚太虚一而已而以為有三層可言者蓋上而推之天地人物之先則萬物之形皆本於無形其湛然無形而足以形形者是太虚之本體所以主宰於上而為生生之原者也造化所以生天地者以此故曰太虚無形氣之本體天地所以生人物者亦以此故曰由太虚有天之名所謂性之中涵而為感之體者也中而推之萬物有生之初凡二氣之絪緼天地之對待陰陽之流行皆太虚之妙用所以為生生之具也而及其有形之後則凡散殊可象之迹莫非太虚之所流貫而其虚空無物之處雖至幾微㝠渺容光一髪之隙亦莫非太虚之流行而充塞焉所謂太和之道清通無礙而神者也極而推之人物既生以後生既盡矣又不能不化有形而無形是復還於太虚也所謂形潰反原而散亦吾體者也是其深思㝠㑹於未有天地之先凝心妙契於既有人物之後豁然一貫左右逢原而後著為一書以闡性命之精以闢異端之謬夫豈苟然而已哉但其所見至太虚而止而最上一層之宰乎此氣之中統乎人物之終始所以貫清濁該有無寓於氣而仍不雜乎氣者尚未之及焉則是纔説太虚便已落第二義即云無聲無臭足以與理為體而究未若太極一言為得理之本體也其言及人物既生以後亦止言其為太虚之所流行而充塞而於人物之各具一理不離乎氣而仍不雜乎氣者亦未嘗顯白軒豁以言之故程朱謂其所言是形而下者非形而上者如云合虚與氣有性之名有無虚實通為一物者性也較之周子則言太極者如言性而直言心之理言太虚者如言性而但言心之虚靈心之虚靈雖亦所以具是性者却直作性字不得即謂其見到而説不到亦不得也且不言理而但言虚將展轉説去終無準紀其流必有所敝故先儒謂其流乃是箇大輪迴而張子亦恐不善㑹者之或至是也故其言虚又必兼言氣故曰惟盡性者能一之又曰兼體而不累者存神其至矣又曰虚空為性本天道為用又曰語性與天道之極盡於㕘伍之神變易而已則其意之周匝言之精密足以自救其説而與釋老之説天淵也由此以思二子所見蓋有不得而强合者豈但其詞之偶異己乎篇内坱然太虚一節鬼神者二氣之良能也一句游氣紛擾一節朱子俱入近思錄道體條太和所謂道中涵浮沉升降動靜相感之性是生絪緼相盪勝負屈伸之始其來也幾微易簡其究也廣大堅固起知於易者乾乎效法於簡者坤乎散殊而可象為氣清通而不可象為神不如野馬絪緼不足謂之太和語道者知此謂之知道學易者見此謂之見易不如是雖周公才美其智不足稱也已徵引易乾卦彖保合太和本義太和陰陽㑹合冲和之氣也繋辭下傳之五章天地絪緼本義絪緼交密之狀繫辭上傳之一章八卦相盪又云乾知大始坤作成物乾以易知坤以簡能本義知猶主也五章成象之謂乾效法之謂坤本義效呈也法謂造化之詳密而可見者莊子逍遥遊篇野馬也塵埃也生物之以息相吹也注司馬云野馬春月澤中遊氣也朱子曰此以太和狀道體與中庸發而中節之和無異補注太和即太虚陰陽冲和之氣也中涵浮沉升降動靜相感之性是言其體是生絪緼相盪勝負屈伸之始是言其用其初來也幾微易簡其究極也廣大堅固此以其流行者言也起知於上便能始物而無所難為乾效法於下皆從乎陽而不自作為坤此以其生物者言也散為萬殊有象可見為氣即所謂生物者也清明通達無象可見為神即所謂流行者也易謂周易所以論天道者也補訓此節全於二氣絪緼處見太和故兩提絪緼字而溯原於性是上一層中庸以鳶飛魚躍言道之費是即氣化上見道張子以太和謂道亦此意太和句是冐語浮沉升降總是動靜相感宜總承上六字絪緼是氣之凝結鼔盪處相盪則有勝負屈伸幾微言其細易簡言其妙廣大横説堅固𥪡説起知二句補注與上分流行生物此生物即從上流行處見非截然兩項有形者氣無形者神神在氣中重神邊補注以氣承生物神承流行未確流行生物總是散殊之氣而皆有清通之神在其中不如云云反言以繳上文華注中涵句是就已發中指其未發之體而言是生二字從中涵來絪緼相盪勝負屈伸總不外浮沉升降動靜惟中涵其性是以為生之始愚按此節大意本易太和字以氣化明道也太和即太虚之第二層中涵之性帶第一層言之語意云人之言道者亦知所謂道乎吾謂太和之氣即所謂道也所謂太和者蓋中涵夫浮沉升降動靜相感之性以為之體於是生夫二氣絪緼相盪勝負屈伸之端以為之用就其用之流行者言之其初來也幾微易簡而不可見其究極也廣大堅固而不可窮就其流行者之功用言之則始之有感必通而無阻難者即乾道乎呈造化之法而不煩力者即坤道乎總而言之凡兩間之内散為萬殊而有象可見者為氣清明通達無象可見者為神神即太和太和即道也倘不如野馬而絪緼相盪不足謂之太和而道於何見乎凡語道者知此太和謂之能知道學易者見此太和謂之能見易不如是雖有周公之才之美其智不足稱矣信乎語道者不可不深體乎太和也先儒言氣之詳莫如張子如此節以太和言氣而一氣字中又層層分析言之首句總提起以下詳其義中涵句是太和上一層未有此氣先有此理也是生句方説到太和既有此理即有此氣之機也然尚未及其流行處其來二句乃就流行處言乾坤易簡又即流行者之功用言之乾坤者陽健陰順之氣而天地之形與天地生物之理皆在其中此四句乃太和正位蓋其來其究是𥪡説其流行者起知效法是於流行中横分其對待者當分兩層串説而非二事散殊二句總上四句意仍挽到太和蓋物之濁而有迹者皆氣氣中之清而無迹者為神神即太和之謂也此雖非截然有許多層次可分實確然有數層道理可言而總之見太和之無不在也故曰不如野馬絪緼不足謂之太和絪緼内該得浮沉升降勝負屈伸意在末言道應上所謂道並及易者以太和字出於易也與太極圖説篇末大哉易也義同太和謂道與一陰一陽之謂道大意相似亦精於狀道之詞但只就氣言而未及理之不雜乎氣者故朱子謂與發而中節之和無異玩語意正以太和為道補注謂太和是氣所以然者乃是道未免多作斡旋矣中涵與是生作對補訓承上句謂道中所涵非是其來二句猶周子發微不可見充周不可窮之意幾微易簡者氣之始動如復之一陽初生是也廣大堅固則以其充滿盛大者言之凡氣之凝形成象為天地為人物者皆是也起知於易二句以大易篇所謂無體感速不煩施普者觀之則張子㸔知字與本義微異諸家多泥舊義未是散殊可象所包甚廣凡天地之化風雨露雷幽明寒暑之類天地間山川人物之類有迹可見者皆是即後所謂反清為濁者也不可象亦有二意幾微易簡時固不可見即廣大堅固時而不可見者自在即後所謂清則無礙無礙故神者也知此則幾微易簡廣大堅固與起知於易效法於簡原非二事補注以散殊二句分承流行生物固未確矣然補訓知以流行生物兼氣與神而亦未能確見神之即太和也大抵諸家各有短長故節錄其説而為辨之如此太虚無形氣之本體其聚其散變化之客形爾至靜無感性之淵源有識有知物交之客感爾客感客形與無感無形惟盡性者一之朱子曰客感客形與無感無形未免分截作兩叚事聖人不如此説只説形而上形而下而已發明此節論氣而合之人氣有無形客形人有無感客感程子所謂體用一原顯微無間非有二也人知體虚空為性又知本天道為用斯一之矣補訓夫太和不離太虚太虚之始無有形狀乃氣之本體然也及氣之呈露則有形矣然其聚其散不過此變化之客形耳非常形也其在人則至靜而無所感觸乃性之淵源也及性之發動則有感矣然其有識有知不過物交之客感耳非常感也此客感客形與無感無形原非有二人自溺於客感客形而昧之惟盡性之聖人乃能以無感無形御夫客感客形而合一無間也本來無形即是本體猶云氣之起根原無形也有聚有散即是變化客對主言無形是主有形是客靜是主感是客雖分客主不可相無盡性者一視之盡性即能體道故以盡性兼綰氣一邊識淺知深交自外來感自内動李註周子謂之太極而張子謂之太虚者太極如性字太虚如靜字太極如中字太虚如未發字人生而靜天性具焉非以靜為性也喜怒哀樂未發而中存焉非以未發為中也太虚無形而無極之真在焉非以太虚為太極也張注有無皆道寂感皆性無所謂客也言體用可耳下客字太險愚按此節首句即太虚第一層正義也聚散變化又言及第二層無形即上中涵之性變化客形即上所謂浮沉升降動靜絪緼勝負屈伸也至靜無感即人心之太虚無形物交客感即人心之變化客形也然有無虚實通為一物者性也故曰盡性者一之蓋虚靜之中事物之理無不具必事物各盡其道而後無形無感者克全其體此能一之義也諸家以太虚太和分體用蓋以第一層與第二層對言也無形處即是氣之本體李注謂太虚無形之中氣之本體存焉即太極也無形本體説作兩層不免混入程朱甲裏非張子本意又張子言性與神處俱以性屬第一層神屬第二層觀末篇感者性之神性者感之體等語可見補注皆以為氣之體亦未確太虚之義分三層足以貫之而其立言不一皆當隨文體認細玩篇中之意惟由太虚有天之名合虚與氣有性之名此若必以理言之方可通然亦張子所見止至太虚而止若遂以為生物之理之盡乎此也者而實未盡也故朱子雖亦以理字釋之而亦謂其生受辛苦聖賢便不如此説蓋非理字不足為言而直以理字代之則不可也若太虚不能無氣萬物不能不散而為太虚氣之聚散於太虚太虚為清萬象為太虚中所見之物此類如以理字訓之則將謂萬物散而為理氣之聚散於理萬象為理中所見之物於説通乎又如太虚無形虚空即氣虚能生氣氣坱然太虚太虚妙應之目氣本之虚則湛此等直以氣言似未盡而亦何可直以理字代之也皆當得其言殊而意不悖處大抵張子所論與程朱宜各為一説朱子稱康節於那陰陽相接處㸔得分明與周程小有不同正蒙論氣處亦宜如此天地之氣雖聚散攻取百塗然其為理也順而不妄氣之為物散入無形適得吾體聚為有象不失吾常太虚不能無氣氣不能不聚而為萬物萬物不能不散而為太虚循是出入是皆不得已而然也然則聖人盡道其間兼體而不累者存神其至矣彼語寂滅者往而不反狥生執有者物而不化二者雖有間矣以言乎失道則均焉徵引易繫辭下傳之十二章愛惡相攻而吉凶生遠近相取而悔吝生華注此明體用之一原也因上章無形客形似説作兩層故申言之補訓夫天地者積氣之區也天地之氣雖其為聚散為攻取塗轍有百然其為理也皆順其自然而無偽妄所以然者氣之為物散則入於無形而非滅也適得吾之本體本體固如是其無形耳聚則彰於有象而非增也亦不失乎吾之常然吾常固不嫌於有象耳始之太虚非真虚也不能無氣以充之既有氣不能不聚而為萬物所以聚為有象也萬物不能不散為太虚所以復散入無形也循是二者一出一入出則有象入則無形是皆理之自然不得已而然所謂順而不妄者也聖人盡道於天地之間能以寂然不動體其無形而恬如以感而遂通體其有象而秩如兼體二者而一無所累所存於中而神妙不測者蓋極其至矣即所謂盡性者能一之也彼異端專語寂滅者但云一往而不復返是知散而不知聚若狥其生而執所有者又狥於物而不知變化是知聚而不知散二者雖有間而皆昧於自然之理其為失道則均焉信乎惟聖人為盡道也前四句提起氣之為物以下至而然也是申明前四句之意因言聖人盡道並及異端失道聚散平言聚為萬物散為太虚攻則散取則聚攻取只貼聚散説順字與不得已相照應順其自然便無妄適得猶言恰合也出屬聚入屬散道字應理字其間應天地字存神借用孟子所存者神而意不同謂所存於己者神妙不測合聚散為一致也有間只是有分别不必辨其優劣李注上言盡性者能一之此言盡道者兼體之盡性則能體道意互相發寂滅者異端之蔽狥生者百姓之愚愚按此節太虚不能無氣即太虚之第一二層物不能不散而為太虚即太虚之第三層也順者行其自然不妄者實然而無偽也氣之為物五句聚散對言太虚以下逓言之總見虚氣之未嘗相離也故以兼體不累歸之聖人寂滅執有李注分異端百姓為允末篇亦多以異端俗學並言而其所謂梏於聞見引取於耳目者正狥生執有之實耳聚亦吾體散亦吾體知死之不亡者可與言性矣李注又申適得吾體不失吾常之意補訓夫氣之有聚散在人不可二視也聚亦吾本體之不失其常也散亦吾本體之適相得也夫散則幾於亡矣然散亦吾體是死而不亡也能知死之不亡者乃可與言性矣吾體即謂氣體非謂身體氣散於人身仍在天地之間即死而不亡集解性即太虚之道不亡者即此道也非謂吾死猶有精靈不亡如佛氏所云也此等處皆湏精别蓋以其强探力索所得故言有此未瑩者耳愚按散亦吾體乃太虚第三層正義也既以太虚立言其歸結必至於此正其立論不能無弊處然所謂死之不亡即末篇形潰反原游魂為變意正以此明輪廻之妄非反拾其殘瀋也宜善㑹之知虚空即氣則有無隱顯神化性命通一無二顧聚散出入形不形能推本所從來則深於易者也若謂虚能生氣則虚無窮氣有限體用殊絶入老氏有生於無自然之論不識所謂有無混一之常若謂萬象為太虚中所見之物則物與虚不相資形自形性自性形性天人不相待而有陷於浮屠以山河大地為見病之説此道不明正由懵者畧知體虚空為性不知本天道為用反以人見之小因縁天地明有不盡則誣世界乾坤為幻化幽明不能舉其要遂躐等妄意而然不悟一陰一陽範圍天地通乎晝夜三極大中之矩遂使儒佛老莊混然一途語天道性命者不罔於恍惚夢幻則定以有生於無為窮髙極微之論入德之途不知擇術而求多見其蔽於詖而陷於淫矣徵引老子去用篇天下萬物生於有有生於無象元篇人法地地法天天法道道法自然虚心篇道之為物惟恍惟惚後漢書桓帝宫中立黄老浮屠之祠易繫辭上傳之五章一陰一陽之謂道四章範圍天地之化而不過又云通乎晝夜之道而知本義通猶兼也晝夜即幽明死生鬼神之謂二章六爻之動三極之道也本義三極天地人之理三才各一太極也釋氏金剛經一切有為法如夢幻泡影補訓此節意在合虚與氣見人不可專認虚空為性而以形氣為輕也夫虚空與氣不容二視也知虚空之即氣則凡為有無為隱顯與夫神化性命皆通一而無二矣但其聚而出則有形散而入則無形人遂二視之能推本其所從來而知虚空即氣則深明於易學者也若謂虚空能生出氣來則虚無窮盡氣有限量是體用不齊相去殊絶入於老氏有生於無自然之論而不識所謂有與無混合為一之常道矣若謂萬象森然皆為太虚中所見之物則物與虚分為二不相資藉形自為形性自為性形而為人性本於天兩不相待而有陷於浮屠氏以山河大地為見病之説矣蓋此虚空即氣之道不明正由昏懵之人畧知體虚空為性不知本天道陰陽以為用反以人見之小因縁以論天地之大其明有不盡則誣世界乾坤為幻化是其於幽而虚明而氣不能舉其至要遂躐等妄意而為此一偏之論耳豈知世界乾坤皆有實理而非幻化乎總之人惟不悟一陰一陽之道足以範圍天地通乎晝夜而為三極大中之矩遂使吾儒與釋氏老莊混然出於一途凡語天道性命者不誣罔於釋氏之恍惚夢幻則定以老氏之有生於無為窮髙極微之論其於入德之途不知擇術而求之多見其蔽於二氏之詖辭而陷於二氏之淫辭也豈不惜哉知所從來虚空即氣則易理盡於是故曰深於易下文一陰一陽數句應此易字浮屠者佛氏之號浮屠以山河大地有可見而為病患湏寂滅無形方無係累也華注此虚空即氣四字為一章之主有無隱顯以氣言神化性命以理言推本所從來意重在推本聚所從來欲人識虚空即氣也老佛皆岐有無隱顯神化性命而二之而老氏之旨則崇無黜有佛氏之旨則視有皆無大同小異總是畧知性而不知用也儒者知得用處俱是實理故於日用倫常間一一理㑹用功此正入德之途而二氏一切去之所以為詖淫也發明太虚不能不聚聚不能不散聚即散之從來散即聚之從來即氣即虚更無别處從來虚能生氣生字與周子動而生陽靜而生陰之生不同周子只言有此次第老氏之生則是以此一物生彼一物截然分作兩件佛氏謂萬象為太虚中所見之物則是太虚反被萬象累了所以遂為見病此皆誤認所從來也愚按此總太虚三層之意而言虚與氣之非二蓋為虚無之學者發也首八句為一節之冐下二段分舉言性道者之謬此道不明以下雙承上二段而申所以陷入佛老之故不悟以下又承上段而申言不知天道為用之意玩通節語意皆指人之語性道者諸家謂直闢二氏尚體貼未細補訓欲以懵者數句專歸釋氏亦於文勢未合虚空即太虚虚空無形者皆氣之充塞故曰虚空即氣也隱與無貼虚屬第一層顯與有貼氣屬第二層性以太虚之體言即上節可與言性之性神以太虚流行之妙言即首節清通之神性與命對神與化對命是性之流行化是神之發用以性與神對則性屬第一層神與命與化皆在第二層内觀末篇各節自見體體貼本推本也以人見之小因縁天地即後大心篇所謂以心法起滅天地以六根之微因縁天地者也一陰一陽氣也而天地之道幽明死生鬼神之理皆不外此故曰三才大中之矩曰天地晝夜又曰三極上分下合只是一意友人宋子鋭臣曰張子亦是以虚空為性而異在以天道為用氣坱然太虚升降飛揚未嘗止息易所謂絪緼莊子所謂生物以息相吹野馬者歟此虚實動靜之機陰陽剛柔之始浮而上者陽之清降而下者陰之濁其感通聚散為風雨為雪霜萬品之流形山川之融結糟粕煨燼無非教也徵引易絪緼見首節又乾卦彖雲行雨施品物流形莊子野馬以息相吹見首節又天道篇君之所讀者古人之糟粕已夫注糟酒滓也糟爛為粕禮孔子閒居風霆流形庶物露生無非教也朱子曰坱然太虚此張子所謂虚空即氣也蓋天在四畔地居其中減得一尺地遂有一尺氣但人不見耳此是未成形者及至浮而上降而下則已成形者若融結糟粕煨燼即是氣之渣滓要之皆是示人以理問言機言始莫是説理否曰此本只是説氣理自在其中一動一靜便是機處問始字之義如何曰始是如生物底母子相似萬物都從這裏生出去升降飛揚便合這虚實動靜兩句虚實動靜陰陽剛柔者便是這升降飛揚者為之非兩般也無非教也教便是説理禮記中天道至教聖人至德與孔子予欲無言天地與聖人都一般精底都從粗底上發見道理都從氣上流行雖至粗底物無非是道理發見聖人與天地皆然此等言語都是經煅煉底語須熟念細㸔或問此一段是造化之初否曰即今便是如此補訓此節極言氣末無非教結到理上坱王逸云霧昧貌説文塵埃也霧塵皆是借形只是氣充滿意陽升陰降陰升陽降皆有飛揚意集釋上下曰升降行四方曰飛揚亦非確解息即鼻息吹猶呼吸也凡天地間虚實動靜陰陽剛柔皆氣之為以其所由發謂之機以其所由成謂之始隨遇而有聚有散風雨雪霜内皆有聚散集釋散為風雨聚為雪霜亦未確融合也結聚也並言山川不必謂川融山結釀者有糟粕㸑者有煨燼皆謂渣滓至小者也教無所主當屬之天氣本非教氣有至理即為教也集解氣坱然太虚言氣之坱然者即太虚也升降飛揚未嘗止息是時也雖未有虚實動靜陰陽剛柔之形而其機其始實在於此此自其未有天地萬物之前以明其所以為天地萬物者之理已具所謂體用一原也浮而上者陽之清天以開也降而下者陰之濁地以闢也天開地闢又由是而陰陽二氣感遇聚散為風雨雪霜萬品山川糟粕煨燼無非教也此自其既有天地萬物之後以明太虚之理又無不因物而寓所謂顯微無間也補注坱然太虚語其體也升降飛揚未嘗止息是其用也華注虚實動靜之機是氣之妙用其理即所謂繼之者善也陰陽剛柔之始是氣之所成就其理即所謂成之者性也愚按此當與首二節㕘㸔坱然太虚即無形之本體也為第一層坱然即指太虚而言言氣之坱然者本太虚無形也升降飛揚未嘗止息即太和之清通不可象者也為第二層浮清降濁以下以屬於天地人物者言即所謂虚實動靜陰陽剛柔者也皆在第二層内一説此節無第一層意氣坱然太虚三句皆屬第二層謂坱然於太虚中也竊謂朱子於通節分三層補注又以首三句自分體用所論更細似得張子本意竊嘗論之曰夫有理而後有氣有氣而理即乘之故理為體而氣為用此諸儒所共言也由張子之言則氣自有氣之體氣自有氣之用而氣之體用又各自有體用之可分焉此非諸儒所共言而張子所以發前人之未發者也可得聞乎曰陰陽兩端循環不已立天地之大義者氣之體也游氣紛擾合而成質生人物之萬殊者氣之用也然則何以言體之體體之用曰坱然太虚者渾然無朕之本體乎升降飛揚者相摩相盪之大用乎此在未有天地人物之先湛然而無形者也無形者皆體也然則何以言用之體用之用曰浮而清降而濁者其對待之本體乎感遇聚散為風雨雪霜者其流行之妙用乎此在既有天地人物之後繁然而有象者也有象者皆用也然則理於何附曰氣之順而不妄不得已而然者即理之所以即氣而存而不雜乎氣者也然則由是而之焉何也曰塞吾其體帥吾其性故得天地之氣為周身之氣而形生焉得天地之理為浩然之氣而性成焉此人之所以可達於天也然則由是而之焉又何也曰理以氣異氣以形殊故理之所得適如氣之所受而賢與愚分人與物判焉形所各具即為氣所由分而人與物分偏全物與物分靈蠢焉此人之所以獨貴於物也然則何以體之曰聖人踐形君子養氣若是者能體之氣聚則離明得施而有形氣不聚則離明不得施而無形方其聚也安得不謂之客方其散也安得遽謂之無故聖人仰觀俯察但云知幽明之故不云知有無之故盈天地之間者法象而已文理之察非離不相睹也方其形也有以知幽之因方其不形也有以知明之故徵引易説卦之九章離為目上傳之四章仰以觀於天文俯以察於地理是故知幽明之故十一章法象莫大乎天地上傳之五章成象之謂乾效法之謂坤朱子曰象是未成形之意法是一成已定之物或問朱子曰離明何謂也曰此説似難曉有作日光説有作目説㸔來只是氣聚則目得而見不聚則不得而見易謂離為目是也形之時其幽之因已在此不形之際其明之故已在此聚者散之因散者聚之故補訓此以幽明字駁有無字闢老氏有生於無之説也離明字不重只是説可見不可見離明謂目之明所能見也聚將復散暫見故為客此便伏幽之因散將復聚而有形故不可謂之無此便伏明之故文理即天文地理與天象地法是一非二華注盈天地四句申氣聚則離明得施四句意方其形也四句申方其聚也四句意補注二察字不同下察著也天文地理上下昭著也張注謂之幽明則顯仁藏用其理具在謂之有無則截然彼此竟分二見矣愚按此與下節大意皆明虚空即氣之意而此以幽明駁有無之説也曰客曰無本上太虚無形一節而言語意云世所以有有無之見者以目之所見論之耳不知氣聚則目可見而有形氣不聚則目不可見而無形其有形也特暫來而即去耳非真有也安得不謂之客其無形也形散而氣自在特離明不得施耳安得遽謂之無易言聖人之仰觀俯察而但云知幽明之故不云知有無之故由此故也夫氣之聚散何以必用離明蓋盈天地之間者地之法天之象而已其文理之昭著固非離不相覩也然方其形而為明也有以知其幽之因已在此方其不形而為幽也有以知其明之故已在此而謂可以有無言乎哉宜作兩截㸔上八句即有無隱顯通一無二意聖人三句引易成語以証之盈天地之間以下正申明上半節意知幽之因知明之故亦大槩論理如此非論聖人之事也補訓謂上截言幽明之故下截言聖人知幽明之故文義未合氣之聚散於太虚猶冰凝釋於水知太虚即氣則無無故聖人語性與天道之極盡於參伍之神變易而已諸子淺妄有有無之分非窮理之學也徵引易上傳之十章參伍以變錯綜其數本義參者三數之也伍者五數之也謂揲蓍求卦之事集解此只是明虚氣合一之意言氣之聚散即太虚之所為則太虚非離氣而入於渺茫者矣故知此則無無蓋不以無視太虚之理也氣之往來升降為參伍其理則兩在而不可測所謂神也神即在參伍之間故曰參伍之神聖人言性與天道之極如曰一陰一陽之謂道曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義是聖人言性與天道之極致不過盡於參伍之神所流行變易者而已未嘗於陰陽參伍變易之外别求一端虚無懸空不着於氣者以為性與天道也安得有有無之分哉愚按此節大意以聚散駁有無之説也語意云夫氣與虚豈二物乎氣之聚而有形散而無形皆太虚所為虚與氣非有二也猶冰之凝而為氷釋而為水皆不外於水水與冰非有二也知太虚即氣而非二則不可以虚為無矣故聖人語性與天道之極致亦不過即陰陽參伍之神變易不測者盡其理而無餘已老釋諸子識見淺妄乃以虚與氣謬分有無蓋不能窮聚散變易之理而陷於詖淫者也烏足信乎參伍之神謂陰陽也變易即謂參伍之神蓋陰陽二氣陰變為陽陽變為陰往來變化不可窮詰故曰參伍之神耳無無下無字指太虚言與下有無無字相應以闢二氏有生於無等語也聚散字止就氣言即前節其聚其散之云乃客形變化之小聚散非萬物復聚為太虚之大聚散也諸家謂氣散歸虚與下參伍變易之義不合而理亦未瑩又此性字指太虚之體言亦與論語異旨太虚為清清則無礙無礙故神反清為濁濁則礙礙則形程子曰一氣相涵周而無餘謂氣外有神神外有氣是兩之也清者為神濁者何獨非神乎問太虚之説本是説無極却只説得無字朱子曰無極是該貫虚實清濁而言無極字落在中間太虚字落在一邊了便是難説聖人熟了説出便恁地平正而今把意思去形容他却有時偏了明道説氣外無神神外無氣謂清者為神則濁者非神乎後來亦有人與横渠説横渠却云清者可以該濁虚者可以該實却不知形而上者還他是理形而下者還他是氣既説是虚便是與實對了既説是清便是與濁對了髙注此言清濁形神之别欲人存神而不囿於形也補注太虚為清清則無礙是陰陽兩端循環不已者也反清為濁濁則礙是游氣紛擾合而成質者也蓋反清為氣之渣滓神化之糟粕故濁愚按此與下節皆太虚之第二層也前謂之太和者以其氣之流行而統言之此謂之太虚者以其氣之清通而析言之其實一也此篇首節以氣與神對次節以本體與客形對天地之氣節以聚與散對而此節尤為著明蓋神無不在而必屬之清者猶性無不在而於喜怒哀樂未發時尤易見也張子又自謂虚可該實清可該濁者自人物未生之始以及人物既生之後而太虚皆統貫而行乎其中故言雖對而意自串如言喜怒哀樂未發而喜怒哀樂之情實無不具於其中也然以神字截斷在清一邊説終是偏處蓋纔言太虚便已不能不與實對纔言清便已不能不與濁對以形下之氣而况形上之理固宜其不能盡也若程朱所言則天地之間清濁皆氣而理宰其中故鳶飛魚躍花落鳥啼處處皆道即處處皆神何嘗離而二之乎語意云夫人亦知神與形所由分乎湛然太虚者為氣之至清清則虚明通逹而無所滯礙無所滯礙故神妙而不可測若清之反為氣之濁濁則凝聚而有所滯礙有所滯礙則局於形是二者不可相無也然則蔽於形而不能存神與遺形以求神者皆可以返矣篇内清濁聚散字太虚為清之清濁以太虚與萬有對氣不能不聚而為萬物之聚散以萬物與太虚對此氣之大清濁大聚散也浮而上者陽之清之清濁以天地自相對其聚其散氣之聚散於太虚之聚散以客形之變化者自相對舉一事之清濁聚散而言也亦皆湏知其不同處凡氣清則通昏則壅清極則神故聚而有間則風行而聲聞具達清之驗歟不行而至通之極歟集釋此發明太虚為清以下之意補訓更即氣推言之凡氣合太虚而清則通反太虚而昏則壅塞而不通若清極則不但通而且神妙不測矣故氣之聚而有間隙以通之則風行而其聲聞具達非清則通之驗歟且不見其行之迹而無所不至豈非通之極而神歟即風而凡氣可知矣有聲可聞故曰聲聞具達者無所不達也不行而至仍以風言由太虚有天之名由氣化有道之名合虚與氣有性之名合性與知覺有心之名朱子曰本只是一箇太虚漸細分得密耳且太虚便是四者之總體而不離乎四者而言由氣化有道之名氣化是陰陽造化寒暑晝夜雨露霜雪山川木石金水火土皆是只此便是太虚但雜却氣化説雖雜氣化説而實不離乎太虚未説人物各具當然之理處合虚與氣有性之名有這氣道理便隨在裏面無此氣則道理無安頓處如水中月湏是有此水方映得月心之知覺又是那氣之虚靈底聰明視聽作為運用皆是有這知覺方運用得這道理所以張子説人能𢎞道是心能盡性非道𢎞人是性不知檢其心邵子説心者性之郛郭此等語皆秦漢以下人道不到由太虚有天之名都是箇自然底由氣化有道之名是虚底物在實上見無形底因有形而見氣有形而虚無迹以有形之氣具無迹之理故謂之性也由太虚有天之名合虚與氣有性之名是天命之謂性管此兩句由氣化有道之名是率性之謂道管此一句合性與知覺有心之名此又是天命之謂性這下管此一句補訓此舉天道性心之名不外乎理氣二者而已太虚屬理氣化屬氣氣即陰陽之氣變變化化者也性雖合虚與氣而以太虚之理為主氣在心則有知覺故合性之理與知覺之氣而謂之心心者氣之靈而理所寓者也李注太虚無形氣之本體此天之所以為天也中涵動靜相感之性是生絪緼相盪之始此太和所以為道也虚者性之體氣者性之質此天所以命人之性也性者真精之合知覺者神智之發此人之所以為心也愚按此節首句即太虚之第一層而以為有天之名者蓋造化之初此太虚在造化上㸔既生天地則天地亦即此以生人物其理一耳次句即太虚之第二層所以生人物之具也心性以下則以人之得於天者言從虚説到氣從虚與氣説到人之性與人之心雖天人分言實相叠而下此節孟子盡其心者章朱註採入鬼神者二氣之良能也聖者至誠得天之謂神者太虚妙應之目凡天地法象皆神化之糟粕爾徵引糟粕見坱然太虚節法象見離明得施節朱子曰伊川謂鬼神者造化之迹却不如横渠所謂二氣良能蓋程説固好但只渾淪在這裏張説分明便見有箇陰陽在問良能之義曰只是二氣之自然者耳屈伸往來是二氣自然能如此補訓此以下言陰陽二氣之妙用而此節兼言鬼神聖神當重二氣良能與太虚妙應聖者是襯貼語二氣良能中即有太虚妙應之神太虚妙應即是神化世所謂鬼神者非他也即二氣之良能二氣之外無鬼神也所謂聖者非他也即至誠得乎天道之謂天道之外無聖也所謂神者非他也即太虚妙應無窮之目太虚之外無神也夫神化超乎法象之外凡天地法象皆神化之糟粕其粗迹可見者耳鬼神對言陰陽屈伸之分也屈伸往來皆自然而然故曰良能神者非鬼神之神只是神妙意猶易言鬼神之情狀而又言神無方也聖人至誠旡妄得天之道與時消息亦自然而然也上言鬼神而以至誠得天言聖亦見聖之契合鬼神處天地間之有法有象皆神化之糟粕當於糟粕認神化無徒見糟粕而遺神化也張注二氣之良能此語極精蓋鬼神不專屬氣比二氣又精是理氣接縫之際也朱子謂伊川不如横渠説得好蓋伊川只説得鬼神後半截事只在天地功用上見之横渠則直究其性情合理與氣而為言也集解得天者與天為一也無在而無乎不在無為而無所不為故謂之妙應愚按妙應太虚之第二層也就用處言故言妙應補訓謂神者非即鬼神之神固是然言神化則神在其中言神則鬼神在其中矣曰二氣良能曰太虚妙應非即神化而何友人宋子鋭臣曰鬼神兩而化也神者一而神也糟粕即體物之物也天道不窮寒暑已衆動不窮屈伸已鬼神之實不越二端而已矣李注申上條二氣良能之説集解天道之所以不窮寒暑推遷而已衆動之所以不窮屈伸相禪而已寒也屈也鬼也暑也伸也神也鬼神之所以為鬼神不越此寒暑屈伸二者而已非謂别有一鬼神如佛老所云也張注此段言鬼神之功效即程子所謂天地之功用而造化之迹者也愚按此節雖申上條之説而其義較粗蓋言良能則二氣在其中而二氣不足該良能之義故也兩不立則一不可見一不可見則兩之用息兩體者虚實也動靜也聚散也清濁也其究一而已矣補訓此承上而言二端之本一也諸家多以太極陰陽為説其理固是但張子是論二氣非周子太極陰陽之謂所謂一者言二氣本一耳有兩必有一為之體有一必有兩以為之用如兩不立則一之體無可見一不可見則兩之用亦息所謂兩體者何也如虚與實也動與靜也聚與散也清與濁也皆兩也兩不離一其究歸於一而已蓋二氣實一氣之消長也陽虚陰實陽動陰靜陽聚陰散陽清陰濁集釋以散屬陽聚屬陰非也聚則為有散則為無豈有者為陰無者為陽乎愚按此節上虚下實兩體以下數語正明兩與一之實皆言氣也與太極無渉下節感而後通亦然補訓得之感而後有通不有兩則無一故聖人以剛柔立本乾坤毁則无以見易徵引易下傳之一章剛柔者立本者也上傳之十二章乾坤毁則无以見易本義乾坤毁謂卦畫不立補注此又申明上章之意補訓夫氣必兩者相感而後有其流通之妙如不有兩者相感則無以見一之通矣故聖人作易以剛柔立其本剛者乾也柔者坤也若乾坤毁則無以見易易必有乾坤者所謂兩也有乾坤而變易於是出所謂一也即感而後通之意也剛柔即陰陽聖人以陽陰為作易之本故曰以剛柔立本剛柔立本是正言乾坤毁是反言乾坤毁則無所謂剛柔李注兩者相對方可言感感而能通非一而何故非兩無以立感之體非一無以致通之用所謂兩不立一不可見一不可見兩之用息者此也游氣紛擾合而成質者生人物之萬殊其陰陽兩端循環不已者立天地之大義朱子曰此段專説氣未及言理游氣紛擾此言氣到此已是渣滓麄濁者去生人物蓋氣之用也動靜兩端説氣之本上章言坱然太虚一段亦是發明此意陰陽即氣也豈陰陽之外復有游氣耶所謂游氣者指其所以賦予萬物一物各得一箇性命便有一箇形質此皆氣合而成之也陰陽循環如磨游氣紛擾如磨中出者易曰陰陽相摩八卦相盪鼔之以雷霆潤之以風雨日月運行一寒一暑此陰陽之循環也乾道成男坤道成女此游氣之紛擾也循環不已者乾道變化也合而成質者各正性命也晝夜運而無息便是陰陽之兩端其四邊散出紛擾者便是游氣以生人物之萬殊如麫磨相似其四邊只管層層撒出天地之氣運轉無已只管層層生出人物其中有麄有細如人物有偏有正游是散殊此如一箇水車一上一下兩邊只管滚轉這便是循環不已立天地之大義底一上一下只管滚轉中間帶得水灌溉得所在便是生人物之萬殊天地之間二氣只管運轉不知不覺生出一箇人不知不覺又生出一箇物即他這箇斡轉便是生物時節游氣是氣之發散生物底游亦流行之意紛擾者㕘錯不齊既生物便是游氣若是生物常運行而不息者二氣初無增損也此固是一物但渠所説游氣紛擾合而成質恰是指陰陽交㑹言之陰陽兩端循環不已却是指那分開底説蓋陰陽只管混了闢闢了混故周子云混兮闢兮其無窮兮游氣是裏而底譬如一箇扇相似扇便是立天地大義底扇出風來便是生人物底補訓陰陽只管循環不已自有游氣紛擾生人生物游氣紛擾不礙陰陽之循環不已游訓游散只是動盪意天地之大義以氣化言非以形體言大義猶言天地之道易所謂立天之道立地之道是也張注此段是倒裝文法陰陽循環不已而後有游氣紛擾散出而生人物要㸔這道理明白無如太極圖所云無極之真二五之精妙合而凝等語尤詳細愚按此節大意以氣之立天地生人物者分體用而言之也游氣成質即所謂感遇聚散流形融結者也陰陽循環即所謂升降飛揚浮清降濁者也皆在太虚第二層内然游氣無時不成質陰陽亦無時不流行有體用而非二物日月相推而明生寒暑相推而歲成神易無方體一陰一陽陰陽不測皆所謂通乎晝夜之道也徵引易下傳之五章日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉上傳之四章通乎晝夜之道而知故神無方而易無體五章一陰一陽之謂道又云陰陽不測之謂神補訓日陽也月陰也日月相推遷而明生不窮焉寒陰也暑陽也寒暑相推遷而歲功以成焉其神妙無方所變易無形體一陰繼以一陽一陽繼以一陰陰陽變化不測總而言之皆所謂通乎晝夜之道也推者推去彼而此方來也明生明之相繼生生不窮也神無方易無體不僅日月寒暑上見而即日月寒暑亦可以見矣故接云神無方易無體陰陽不測云云也愚按此節大意即日月寒暑見二氣循環之妙也雖全以易辭成文非注釋之體當分三層首二句舉日月寒暑言之中三句見其神妙不測末句總斷神易之理陰陽變化之妙無時無處不然而即日月寒暑之相推可見故曰此皆通乎晝夜之道也日與暑即晝之道月與寒即夜之道晝夜者天之一息乎寒暑者天之晝夜乎天道春秋分而氣易猶人一寤寐而魂交魂交成夢百感紛紜對寤而言一身之晝夜也氣交為春萬物糅錯對秋而言天之晝夜也氣本之虚則湛本無形感而生則聚而有象有象斯有對對必反其為有反斯有仇仇必和而解故愛惡之情同出於太虚而卒歸於物欲倐而生忽而成不容有毫髪之間其神矣夫徵引莊子齊物論其寐也魂交其覺也形開注司馬云魂交精神交錯也華注承上通乎晝夜之道以明天道人道總不外此天道春秋分至天之晝夜也正明寒暑者天之晝夜意氣本之虚以下又明天地間恩仇愛惡總是陰陽聚散之所為是亦一晝夜也由張子之意推之則人身之一呼一吸一喜一怒以至古今氣運之剝復人事之治亂倐生忽成亦一晝夜也無大無小無久無暫晝夜二字可以畢該而其本皆出於虚其用則著於物欲此物欲字未便是不好字眼神字從循環不已上㸔出二氣本一一故神也補訓春秋分只是説分春分秋非厯之春分秋分也補注太泥夏暑冬寒而云春秋者由春至夏而暑由秋至冬而寒是分春秋而寒暑之氣因以易也魂交交字對易字㸔當為交接之交以寐言則是魂交成夢以寤言亦是魂交成寤百感紛紜是夢境氣交亦是交接之交猶氣易也春固氣交秋亦氣交萬物雜然並生故曰糅錯氣本之虚二句又推上一層本之虚者以太虚為根本也有對而反而仇而和解只照寒暑之氣言較明集解以日月薄蝕男女反目言殊不合相反則惡相合則愛集釋云春生可愛秋殺可惡愛之惡之人心之私愛惡全以人言與上文不聨倐生忽成承上感而生生字來生成渾説集釋分春生秋成亦可但不宜以生成跟愛惡説即此可見寒暑循環無毫髪之間猶晝夜也愚按此節大意皆明天道之神也虚是第一層反仇愛惡以下皆在第二層内重一神字前神字俱以妙應不測者言此重神速意語意云夫天道之神又有可得而言者晝夜者其天之一息乎一晝一夜猶一呼吸之速也寒暑者其天之晝夜乎一寒一暑猶一昏旦之暫也蓋天道分春秋而寒暑之氣變如人之一寤寐而魂以交易人之寐時魂交成夢百感紛紜變幻不一以之對寤而言寐則夜寤則晝是一身之晝夜也天之氣交為春萬物糅錯而生以之對秋而言春則晝秋則夜是天之晝夜也夫氣之本體是為太虚其初亦湛然至清本無形象耳及氣之相感而生則聚而有可見之象既有象斯有對如寒與暑對也有對必反其所為如寒暑相反也有反斯有仇如寒暑之不相容也仇必有以和而解如寒由温而暑至暑由凉而寒至也和解則愛反仇則惡是天道愛惡之情同出於太虚之一本而其後卒歸於物欲之萬殊故其二氣紛擾化育不窮倐而生忽而成不容有毫髪之間斷豈不神妙莫測矣乎故曰寒暑者天之晝夜也首句形起次句天道春秋分以下皆明次句意只以人之寤寐形容天道不以天人並重一寒一暑厯四時而成歲在天道則如一晝夜然便有倐生忽成而極其神意氣本之虚以下又提起一筆而詳推其理言其始本太虚而無形也一至聚而有象則遂有反仇和解愛惡之情紛紜參錯不可窮紀同出於太虚之無形而卒歸於物欲之有迹此數句即見一氣循環神速不測之妙故接云倐生忽成無毫髪之間其神矣夫正應轉天之晝夜句反仇和解愛惡物欲等字皆以人事形容天道愛者相生相合之意惡者相制相克之意物欲云者天道之變化客形如人之有感而動隨物而遷千狀萬態無復本一之體即上象對反仇和解數句意非私欲之謂也倐生忽成又即氣化之生人生物而言生生不息成成相繼神速不測何間之有舊説皆以物欲屬人言故語氣不能一貫李注遂分氣本之虚以下另為一節於倐生忽成句反難安頓矣惟華注畧得其意而以天道人道並言亦誤造化所成無一物相肖者以是知萬物雖多其實一物無無陰陽者以是知天地變化二端而已矣張子語錄人與動植之類已是大分不齊於其類中又極有不齊某嘗謂天下之物無兩箇有相似者雖一件物亦有陰陽左右譬之人一身中兩手為相似然而有左右一手之中五指而復有長短直至於毛髪之類亦無有一相似至如同父母之兄弟不惟其心之不相似以至聲音形狀亦莫有同者以此見直無一同者李注以造化成物之各異知物之各具陰陽以物之各具陰陽知天地變化之不出於陰陽也華注陰陽雖只兩端其感遇凝聚却萬有不齊所以形質各不相肖就其不相肖而益可悟天地之化不外於陰陽也愚按上四句因形之不相肖而知無物無陰陽此在萬殊處説陰陽下二句因物之各具一陰陽而知天地之變化以生物者總不外陰陽二端此方見萬殊之一本意兩以是知字相叠而下舊説於無一物句即謂萬殊一本語氣未合不相肖不但人與物異飛與走異即人之各具一面目肢體飛走之族各三百有六十皆足見其不同蓋就形體言之集釋並及聖愚之異亦非是萬物形色神之糟粕性與天道云者易而已矣心所以萬殊者感外物為不一也天大無外其為感者絪緼二端而已李注易者變化也神者變化之妙也性與天道在其中矣張注心所以萬殊二句此就無主宰之心言之非論心之本體也天下同歸而殊塗一致而百慮何不一之有絪緼二端而已湏知絪緼中便有許多不測道理在愚按此節大意亦明天道之神也語意云夫天道之妙豈有外於神乎萬物之形色氣也而即神之糟粕非能離神以為形也即理之微者莫過於性與天道亦不外陰陽變易之神而已豈有他哉彼人心所以有萬殊而不一者特以物之所感者不同故不能一而神也若天之大而無外其所感者不外陰陽二端絪緼交密而已而有不極其神者乎形色所該者廣凡散殊可象者皆是不專指人言心有萬殊者以人之有心襯起天道之自然也此節舊説皆不得其解惟吾友宋子鋭臣之説得之宋云首二句見氣皆神之所為性與天道二句見理亦不外乎神言神又言易者神無方易無體其實一也惟一故神心不能一故不能得感而遂通之神絪緼則所謂清通不可象而神者也物之所以相感者利用出入莫知其鄉一萬物之妙者歟徵引易上傳之十一章利用出入民咸用之謂之神説卦之六章神也者妙萬物而為言者也華注此節發明神之為妙集解如日月寒暑之推遷人物之終始山川之流峙皆物之相感氣也而其所以相感者理也利用出入往來無礙無所不在而不可測者也故曰一萬物之妙一者貫通之意言其統貫乎萬物而極其妙也補訓引來三句一串下皆是証一神字利用妙萬物固是神莫知其鄉亦只説神不説心物相感而生是生生不窮意非謂此感彼應也利用出入用以出用以入無不利利即神處神無形故莫知其鄉愚按此以首句作一呼下三句作一應神理自明氣與志天與人有交勝之理聖人在上而下民咨氣壹之動志也鳳凰儀志壹之動氣也徵引書堯典洪水滔天下民其咨益稷簫韶九成鳳凰來儀華注此節重在志能勝氣人能勝天上上文屢言陰陽交感萬事萬物皆由之以出入則似聖人無權而不知補救調爕乎陰陽者在人裁成輔相乎天地者在人故以志壹動氣明人定可以勝天也下民咨鳳凰儀舉一以見端補訓氣與志交勝天與人交勝下文只証氣志而天人自見蓋以天配氣以人配志氣壹動志即天定之勝人志壹動氣即人定之勝天也動志動氣是借用語只大槩説集釋以動志為堯之志動氣為鳥獸之氣覺拘蓋水災尚可言氣而作樂難以貼志也愚按氣謂氣數志謂人事拘本旨則難解矣正䝉初義卷一
