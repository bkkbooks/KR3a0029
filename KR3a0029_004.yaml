body:
  text: 正蒙初義卷四邳州知州王植撰神化篇第四補訓此以神化名篇首言天道之神化至氣有陰陽節乃合在人者言之以下多言人之神化雜引易中庸論語孟子之説以暢發其旨愚按此篇凡三十節自首節以下九節皆明神化之理神化者天之良能以下六節多言大與化見幾則義明以下五節多言窮神知化惟神為能變化以下五節多言神與易徇物喪心以下四節多言存神過化末節作總結細分之則其曰窮神知化曰神無方易無體曰過化存神皆神化合言者也曰鼓舞盡神曰知幾其神曰精義入神曰聖不可知謂神與谷神不死皆言神也曰化而裁之曰變則化至誠為能化曰大而化之皆言化也引用多與本旨弗類而經傳所言神化之理大都具是矣觀其言經正言無我而篇末以反經敦化結之談理雖極微妙用功仍以平實為主內精義入神事豫吾內一節朱子入近思録論學神天德化天道德其體道其用一於氣而已徵引易下傳之五章窮神知化德之盛也補訓首節提出神化為一篇之綱意重神化不重氣即氣以見神化也易云窮神知化神與化一而二二而一者也神者天德也化者天道也德其體也道其用也總之一於氣而已化不離氣神不離化皆不外於陰陽也集解神所以主張萬化而運於無形者自其微而言故曰天德又曰體化即此理之發而流行升降變化羣動而不已者就造化之迹上言故曰天道又曰用用所以發其體而體即寓於用之中如日月寒暑之往來草木之榮枯人物之生死皆氣之化而道之所在也道固氣矣而即此是神也神又豈外於氣哉故曰一於氣愚按神與化皆在首篇太和中皆太虛之第二層也宋子鋭臣云首末二篇性與神對則性為體神為用此篇神與化對則神為體化為用須於無層次中分出層次看神無方易無體大且一而已耳徵引易上傳之四章神無方而易無體發明朱子曰神便是在陰的又忽然在陽在陽的又忽然在陰易便是或為陽或為陰交錯代換而不可以形體拘也易説曰神易雖一事方體雖一義以其不測故言無方以其生生故言無體然則易近於化補訓或以易屬大神屬一語氣不合當是神易皆大而又合一也愚按此節大意釋易傳之文以明神化之非有二也上文一於氣之一乃虛活字猶云皆不外於氣此節一是實字謂神與化大而無外且合一而不測也舊説謂即一於氣之一未是趙子彤元云大而天地鬼神風雷雨露小而名物象數日用飲食莫非神化所為故曰大神即化之體化即神之用神即化之微者化即神之顯者體用一原顯微無間故曰一虛明照鑑神之明也無遠近幽深利用出入神之充塞無間也大全明一作靜徵引易上傳之十章無遠近幽深遂知來物十一章利用出入民咸用之謂之神補訓此以神該化也神之明是神神之充塞無間即是化利用出入用字只作以字看虛明無不照鑒乃神之明也體也無論遠近幽深之處利以出利以入乃神之充塞而無間礙也用也化豈外於是哉補注此與前篇凡氣清則通章之意略同愚按虛明照鑒只形容一清字意首篇所謂清通而不可象所謂太虛為清無礙故神者也執著一物説不得天下之動神鼓之也辭不鼓舞則不足以盡神徵引易上傳之二章鼓之舞之以盡神又云鼓天下之動者存乎辭集解辭狀神之言也如曰陰陽不測曰鼓萬物而不與聖人同憂曰神妙萬物曰無為而無所不為無在而無乎不在凡此類皆鼓舞之辭也不如是不足以盡神之狀也愚按此節大意言神而併及狀神之辭也上二句言神下二句乃言狀神之辭辭不鼓舞猶後所謂緩辭不足以盡神也狀神之辭亦大概言補注專言設卦繫辭未是鬼神往來屈伸之義故天曰神地曰示人曰鬼自注神示者歸之始歸往者來之終徵引易下傳之五章往者屈也來者伸也周禮大宗伯之職掌建邦之天神人鬼地示之禮朱子曰説文示字以有所示為義故視字從示天之氣生而不息故曰神地之氣顯然示人故曰示一説一而大謂之天二而小謂之地二而小即示字也天曰神地曰示者蓋其氣未嘗或息也人鬼則其氣有所歸矣補訓鬼神乃神化之一端猶中庸言鬼神為德而及祭祀之鬼神也往則屈來則伸上言鬼神下分天地人天神地示皆神而人為鬼然三者各有往來屈伸不必拘定天地伸而人屈愚按玩自注則天神地示來與伸之義多人鬼往與屈之義多歸往即鬼之謂也形而上者得辭斯得象矣神為不測故緩辭不足以盡神化為難知故急辭不足以體化朱子曰神自是急底物事緩辭如何形容之如陰陽不測之謂神神無方易無體皆是急辭化是漸漸而化若急辭以形容之則不可補訓上云辭不鼓舞不足以盡神因又推衍其義神為不測要極力形容化為難知要曲為形容形而上之神化固無象可見然得其辭斯得其倣佛之象矣言神宜用急辭蓋神為不測緩而不急則不足以盡神言化宜用緩辭蓋化為難知急而不緩則不足以體化未易形容若此愈知神化之妙矣氣有陰陽推行有漸為化合一不測為神其在人也知義用利則神化之事備矣德盛者窮神則知不足道知化則義不足云天之化也運諸氣人之化也順夫時非氣非時則化之名何有化之實何施中庸曰至誠為能化孟子曰大而化之皆以其德合陰陽與天地同流而無不通也所謂氣也者非特其蒸鬱凝聚接於目而後知之苟健順動止浩然湛然之得言皆可名之象耳然則象若非氣指何為象時若非象指何為時世人取釋氏銷礙入空學者舍惡趨善以為化此直可為始學遣纍者薄乎云爾豈天道神化所同語也哉徵引易下傳之五章精義入神以致用也利用安身以崇德也又云窮神知化德之盛也六章陰陽合德説卦之七章乾健也坤順也震動也艮止也朱子曰神化二字雖程子説得亦不甚分明惟是橫渠推出來曰推行有漸為化合一不測為神又曰一故神兩在故不測兩在者或在陰或在陽在陰時全體都是陰在陽時全體都是陽化是逐一挨將去底一日復一日一月復一月節節挨將去便成一年這是化問象若非氣指何為象時若非象指何為時曰且如天地日月若無這氣何以撑住得成這象象無晦明何以别其為晝夜無寒暑何以别其為冬夏發明化有節次故曰推行有漸神無定在故曰合一不測義者宜也於此為宜於彼不宜無定形而有定理者也知者將此理貫穿心中可以待用神之事也以義制用任他千變萬化改頭換面出來信手應副如利刀快劍相似故曰利用化之事也義字搭在知上又搭在用上此不過大人之事可以思勉力至者德盛即由知義利用而造其極也窮神是窮盡神妙處不思而得故曰知不足道知化則屈伸通變由義而行非行義也故以義利用不足云天之化日月寒暑往來一陰陽之運而已人之化進退存亡得喪一順時消息而已德合陰陽即能順時者也陽健陰順陽動則陰止陰動則陽止充塞無間浩然者也虛明照鑒湛然者也此皆氣之可以得名而得象者若非健順動止之氣何所指以為象非氣之可象何所指以為時此正見神化一於氣而已之意銷礙舍惡亦是化之一事但天道神化無方無體此何足以語之補訓張子本易以為言知義即精義利用即利用安身之利用德之盛者更進一層此神化就人事言非謂知陰陽神化健順動止亦借用易語而意不同銷礙舍惡皆遣纍意薄猶略也略知有化意也補注天之化也以下不言神者蓋神隱於中化見於外而天人之所以化即所謂神也集釋蒸鬱者氣之始凝聚者氣之成蒸鬱凝聚氣之粗者浩然湛然氣之清者浩極其大湛極其清愚按此節大意又以天之神化與人之神化並言也神化一於氣已見首節此又以時字配之語意云夫氣有陰有陽陰陽之推行有漸即為化陰陽之合一不測即為神天道固如是也其在人也能知義以利用則神化之事可備於身矣然非其至也至於德之盛者能窮神則知義之知不足道能知化則利用之義不足云矣即此可見天有化人亦有化天之化也運諸氣以為流行人之化也順夫時以為變化天非氣人非時則化之名於何有化之實於何施乎考之於古如中庸云至誠為能化孟子曰大而化之所謂化者皆以其人之德合陰陽與天地同流而無不通也豈非順夫時之謂歟若所謂氣也者非特其蒸鬱而凝聚有形象之接於目而後知之苟其健順動止有浩然湛然之可言者皆象之可為指示者耳然則氣之可見者即為象象若非氣指何者為象象之流行者即為時時若非象又指何者為時信乎天之化運諸氣也世人但取釋氏之銷礙入空學者之舍惡趨善以為化此只可為始學遣去物纍者淺乎言化之義云爾豈可與天道之神化同日而語哉苟知化之妙則神不外是而推行合一之理可識矣首三句言天道之神化其在人也以下六句言人之窮神知化天之化也二句又為下半節之綱中庸以下正明順夫時意德合陰陽天地同流則順時之實也氣也者以下明運諸氣意象與時只是發明氣字非有兩意時若非象指何為時二時字以天言與上言人之順時者頗異諸家有與上時字牽合者反難安頓銷礙入空猶言由有入無即氷銷雪化之化言之出於釋氏者也舍惡趨善即變化氣質之化學者所恆言也此特以人之淺乎言化者形容神化之化非為辨聖人學者之深淺與聖學異端之邪正也舊以闢異端為説亦非本意節首三句易窮神知化節本義採入變則化由粗入精也化而裁之謂之變以著顯微也谷神不死故能微顯而不掩徵引易上傳之二章化而裁之謂之變老子谷神不死發明此言化本於神即後章惟神為能變化之意變則化變是化之漸化是變之成如昨日是夏今日立秋為變到那全然天涼無一些熱為化變粗化精也化而裁之謂之變則化又是漸如正月一日漸漸化至三十日至二月一日則是正月變為二月矣化微變著也顯微謂顯其微也下云微顯則即中庸微之顯也不死謂造化屈伸古今不息髙注變有形化無迹故曰由粗入精化而裁之者如一歲之化裁作四時之變以變顯化也皆神之所為故至微至顯昭著而不可掩谷神即虛空之神前言谷神有限此又借谷神以明神也愚按此通以天之神化言引中庸語難拘本旨末句微當兼上精與微顯當兼上粗與顯鬼神常不死故誠不可掩人有是心在隱微必乘間而見故君子雖處幽獨防亦不懈徵引老子成象篇谷神不死張子經學理窟氣質篇學者有息時一如木偶人撁搐則動舍之則息一日而萬生萬死學者有息時亦與死無異是心死也身雖生身亦物也天下之物多矣學者本以道為生道息則死也終是偽物當以木偶人為警以自戒華注誠不可掩在天地與在人心一而已矣故慎獨所以立神化之本愚按此節大意即鬼神之不死而勉人以慎獨鬼神亦神化之義感而遂通即人心之神也語意云凡物有息則死矣鬼神虛明昭著無一息之停而不死故其屈伸往來之實理顯然而不可掩也人有是心雖寂然不動然感之即通觸之即覺在隱微必乘間而見是人心與鬼神同一不死也故君子雖處幽獨必戒慎恐懼而防維不懈蓋恐其或息而遠於天道之神焉耳此節舊説皆誤惟豫友宋子鋭臣之説得之宋云此節自重不死字鬼神惟無一息之停故誠不可掩人有是心在隱微必乘間而見是言心之自然原與鬼神同其不死但一息有懈則死矣君子不懈所以求合於鬼神之不死也神化者天之良能非人能故大而位天德然後能窮神知化徵引易乾卦文言飛龍在天乃位乎天德補訓此節以神化説起而意重在窮神知化易是言大人有天德而居天位張子只重天德上集解神化者天道自然之妙非人思勉之所能及故必大而位天德德盛仁熟而化焉然後能窮神知化與天合一華注位天德者雖人能而實無異於天之良能也故能窮神知化大可為也大而化不可為也在熟而已易謂窮神知化乃德盛仁熟之致非智力能強也補訓大而化與知化之化不同然其理一也化不可為在乎熟窮神知化在乎德盛仁熟其理亦一也上下相形只是一意化是不可用力處徐以聽其自至故在熟張注窮字知字是到頭語不是工夫字面下一熟字正是張子引人塗轍處非空懸一至髙之簾使人得假借為絶學之説以荒之也愚按自此以下十節大意皆明化不可為神不可知之意此引易以證孟子見學之在熟也語意云孟子言大而化之夫大可以人力為也大而化不可以人力為也在於熟而已不觀易之言窮神知化者乎易言窮神知化乃德盛仁熟而致之非智力所能強也不至於熟而言化不亦異乎易之所謂哉首三句孟子大而化之節朱注採入大而化之能不勉而大也不已而天則不測而神矣補訓此融會孟子大而化聖不可知二句意不測即聖不可知之意大而化之者非徒大也能不勉而大也如是不已而純乎天德則不測其妙而神矣蓋神乃化之所致也先後天而不違順至理以推行知無不合也雖然得聖人之任者皆可勉而至猶不害於未化耳大幾聖矣化則位乎天德矣徵引易乾卦文言大人者先天而天弗違後天而奉天時補訓此言大與聖之分上言神此言聖聖神一也皆化之所為易云大人先後天而不違所以不違者蓋天者理而已大人惟順理以推行故知其無不合也何違之有雖然能得聖人之任者皆可勉力而至於不違之地而猶不免於未化耳大而未化僅幾於聖若化則位乎天德而聖矣此大與聖之分也合即不違得聖之任只是能以聖人為己任不必指伊尹説不害猶云不免易言大人張子以為未化亦是斷章取義位天德只是造到有天德地位大則不驕化則不吝程子語録問大則不驕化則不吝二語如何曰若以大而化之解此則未是然大則不驕此句却有意思只為小便驕也化煞髙不吝不足以言之補訓此申明大化之意而借論語驕吝以明之華注不驕者志氣已極深靜然猶有意不吝則過化存神無所留滯全無心矣驕吝字俱要看得細無我而後大大成性而後聖聖位天德不可致知謂神故神也者聖而不可知徵引易上傳之七章成性存存本義成性本成之性也補注無我私意盡去也成性天理渾然也聖位天德與天合德也發明羅翰曰大是箇生聖人聖是箇熟大人補訓無我而後成性成性即位天德成性即化也愚按此節大意明大聖神之義而以論孟易辭發之也玩末句意重在神大成性猶程子所謂習與性成自然而然若出天性也集解謂復性之本體未是見幾則義明動而不括則用利屈伸順理則身安而德滋窮神知化與天為一豈有我所能勉哉乃德盛而自致耳徵引易下傳之五章君子見幾而作又云動而不括本義括結礙也又云屈伸相感而利生焉又云利用安身以崇德也又云窮神知化德之盛也補訓此推論聖神之事借易為説非專釋易雜引易辭錯綜為説亦與易本旨不同集釋見幾則義明以下進德之事也窮神知化與天為一成德之事也愚按見幾也動而不括也屈伸順理也皆取變通不滯之義與神化意合皆所謂德也積而至於德之盛則窮神知化與天為一矣精義入神事豫吾內求利吾外也利用安身素利吾外致養吾內也窮神知化乃養盛自致非思勉之能強故崇德而外君子未或致知也徵引易辭見氣有陰陽節朱子曰精熟義理而造於神事素定於內而乃所以求利乎外也通達其用而身得其安素利乎外而乃所以致養其內也蓋內外相應之理入神是入至於微妙處此却似向內做工夫非是作用於外然乃所以致用於外也故嘗謂門人曰吾學既得於心則修其辭命辭無差然後斷事斷事無失吾乃沛然精義入神者豫而已橫渠可謂精義入神補注此與上章同意補訓上數句乃崇德之事神化乃崇德而外此與易本旨不甚相遠豫與素同意未或致知只是未之或知意神不可致思存焉可也化不可助長順焉可也存虛明久至德順變化達時中仁之至義之盡也知微知彰不舍而繼其善然後可以成之性矣徵引易下傳之五章君子知微知彰上傳之五章繼之者善也成之者性也補注此又明神化之義童氏發微曰陰陽不測故不可致思推行有漸故不可助長愚謂存虛明久至德所以存神仁之至也順變化達時中所以順化義之盡也微謂神之妙章謂化之著補訓所謂神者不可強致其思存其理於心可也所謂化者不可助之使長順以俟之可也能存虛明之心以久於至德順變化之宜以達於時中斯為仁之至義之盡也既知其微又知其彰如是不已而能繼其善然後可云成之者性矣存仁微屬神一邊順義彰屬化一邊繼善成性總承易知微知彰以知幾言繼善成性以陰陽之始生人物言張子借用其語與易本旨不同愚按神不可致思四句為一層皆所謂善也存虛明六句又為一層所謂成性也存虛明即存神前節云虛明照鑒神之明也順變化即順化前節云變則化由粗入精也補注於存虛明二句外另補神化非是存神而久於至德即仁之至仁為體故屬之神順化而達乎時中即義之盡義為用故屬之化知微彰而存神順化在大人以下可能繼其善而至於仁至義盡則非聖神不能也成之性一作成人性當以之字為正蓋用易成語而意不同耳聖不可知者乃天德良能立心求之則不可得而知之發明良者自然之謂天德良能謂造位天德者自然之能非由致思助長也愚按此節大意釋孟子以明聖人之神也此不可知與前不可致知皆以人言舊説以聖人不思勉為立心求之之解故華注疑而知之三字為衍文終覺未安大心篇所用自别是一説也聖不可知謂神莊生繆妄又謂有神人焉徵引莊子逍遙遊篇藐姑射之山有神人焉補訓承上而言聖神之非二集釋孟子所言神化至誠之聖莊子所言虛無怪誕之神惟神為能變化以其一天下之動也人能知變化之道其必知神之為也徵引易上傳之九章知變化之道者其知神之所為乎下傳之一章天下之動貞夫一者也補訓引易見神之能化也凡天下之動皆神之所為是有以一之也髙注神妙萬物故曰一天下之動變化皆神也故知變化之道則必知神張注學至於可與權則知變化之道矣見易則神其幾矣補注此承上章之意而言集解易即化也神化合一故見易則神其幾補訓幾訓近主知説知幾其神由經正以貫之則寧用終日斷可識矣幾者象見而未形也形則涉乎明不待神而後知也吉之先見云者順性命則所先皆吉也徵引易豫二爻介於石不終日貞吉繫辭下傳之五章子曰知幾其神乎幾者動之微吉之先見者也君子見幾而作不俟終日介如石焉寧用終日斷可識矣本義漢書吉之之間有凶字説卦之二章聖人之作易也將以順性命之理補訓易云知幾其神乎所以然者由其於經常之理守之而得其正以之貫萬事皆能見幾而趨避之寧用終日斷乎其可識矣幾者雖有其象而未見其形必神乃知之若形則涉於迹而明顯不待神而知之也易所云吉之先見者蓋能順性命之理而動則所先見者有吉而無凶也順性命則經無不正而知幾其神可知已此依易本文不補凶字經正即順性命之理首尾見意華注神者不測之妙經者一定之理不測即在一定之中恐人不知神之本乎經淺者入於推測髙者墮於虛無故言所謂知幾其神者亦不過以經正之理無所不貫則觀其合經與否即知其幾之善惡而吉凶之兆不待終日而可以立見也愚按此節大意首四句釋易知幾其神句幾者以下又釋一幾字與吉之先見句而意則正以見神之不外於經也必以經正為言者天下事理甚煩而五品經常之道乃其大原主腦所在於此無疑然後萬事之幾無不可知知神而後能饗帝饗親見易而後能知神是故不聞性與天道而能制禮作樂者末矣徵引禮祭義惟聖人為能饗帝孝子為能饗親補訓從知神推到饗帝饗親制禮作樂上見得性與天道即禮樂之本此張子至精之論知神從上知神之所為來見易從上知變化來知神之神為神化之神非鬼神之神然其意可通聞即知也非謂聞於人華注神者合天人貫幽明而一之者也知神則知人本乎天萬物本乎祖總是陰陽合散之理故能誠意交孚而饗帝饗親也見易而後知神明神之不外乎陰陽易也神也即性與天道也苟不聞之則禮樂從何而起愚按易神性道其理一也以陰陽變化之用言謂之易以陰陽不測之妙言謂之神以易神自然之理言謂之性與天道實則一而已天神人鬼即此理屈伸往來之實然禮樂者本此理而列為度數見之聲容者也知神則知陰陽合散無非實理故能來享來格以事鬼神此首句意也知神則知陰陽屈伸無非實事故能興制立法作禮樂以事鬼神此於首句即見末句意也饗帝饗親中即有制禮作樂意在性與天道皆以天德言與首篇語性與天道之極盡於參伍之神變易而已性與天道云者易而已矣義同精義入神豫之至也華注若倉卒之間揆度事理便不能盡矣精義入神則本原已徹萬事萬化皆不能外故曰豫之至愚按此節大意釋易精義入神之文以見神之不可不知也徇物喪心人化物而滅天理者乎存神過化忘物纍而順性命者乎徵引書旅獒玩物喪志禮樂記人化物也者滅天理而窮人欲者也易順性命見上知幾節補訓此推言過化存神之義上反下正重下句李注張子言過化猶言過而不留不滯於物也故忘物纍則不徇於物不徇於物則不化於物過化之道也順性命則不喪其心不喪其心則不滅於理存神之方也集釋性命即天理也徇物喪心即書玩物喪志之謂敦厚而不化有體而無用也化而自失焉徇物而喪己也大德敦化然後仁智一而聖人之事備性性為能存神物物為能過化西山真氏曰過化存神本出孟子過化謂聖人凡所經厯處人皆化之存神謂其中所存神妙正意只是如此至橫渠先生乃謂性性為能存神物物為能過化下性字指本然者而言上性字謂我能全其性而不為情所蕩則其所存神妙不可測下物字指事物而言上物字指我之應物而言謂物物各自有理我隨其理以應之物各付物不以己之私意參乎其間則事過弗留如氷之釋如風之休後來諸老先生多本其説獨文公不以為然者蓋孟子之意未説到如此深也文公解經平實如此然橫渠先生之説亦不可不知也補注厚重有餘而不知變通之道是有體而無用也熟於應變而無厚重之德是徇物而喪己也故大德者必敦且化然後仁智合一而聖人之事備矣至於性性為能存神則極其仁而敦不足言物物為能過化則極其智而化不足言矣愚按此節大意蓋以中庸敦化之意合於孟子存神過化之文而皆非其本意敦化之化作變化之意過化之化則過而不留之意上下似難合一竊意敦化己備聖人之事矣至於敦之不已而復其性之本然則所存者神妙不測矣神比仁字較深化之盡變而因物付物而無心則所過者化而不留矣此化字亦較上為深蓋大德敦化者大之位過化存神者化之位也補注之説得之但其謂過化之化為變化而疑西山事過弗留之謂為異於張子則猶未細看耳無我然後得正已之盡存神然後妙應物之感範圍天地之化而不過過則溺於空淪於靜既不能存夫神乂不能知夫化矣徵引易上傳之四章範圍天地之化而不過本義天地之化無窮而聖人為之範圍不使過於中道髙注有一分私意則已一分未正故無我然後得正已之盡也物各付物妙應而無滯者神也故存神然後妙應物之感天地之化不止氣化凡人物之性皆是人倫日用一循其當然之則所謂範圍天地之化而不過也過則陷於異端而於神化遠矣愚按上皆存神過化窮神知化分説此節大意則由存神説到知化而以無我補出上一層本領亦如言知幾而本於經正之意也物感中即有天地之化在範圍中即有知字意在故相疊而下語意云孟子言存神易言知化是皆未易言也必無我然後能正已之盡而所存者神存神然後妙於應物之感而物各付物妙應即所以範圍天地之化不至過於中道也若過中則溺於空虛淪於寂靜既不能正已之盡而存神又安能範圍而知天地之化乎甚矣無我之要而過中者之未足語此也存神以心言知化以應事言無我然後得正已之盡而存神存神然後妙於應物而範圍不過範圍句緊連上妙應句物各有理即天地之化物各付物即範圍天地之化而知化亦不外是矣易本言不使天地之過於中道此則謂君子範圍天地之化而不自過於中道蓋因物付物而未嘗厭而弗有遣而弗存也過而淪於空靜者蔽聰塞明離事去物并無所謂存神又安能妙應而知化乎旁行不流圓神不倚也百姓日用而不知溺於流也徵引易上傳之四章旁行而不流本義旁行者行權之智也不流者守正之仁也五章百姓日用而不知十一章蓍之德圓而神補訓易謂聖人委曲旁通以行而不至於流者蓋圓通神妙不倚於一偏也若百姓日用此道而不知此道由其溺於物欲而流也安能如聖人之圓神不倚哉上正下反圓神貼旁行不倚貼不流愚按此節大意因言神化而引易以明之也不倚只是圓神意與易仁智並重者微異圓神而不倚於一偏故存神而過化義以反經為本經正則精仁以敦化為深化行則顯義入神動一靜也仁敦化靜一動也仁敦化則無體義入神則無方徵引易下傳之五章精義入神上傳之四章神無方而易無體補訓此一篇之末又錯綜前意而申言之前云精義云經正此合言之謂反經為義經正則義精也前云敦化云仁此合言之謂仁以敦化化行則仁顯也前言敦化謂敦而能化此似言敦厚其化所謂義者非他也即經正之謂也義以反經為本經正則義精矣所謂仁者非他也即敦化之謂也仁以敦化為深化行則仁顯矣義主動入神則動一靜也仁主靜敦化則靜一動也仁敦化則仁隨變化而無體義入神則義極神妙而無方蓋神化之妙如此李注由經正以貫之則知幾如神是義以反經為本也敦厚而不化則有體而無用是仁以敦化為深也補注反復也義以反經為本經正則義精精義至於入神由動而之靜也神妙於中故無方敦厚也仁以敦化為深化行則仁顯仁而能敦其化由靜而之動也化行於外故無體愚按通篇言神化之妙精深微渺至於不可形容至矣盡矣張子慮人之馳心深隱而不知所用力也故於此合言神化而以反經敦化結之見反經敦化事極切近而無方無體之妙由此馴致可見神化非不可致而正未可以易而致耳正蒙初義卷四
