body:
  text: 正䝉初義卷七邳州知州王植撰大心篇第七補訓此篇大意盡於首節狥象喪心即見聞梏心之意知合内外於耳目之外即徳性之知人病其以耳目累心而不務盡心與聖人盡性正相反成吾身節又申人謂己知節意以上皆申不以見聞梏心句體物體身節言體道則大應大心體物意又言以天體身則能體物又從成心忘化與時中説到盡性則首節所以盡性之㫖益明又以君子之大大於道明大心體物意燭天理是喻大於道之意末二節闢釋氏釋氏不能知命盡性所以不能大心體物愚按此篇凡十六節通篇一意理致綿宻雖文多不相屬而前後之意實互為發明前六節大槩皆就知邊言體物體身以下八節言身能體道則大心能無私則能體道而盡性不專就知言然知行相輔而進非竟分二事也末二節明釋氏之不能大心而盡性首節入近思錄論學釋氏妄意天性節入辨别異端大其心則能體天下之物物有未體則心為有外世人之心止於聞見之狹聖人盡性不以見聞梏其心其視天下無一物非我孟子謂盡心則知性知天以此天大無外故有外之心不足以合天心見聞之知乃物交而知非徳性所知徳性所知不萌於見聞朱子曰體猶仁體事而無不在言心理流行脉絡貫通無有不到苟一物有未體則便有不到處包括不盡是心為有外蓋私意間隔而物我對立則雖至親且未必能無外矣問體之義曰此是置心在物中究見其理如格物致知之意與體用之體不同問不以見聞梏其心曰此是説聖人盡性事今人理㑹學先於見聞上做工夫到然後脱然貫通蓋尋常見聞一事只知得一個道理若到貫通便都是一理曾子是已盡心則只是極其大心極其大則知性知天而無有外之心矣然孟子之意只是説窮理之至則心自然極其全體而無餘非是要大其心而後知性知天也問如何是有外之心曰只是有私意便内外扞格只見得自身上事凡物皆不與已相關便是有外之心問如何是不足以合天心曰天大無外物無不包物理所在一有所遺則吾心為有外便與天心不相似横渠此説固好然只管如此説相將便無規矩無歸着此心便瞥入虛空裏去了夫子萬世道徳之宗都説得語意平易從得夫子之言便是無外之實補訓大其心三句泛言理下以世人引起聖人見聖人能大心體物下引孟子説到天上以合上文大而無外之㫖見聞數句又申世人五句意大其心將心量展拓令大照下不以見聞梏其心㸔便明大心體物則無外有未體則有外矣不以見聞梏其心則其心大視天下無一物非我則能體物無外矣孟子盡心知性知天引來重在天上以取大而無外之意有外之心不足以合天心盡心知性者能以無外之心合天心故知天愚按此節大意見人當大心以體物而見聞之知不足以為知也語意云性者萬物之一原而具於人之一心心之量本大也人能大其心之量則視天下之物為一體而無所不包苟一物有未體則心為有外而其量不盡矣然心之大不大有故焉世人之心止於聞見之狹而不能盡所以小也聖人窮理盡性不以見聞梏桎其心故心大心大而視天下之物無一物非我分内故能體天下之物而無外孟子謂盡心則知性知天正謂心大則性無不盡而與天合徳也盖天大無外故有外之心不足以合天心若大心而盡性而有不能知天者乎所謂世人止於聞見而聖人不以梏其心者盖見聞之知乃交於物而知知囿於物惟徳性所知則不因見聞而萌故能體天下之物而無外也補註以大心體物與不以聞見梏心分仁智對言竊謂此節大槩皆屬知一邊細玩朱子之說所謂心理流通物我對立者似以語仁而其謂置心在物中究見其理物理無所遺者皆以言知何得以仁智截分為二意盖大心體物猶大學補格致𫝊而云吾心之全體大用無不明者此四句虚下以世人之狹引起聖人之大正明其實狹即大之反聖人盡性二句即大其心之實視天下無一物非我即體天下之物之實也盡性内有窮理意宜照下徳性所知與中庸盡性盡人物之性者微異無一物非我已有合天意故引孟子以明之孟子本謂盡心由于知性知天此則謂盡其心之量則性無不盡而自能知天意以盡心貼大心知性貼盡性知天貼天下無物非我天大無外三句即承上無物非我而反言以明之耳人心之量無所不統而自私自利之人所見不過耳目之前視一身之外已成秦越苟學者見理稍濶則於物我之間亦覺相關處多然所見亦各如其量而止惟聖人天性渾然全體洞徹視天下之物皆我一體近而親逺而民物皆非身外之事故其見之於施為者自有親親仁民愛物之實事但張子専為人之私已而見不廣者發故於親親仁愛之實事未之及而但即所見之大小言之謂此已該仁之意則可謂為仁智對言則不可由象識心狥象喪心知象者心存象之心亦象而已謂之心可乎發明此言世人以見聞梏其心者補訓夫物皆有象也由物之象可以識心若狥象反以喪心所以然者何也知象者超於象外乃謂之心狥象而存象之心心亦滯於象而已尚謂之心可乎由象識心則不以見聞梏其心狥象喪心則止於聞見之狹知象承識心來存象承狥象來知象者由象而知其理也存象之心心溺於象而昧其理也亦象而已心亦為象也髙注天下之物皆象也由象識心者格物致知也狥象喪心者玩物喪志也人謂已有知由耳目有受也人之有受由内外之合也知合内外於耳目之外則其知也過人逺矣李注申明不以見聞梏心之意髙注耳目有受受於外也不知耳目所以有受雖曰交於物而亦吾心之知與之合也然交則合而知不交則不知是其知止於聞見耳必於聞見之外而有知則徳性所知乃為知之大焉愚按内外以心與物言集釋以心為内耳目為外補訓因之以上内外為耳目與物下内外為心與物皆非是語意云夫人莫不有知矣人謂已之有知由耳目有所受於外因物而起也不知耳目有所以受者焉人之有受盖由心之在内者與在外之物兩相合也物理皆具於心故觸之即動耳人知以心體物合内外於耳目之外而不専恃耳目則是不以聞見為知而以徳性為知其知豈不過人逺矣乎天之明莫大於日故有目接之不知其幾萬里之髙也天之聲莫大於雷霆故有耳屬之莫知其幾萬里之逺也天之不禦莫大於太虚故心知廓之莫究其極也人病其以耳目見聞累其心而不務盡其心故思盡其心者必知心所從來而後能徴引詩小雅小弁篇耳屬於垣易上傳之六章以言乎逺則不禦本義不禦言無盡禮樂記使耳目鼻口心知百體皆由順正莊子人間世篇狥耳目内通而外於心知補訓此亦承上文耳目心而申言之以耳目之髙逺形心之大夫耳目未嘗不髙逺而心為尤大也天之明莫大於日故有目者接之不知其幾萬里之髙也天之聲莫大於雷霆故有耳者屬之不知其幾萬里之逺也耳目之能有如此若天之不可盡莫大於太虚故人心之知廓之而莫究其極與太虛同其大也人之病在逐於見聞以耳目累其心而不務盡其心之量耳故思盡其心者必知心所從來由於天與天同大而後能然也集觧人之心本於天而生天之太虛無所不包心之理本亦無所不包也是為心所從來知之則必自識心之大矣然後能加盡心之功耳目雖為性累然合内外之徳知其為啟之之要也華注張子恐人因上文所言遂欲遺耳目而専務識心便入於佛氏之學故言啟吾知者仍在耳目以實之李注為性累者其官不思而蔽於物者也為心助者多聞多見以畜其徳者也成吾身者天之神也不知以性成身而自謂因身發智貪天功為已力吾不知其知也民何知哉因物同異相形萬變相感耳目内外之合貪天功而自謂已知耳徴引左傳僖公二十四年介之推曰竊人之財猶謂之盗况貪天之功以為已力乎補訓此申言已有知由耳目有受之意不知以性至知也一氣說民何知以下申明上意民何知即承不知其知成吾身者性乃天之賦予神妙不測者也性自有知乃天之功人不知以性成身而自謂因身之耳目有受以發其智是貪天之功為已力吾不知其知為何如也民果何知哉因物之同異相形萬變相感耳目交物内外相合而有知乃遂貪天功而自謂已知耳亦不足為知矣李注推梏於見聞之弊其迷謬必至此愚按不直曰性而必曰天之神見性中原有感通之妙也不知以性成身猶言不知性具於身非用功語集觧謂以性成身為復其性之本未是因物三句是就自謂因身發智者言之但見物變相感内外相合而知出遂謂已有知而不知内外之所以合者即天之神為之也體物體身道之本也身而體道其為人也大矣道能物身故大不能物身而累於身則藐乎其卑矣朱子曰非以身體道盖是主乎義理只知有義理却將身只做物様㸔待謂如先理㑹身上利害是非便是以身體道如顔子非禮勿視便只知有禮不知有已耳只知有義理直把自己作無物㸔伊川亦云除却身只是理懸空只是箇義理補訓此節變性言道體道即所以盡性也先言道後言人重人體道上泛言之則無物不體切言之則體乎人身道之本來甚大也身而體乎道則其為人也大矣所以然者以道為主而視身猶物故其人以道而大若不能視身猶物而反以私累其身則其人失其大而藐乎其卑矣人可不知體道乎道能物身能字以人言謂人能以道物身也集觧體物體身言道為之體猶中庸所謂體物也體道言以道為體猶易所謂體仁也張注將體身體道分作兩様㸔未免將身與道作二見矣身乃道之軀殻也無此身則道亦無掛撘處故聖人但說修身則道立一語便了即如顔子克已亦只言克去已私耳何嘗直將已身㸔作無物都要擺脱了至於伊川除却身只是理别是一說盖謂道理徧滿世間自身以外懸空都是義理似與張子之說不相干涉耳愚按張子物身字微覺太髙朱子亦就其說而解之張注所駁不可不知能以天體身則能體物也不疑補訓此承上體道而推及於天也天者道所從出集解以天體身則吾身即天矣天之理無所不包故於物必能知之明處之當而體之也何疑之有成心㤀然後可與進於道補訓此承上文體道而言人當去其成心也㤀之有存省工夫在張注成心未便為不好之心但有意以處之未免執持於形迹之間故曰成心愚按成心雖非甚不好之心然但云可與進於道則㤀之為功尚淺下節曰化曰時中曰聖不可知乃推其至而言之化則無成心矣成心者意之謂歟補訓此承上㤀字而申言其意必化方能㤀化者因時制宜變化無方之謂成心何以能㤀乎至於能化則無成心矣成心者其私意之謂歟化則何私意之有無成心者時中而已矣補訓此承上文化字而推其意時中即化之實也集觧是所謂無適也無莫也義之與比意心存無盡性之理故聖不可知謂神補注此承上章無成心而言張注存字正對不可知說華注心存本是好字眼然有意在是初下手工夫非成徳地位先儒謂敬字是徹上徹下工夫然著意把持又非敬即此意也愚按此聖不可知以聖人之無思無為言與孟子異㫖心存不必私心如程子稱孔子無迹顔子微有迹是也然理欲幾微之間少有未融即私心猶存顔子微有迹終是三月不違之後不無少間耳以我視物則我大以道體物我則道大故君子之大也大於道大於我者容不免狂而已補訓此又申上身而體道為人大之意前體物體身以道言此以道體物我以人言集解鳥獸草木之類皆物也故以我視之則我大道者萬物之主以道體物我則我亦物也聽命於道者也故道大惟道大於物我故君子之所以為大人者惟其以身體道大於道而已矣若夫不能體道而徒自大其身則驕夸躁妄不免為狂人而已愚按篇中體字有二義首節體物中庸體物之體也體物體身道體物我體物不疑皆此意身而體道易體仁之體也以天體身亦此意皆當随文體認不必强合燭天理如向明萬象無所隐窮人欲如専顧影間區區於一物之中爾李注燭天理者知性也萬象無隐則能體物矣華注天理髙明人欲則闇蔽故其所見如此愚按此節雖不言心言性然亦大心盡性之義也燭明也影間猶言闇處釋氏不知天命而以心法起滅天地以小緣大以末緣本其不能窮而謂之幻妄真所謂疑冰者與徴引莊子秋水篇夏蟲不可以語於氷者篤於時也孫綽逰天台山賦哂夏蟲之疑氷發明張子既偹言大心足以體物恐學者不察而溺志空虚不免流入釋氏故此二章専闢釋氏之非吾儒謂天下之物無一非我故索大心以體之窮理以盡性也釋氏則謂天下之物無一非空故遂溺志空虚而不自覺求見性而不知窮理也補訓釋氏不知有天命之性凡物皆實理而以其心法之空起滅乎天地是以其見之小因以論大而亦為小以其見之末因以論本而亦為末於其不能窮者輙舉而謂之幻妄豈非所謂夏䖝疑氷者歟究其實由於不知天命耳天命即性也緣因也愚按天命皆實理故天地皆實形此吾儒之道也釋氏則以空寂為心法欲六根妄想皆歸烏有乃即此以揣度天地亦以為宜歸於空及不能然則遂舉而歸之幻妄以為太虚中不宜有而有之物起滅者謂其以一人之私見生之滅之猶所謂以意予奪人者也李注以起滅屬心語氣不合釋氏妄意天性而不知範圍天用反以六根之微因緣天地明不能盡則誣天地日月為幻妄蔽其用於一身之小溺其志於虚空之大此所以語大語小流遁失中其過於大也塵芥六合其蔽於小也夢幻人世謂之窮理可乎不知窮理而謂盡性可乎謂之無不知可乎塵芥六合謂天地為有窮也夢幻人世明不能究所從也徴引易上傳之四章範圍天地之化而不過釋氏謂眼為色根耳為聲根鼻為香根舌為味根身為觸根意為法根心經云無眼耳鼻舌身意楞嚴經云六根成解脱金剛經云一切有為法如夢幻泡影補訓此承上文不知天命以心法起滅天地而推言之妄意天性即不知天命不範圍天用即以心法起滅天地反以六根之微因緣天地遂謂天地日月為幻妄即以小緣大以末緣本謂之幻妄下文蔽其用於小溺其志於大承六根天地言之塵芥夢幻又承小大言之是皆不能範圍天用不可謂之窮理盡性無不知又挽到妄意天性上末四句又推其塵芥夢幻之意層層説下總是極言釋氏之失較上節尤為詳盡易範圍天地之化化即是用蔽遮蔽所見不全也李注此條起數語即太和篇所謂畧知體虚空為性不知本天道為用反以人見之小因緣天地明有不盡則誣世界乾坤為幻化者既不知隂陽剛柔仁義三極大中之矩則其語大語小也皆蔽於詖而䧟於淫欲不流遁失中得乎盖既溺其志於虚空是過於大也所以塵芥六合既蔽其用於一身是蔽於小也所以幻妄人世六合無窮也人世無息也謂之塵芥幻妄是不窮理者也不窮理者由於不知性之所有而昧於天之所以為天也反自謂盡性而無不知可乎惟不能知性之所有而昧於天之所以為天故其塵芥六合也則以天地為有窮而性獨無窮不知性無窮天亦無窮也其幻妄人世也則其明不足以究所從來故謂天地且幻妄况人世乎不知天人異形同歸於道天人殊用同出於性天地非幻妄則人世亦非幻妄也盖六根之輾轉流滯者乃人欲之末流而一隂一陽乃天理之本體以人欲之末流疑天理之本體豈非以小緣大以末緣本之過乎愚按妄意天性謂以私意揣度天性不知範圍天用正見其實不知性也吾儒以性為至實性中萬理畢具故能範圍天地之化其於吾身則以性節情以理制欲随處盡道以全其本然之體其於天地萬物則知明處當參贊位育以盡其分所得為之事皆所謂範圍天用也釋氏以空為心法遂欲遺棄一切是妄意天性而實不知本天道為用以盡範圍之理亦烏足與語性哉六根之微以下皆言其不知範圍天用處即不知性之實也蔽于小跟六根來溺於大跟因縁天地來語大語小二句虚下言其實以六合為微塵芥子正溺於大而語大之失中也以人世為夢幻泡影正蔽於小而語小之失中也此數語層層推出總不外前節以心法起滅天地以小縁大以末縁本之意明不能盡與明不能究所從俱言釋氏少窮理之功而不能明此補訓謂明其不能究所從亦未合正䝉初義卷七
