body:
  text: 正䝉初義卷十五邳州知州王植撰樂器篇第十五補訓首節釋樂記之文因有樂器字故以名篇首言樂次節言樂章樂章詩也以下遂言詩至漸漸之石皆詩也君子所貴節偶及論語苟造德以下至篇末皆言書得失相半不盡可從愚按此篇凡三十七節內釋詩者二十五章釋書者七章多用序說與朱蔡傳注有迥不同者當以張子之意自存一家之言舊多雜入朱蔡語恐未合樂器有相周召之治與其有雅太公之志乎雅者正也直己而行正也故訊疾蹈厲者太公之事耶詩亦有雅亦正言而直歌之無隱諷譎諫之巧也徵引禮樂記治亂以相訊疾以雅陳注相拊鼓也所以輔相於樂治亂而使之理訊亦治也雅亦樂器也過而失節謂之疾奏此雅器以治舞者之疾樂記又云發揚蹈厲太公之志也武亂皆坐周召之治也陳注初舞時發揚蹈地而猛厲所以象太公威武鷹揚之志也武舞將終而坐象周召文德之治蓋以文而止武也張子經學理窟禮樂篇治亂以相為周召作訊疾以雅為太公作李注此張子會合樂記之語以為說集解相謂之周召之治者周召以文致大平從容而紓徐相則節奏衆樂使之從容齊發而條理不紊有文德之象也雅所以趣舞者之節奏使之訊疾蹈厲而不失其正有直己行正之意故曰雅謂之太公之志者太公威武鷹揚以直正商之心也補訓相雅並言下只言雅重在雅上詩亦有雅又因雅字及之樂記治亂訊疾泛論樂不干周召太公事發揚蹈厲方言太公張子周召之治太公之志是想像言之詩亦有雅謂大雅小雅又借以明雅訓正之意愚按集解解訊疾與蹈厲一例與陳注異似合張子四字連用之意象武武王初有天下象文王武功之舞歌維清以奏之自注成童學之大武武王沒嗣王象武王之功之舞歌武以奏之自注冠者舞之酌周公沒嗣王以武王之功由周公告其成於宗廟之歌也自注十三舞焉徵引詩周頌維清集傳此亦祭文王之詩武集傳大武周公象武王武功之舞歌此詩以奏之酌集傳此亦頌武王之詩酌即勺以此詩為節而舞也禮文王世子下管象舞大武陳注象是文王之舞維清乃象舞之樂歌武則大武之樂歌也內則十有三年學樂誦詩舞勺成童舞象二十而冠舞大夏張子理窟禮樂篇周樂有象有大武有酌象是武王為文王廟所作武功本於文王武王繼之故武王歸功於文王以作此樂象文王也大武必是武王既崩國家所作之樂奏之於武王之廟酌必是周公七年之後制禮作樂時於大武有增添也故酌言告武大成也其後必是酌以祀周公補訓此明象武大武酌三詩之義象武或只云象維清者周頌維清緝熙一節是也大武者周頌於皇武王一節是也酌者周頌於鑠王師一節是也酌亦頌武王之詩不及周公或亦用以祀周公歟補注內則二十而冠舞大夏此云舞大武未詳孰是興己之善觀人之志羣而思無邪怨而止禮義入可事親出可事君但言君父舉其重者也徵引毛詩序變風發乎情止乎禮義集釋此解論語興觀羣怨章補訓遺多識句以其易明也觀謂因詩而觀見自已得失張子云觀人之志稍異志至詩至有象必可名有名斯有體故禮亦至焉徵引禮孔子閒居何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉陳注至極盛而無以復加也李注此釋禮所謂五至之義也集解象猶言情狀也名言也詩言志既見得懇至得其理之情狀而無所疑必可以名其情狀親切而有味矣故志至則詩至發於言而為詩者既至則有名矣然後能見之行事而有體禮者體也親疏貴賤各得其所故曰禮亦至愚按此與上章皆釋他書之言及詩者也象者得其情狀猶云意也名猶言也心中有此意必可言之而為詩也以意與言對高注發明實作形象之象名字之名故但以雎鳩之類為說太泥有此言方可見之行事而有體故以為禮亦至以言與行對止以詩之善者言華注欲兼刺惡亦誤幽贊天地之道非聖人而能哉詩人謂后稷之穡有相之道贊化育之一端也徵引易說卦之一章幽贊於神明而生蓍詩大雅生民篇誕后稷之穡有相之道集傳相助也補注此引大雅誕后稷之穡二句而贊其功用之大也上以贊天地引起舉后稷以實之天地之道即謂化育相助稼穯即是贊化育之一端此節以詩為主禮矯實求稱或文或質居物後而不可常也他人才未美故絢飾之以文莊姜才甚美乃更絢之用質素下文繪事後素素謂其材字雖同而義施各異故設色之工材黃白必繪以青赤材赤黑必絢以粉素徵引詩衛風碩人篇巧笑倩兮美目盼兮集傳莊姜美而無子衛人為之賦碩人補訓此釋論語所引素以為絢之詩而併及繪事後素之語實謂本來實有者稱即文質相稱物字兼文質或文居質之後或質居文之後但求其稱不可執定先後以為常下文是言文先質後者而以他人形起莊姜上之素飾以素也下之素其本地也末言設色之工於材之黃白者繪以青赤先質後文也材之赤黑者絢以粉素先文後質也愚按子夏所云乃逸詩非碩人也張子因二語偶同而以莊姜為言亦是别解其看以素為絢意如唐人詩所謂却嫌脂粉汙顔色淡掃蛾眉朝至尊者也素絢之素謂質素對文言繪素之素謂本質兼文質言故曰義之所施各異陟降庭止上下無常非為邪也進德修業欲及時也在帝左右所謂欲及時者與徵引詩周頌閔豫小子篇念兹皇祖陟降庭止大雅文王篇文王陟降在帝左右易乾卦九四文言上下無常非為邪也君子進德修業欲及時也華注以易釋詩李注古注謂庭直也文王上以事天下以治民以直道無私枉也在察也文王能察知天意順而行之也張子遂以上下無邪為陟降庭止之義時時進修為察帝則而順之以周旋也補訓陟降庭止本言武王若見文王於在庭張子却是合大雅在帝左右看文王升降於帝庭即易之上下無常非為邪也進德修業欲及時也之意文王之陟降而在帝左右正所謂欲及時而進修者歟天理不離身即在帝左右上言陟降庭止下言在帝左右一意合說非分易四語為兩截愚按陟降庭止依李注其說始通以易上下釋詩陟降以易非邪釋詩庭字以詩在帝左右實庭止之事而以易進修及時釋之也然李注分作兩截尚襲陳潛室舊說竊意易四語連舉似難分屬上下張子既合二詩為言當如補訓一意說為當語意云詩言文王陟降庭止者其即易上下無常非為邪也進德修業欲及時也之義歟蓋文王之陟而上降而下皆以直而無邪者欲其德業之及時而無怠也即詩言文王陟降而云在帝左右則察天理而不離豈非所謂進修欲及時者歟江沱之媵以類行而欲喪朋故無怨嫡以類行而不能喪其朋故不以媵備數卒能自悔得安貞之吉乃終有慶而其嘯也歌徵引詩召南江有汜之卒章江有沱之子歸不我過不我過其嘯也歌集傳媵有待年於國而嫡不與之偕行者其后嫡被后妃夫人之化乃悔而迎之媵見江水而起興易坤卦彖西南得朋東北喪朋安貞吉彖傳西南得朋乃與類行東北喪朋乃終有慶補注此以易卦彖辭釋詩江有沱之意補訓江沱之媵宜以類行而不得行似不能無怨因其欲絶去私心故能無怨嫡宜以類行以媵備數因不能絶其私心故不能以之備數然卒能自悔得坤道安貞之吉乃與類行而終有慶故謂之嘯也歌集釋媵從嫁之女也類即媵也發明易朋本即指類言張子則以朋為自已比昵其君之私意愚按嘯者悔極之聲歌者共處而相歡也故以易之有慶釋之采枲耳議酒食女子所以奉賓祭厚君親者足矣又思酌使臣之勞推及求賢審官王季文王之心豈是過歟徵引詩周南卷耳篇詩序后妃輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心首章采采卷耳不盈頃筐嗟我懷人置彼周行二章陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷三章陟彼高岡我馬𤣥黃我姑酌彼兕觥維以不永傷末章陟彼砠矣我馬瘏矣我僕痡矣云何吁矣小雅斯干篇惟酒食是議補訓此釋卷耳詩用小序之說首章毛傳思君子官賢人置周之列位二章鄭箋我君也臣出使功成而反君當設燕饗之禮與之飲食以勞之此枲耳即卷耳可煮為茹采枲耳議酒食所以奉賓祭厚君親者足矣此釋首二句又思酌使臣之勞推及求賢審官乃釋周行及二三節王季文王之心不是過深贊后妃之賢能事翁相夫集釋采采卷耳酌以金罍兕觥酌者以為酌臣馬之瘏僕之痡者以為君求賢審官之勞故王季文王之心亦不是過愚按此以采枲耳四句釋詩采采卷耳二語以酌使臣句釋詩酌以金罍兕觥求賢審官未詳所指集釋謂指馬瘏僕痡以張子語氣按之詩詞節次似為甚合然下卷耳節又以云何吁為臣之怨苦吁嗟玩張子語意豈以二三節之一二句皆謂君之求賢審官二三節之不永懷永傷及末節之云何吁矣皆謂臣之不致怨苦歟甘棠初能使民不忍去中能使民不忍傷卒能使民知心敬而不瀆之以拜非善教浸明能取是於民哉徵引詩召南甘棠篇首章勿翦勿伐二章勿翦勿敗卒章勿翦勿拜集傳拜屈也張子經學理窟自道篇家中有孔子真嘗欲置於左右對而坐又不可拜而瞻禮皆不可無以為容思之不若卷而藏之尊其道若召伯之甘棠始也勿伐及教益明於南國則至於不敢拜補注此言甘棠三章之意集釋詩言勿拜勿屈折也張子則謂去伐也瀆之以拜拜敬之也不可拜者恐瀆之也補訓寖漸也善教寖明即傳所云布文王之政華注所謂得民心者故云善教愚按集傳謂召伯既去之後愛及其樹而反復言之張子則謂教愈明而敬愈至三章有淺深非一時事也振振勸使勉也歸哉歸哉序其情也徵引詩召南殷其靁篇振振君子歸哉歸哉補訓釋殷其靁三章詩振振言其能信厚張子則謂勸勉其信厚也末叠言歸哉序其思君子之情望其歸也卷耳念臣下小勞則思小飲之大勞則思大飲之甚則知其怨苦噓嘆婦人能此則險詖私謁害政之心知其無也徵引詩已見采枲耳節補訓卷耳即枲耳一詩再言之發明小飲酌以金罍也大飲酌以兕觥也云何吁矣乃怨苦噓嘆也險詖私謁蠱君心而專寵者也專寵必害政者也李注此詩之義以為后妃為使臣作者朱子辨之詳矣綢直如髮貧者紒縰無餘順其髮而直韜之耳徵引詩小雅都人士篇彼君子女綢直如髮禮內則櫛縰笄總注縰黑繒韜髮者以縰韜髮作髻補訓此解綢直如髮句以綢為韜韜所以容髮韜之直順其髮愚按詩義綢密也密而直如其本然之質言其髮之善也張子則以綢為縰以髮為紒紒同髻綰髮為髻而外韜以縰此外無餘飾以是為貧也韜者冒而藏之之義所以為韜者即縰也蓼蕭裳華有譽處兮皆謂君接已溫厚則下情得伸讒毁不入而美名可保也徵引詩小雅蓼彼蕭斯我心寫兮是以有譽處兮集傳譽善聲也處安樂也諸侯朝於天子天子與之燕故歌此詩小雅裳裳者華我心寫兮是以有譽處兮集傳此天子美諸侯之詞補訓君接已溫厚則下情得伸是從上句我心寫兮來讒毁不入而美名可保是說譽處之意或以處為保其有常歟愚按此節大意因二詩詞同而合釋之也詩本天子美諸侯此則自諸侯言之故曰君曰己乃詩詞之對面耳商頌顧豫蒸嘗湯孫之將言祖考來顧以助湯孫也徵引詩商頌那篇烈祖篇篇末皆云顧豫蒸嘗湯孫之將集傳將奉也補訓朱傳以將為奉謂奉祭張子以將為助謂降福愚按此節大意釋顧豫蒸嘗二句不著何篇亦合釋二詩之文也鄂不韡韡兄弟之見不致文於初本諸誠也徵引詩小雅常棣篇常棣之華鄂不韡韡集傳鄂然外見之貌不猶豈不也韡韡光明貌此燕兄弟之樂歌補注釋詩小雅常棣之意與朱傳亦異集解此以不字實看初疑當作物愚按兄弟相見難以言初作物似優采苓之詩舍旃則無然為言則求所得所譽必有所試厚之至也徵引詩唐風采苓篇舍旃舍旃苟亦無然人之為言胡得焉集傳旃之也此刺聽讒言之詩人言未可遽信姑舍置之而無遽以為然徐察而審聽之則造言者無所得而讒止矣補注釋詩采苓篇發明詩曰舍旃舍旃苟亦無然謂無然遽舍之又曰人之為言胡得焉謂於人言當求其何所得也與朱注異簡略也無所難也甚則不恭焉賢者仕祿非迫於饑寒不恭莫甚焉簡兮簡兮雖刺時君不用然為士者不能無太簡之譏故詩人陳其容色之盛善御之強與夫君子由房由敖不語其材武者異矣徵引詩邶風簡兮簡兮方將萬舞二章有力如虎執轡如組三章赫如渥赭公言錫爵集傳賢者仕於伶官有輕世肆志之心其言若自譽而實自嘲也王風君子陽陽左執簧右招我由房二章左執翿右招我由敖集傳此不以行役為勞而安於貧賤以自樂其家人嘆美之由從也房東房也敖舞位也補注釋邶風簡兮之意補訓簡略也於事脫略漫應無所畏難也簡之甚則不恭焉此數句泛言簡下方接出賢者以見不恭而為簡太簡之譏太即甚也甚則不恭故詩人陳其容色之盛曰赫如渥赭言其善御之強曰有力如虎以此人而仕於伶官所以譏其簡而不恭也君子揚揚言君子左手執笙簧右手招我從東房以共聽左手執翿羽右手招我由敖以共觀只是安貧賤以自樂不復言其材武無簡略不恭之意故謂簡詩與之異破我斧缺我斨言四國首亂烏能有為徒破缺我斧斨而已周公征而安之愛人之至也徵引詩豳風破斧篇既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將集傳皇匡也將大也補注釋豳風破斧之意四國首亂武庚與三監叛也安之謂安四國之人也補訓詩傳以破斧缺斨為甚勞張子謂四國無能為易於敗滅徒令我破斧缺斨而已是軍士稱快語匡即所以安也愛人從哀我字看出至字從將字看出愛人之至即哀人之將變文耳伐柯言王當加禮於周公取人以身也其終見書豫小子其新逆徵引詩豳風伐柯篇伐柯伐柯其則不逺我遘之子籩豆有踐集傳比得見周公之易書金縢篇王啓金縢之書得周公代武王之說王執書以泣曰惟朕小子其新逆蔡傳新當作親補訓釋豳風伐柯取人以身借中庸語言當以身迎周公其終成王見周公身代武王之書乃曰豫小子其親逆即加禮以身之證也高注此指成王而言其曰籩豆有踐者加禮也其則不逺者取人以身也書新逆謂迎周公以歸也李注伐柯詩箋成王既得風雷之變欲迎周公而朝廷猶疑於王迎之禮是以刺之九罭言王見周公當大其禮命則大人可致也徵引詩豳風九罭篇九罭之魚鱒魴我覯之子衮衣繡裳朱傳周公居東之時東人喜得見之補訓釋詩九罭九罭之大網則大魚可得王加禮命於周公而賜之衮繡則可致周公之歸大人謂周公也集釋張子以衣冠為禮命之大也狼跋美周公不失其聖卒能感人心於和平也徵引詩豳風狼跋篇公孫碩膚赤舄几几二章公孫碩膚德音不瑕易咸卦彖聖人感人心而天下和平補訓此釋狼跋與朱傳意合周公能感人乃詩言外意高注狼跋之詩言周公遭流言之變而安肆自得赤舄几几然德音不瑕而不失其聖也甫田嵗取十千一成之田九萬畝公取十千畝九一之法也徵引詩小雅甫田篇倬彼甫田嵗取十千補訓釋小雅甫田之詩朱傳與張子說同李注此十千以所取之數言故謂一成周頌十千以耦耕之夫言又有終三十里之文故謂一同也此以都鄙井里之制言周頌以鄉遂溝洫之制言后稷之生當在堯舜之中年而詩云上帝不寧疑在堯時高辛子孫為二王後而詩人稱帝耳徵引詩大雅生民篇上帝不寧集傳不寧寧也史記五帝本紀帝嚳號高辛氏李注古說不以后稷為嚳之子但言其母配高辛氏帝耳張子謂后稷生當堯舜中年則高辛之帝已沒生后稷者高辛氏之子孫耳而詩言履帝武又言上帝不寧者䝉其先號而稱詩箋亦言二王之後得用天子之禮故禋祀上帝於郊禖也二王謂高陽氏高辛氏也補訓詩上帝謂天言后稷生之易是天欲寧姜嫄也張子以帝為高辛氏子孫只是疑案周封夏殷之後為二王後在堯時則高辛氏子孫必有爵位猶周之二王後詩人因其為帝裔謂之為帝張子謂高辛子孫因后稷生之異而驚疑不寧也愚按此節大意釋詩上帝不寧之語也生民篇孔疏云大戴禮帝繫篇帝嚳四妃上妃曰姜嫄生后稷鄭氏信䜟緯命歷序云帝嚳十世則堯非嚳子稷又少于堯則姜嫄不得為帝嚳之妃故云當堯之時為高辛之世妃謂其為後世子孫之妃也據此則張子全用鄭說於帝字頗費解而張子所言二王者抑又難為之解也姑存李注補訓以俟考焉唐棣枝類棘枝隨節屈曲則其華一偏一反左右相矯因得全體均正偏喻管蔡失道反喻周公誅殛言我豈不思兄弟之愛以權宜合義主在逺者耳唐棣本文王之詩此一章周公制作序巳情而加之仲尼以不必常存而去之徵引見前鄂不韡韡節朱子曰唐棣自是一篇詩與常棣别且是兩般物夫子止是取下面兩句云人但不思思則何逺之有不與上文通漢儒合為一章故誤認偏其反而為反經合道也黃氏瑞節曰張子誤以唐棣為常棣又誤襲漢儒之失然以為仲尼去之甚善蓋刪詩也補訓此釋逸詩唐棣之華四句棘有刺唐棣亦有刺相類隨枝節之屈曲而開花屈者不伸也曲者不直也偏者偏於一邊反者又反而就於正如偏於左又反於右偏於右又反於左是左右相矯有左有右因得全體均正不見其偏偏以喻管蔡之失道流言於國助武庚為亂反以喻周公之誅殛管蔡其云豈不爾思室是逺而者蓋言豈不思兄弟之愛乎但以權宜合義主在逺者耳權宜合義是因舊說與上章可與權合看常棣為燕兄弟之樂歌亦非出於文王以全詩為文王作此一章為周公制作時序已情而加之殊不然仲尼以不必常存而去之亦未必為此高注主在逺謂為社稷長逺慮也日出而隂升自西日迎而㑹之雨之候也喻婚姻之得禮者也日西矣而隂生於東喻婚姻之失道者也徵引詩鄘風蝃蝀篇蝃蝀在東莫之敢指二章朝隮于西崇朝其雨集傳此刺淫奔之詩在東者暮虹也方雨而虹見則其雨終朝而止矣集解詩以刺淫奔張子解之為婚姻高注此以自西者為陽倡隂和為婚姻得禮之喻自東者陽倡而隂不和為婚姻失道之喻也集釋南軒張氏曰蝃蝀見則雨止初無東西之分驗之多矣隂陽和則成雨隂氣方凝聚而日氣自他方來感不以正隂受其感其正反為之解散故雨不能成也由張氏之言觀之則蝃蝀之見不問東西皆止雨者也今乃以崇朝其雨解為雨之候非其情矣喻婚姻之得禮亦不然淫慝之氣害隂陽之和正猶女子淫奔之惡害人道之正皆所以喻婚姻之失道也何得禮之有鶴鳴而子和言出之善者歟鶴鳴魚潛畏聲聞之不臧者歟徵引易中孚九二爻鳴鶴在隂其子和之上傳之八章解之曰君子居其室出其言善則千里之外應之况其邇者乎詩小雅鶴鳴于九臯聲聞于野魚潛在淵或在于渚集傳鶴鳴而聲聞言誠之不可掩也在淵而在渚言理之無定在也補注此引易大傳之辭明詩小雅鶴鳴魚潛之意也補訓於子和見其善而有應於魚潛取避鶴意故以為畏聲聞之不臧鶴鳴一也而有善不善見言不可不慎鴥彼晨風鬱彼北林晨風雖摯擊之鳥猶時得退而依深林而止也徵引詩秦風鴥彼晨風鬱彼北林未見君子憂心欽欽集傳鴥音聿疾飛貌晨風鸇也婦人以夫不在而言鴥彼晨風則歸于鬱然之北林矣故我未見君子而憂心欽欽也補注釋秦風晨風之意補訓鸇為摯擊之鳥時得退依深林而止以形君子不得退而休息之意漸漸之石言有豕白蹢蒸涉波矣豕之負塗曳泥其常性也今豕足皆白衆與涉波而去水患之多為可知也徵引詩小雅漸漸之石篇末章有豕白蹢蒸涉波矣集傳將帥出征不堪勞苦而作此詩蹢蹄蒸衆也易睽卦上九見豕負塗補訓釋有豕白蹢二語而舉其篇名言之朱子引此數語入詩傳君子所貴乎道者三猶王天下有三重焉言也動也行也補訓中庸三重本謂禮度文張子以為言動行又配以論語所貴乎道者三動容貌可謂之動出辭氣可謂之言正顔色與行難以貼合補注動容貌與議禮皆動也正顔色與制度皆行也出辭氣與考文皆言也苟造德降則民諴和而鳯可致故鳴鳥聞所以為和氣之應也補訓苟當作耉徵引書君奭篇耉造德不降我則鳴鳥不聞蔡傳言召公去則耉老成人之德不下於民在郊之鳳將不復得聞其鳴矣召誥篇其丕能諴於小民蔡傳諴和也無逸篇用咸和萬民補訓釋君奭篇添出諴和一層以見民和而有和氣之應乃致鳳鳴集解此以下皆解書耉老也造成也謂召公也九疇次序民資以生莫先天材故首曰五行君天下必先正己故次五事己正然後邦得而治故次八政政不時舉必昏故次五紀五紀明然後時措得中故次建皇極求大中不可不知權故次三德權必有疑故次稽疑可徵然後疑決故次庶徵福極徵然後可不勞而治故九以嚮勸終焉五為數中故皇極處之權過中而合義者也故三德處六徵引書洪範九疇初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極一五行一曰水二曰火三曰木四曰金五曰土二五事一曰貌二曰言三曰視四曰聽五曰思三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賓八曰師四五紀一曰嵗二曰月三曰日四曰星辰五曰歷數五皇極皇建其有極六三德一曰正直二曰剛克三曰柔克七稽疑乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔八庶徵曰雨曰𤾉曰燠曰寒曰風九五福一曰夀二曰富三曰康寧四曰攸好德五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱蔡傳洪大範法疇類也治天下之大法其類有九皇君極至極之義標凖之名中立而四方所取正焉者也華注此節倣序卦意釋九疇之序補訓民所資以生莫先於五材故首五行君天下必先正己正己修身也故謹五事正己然後治邦而行政故次八政政不以時舉則無憑而昏亂故次以五紀五紀既明然後時措必求其得中故次以建皇極皇大也極中也求大中不可不知權變故次以三德之用行權則必有所疑故次以稽疑卜筮之法稽疑必求可徵故次以庶徵徵必徵之福極然後可不勞而治故以嚮勸終焉以嚮兼威威亦使之知所向也末二句專明五六五為九數之中故皇極處之以其中也行權則取其過於中而合義六數過中故三德處六補注皇極二字自漢孔安國訓為大中故張子言求大中不可不知權親親尊尊又曰親親尊賢義雖各施然而親均則尊其尊尊均則親其親為可矣若親均尊均則齒不可不先此施於有親者不疑若尊賢之等則於親尊之殺必有權而後行急親賢為堯舜之道然則親之賢者先得之於踈之賢者為必然堯明俊德於九族而九族睦章俊德於百姓而萬邦協黎民雍臯陶亦以惇敘九族庶明勵翼為邇可逺之道則九族勉敬之人固先明之然後逺者可次序而及大學謂克明俊德為自明其德不若孔氏之注愈徵引禮喪服小記親親尊尊長長陳注親親謂父母尊尊謂祖及高曾祖也書堯典克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍蔡傳俊大也堯之大德平均章明也此言堯能推其德自身而家而國而天下所謂放勳者也臯陶謨惇敘九族庶明勵翼邇可逺在兹蔡傳厚敘九族則親親恩篤而家齊矣庶明勵翼則羣哲勉輔而國治矣近而可推之逺者在此道也身修齊治而天下平矣補訓此雜引禮記中庸孟子之言而以釋書為主以親親尊尊親親尊賢義雖各施提起然而親均至不疑所以釋親親尊尊之義若尊賢之等至必然所以釋親親尊賢之義此段為重以之引起書言見得堯之尊賢先其親也堯明俊德至次序而及總以明堯事臯陶之語是借證末言大學訓克明俊德不如孔注李注此條大意以親親為主言以尊尊權衡於親親之間有家之常也而以尊賢權衡於親親之間則實為治之要務集解此章所引書皆非本㫖今且就此解之如祖父母父母親之均者也而祖父母則尊矣故禮不以父命廢王父命如伯叔父尊之均者也而有從與再從三從之别則從者為親再從三從者為疏矣如均為從伯叔父親尊之皆均者也然伯兄而叔弟伯之齒固當先者矣此施於有親者其隆殺之禮固無所疑急親賢謂以親之賢者為急明如明明揚側陋之明謂顯用之也俊德謂大德之人也庶明明字同上義勵勉也翼敬也邇謂九族之賢者此皆張子之意本孔氏注而論若論其極堯典本記堯德業之盛當舉其全體大用而言正己而物正則用賢行政之類固自包在其中不宜偏指用賢也蔡傳為不可易矣張子反以大學為非而取孔氏之注不亦誤乎愚按張子語意云禮言親親尊尊明九族之親與尊異也中庸又曰親親尊賢明親親之與尊賢又異也是其義雖各施然自有並行而不悖者以尊與親言之親均則尊其尊如祖父母與父母同親而祖為尊尊均則親其親如伯叔父母同尊而伯叔親於從伯叔則尊之親之為可矣若親均尊又均則於中以齒為先如均為伯叔父而伯為齒之尊此其施於有親者雖異而無可疑也然苐以親論之耳若以尊賢言之尊賢之有等級或為大賢或為小賢則於尊親之隆殺又必兩相權衡焉使賢者無失其為賢親者無失其為親而後可行也彼大德大賢迥出於尊親之外者無論矣若親踈之賢既均則親親尤要焉孟子嘗以急於親之賢者為堯舜之道然則親之賢者先得而後得之於踈之賢者為必然而無疑矣書不嘗言之乎昔者堯明揚大德之人於九族而九族睦章顯大德之人於百姓而萬邦協黎民雍此急親賢之實也臯陶亦以惇敘九族之人庶幾明揚其勉敬者為邇可逺之道正謂九族勉敬之人當先明之然後逺者可次序而及也大學以明俊德為堯之自明其德不若孔安國注尚書作明揚大德之人為愈矣然則親親可不急乎義民安分之良民而已俊民俊德之民也官能則凖牧無義民治昏則俊民用微徵引書立政宅乃事宅乃牧宅乃凖兹惟后矣謀面用丕訓德則乃宅人兹乃三宅無義民蔡傳徒謀之面貌用以為大順於德乃宅而任之三宅豈復有賢者乎洪範乂用昏不明俊民用微補注釋書立政三宅無義民及洪範俊民用微之意集解書本㫖義民猶言賢者張子以為安分之良民而已非有大材大德也官能則居凖牧之位者皆大賢之德無義民矣洪範政治昏昧不明則於賢者必不能舉而用之故俊民用微高注凖謂凖人守法之有司也牧謂常伯牧民之長也官即凖牧愚按此因二書皆言民故合而釋之以義民為安分之良民而已未知謀面作何解也五言樂語歌詠五德之言也徵引書益稷篇豫欲聞六律五聲八音在治忽以出納五言蔡傳五言詩歌之協於五聲者也補訓書五言兼善不善說張子謂五言乃作樂所用之語為歌詠五德之言是言必由於仁義禮智信之五德而後可入樂章與書治忽不甚合愚按此節大意解書所謂五言者亦不如蔡傳之說愈卜不習吉言卜官將占先决問人心有疑乃卜無疑則否朕志無疑人謀僉同故無所用卜鬼神必依龜筮必從故不必卜筮玩習其吉以瀆神也徵引書大禹謨官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉蔡傳蔽斷昆後習重也占卜之法不待重也補注釋書大禹謨之意李注此以鬼神其依龜筮協從為未卜而預斷其必然之辭故其說卜不習吉如此華注以習為煩瀆之意既吉矣而復瀆神則習其吉也衍忒未分有悔吝之防此卜筮之所由作也徵引書洪範卜五占用二衍忒蔡傳衍推忒過也所以推人事之過差也華注釋書衍忒補訓以衍同愆字看衍忒未分是於事之愆忒不能分曉恐其致悔吝而防之故决之以卜筮愚按朱子亦有一說云衍疑是過多剩底意思忒是差錯了微與張子意同然於經文意理句法皆有未安蔡傳為是正䝉初義卷十五
